body:
  text: 湛園集巻六翰林院編修姜宸英撰墓表户科掌印給事中黄湄王公墓表户科掌印給事中黄湄王君以今年三月日卒官於京師其孤幼也越月而其仲弟明經又維自關中奔䘮將以其孤奉柩還葬於郃陽之某原而哀不自勝過余請曰吾兄行述吾已謁竹垞檢討銘諸其幽矣吾懼無以表諸道謹伐石為碣待子之辭余曰可哉給事之於余厚也是惡得無言君諱又旦字㓜華黄湄其别號世為西安郃陽人順治十三年以經魁其鄉明年戊戌舉禮部己亥殿試成進士需次選人而南遊吳越間與余邂逅廣陵是時君年甚少見其精研詩律分刌節度辨入毫芒謂再遲君學力當於古人中擅長不難耳已相别十年時聞其為令濳江有治績如古循吏又數年間其入為給事中論事大廷不激不阿惟事之宜如古所稱名諫臣以是悔吾向之以詩期君者尚未足以盡君之能事而君之好詩也亦愈甚益工自京師士大夫上舎名宿逺方遊士以詩請業者君與之辨疑送難獻酬竟日無倦容經其指授皆有家法雖天子亦聞之時對侍官稱其才僉以君當得大用使其聲施煜然然不幸以死故聚而哭君者歴時有餘哀是以不足以見君之賢矣乎君初筮仕當得推官後例改為縣始治濳江親履畝定賦杜豪强侵占葺長堤拄漢水決囓建傳經書院築説詩臺興起逢掖以禮讓值寅邜方事之殷縣居孔道征調旁午君糗糧芻茭無所缺臺司倚毗民忘其勞既為言官疏湖北堤工恊濟之害荆郢分界治段絶委卸而專考成得㫖報可已改户科掌印典試粤東還過南海花山建議於其地設縣治奪盜淵藪㫖又報可君之盡心於所職雖去不忘其民雖其暫時經厯之地猶欲為國家計久逺如是然君當試事之竣也嘗因間邀友人登羅浮極頂訪白鶴峰址蘇子瞻故居還泊彭蠡躡匡廬眺望五老峰岞久之乃去皆有詩數十首紀其事其意方自快極耳目所未經有飄然遺脱塵埃之想而視世之一切建功立名者若不足為君又自言吾所居芝川舊廬中條當其前龍門太史公祠踞其左山水竒勝嘗日讀書其下及為縣案牘倥偬呻畢不廢以此記誦日益夥而恒苦於無所自得夫詩小道耳不足事吾行謀告歸先人之敝廬益陳書而觀之以求夫古聖賢者之用心而致力焉庶㡬求其自得於己者也其未寢疾前一月猶秉燭為余言如此今君既不幸以死則夫世之所交口稱君者舉非君之志而君之志之所欲為一旦奄棄於不及為者又孰傳而孰信之哉此余之所以尤悲徒致歎於天者之無可如何而已矣君儀觀豐碩胸中廓然無滯吝與人交披露軒豁既貴二十餘年兄弟尚未析㸑明經君每言及必涕雨下則其生平友愛可知也父圖南誥封文林郎母康氏封孺人娶范氏繼張氏皆封孺人子鳩側室崔氏出君前年自嶺南歸䘮其七嵗子鯈以此積傷致損而鳩今纔五嵗君沒年亦止五十有一則造物者之於君誠有不可得而知者矣河津令李公墓表公諱源字星來一字江餘姓李氏其先自遵化徙居商河高祖諱志臯夀百有十嵗志臯生蘭明嘉靖間再徙徳州而蘭子大華遂以舉人起家武强令生二子明誠明諴明誠領鄉薦十上春官不第魏忠賢聞其名幣招之不得由此名益重無子以明諴長子為後即公也順治乙酉舉於鄉次年成進士除知河津縣事縣殘於賊少居民公潔已視事寛徭輕刑以與之休息未幾流亡復聚於是鋤奸吏屏豪彊有張家璧者侵奪人田産子女無數厯數政不敢問公榜其子於庭以次列被寃者簿質之而盡録其所奪還之主於是傍近縣聞之訴狀者皆書紙尾請下河津治案牘填委剖決無滯老吏不得上下手政聲日聞上官雖素威嚴者輒為公霽容以戒於他縣令曰若治縣何不效河津耶一日上謁䑓使聞河津何所有對曰止有龍門山耳他固無所有也凡䑓所下檄不便即封繳上司初不能平久之反以為賢而慰薦公章屡上報最矣㑹大同搃兵姜壤反破汾路盡下平陽諸屬縣公築隍浚壕募勇卒援甲登埤為死守計相持至五月不能支乃率健兒十餘人突圍出而張家璧者遂乗亂伏黨山中謀刼公投賊適風沙晝晦疾馳數十里得脱時蒲州已陷即求援於陜西搃督孟公且請身為嚮導前驅擊賊得兵三千人大破賊蒲州收復河津而家璧亦就禽村堡尚有為賊守者軍士欲屠之公持不可乃止㓂平搃制上公功狀吏議以功過相凖不叙遂拂衣歸順治十三年詔城池失守官情勢可原者許督撫以名奏河津數百人詣䑓白狀撫軍立為疏聞終格於部議不行公自此無意當世矣家故有别墅築退菴居之因以自號積書萬巻朱墨㸃勘於國家典故河漕鹽屯兵農諸務皆有論次而其餘古治亂興廢得失之故遇事感發胸中排笮有耿耿不能下者則托之詩歌時復放浪於世外之言園居乗夜折柬招客浮白大呌博簺競進絲竹迭奏非達旦不休或時晝眠雖達官在門撼之不可起人以為任達也而不知其中之所寄有難言者即讀其書者亦以為感憤無聊而已而不知其身之既老而才之有可用也晩嵗閉門静坐屏絶讌㑹預定亡日期戊辰四月某日果至期卒夀七十嵗夫疆埸之事城亡與亡正也就身求援以圖恢復亦正也不幸而事敗圖不克遂原心者猶録其功况於出萬死一生之力收城殺賊名為功過相凖而不以功擢何也且其時失守從賊因縁還職者相望而公獨以深文被黜不屑出一言自解説遂至老死不復不大可惜乎雖然自公罷官及捐館垂四十年其間仕宦風波之振撼檣摧軸折或身家之不保後先接踵也乃公獨蕭然塵埃之外是非不入其耳得䘮不關其心晩有賢子四人諸孫林立一門師友鄉里歸重彼此相較其得失何如耶公元配朱孺人能佐公貧賤以成名者也繼王孺人又繼王孺人父諱夢卜十六歸公於河津署中公歸里後日對客飲宴不問家人産孺人聞客至泊具立辦御家嚴肅口授孝經論語教諸子畢方就外傅撫前母子如已出者恩意反過之河津公雖失志久困而能怡然自忘其憂者亦以有孺人也孺人後公八年以丙子八月日卒享年六十有五朱孺人生楨國子監學正王孺人所生子森助教棅舉人檉庠生女之壻曰趙廷講于徳慎金庭遶某曽祖太常公與武强公同癸酉鄉舉而某又與棅同舉癸酉順天鄉試交誼最厚故因棅請不敢以固陋辭謹掇其梗槪而掲之於墓道之右旌表節烈湯母趙恭人墓表前代自崇禎之季盜賊之禍極矣李自成以三輔劇賊鈔掠自關以東徧於中原而河南被兵始自庚辰間屠殺尤慘當此之時朝廷日責諸臣以死守其間偷生䑕竄歸命司敗者接踵而有司與其鄉之士大夫攖城固守力屈被刃肝腦塗地者亦往往而有然恭人趙氏以一婦人而能與封疆死事之臣争烈至於罵賊不屈視死如歸此其所以尤難也恭人為睢州文學孝先湯公元配子參政君斌時對予言其母事輒涕下不可止方河南未亂時連嵗苦旱蝗既自成擁衆數十萬蹂躪開歸間睢旁羣邑皆陷恭人時邑邑對孝先公嘆息廼拮据為其子女營婚嫁如日不足者明年賊大至參政從其伯父讀書城北山莊聞難奔赴門者止焉不得入謂孝先公曰我所以遣子者正以今日也今來則俱死無益子盍往止之於是孝先公登陴及其兄與子相望而哭已相訣去城破孝先公負其母逃葭葦中獲免初邀恭人偕往恭人固不肯曰吾誓與此廬俱盡矣解衣帶自經不死投井井眢家人甫縋出之而賊羣至環脅以刃益罵不絶聲遂被害時三月二十有二日也十餘日參政歸哭而殮之尸殭如生恭人姓趙氏世為望族孝先公諱祖契自恭人始歸其舅姑以為賢孝先公績學有孝弟行而恭人能佐之以不懈臨賊時猶力謀脱姑於難性諳書課參政讀率至夜分乃止其他懿行多見傳述中故予不盡載而亦有不必載者葢人之能不亂於臨事者未有稍苟且於平日者也恭人既沒十一年為皇清順治九年參政中進士授翰林院庶吉士進檢討遷陜西按察司副使用覃恩封孝先公如子官而贈母為恭人又三年以巡按御史奏旌其閭葢贈與旌同被者異數也若乃加恩於前代之死節者此又古所不槩見當時朝廷思以節義移易天下而發其尊君親上之心既下禮臣褒贈明懷宗殉難臣十有四人矣恭人亦遭逢運會得膺斯典嗚呼盛哉恭人殯在堂其年九月黄河驟決城廓廬舎湮於水匶與俱没後孝先公卒始得出而合葬於本州澗崗之阡距恭人没時垂二十年矣恭人被難年纔三十有六自革命以來所在草竊芟刈煙銷塵滅而恭人之墓獨與山川之英靈同其不朽里人為建祠祀之此可見節義之報逺矣予特綜其梗槩掲而書之於隧參政字孔伯後再陞江西以父老謀所以歸養者例有兄弟者不得終養而外官賜告非特薦不得起參政君故有異母幼弟當事惜其才欲令權宜請君曰奈何以此欺吾君也且吾父老而絶憐愛少子今謂無兄弟而歸吾父聞之必不樂是失吾所以求養之意也竟以病告遂致其事時年纔三十三云今年予遇君於惠山被服寒素如諸生從兩倉頭其槖蕭然而君不知其貧也然君嘗徧行天下求能文者以暴揚其親名而辱以及予豈不為過哉余以恭人之節宜有傳因不揣其陋而為之且志君之事於右贈奉直大夫張公墓表君諱某字某大興人祖大化太平府知府父國禎邑庠生君承籍家世孝友慈惠動合矩度克無墜先人清白聲晩而有賢子曰廷琛自君沒後益讀書砥飭名行用能邀國榮寵以奉直大夫之誥賁君泉壤而贈君元配趙氏為宜人於是君之隠徳益著聞逺近有墓在京城西核桃園祖塋值今康熙紀元庚午君沒已三十餘年矣廷琛謂不可無勒辭燧道使君隠徳著聞逺近者幸不冺沒於後世且以彰國家錫類之恩於無窮於事為宜乃以狀介河中吳徵君天章請辭於予徴君予友誠篤人也述其善也葢信始君雖食貧䘮其先人祭葬皆盡禮既饒樂施不名任俠而親踈各賴其濟平居與人無争亦無所狎侮趙宜人以勤儉恭順佐之行益修年六十三沒沒之日執廷琛手誡之以不欺談笑如平常趙宜人進曰公一生辛苦得力正在此時君笑曰我此事尚煩汝多屬耶遂支頤而逝其夫婦之間類如得道者宜人生望族以未亡人持家十六年内外井井卒年六十有八子一人即廷琛候選府通判恩加一級女五人皆適人徵君謂余曰雯處津門久交其里人里中稱善人必先張君君嘗自言生平行事無一不可告天地者里中人聞之皆曰然嘗以女心疾禱於神祠拾筊神坐下得方藥五種取歸試服之疾良已至今其家用其藥施人多得愈蓋誠信之孚也如此予故不斥其怪而謂此亦足以表君之墓云墓碣文學李君墓碣平原李編修述修先生之弟曰文學静嵐君諱潤者以去年癸亥五月卒於家編修哭之逾年除服而不忍也葬有期矣謀於余思所以抒其哀者且曰甚矣吾之不良於時也吾自年十八先大人僉憲公見背時家中落太宜人勉吾兄弟以纘承先志而弟之少吾者兩嵗體羸然弱耳然獨能攻苦淬厲屢試於場屋佹得失今春秋僅三十七竟以諸生食餼終可為悲矣吾前年䘮室程次年復哭余幼女淚日漬枕席間弟知吾之不樂也思奉母京師以慰余懷臨行自筮得蹇占之不吉不果行而吾母獨來浹月而弟訃至矣吾不忍吾母之嗚鳴哭也聞弟屬纊時口呼母不絶聲曰吾則已矣垂白之老何以堪此夫其身死之不恤也而母之遺痛是憂焉噫吾弟孝子也又曰弟生平與余讀書寢食無暫離自余得第後聚首日始益寡然猶間嵗一來京師來輒連床談日夜不休嘗語余曰比頗究心方外㫖知其言非虚設顧人事紛擾轉瞬老矣可為傷悲其意欲規余以學道而不料其身之先沒也悲夫弟性沉静於人事寡所與葦簾綈几展玩經籍終日不忘謦欬人過聴之惟㣲聞繙紙聲而已又諳岐黄家言老母在家善病按法調劑數得無困今弟卒而吾母思歸愈亟吾向之所以得安於此者徒以弟在也今復何望哉吾行侍母歸哭吾弟矣子盍為吾辭而誌之且并藉以抒吾母之哀子其不可以緩余素聞編修君内行修樂交其人幸得以編纂之役追隨於史局者有年今復將别去因如其言而表之於墓道非獨為静嵐君賢也亦庸以見編修之孝友而志余嚮慕之私焉君父某進士仕至按察司僉事母某氏封安人娶某氏無子以編修之仲子某為後光禄卿介岑龔公墓碑隂光禄卿龔公以官卒於康熈二十四年七月丙戌歸葬宫詹濟南王公志其墓王公初郎户部與公同官相善也故紀其治行特詳公以幕僚起家知縣事洊歴户兵兩曹而為户部最久後由山東僉憲分巡通永道陟江南安徽布政司使内遷太常卿改光禄卿始終多居錢榖要地出納平準胥絶乾没政不龎茸公私交藉其利而居無十畝之宮無食租衣税之入遇事飈發沈幾立斷如抑伶人之暴横鄉曲執侍衛之詐傳勅㫖事尤竒偉而與人樂易恂恂長者一意當官遏請屬鋤强豪嫉貪㳫人罕得以私干然雅好延禮名士幸舍常滿聚書至萬餘巻以故公子翔麟弱冠即有聞於士大夫間人皆謂公才識使得秉節鉞整肅一道必有可紀廼廻翔九列者二年竟得疾捐舘上方有意用之盤錯而公不能待矣任不充其才施不竟其志余讀濟南公之志而惜之友人朱檢討彛尊與公舊為余言公當明崇禎末流寓昌平時李自成陷京師昌平已為賊守宻雲副將張減帥兵至射血書城中諸生孫繁祉民白希賢等反城出縛賊渠磔之以偽署劉愷澤等四人獻俘於陵側陵即田貴妃藏也凡地宫例書某皇帝之陵合以石板奉安梓宫前時倉卒不及礱石用甎朱書之鈐之以鐵皆出自光禄手公憤賊不討屢以忠義皷激其士民賊之殱公與有力焉然終不自言也葢其㣲時節概已如此檢討又曰光禄為余言壙始開入石門地甚窪濕衣被物多黬黑被錦繡裹皆用布長明燈油僅可二三寸許缸底盛以水金銀器悉鎔銅鉛充之時同入者皆咎當時内官冒破非也田妃寵冠後宫其下里物至瘠薄如此葢由思陵儉徳故如此公之緒論以有關事實余故并列之碑隂勅封文林郎翰林院編修沈公行狀公諱某字幼升先世自吳興分居華亭數傳至中書公生三子季諱某禮部儒士始占籍嘉善是謂公五世祖曾祖諱某邑庠生祖諱某父諱某生四子公其長也公讀書務為有用之學補博士弟子員嘗赴省試值嵗大祲道饉相望目擊慨傷悉解所賫貲賑之垂槖至㑹城稱貸竣事隨丁内艱哀毁逾制而是時明季荒亂相仍奉父雲嵩公流離播徙墟落間雖造次諷誦不輟及事少定返查溪舊廬日課蒼頭農事遍覔佳花果環植圃前後擁書數百卷其中所愛唯陶杜詩晨夕㣲吟或與鄰翁溪友量晴雨話桑麻蕭然有世外之想是時遂不復留意舉子業矣㑹嵗復大旱查溪左右百餘家乏食公出廩粟五百石貸之而不責其息曰吾忍獨飽也公家僅中人産遇疫癘則施槥遇饑則倣朱子社倉為廣仁㑹生平所折劵以百數晩聯吟社與其徒以各生日放生人謂公所居處民物俱被其利其仁愛如此以是鄉黨皆推為善人君子鄉飲酒禮積廢久矣至是得公翕然以為重然公天性孝友所施尤篤於親故世父没無子雲嵩公悲不自勝公力為經營喪葬雲嵩公至為之輟哀姊錢貧寡撫弱甥為其幼置室其他所為具稱是與諸弟游處欣欣然無一日離也某嘗識公二十年前既編修君為侍從京師公來視與相見執手道故見公顔色逾少精神充益於時編修同年友雍丘劉君粤西鄧君尊甫俱以迎飬來京瀬江黄中允父某公亦需次於都下數家父蒼顔白髪扶杖過從是年冬適遇覃恩皆得受封兩代拜恩闕下時公年七十矣編修君以所得校書文綺之賜製襲衣上之公服之而喜誡君曰宜勉力無忘上賜矣一時中外相傳為昇平盛事既歸踰年編修欲􅕥疏南省公寄書止之曰吾行治裝北上且儲糧舟中矣未㡬家人以訃至比予返里往弔其家其邑人往往稱述公不置云公以康熈庚午年十二月某日卒年七十有一勅封文林郎翰林院編修元配贈孺人陸太夫人先公十餘年卒公思其徳不再娶云子辰垣康熈乙丑科進士翰林院編修孺男五銘孝附例監生銘慎邑庠生銘新三殤曾孫二編修君將卜吉與陸孺人合葬於某原謂某曰君幸知吾父願有述也某不敢辭謹狀故徽州知府前工部郎中復齋秦公誄辛丑年正月十四日甲子故中憲大夫知徽州府事復齋秦公卒嗚呼哀哉初某獲交於公爰自壬辰嵗少讀其文長識其面自後素奉名節歡然若平交又重之婚姻十餘年於茲今公既沒矣其哭必不得聞伏自思念公平時所樂稱者吾文也愚不自揆敬託於旗旒公初釋褐旋出守新安甫下車渡江難作公意欲有所為不果就遂歸深自悔匿隱姓名不出方某與長公讀書山東公襆被就宿良久從者皆散去夜起徬徨與余促膝語平生事意慷慨殊壯余謂公幸春秋强遂得無意於世乎公黙然因啓戸出視天隂雲䝉冪雨聲摵摵林樾間還坐不樂出示所知相邀致書數十紙流涕謂余曰吾殘生終不能作此等事留我餘福以待子孫矣然公矢此志未嘗以聞於人者亦不解也顧謂余唯公足以語此嗚呼公今已矣某隻影落拓蕩然州里仰面無與告行且杖䇿江南北發抒其胸中不平之氣念公之沒而不聞某之言也辭曰猗歟中憲葉公是肄有宋不競播遷江㵝奕奕丞相徳流千禩違難去國爰更厥氏唯公之生實鍾地靈弱冠射策含香帝庭板蕩南徙君臣棘荆廼視起部未央是營有嘉丕績俾以專城專城維何傑立三都百雉繡錯鳥道縈紆甲起晋陽鎖焚江隅誰捍牧圉維公金聲江天一清羽飛吳越義動漳汀太守誓師湘東建邦天命匪佑諸將趣降焉首曰歸摧旄息幢吟殘於畔足企於窗予時癸巳吹篳城雉東山偃仰三人二屐長籌亮采公來萃止僕夫惆悵寒蛩嗚咽雨聲竹上公久不寐以足起我叙述䘮亂及於江左朋黨恣姦小大營賄陪京淪胥障城旋墮我為角之越閩犄之我為其唇越閩其齒猗嗟古人孰為衡權漢維北海唐則平原對書集簇馳檄飛丸事雖不成大義可觀公起闢戸還而喟歎示為箧書風雲高搴其時燭滅吹火壁間照其兩眶淚流􅀈􅀈俛仰卽予豁腎露肝與飽而趨寕餓於棺吾兒三人兩勝衣冠闔門祀臘聊以盤桓嗚呼哀哉憂能傷人僨亂血脉太陵之輸䜿子來客未幾言别公病齒劇余來視公欈李逺宅蹔止逆旅往來通昔遽命使來㩦我帷蓆書劍筐箱併處朝夕謔談里巷莊論典籍㣲視公狀未言先咳余堅謂公非齒是痗盍以温投塞其洸潰余駕而東公掉而西策肥太行及乎雍岐中道不樂我胡栖栖還息舊邱澤居巗棲紉蘭采菊不歌而唏斷山之吟其鬼夜啼無何疾亟語不及私顧謂公等且好為之治命絶賻歛襲以時嗣無廢徳御䘮克宜東山之麓魂魄所舍北山之岑夏日冬夜嗚呼哀哉公既死矣無復何憾視塵息言撫琴遺韻斵䘮成風埋空玊潤承轜始發義乖扶櫬唯公知我貧遊莫振不知我者謂余不信余與夫子元味希音大節在世惠好在心紀庸無日哀誄自今濡毫永嘆揮涕横襟嗚呼哀哉香山了義禪師塔志西北隅香山寺為吾邑祖刹有泉巗林木之勝余少時讀書其中與續宗禪師晨夕論議間以吟咏多所省發師每言必稱其祖了義禪師而是時師之化去已數年矣請余詞志其㙮予許之未就也抵今二十餘載續師命其孫某來曰吾師沒而吾年亦七十有九矣君復不銘是吾終不得見子之文也吾負吾師於地下矣予應曰諾按狀師諱隆柢字茂園别號了義姓嵇也生而有慧性六嵗隨母嚴氏入寺見誦經者侍立諦聴竟日不忍去十八始執業於香山湛然師時天台無盡大師開講觀經妙宗鈔於郡城延壽寺師往參畢就壇受具歸感寺大殿剥落身募資抵閩載木歸竣工請雲栖冲菴法師究論楞嚴七處徵經三伏臘至崇禎丁夘而寺宇宏起金相莊嚴道俗相與瞻顧賛歎而不知其所自己復攜續宗聴講於阿育王寺參學於天童密雲大和尚密問以楞嚴七處徴心因度糕與啖次頓有領悟後復延雪竇石竒師往持山門而身自奉之自是香山法席遂為諸山歸仰師之力也師雖屢參大徳問答有契然不欲為近世儇薄禪子擎拳竪拂習為謾欺以聲利相鼓動故受持經行耑念佛三昧積終身不改昔人有言曰凡浮屠之道衰其人必小律而去經由師是道也佛教其有濟乎雖其有濟佛之徒其庸知重乎生不知重於時没而又無所信於後宜續宗之惓惓以請葢不獨兾其師之有傳亦將以大庇其教於無窮也師示寂於順治辛卯之五月十三日塔於殿之東北夀六十七為僧臘四十有六年祭文祭慎貽馮公文噫嗚呼勞者易歌悲者易傷我胡不樂來登此堂葢嘗俛仰先世撫念存殁而不覺百端交集之茫茫自公未仕州里徜徉及我先君一咏一觴公之元配實我自出既姻婭之洽比况宅居之相望逮公綰綬山左鼓鷁衡湘佐軍金陵聞譽飇揚逺跡翁趙越軌龔黄雖羇身乎纓紱益係思乎江鄉夜忽夢號吾父來翔起謂夫人厥夢何祥是想所成亦維其常詰旦謁入有客曰姜喜不暇屣顛倒衣裳先君既盤桓累日而徐謂公曰吾倦遊厯年而老且衰矣而視子之鬢亦已蒼蒼盍不早遂子之初服復相與嬉笑醉歌於闞湖之傍公聞嘆息至久不忘逮先君無禄千里致弔瑣述厥事悽愴奠章自是之後再遷姑孰遂未及久而解組而江干父老徒思遺愛於甘棠某方哀陟岵之無從猶幸日周旋几杖於吾公之側兮庻幾先人之未亡何圖夙疾寒星殞芒此非徒為時勢而悲悼而俯念私情益不禁淚流之浪浪哀哀良嗣一榼充腸惟古制禮毁戒滅性况晨飱而夕膳幸太夫人之既夀而且康小人有母負來四方值公始歛戒途倉皇懼助紼之無期聊敬奠乎椒漿尚饗祭房師黄公文士感知己道重淵源古人之誼比於所天嗟我夫子族望泉山發跡省解下車白檀孤竹之墟是為絶塞不鄙其人嫗呴教誨撫循三年俗肥身瘵敝屣一官投車告退惟時酉秋分校京闈得巻雀躍大呌絶竒首薦獲雋佹復失之出受公謁留語移時閩浙異音莫辨唇齶扺掌歡咲耳聴臆度惟聆四字暗中摸索從茲别後聲聞落落歸道潞河鄉人實來事羈莫致臨岐一杯附奏數行以當祖送執書俯讀椎枕而慟今嵗徂暑蔡兄信至驚聞去秋七夕奄逝先時口占遺我一函云在季春聞子吉音得第南宫喜不自禁有子與壻以為君累行間嗚咽斑斑淚漬繄某晩達身事蹉跎我聞有命撫躬自嗟廻瞻恩地涕泗滂沱誓心欲然未知命何公卜何阡公窆何日若斧之封末由執紼雲山漫漫萬里燕粤一巵寄奠音塵永歇哀哉尚饗同年合祭杜母孫孺人文國家三年貢士於鄉與其選者謂之同年皆同省士也獨京闈解額㡬三倍於大省八旗與四方之士皆在焉其取數多而占籍之相去有逺至七八千里者然一為同年則無論逺近誼若兄弟喜相慶而憂相恤非有所作而致之以為相兄弟之道固然也順天癸酉科余軰同譜中具慶者纔十之二三獨聞大宗母孫碩人之賢於時年七十餘矣與大宗尊先生尚舉案相對不替恭敬先生待之如友以為吾老而得優㳺寢食以忘其貧者碩人之力也不幸於今月棄世先生哭之慟大宗既慟失其母又懼先生之過傷自始䘮至今朝暮一溢米號呼苫凷幾不免於毁滅吾黨見其如此皆相與涕泗助大宗悲又欲大宗之少節其哀以安先生之暮齒而釋其無涯之痛此今日登堂之奠所以既弔而又以慰也聞之先生親友云碩人慈儉婉嫕之徳不可殫述其大節甲申賊犯京城輒先誓雉經以預逺不測賴家人奔救得免後為先生嗣續計勸娶劉孺人生二子未幾劉没而躬為鞠飬長而延師則㓗治酒食以奉之不幸長兄早世大宗遂上春官迄有成立碩人之撫大宗也不知其非已出也而大宗之哭其嫡也甚於其所生之母則碩人之徳可知矣先生道徳著聞推重鄉黨於碩人亦多内助則於其沒而哀痛無已者豈獨其夫婦之情云爾哉然碩人在時初憂無子今兩孫矣大宗聲名日起門户之慶當益隆先生安享期頥上荷天寵方未艾也碩人之靈固可以自慰於地下其亦泫然舉此觴耶嗚呼尚饗祭成容若文嗚呼自兄之死無知不知而驟聞無不涕齎况我於兄其能無悲我始見兄嵗在癸丑時纔弱冠叩無不有馬賦董策彈丸脱手拔幟南宫掩芒北斗兄一見我怪我落落轉亦以此賞我標格人事多乖分袂南還旋復合并於午未間我蹶而窮百憂萃止是時歸兄舘我蕭寺人之㹞㹞笑侮多方兄不謂然待我彌莊俯循弱植恃兄而强繼予憂歸涕泣瀰瀰所以腆賻憐予不子趨庭之言今猶在耳何圖白首復遄斯行削牘懐慙著作之庭梵筵栖止其室不逺縱談晨夕枕席書巻謔浪間在杯盤㳺衍豈伊異人實惟嵇阮予來京師刺字漫滅舉頭觸諱動足遭跌見輙怡然亡其顛蹶數兄知我其端匪一我常箕踞對客欠伸兄不予傲知我任真我時嫚罵無問强弱兄不予狂知予嫉惡激昻論事眼瞪舌槁兄為扺掌助之呌號有時對酒雪涕悲歌謂予失志孤憤則􅄼彼何人斯實應且憎予色拒之兄門固扃充兄之志期於古人匪貎其形直肖其神在貴不驕處富能貧宜其胸中無所厭欣忽然而夭豈亦有云病之前日信促予往商畧文選感懷疇曩梁吳二子此日實來夜合之時分咏同裁詩墨未乾花猶爛開七日之間玊折蘭摧嗚呼已矣宛其死矣我將安適行倚徙矣世無兄者誰實容我為去與留無一而可兄今不幸所絀者年其未亡者樂府百篇詩辭冲淡書經精研吾黨銓次以付劂鐫生而有才為天子使没而名垂以百世俟茫茫大造幾人如此魂之有知可以無傷嗟二三子是亦難忘祭謝時逢太學文誰令君生豈曰非天君忽而逝理亦有然悠悠古今善人實艱帝湏君歸不百其年維君之生為閏十九其中變化倐忽萬有先觀察公仕宦奔走君初弱冠所事不苟南詔西蜀獮叛區降君隨經營若敵國疆翩然東遊來歸故鄉登城一揮袖中干將玊果璿珠琳瑯鏗鏘炤燿觀者歎息道旁嗟君屯蹶亦其自蹈竊人財賄猶謂之盗何况造物恣其搜討穿鑿雕劂茫不知老發為文章荒山鬼呌爰顛爰躓人咷子笑先君死者薛君白瑜恭愍公子有至行為世楷模泰航膺車人之云亡胡不徐徐人百可贖而隕其軀君貢太學儀於帝廷既而思歸當秋風生嬉遊東海思寄滄溟手種一菊日餐其英滔滔百家為之懸縆君今而死誰笥五經嗚呼哀哉唯君有子克遵治命御䘮以禮外道却屏君生克勤君沒以正惟其無憾以是慰公神之欣之降此筵中祭張母何太夫人文嗚呼自我太夫人之棄世於今十有幾日矣凡在朝士大夫追慕閫徳無不欷歔悲愴而要之天之所以曲成我相國母子之愛者至此而益可感也始相國之扈駕三征漠北左右皇躬内殫謀謨外矢盡瘁既功成掃蕩班師飲至可以從容廊廟尋東山緑野之樂矣乃相國則遙念太夫人不置陳情歸省限以三月還闕髀肉未生匹焉南返日馳二百里田飡野宿雨雪載塗竟不踰半月渡江而南正值嵗旦拜太夫人於里第於時鞠􅛏上夀喜可知也已而王程漸廹行有期矣公依倚膝下悲戀彌切太夫人感其至誠遂慨然許與同行安輿至京之日獨僉憲公視學中州不與耳詹事司農諸叔季咸集都下孫曾羅列曲庭讌賞偹天倫之樂事太夫人始示㣲疾逍遙辭世準之人子之情固尚不免其太遽者然太夫人年已上夀秩登一品始則起居無恙安然而受相國之歸覲繼之迎養邸中家庭聚順一切甘膬之奉参藥之劑公與諸季無不親嘗而䖍進之及於不幸而附棺附身皆得以無悔者此從來宦遊士大夫之所難古所謂終天之痛也而相國一門獨得無幾㣲遺憾於心者豈非太夫人之令徳所召與相國純孝之所感而造物亦將有以曲成之歟嗚呼哀哉猗太夫人名門毓質作嬪先公蘋蘩著㓗唯其淑慎以相夫子笄珈䄖翟象服有玼赫赫先公國之棟隆哲嗣篤生荀氏八龍相國矯矯左右周召聯翩金昆禀母之教母來祁祁國人是儀奄忽上升誰不涕洟帝用咨嗟慼我良輔便蕃遣酹㫖酒惟醹惟帝念切其䘏孔多寵我孝子視古有過辱在門墻欣戚誼共溯徳叙哀亦惟其痛敬奠一巵庶其享之神之俣俣以慰永思尚饗祭凌氏姊文嗚呼旻天不吊降割於我家八年之内䘮吾祖父三年之中復䘮吾母方吾母之始疾也吾姊病脹劇衆方惟姊是憂然孰意吾母已先棄諸孤矣己未吾客京邸接二弟手書聞變崩殞中述姊病篤日奔走營視不暇也竊疑是時姊已不幸弟慮吾重傷故或者諱言之比抵家姊果無恙强起飯我於時予雖創痛猶私幸得姊荏苒經嵗今春蹔往吳下將出關兒子書來云姑病勢不可起即日反棹扶服歸省中路飲泣及城不敢問消息殆入門從牖間窺姊持藥椀倚牀上相見且泣且喜姊亦掩淚謂予曰吾病不至死母葬事急盍少需而捨此來乎居頃之則促予行予視姊神尚王也冀得延留數月間北上期廹負土無計欲留不可欲去不忍姊弟之情依違竟日既去復入者數而死生之别從此决矣六月訃至呉門姊已於前月二十日捐世嗚呼予之自京南還憂姊死幸無死及自省還其憂彌甚又得無死今别甫月餘遽有意外之戚而予終不及一見也痛哉吾年四十五先君道卒不得視含殮前年母死逺在四千里㷀㷀者姊弟四人今姊復奄逝并無由執手一訣不孝孤之罪釁山積百身莫贖然非天之厄我至此吾豈獨無人心忍逺去骨肉之親長為羈旅耶傷哉貧也復何云哉姊天性閑淑内外稱賢如一口自節推公去世事嫠姑三十年極盡孝道吾兄弟經嵗出門温凊缺如輒辛苦營甘㫖以遺母有餘以賙吾兄弟之緩急中遭門内之侮良人被禍隱忍圖報而下無遺孤旁無强近飲恨吞聲積成痞結數年之間竟以身殉悲夫先慈不幸為貧兒母手撫三子兩違膝下居常葦簾葛帳孤影坐歎饑飽不時抑搔不至七十老人奄奄以卒固宜有不快於心者予歸自京師毎過姊則支離扶坐與我絮述母平生家庭瑣屑與夫宛轉臨訣之狀則姊弟相對嗚嗚而泣不能出一聲姊今復舍我死吾塊然一身惘惘無適胸中結轖悔恨萬端顧視兒女開口誰訴世網牽廹不久又當别去矣蓬鬆華髪揮淚出門廻念家庭前後存沒之故沒者魂魄不知所之存者萍蹤飄泊無所曽不十年間而天倫樂事觸緒成傷慘不知人生之可悦矣嗚呼吾殘年有幾逢此百憂以我悲姊安知靈之有知反不似我之為悲也姊夫婦兩櫬在堂嗣子穉弱吾力不能即窆爾於吉壤從此天涯南北雖欲長拊棺一慟其可得耶聞姊臨没惓惓付託唯嗣子之成立與否吾雖綿力敢不盡心一巵告哀吾言止此尚饗祭濓兒文嗚呼我之初行汝送江滸及我歸來顧不見汝夫婦俱亡并乏兒女繼嗣未立饋獻無主以汝仁厚亦曰能文一朝及此天道何論今十八日汝祖忌辰我欲逺出為此逡巡先一日期是為丙寅適當爾忌綿厯五春簌簌老淚為爾先灑聞汝臨沒形容頓改妄謂爹歸忍死以待爹今哭汝而汝安左嗚呼尚饗湛園集巻六
