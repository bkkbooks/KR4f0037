body:
  text: 湛園集巻八翰林院編修姜宸英撰說經說按太宰所掌八法八則八柄之統此治之大綱九賦九貢九式此理之常法而九兩繫邦國之民則又不獨理財矣嵗終詔王廢置三年大計誅賞合羣吏之職掌而受治也小宰掌職其貳以賛冢宰宰夫合羣吏正嵗會月要日成治其不時舉者以告冢宰而誅之皆是總舉庶職合太宰小宰宰夫職分是一項太府分太宰理財之一事而頒其貨於受藏則内府屬焉頒其賄於受用則外府屬焉玊府則分内府之貨而職其小用者也合太府内府外府玊府職分亦自一項司㑹亦分太宰理財之一事而專主鈎考㑹稽司書職内職嵗職幣屬焉職内掌邦之賦入亦如太府之有内府職嵗掌邦之賦出亦如太府之有外府職幣掌振餘財亦如太府之有玊府蓋用財與㑹財相對舉職合司㑹司書職内職嵗職幣又是一項太宰所謂詔王廢置所該者廣司㑹所謂詔王及冢宰廢置單指理財一事論者不知以為周禮合用人理財而一之而因渾司㑹於小宰宰夫之列是亦不知周公建官總領分核之深意矣司㑹調人所謂過而殺傷人者以民成之此殺傷或是八議三宥之類法所不加而孝子仁人之心則自有不能已者故和難者使辟之則兩得之矣然而王法亦不可以無伸也父子之讐辟諸海外海外者魚鼈蛟龍之與遊魑魅魍魎之與處是傳所謂屏之四夷者也名雖辟而實則與竄流之無異矣兄弟之讐辟之千里之外是即今法流一千里者也從父兄弟之讐不同國是即今法所謂流五百里以下者也然則殺人之罪雖赦而王法未嘗不伸而仁人孝子之心所謂枕干寢塊而誓不共戴者至是亦可以少慰矣又曰凡殺人而義者不同國令勿讐之此所謂義者亦指民間之相殺非過非故而理所當殺如殺越人于貨凡民㒺不憝者今律竊盜章亦有登時打死弗論之律盖事起倉卒其勢不及告於有司斯殺之無罪矣然為其所殺子弟義不得已也但勿與同國而已令勿讐之讐之則死勿與同國者其子弟之自往辟之也非殺人者之辟之也既義不得讐之矣亦何辟之有舊説殺人而義者為當官執法而殺人如此則辟之他境吾未見當官執法可以去位而辟人者且殺人之罪嘗數至於有司之庭矣是終日辟人無已時也其説之荒謬不泰甚乎調人冡人凡死於兵者不入兆域鄭註死兵謂戰敗無功者果爾則童汪錡竟宜殤而結纓之子路將不免於投之塋外之罰矣隋仁夀間詔致命戎旅不入兆域虧孝子之意傷人臣之心自今戰亡之徒宜入兆域此皆前此誤解經義之故盖兵者刃也死於兵為有罪以其辱及其先故絶之以示罰左傳襄二十九年齊人葬莊公於於北郭註兵死不入兆域是也冡人戴記疏天子春夏受朝宗則無迎法受享則有之故大行人云廟中將幣三享鄭云朝先享不言朝者朝正禮不嫌有等也若秋冬覲遇一受之於廟則亦無迎法故郊特牲云覲禮天子不下堂而見諸侯明冬遇依秋也春朝受圭玊於朝受庭實於廟生氣文也秋覲一併朝享皆廟受之殺氣質也朝禮升朝之時王但迎公自諸侯而下隨之而入更不别迎據熊義朝無迎法唯享有迎按禮器稱夷王下堂見諸侯為失禮是單指覲禮若朝宗行享禮天子於諸侯固有下堂而見之時也朝享天子大蜡八註先嗇一司嗇二農三郵表畷四貓虎五坊六水庸七昆蟲八按八蜡之祭本以其有功而報之也昆蟲何功焉且祝辭曰昆蟲無作而反祭之與記分疏八者於下曰祭先嗇司嗇饗農及郵表畷禽獸迎貓迎虎而未嘗及昆蟲知王肅分貓虎為二事其説不可易矣蘇氏云迎貓則為貓之尸迎虎則為虎之尸亦不及昆蟲可見若昆蟲有尸當作何像耶或云周禮族師春秋祭酺亦如之註蝝螟食榖之蟲此神能為災害故祭以止之則祭昆蟲亦祭其神也然此說與禮註俱鄭自為之不可信果有祭神之禮則大田之詩何必復祈田祖畀炎火耶八蜡惡病無子婦人之不幸義雖當去獨無可以善處之法乎禮註姆婦人五十無子出而不復嫁能以婦道教人者若今乳母矣夫能以婦道教人是謂賢婦與賢婦同處三十年既老而出之聽其為人乳母非義所安余讀商陵穆子之操而悲之知古人其亦有不得已者也淫與竊盜雖更三年之喪焉得不去况前貧賤後富貴乎古無生而富貴者故有士冠禮無諸侯冠禮士四十强仕始受禄有采地前此皆貧賤之曰也然未仕則有分田以自給藝成行立書於州黨則取于上者有必得之理故其貧賤也不必戚而其富貴也不足驚今曰前貧賤後富貴是徒習見夫後世蘇秦朱買臣之徒驟得意于困阨日久之餘所以誇耀其妻子者而不知先王之世無是也其説皆不足信七出三不去曽子問壻已葬壻之伯父致命曰某之子有父母之喪不得嗣為兄弟使為致命女氏許諾而弗敢嫁禮也壻免喪女之父母請壻弗取而後嫁之禮也女之父母死壻亦如之父母死昏禮不行禮也待之三年而弗敢見乃所以求嗣為兄弟者既三年免喪矣然且弗取焉其諸非父母之喪故耶不然可以嗣為兄弟矣而復弗取於義無所取爾也禮女子許嫁笄而施纓所以明繫屬於人之義雖未嘗共牢合􅈟已有相為夫婦之道焉雜記云女未許嫁年二十方筓燕則鬈首鬈首者猶以少者禮處之也許嫁之於禮若是乎其重也今許嫁而復止鬈首與不鬈首與不鬈首則異乎其未許嫁也鬈首則如之何成人而復少之也壻免喪與女免喪既遲之三年矣使復許嫁一人而壻之父母死或女之父母死將必復遲之三年遲之三年又不免於改字以聽之不可知之三年之喪于古者二十而嫁之年無乃逾之已逺乎且一女子也偃蹇數夫之間辱莫大焉先王之制為昏禮也所以成男女之别而立夫婦之義一與之齊終身不改矣豈其未嫁而終身毁之防也吾聞之也昏禮納采問名納吉納徵請期皆主人聽命於廟而後行事所以謹慎重正昏禮也今既納幣有吉日矣是己嘗納采問名納吉于廟而重之祖宗之命矣固不可以亟取而亟辭之若是其輕也吾意此非夫子之言記者之過也然則如何吾聞之内則曰女子十有五年而笄二十而嫁有故二十三年而嫁此有故者明是遭父母壻遭父母之喪而言除喪三年適二十三年矣二十三年而嫁與二十而嫁同文故知非婿弗取而改嫁也是為得禮之正而已矣曰三年弗取而後嫁之非禮也故曰此非夫子之言是記者之過也父母死昏禮不行國䇿樂毅入齊祀齊桓公管仲論者稱毅為王者之師是時田單起兵於安平扶立襄王而齊之義士多從之毅卒不能下莒即墨以人情相安於故主耳使毅明於大義請於昭王訪桓公之後而立之人情必益感動戴燕之德而王業成矣當時齊與韓趙魏皆非其舊而秦楚夷也獨燕為周初封國不立齊以自强使田氏餘孽得乗其弊舉全齊而盡復之惜哉前漢漢制武帝以前北軍屬中尉領丞候司馬千人等官至武帝又立中壘以下八校尉南軍盖衞尉所統掌宫門衞屯兵周勃入北軍尚有南軍乃先使曹窋告衞尉毋以吕産然後使朱虚侯逐産殺之以南軍屬衞尉故也文帝即位始置為衞將軍以宋昌為之令鎮撫南北軍則中尉衞尉之軍皆受節制於衞將軍矣此特初除宫危疑之際權寄心膂於代來之臣以防倉卒之變而非必為定制也故三年之詔即罷其軍至前三年遣丞相發車騎八萬五千詣髙奴擊右賢王復發中尉材官屬衞將軍軍長安盖衞尉禁兵不復𨽻矣後十四年冬匈奴冦邊殺北地都尉卭遣三將軍屯邊而用中尉周舍為後將軍當以有事暫設自此年後至宣帝地節二年始以張安世為衞將軍兩宫衞尉城門北軍兵屬焉復如宋昌之兼統南北軍矣盖用安世親臣虞霍氏之變也安世死不復見衞將軍官其罷之明矣胡注因衞將軍重見據漢書謂漢不罷衞將軍通鑑傳冩逸一軍字又於前三年發中尉之下注曰觀此益足以明罷衞將軍而衞將軍之官不罷也然玩漢書所謂罷衞將軍軍者罷其所將之軍則并將軍亦罷之矣所以然者盖國有大事特設此官以統南北之軍使事權歸一及事變既定則南北各歸其軍中尉衞尉仍分治之所以防其權之太重此漢之良法也盖後世之失也京師媮惰禁軍驕横其為禁軍者多中官寵帥主之而大將之威令有所不得行也此能分而不能合之病也及其功成求得大將久握重兵於外根柢蟠固專恣自用而天子尺一之詔不足以收之此能聚而不能散之病也然後思漢文倉卒之制操縱合宜其所以經久而慮變者如此其精論者固不足以盡之矣南北軍賈誼上疏憂淮陽代王國邊小不足恃願舉淮南地以益淮陽而為梁王立後割淮陽北邊二三列城與東郡以益梁不可者可徙代王都睢陽梁起於新郪而北著之河淮陽包陳而南揵之江則大諸侯之有異心者破膽而不敢謀梁足以扞齊趙淮陽足以禁吳楚陛下髙枕無山東之憂矣此萬世之利也其後吳楚反藉梁扞不得出卒以此破散世皆稱賈誼先見之功然梁王封國王四十餘城遂恣行不法反端已見賴田叔之言卒不及誅七國始破而勝亦憂死矣賈生之言亦見迷而不能自見其睫者也且生以齊趙吳楚為疏屬而勸帝厚植其子不知一再傳而後其視梁代亦猶今之視吳楚齊趙耳故與其謀再世之利不如為帝建萬世之䇿也賈誼傳以能誦詩書屬文稱於郡中此時詩書未出誼之所誦豈别有本耶呉公稱誼頗通諸家之書誼必嘗師受其學而吳公學事李斯斯學於荀卿故或謂誼受左氏學於荀卿其淵源蓋如此不然誼當吳公為守時纔年十八計其生時去漢興已十餘年矣安得及荀卿而學之若詩經疏謂孫卿毛氏之師毛萇武帝時人或大毛公生年先於賈耳賈誼後漢後漢中平六年袁紹勒兵收諸閽人無少長皆斬之少帝立初令侍中給事黄門侍郎員各六人賜公卿以下至黄門侍郎家一人為郎以補宦官所領諸署侍於殿上獻帝起居注曰自誅黄門後侍中侍郎出入禁門機事頗露由是王允乃奏侍中黄門不得出入不通賔客自此始也初何進與袁紹定謀告太后太后曰先帝新棄天下奈何令我楚楚與士人相對事乎其後曹操欲廢伏后以尚書令華歆副郗慮勒兵入宫收后歆牽后於壁中執之出使此時各中官守禦宫禁此輩雖跋扈安能排闥入之執殺母后如取竈下婢耶故弊去其太甚而已張文寳後唐張文寳知貢舉進士有覆落者下學士院作詩賦貢舉格學士李懌曰予少舉進士登科葢偶然耳後生可畏來者未可量假令予復就試禮部未必不落第安能與英俊為準格聞者多其知體金明昌中禮部尚書張行簡轉對言擬作程文本欲為考試之式今會試考試官御試讀巻官皆居顯職擢第後離筆硯久不復常習今臨試擬作之文稍有不工徒起謗議詔罷之此二段議論皆得體蘇子瞻曰麻衣如再著墨水真可飲前輩虛心如此亦是實理今制試錄不用程文是也而淺學小生紛紛擬作必為二君含笑於地下矣尺牘與陳其年性不喜逢人談文字又厭聽人訴貧昨過江遇一二達官髙論班馬奴視唐宋微窺其意中極自矜詡茶酒次攢眉訴窮言言酸鼻令人有解綈袍而欲贈之意特旅人無從得此耳歸復自嘆天既嗇我以遇而豐我以文矣文字之外所竊取自娛者貧而已故昔人有以貧賤驕人者以為此人所不爭之物也身既與此二者周旋久而皆為有力者攘之而去則信乎命之窮也知足下僑寓雉臯鍵闗苦吟經嵗無裹飯而問者此大佳但竊莫令人知恐此輩聞之又裂眼而爭耳不一寄雲門和尚昨留香飯歸讀新吟夜雨聲中繚繞清夢不知此身之在客矣謝謝先君行述從昏迷之後略志梗概罣漏八九承問及敢塵法席倘憫其一生名節惠箋數語不獨顯幽闡微所望于大慈悲者㝠㝠之中亦可作往生公案也謹懇與人今日讀司馬相如傳相如以為列仙之儒居山澤間形容甚臞此非帝王之仙意乃奏大人賦仙乃分帝王與山澤耶賦中侈陳輿馬幓旒之美侍從儀衞之盛與其意態之飛揚驕恣而自得召屏翳誅風伯刑雨師揮霍凌厲儼然一漢天子千乗萬騎鞭斥八極氣象絶無一㸃煙霞之氣大則大矣其于仙者果何如耶而武帝讀而大悅之自謂飄飄有凌雲意此所謂漢武無僊材也長卿賦心甚麗一渉彌縫遂失故態故知作俗下文字其性靈未有不為所移易者然今日此道方施行念足下擁絮苦吟調髙和寡何時得一開茂陵劉郎之笑眼乎又積憂以來神思眊廢至䑛筆和墨代謀懸繂之事尤不當問之棘人直以數奉名節于尊先生兼辱大孝拳拳遂不敢引禮自外脱稿讀之歔欷竟日既悲足下又自悲也原本送上未合處乞指示此公家千秋萬嵗事正不欲草草耳聞攜來小史楷法甚精能錄别紙見付否此間無留本自家物仍記不得也寄徐編修廣厦之庇半載遽爾分袂即擬趨送國門知供張塞路脂車復輟落日倉皇與蓀友作别時蓀友入城弟亦襆被單行投金氏邸故途中作别嚴詩有本欲留君今日住我亦隨人泊何處之句想知已聞之助悲嘆也大梁遇王君汝上復與盤桓數日屈指行旌度已還里板輿綠野大勝馬足紅塵忌者之口適以厚公正不知歸途興致何似霜天景物大要為錦囊收拾盡耳僕本愁人一辭良友倍覺生趣都盡同侣數人幸不寂寞時復開一笑口也來日當發汝計嵗杪可到揚至時遄望渡江之信想勿遲遲又過淇上去蘇門五十里不及一見孫徵君來滁州馬上望瑯琊山思從醉翁亭一訪六一公遺蹟躑躅而不得進此行失此兩勝事日蹩躠逆旅主人間正是一没氣色闗西窮賈耳因人作遊凡百無足言者復程穆倩得先生到署便有清風肅然而來籠中棲羽益動雲霄之想數日間正在企遲忽傳錦字兼惠篆章書既珠懸石尤璧合泥塗姓字獲此莊嚴逺勝玉板金鐀矣謝謝某兄知在此間希道意弟尚有拙咏欲就其訂正只弟一生讀詩觸目即吟一生作詩意到即發不論宗派不名家數向積有一巻去年過揚州為何人竊去意亦不甚惜此如行路舉足已過何足記憶只要向前尋進步耳然亦不能懸擬也試以此語某兄于今日分標樹幟之外當必有以位置我矣與馮孟勉弟賦性狂率少所檢括又不善與俗子阿邑而近來奔走四方所作縁轉多此輩觸喉抵忌悔罪途窮因思得黙之一字人能黙者與人對面邈若江河混俗同塵迥然霄漢邇來學得此法脫然如出樊之鳥自覺洒然胸次轉悔從前錯過半生與人唐劉文泉曰十為文不得十如意一如意豈非天乎昨文似不偶然故為足下說之如此非自諛也諛乃媚道生平不喜媚人况肯自媚耶非足下相知之深無從發此言與容若經年遊子失侍晨昏馴至大故聞訃崩殞百身莫贖此宜為大君子所不齒而過承垂唁有踰常等昨進辭太傅公接見之次情辭憫惻若深憐其以貧賤而失養之可悲者至于使者辱臨賻恤備至竊念公以上相之尊爕理廟堂而曲體下情至不遺于一介之賤士仁兄少都華胄希風望澤者駢肩接足乃獨軫念貧交施及存没使藐然之孤雖不得盡奉養於生前猶得慰所生于地下而免於不孝之誅者此仁人君子之用心特其身受感激而不知所以圖報之方亦惟有中心藏之而已舟已于前日南發耑此布謝無任悽咽與鈕白水前嵗青門贈别依依知己之情獨厚于潦倒窮途之客感刻之私無時暫釋比至都門則輪蹄接踵而來者莫不極口中牟異績每從京洛諸故人歎頌不絶非敢阿好實欲借為吾道光也初夏接某書益幸所聞之不謬辱翰教知知已意氣尚不殊前欣佩何似復鈕白水十年分袂逺貢相思京邸論心恍然舊雨别後復荏苒改嵗矣台翰遥臨殷勤叙昔詳訊使乎備諗近履清勝拜賜之餘不覺喜愧之交并也鸞鳳枳棘昔賢所歎然地僻務間優游文史文人際遇無復相過正恐柱後惠文逺來相逼耳弟匏繫此間既無速化之術又鮮買山之資局趨塵中忽忽少趣欲得知已如兄者露其狂態所欲吐于酒後耳熱之時了不可得如何如何粗箑如教奉寄胸次惡劣并不能以短章志謝特祈原諒與王白民筆訣是舊來相傳本子因髙足耑精摹古故備為寫致非敢以拙札為英俊準格也然弟三十年苦心研究雖粗于此道有理㑹而于所謂博觀古帖隨物賦形者則力有未暇而老已及之矣生事蹉跎往往如此書雖小道足發一慨也與孫舍人昨叩祝不晤與阿戎談久始歸耳選毫十枝唐刻蘭亭二種聊代一觴之敬紫薇仙客筆大如椽而復用此唐突真所謂野人之獻也寄王阮亭宫詹昨尊紀還數行附候即日蒸暑異常伏惟台履清勝為慰門下翻然歸里栖遲丙舍松楸之慕過時彌篤此真古之純孝然南來消息殊出意外東山一局非捉鼻人莫能辨竊謂宜以時脂秣副輿情也某老居人下祗益厚顔俟館務粗了即圖南下矣明布衣修元史者多乞還山此有成例只無縁一奉清塵快吐胸臆為恨耳先傳昨始脫稿錄呈讀行狀筆筆傳神只得依様描畫殊負委囑然所恃以仰慰孝思者或亦在此也欲時達起居郵便勿吝好音復仇編修欲書長幅須是五大筆大墨大硯大几大此四大正即次所少餘是膽大耳雖然辱公見委不可無以復命愚意此紙不宜為風雲月露之辭架上倘有小學及前賢語錄當檢付錄一二段懸之堂中使公子輩舉頭得師何如上杜司空昨偶從慈恩方丈得從容陪侍載承善誨感謝非復常情也巡視封章自當轉請宥府取歸讀之荷面諭别紙付抄必求全稿方得盡此中情事曲折老先生當今方召其老謨碩畫流傳竹帛者足垂萬世之利某𤨏𤨏編緝亦將藉光以塵甲帳豈非附青雲而益顯者其為私幸復何如耶寄惠元龍前冬送别之後去年唐趙兩公亦南發老友星散知音無㡬以此登臨少興文詠亦復寥寥知下車之後正當軍興旁午盤錯别利肯綮迎解真乃頗牧出自禁中可以鉗武夫之口而折幹吏之角矣秋間入闈選俊遂空馬羣此則吾輩意中事也爾時恨留滯津門無從握手一叙耳某老而得第禄不逮養既極酸心珠桂縈懐彌成大累以此自悔少壯謀生之無䇿以至暮途汲汲逐隊少年為可恥我友其何以教我頃晤計君述先生近狀云上臺公論雖極分明近來不無有牴牾者某以先生兩年撫字能事見于天下矣板輿侍養極人生之樂事何不翻然逺引息弋者之慕乎與其邁績龔黄不如希蹤曽閔悠悠萬事惟此為重想長者念之熟矣某屬知愛久但願先生為天下之全人使研溪一集萬古有所傳述故自以生平隠悔發此狂言倘不以為罪願有以相復與狄立人昨晩始成此詩書正原期以十五後繳幸不遲但三年追叙殊覺不情耳望日奉候云往報國寺買得何異書并何佳玩稍暇當再過不盡復張鳳陽書名宣字儀陸己未科進士某載拜昨承手翰屬為先太君傳謂僕之文為足以發幽而闡微則非愚力所敢任以僕列官史館有表揚幽貞之責若徒工祝辭而譽墓則何文之足傳某捧讀惶悚敢不勉焉竭其駑憊以副知已之望以慰孝子順孫顯揚無已之盛心然伏自思維唐李習之與皇甫持正書謂前漢事跡灼然在人口者以遷固叙述之工故學者悅而習焉其讀之詳也故溫習者事跡彰罕讀者事跡晦讀之踈數在辭之髙下而自誇其叙髙愍女楊烈婦謂不出班孟堅蔡伯喈下後唐書所記亦悉仍其舊文則其詞之工可知今太夫人節槩固不讓此兩婦女者僕才非李翺而門下猥望之以遷固之事以期所以不朽于先人僕竊以為過也縁此逡巡閣筆者數日既感門下見知之甚誼不可以淺陋自外輒按狀撰次錄呈唯左右讀而擇焉抑僕又聞之曽子固求歐陽公為其大父志銘一自為先大夫集序一書致謝歐公今所傳者歐公之文固精矣而曽公兩文激昂頓挫具有史公家法微歐陽其大父事亦必傳若門下所為家狀及枉書一通文詞茂美叙致悽婉不啻頡頏子固顧僕無歐陽之筆則太夫人之節烈後之秉史筆者舎門下所自為又奚取也僕拜命之辱因書其所愧并所嚮往于左右者因以為答復洪虞鄰先生書某自少讀先生行巻便心知嚮往藏此三十餘年矣長公來承先生不鄙而先惠之書兼賜大集讀之感荷不勝顧其詞義深博後進淺學茫然望洋于大河之濵不能測其涯涘也承諭比來有兩浙古文十名家之選所以嘉惠承學意良厚顧竊有疑者不敢不白于左右吾浙固稱文獻之邦自明洪永以來能以古文辭名世至今烜赫人口耳者㡬人哉計三百年中無過三四公止耳王子充宋景濂方希哲王陽明是也他如謝方石茅鹿門徐文長諸公猶具體而未醇不足以齊肩于數公之列自浙而推之他省亦猶是矣蓋人才之難得也何數百年英靈之聚靳于昔而獨盛子今時又皆出于浙東西一水之間而其數又不啻十人之多至此耶此某所以始承來教竊不能無疑也及展讀終幅云欲徵某文就選以充其所謂十人之數者于是不覺汗流顔赬舍其所以疑者復轉而為愧焉某固嘗有志于古之文矣苦資性駑鈍開巻過目輒眊忘焉向所習書隔數月視之如未嘗經見以此自詭嘗得新書讀耳雖于作者之㫖稍窺見本原捉筆為文時復相近然少年時科舉輟其半中年以後奔走疾患復輟其半所涉獵經傳竊取之以縁飾為文者特其稠雜中工夫什百之一二耳而貧賤也俗下應酬之文字又不能以無以為則其一二存者果可以盡信乎此視古人之并力一向以耑攻斯事至于久而後名其家者大不侔也先生誤采其浮名而不知其實之無有使以某文字入選豈不足為門下知言之累哉不但是也且使逺近有識之士讀某之文而妄揣量彼九人者之于文亦如是而已矣其為九人之累以累先生者益不淺也某之所以終疑而且愧者以此然荷先生冲懐下問誼不可令長公虛往因裒次近所著數巻附呈可一㸔置之若不䝉垂諒必欲以煩剞劂則某有瘞筆焚硯而逃耳臨復狂率惟鑒其誠欵勿罪某惶恐再拜題跋題朱岐載印譜梁谿朱子岐載律體精工楷法遒麗其篆刻之妙尤能獨得籀斯遺意挾其藝遊京師翕然名動搢紳間因得日親近供奉殿閣上意方欲録用之左右而岐載則以母老請歸江南矣以是人益服其髙致余特知岐載之深其意非不知以禄養為孝者勢有所不可耳顧知其不可而遂去之是今仕官者之所難而岐載獨能如此者其所得于古人有不僅區區翰墨之間者矣值今世右文公卿方急士余幸岐載之將母而來也不乆此冊所存賢士大夫名家多岐載所親識而嘗謂其知已者晨昏起居之暇一展閲之得無有褰裳而欲從之游者乎繭園文讌集跋語往予每至玉峰則必與葉徵君九來講論累日過繭園觴詠甚適繭園者其先公水部公之别業也後余客京邸徵君應新詔制科北來索余為小有園記甚急小有園者以其所分于先公繭園之半從而加葺焉徵君所自為讀書處也余往京師九年今年春奉命隨局纂修一統志復至玊峰則徵君之捐館巴三嵗矣其令嗣公奭少孤向學復整理舊業而益新之與同志四五人為文讌之㑹于園中每㑹課文賦及詩若干篇顧予通家誼以其文見投復請吾文以冠其集予既喜徵君之有後雖不得再窺繭園而觀其亭池上下泉石位置與昔游何似問當日觴詠舊人某某在者㡬輩能數過從否然觀數子之興會飇舉而一一能摹寫之于文與徵君之在時朋友詩酒之盛何以異此余雖悲老友之凋喪而猶樂道其今昔之所見附于斯集之後也跋同集書後往年容若招予住龍華僧舍日與蓀友梁汾諸子集花閒草堂劇論文史摩挲書畫于時禹子尚基亦閒來同此風味也自後改葺通志堂數人者復晨夕相對几案陳設尤極精麗而主人不可復作矣蓀友已前出國門梁汾羈栖荒寓行一年所今亦將妻子歸矣落魄而留者惟余與尚基耳閱蓀友容若此書不勝聚散存没之感而予于容若之死尤多慨心者不獨以區區朋游之好已也此殆有難為不知者言者若余書偶然涉筆不知尚基何縁收此然亦足以見姓名于其閒志一時之勝概云爾書王少詹使祀南海神序跋適有以碑文屬書者作字于青油紙上研膠筆凍限以界畫又寫他人文字時懼脫誤神氣愈窘書完得此巻信筆揮洒雜出真草頗傲大令洛神全本興到筆隨若蛇尾之赴壑不可遏已孫虔禮云書有五合狥知居其一余為先生作文寫字宜其顛倒至此也題樂毅論梁武帝答陶貞白書逸少跡無甚極細書樂毅論乃微麄健恐非真跡陶上書云樂毅論愚心甚疑非真而不敢輕言令㫖以為非真竊自信頗涉有悟余觀逸少黄庭曹娥像贊諸帖知樂毅論洵為麄健不同然自唐人相傳為法書第一蓋唐時去梁已逺王之真跡益微而唐人書法氣象多而神明少宜此帖之見重于世也此本與余所藏宋搨寳晉齋刻相爭在毫釐之間亦世所罕覯者張子漢瞻别去兩年其臨池増妙今相見吳門出此令題余謂張子寳愛此書正恐其作書便落唐以後氣格耳跋祝枝山書今日觀陸子其清家藏法書最多宋搨黄庭經十七帖及宋仲溫真書孫過庭書譜其尤佳者又枝山自寫所作詩長幅文徵仲評其規模襄陽而其書法原出于王氏父子可謂曲盡枝山之蘊然祝書尤深入大令閫域惜偽書紛出非具眼不能辨也張鳳翼後跋謂徵仲以東方朔學叔敖衣冠為一時下筆之悞然張云枝山為徐武功宅相故其書似之猶張敞之類馬遷張當是楊字之誤即楊敞亦未是司馬外孫乃敞子惲耳一事兩誤可謂彼此更相笑也跋祝京兆千文章草書前朝惟宋仲溫得張索遺意而過于放軼枝山繼之體兼衆家故為明書家第一昨研溪庶常過予寓齋出觀余所藏離騷經墨跡研溪歎絶因以千文此本見假余手臨一過頗識其用筆之妙但此帖不用章草位置停勻規矩謹飭殆是此公杜德機時也枝山又有一千文純用藏真法大小錯綜行間天機亦自盎溢只是摹本摹手又不工不及此真跡逺甚乙亥春三月記臨宋儋書題後此宋儋唐開元時人與李璆齊聲李師王宋師鍾李書今不傳而宋真跡唯閣帖存此二十一行閣帖置古法帖中列于衞夫人之前則尚未知其為唐人也然其書自有六朝間風味臨樂毅論題後近始悟運筆之妙全在心空學中鋒三十年都無一筆是處早閒臨此似有轉機然塵務闗心往往墮落舊塹東晉諸賢書法超絶古今者由其神明獨妙董臨澄清堂帖跋華亭書法輕薄摹仿頓失古意唯此巻筆筆藏鋒妙于用拙始見文敏真本領然不得澄清祖帖亦不能酣適如此昔人論學書者必得古人真蹟一二叚臨摹方能入妙端有此理今人眼界淺隘書格所以日下也聞張子漢瞻為人乞文以潤筆得之余傭書至老墨刓穎秃無從購此一字以此知文章聲價去君逺矣跋遺教經陶貞白與武帝論逸少書備矣獨不及遺教經何耶黄山谷詩云小字莫作癡凍蠅樂毅論勝遺教經癡凍蠅言其拘窘無逸韻也今考唐僧徒最善集書于逸少尤多遺教經是集樂毅像贊黄庭洛神孝女誓墓諸帖而成者逐字玩之自見字體雖少拘窘然自是右軍家法勝道德經多矣跋蕭子雲書列子述書賦景髙則潤色鍾門生情屬已景髙正書果出于鍾此本則黄伯思米元章俱疑其偽然極為古秀微少生動耳臨帖後書寒威少霽紙窓西照執筆欣然得閣帖僅臨晉魏間書數種愛其遒秀發于淳古也不及鍾傅二王者亦猶唐人選詩之不錄杜工部也時乙亥十二月初五日書成筆頭作凍霅然有聲謝莊諸人書謝希逸庾肩吾書張懐瓘諸家品書亦不及然其書實超逸可入能品謝萬石亦在能書之列朗字長度萬兄據之長子小字胡兒與姪疏自稱父晉人猶有此風晉朝儀欲以謝元為荆州謝安自以父子名位太重云云亦猶漢疏廣受之相稱也對子姪自稱其名則古所未有閣帖王廞與三女稱廞疏晉人通脫固所不嫌耶題李君冊子篆法貴古不貴巧漢印白文皆鑄成者但記爵名而已無為字者其篆體亦方正無多轉折至唐用朱文刀刻始有字及道號而印璽之法從此日趨于巧矣然自唐及明隆萬以前書翰家亦不多用印章用者只是銅牙章及黄楊木故講此者頗少今地不愛寳文石肆出好竒之士鐫鑿爭工各以其意相配換無復知有方正體者且專講刀法而漢鑄之體㡬亡今李君製譜力追古法不欲多出新意當波靡之㑹而好尚顧如此是余之所重也題鄭谷口摹古碑真出于𨽻鍾太傅真書妙絶古今以其全體分𨽻右軍父子摹倣元常所以楷法尤妙欲學鍾王之楷而不解分𨽻是謂失其原本漢建平光和閒碑板乃鍾王所出學者顧求之開元以還是并不知鍾王發源處俱未得為書家正宗余晩好此書恨年事無及又未見谷口問之其門人云先生自悔從曹碑入手暮年規撫夏承始盡其竒妙今觀此題曹碑云甲于漢刻知或言未信谷口晩書竒變殆是游刃之餘未有舍規矩而能成巧者也題戱魚堂像贊寳晉齋初刻像贊最為神妙缺九十餘字停書館摹本雖少生趣風格尚可想見余家藏寳晉乃是曹之格重刻者結體豐勻亦無缺字然頓乏風致不足重也前年北上時收拾得舊藏戲魚堂殘本四册呉門遇故人司冦徐公云當為予命善手重裝今不知竟落何處内亦無此帖今日友人查浦以此本見示快所未覩殆是寳晉初本之亞也雖石刻多剥意正似微雲之㸃月愈覺妍好又題黄庭蘭亭宋搨壬申嵗獲見于朱竹垞之六峰閣因題年月其後此帖乃是定武之最有風神者紙隔麻首尾無損竹垞云多方購之始得今遂落查浦手其計更過于蕭翼也丙子三月京師再題録新書詩後王君樹百以便面囑書適新詩成遂細行書其上十指㡬為皸裂不知當暑摇之定能作氷氣來襲人否時乙亥十一月二十七日也題玊峰相國徐公感蝗賦巻蝗之言王陸農師曰其首腹背皆有王字然則羣飛食苗其聲焰蔽天者以其有所挾而然也公所見入境薨薨徧于郡縣安知其胸腹背間不隠隠有文若王如得所挾者乎賦中有云念吾后之深仁亶民依之是恤畢竟此輩戢影年書大有深仁之效應若枹鼔者惜不令公見之如公者所謂進亦憂退亦憂者也又題述歸賦巻行芳志潔昭昭若揭日月而行公與靈均固可千載相質其文瀾千迴萬折斷續掩抑閒自宫徵騷人以降惟長門羽獵差為近之厯乎魏晉寥寥絶響矣公書法雖派本率更實由心運此與後賦兩紙隨手塗乙無一筆率爾祭姪文争坐位之伯仲也正不知天問呵壁時亦有此淋漓翰墨否竊以屈子處亂事暗其悲憤固宜公遭際明盛而亦有坎坷之歎此撫今感昔念不忘君蓋有不已于言者在也每一展巻不覺涕淚之承睫云時丙子三月二十日敬跋于京師椿樹邸中臨王書洛神賦題後有以羣玊堂帖見示者中有此賦校寳晉帖差完且神采更生動逐字摹之見形似神拘然形似亦在運筆閒消息今書家誰當解此能知吾合處方能指㸃吾病處書宋搨宣示帖褚臨樂毅論後乙丑年在都以褚河南枯樹賦易得樂毅破邪二帖後為吳徵君天章取去不得已捐此帖購還之出門時以樂毅破邪付長孫嘉樹聞又入偷兒手矣是余併三帖失之也此本宋搨褚書人間絶少各帖無所之施褚作無施之所足備收藏家考政一時換去全計固失而徴君復以貽聲伯年兄亦未為得也欲守此帖當以予二人為戒臨王帖題後古人行書有真行有行草此所書官奴帖與蘭亭序皆真行也通體真書少作牽曳而已雨冷鷹觜二帖行草也真書中閒以草字雖則是草不可縱筆故魏晉人多用章草入行後來率意作書古法遂不可復見題郎太守畫像君謂考功我來必告詎意三年一面未卜有木千章有琴一張有亭有池置君中央蹟邁龔黄心希嵇阮澹爾太虛空林偃蹇我展君畫君得我文何用識面目擊道存君與唐東江相對居謂唐余過必相聞也余詣唐唐輒忘之而余亦踈懶未及修謁因題此聊述其雅意以志相思題徐武功書後武功倜儻畸人故其書亦多竒氣然予浙人也于忠肅事不能學呉人以私恕之于此帖亦不欲多觀亦如李衞公之惡白香山詩以為見則必好也臨像贊書後末云永和十二年五月十三日書與王敬仁敬仁王修字濛之子官著作郎此太原人與瑯琊異派故書姓王導雅愛鍾書亂後猶衣帶中盛宣示帖過江後以與右軍敬仁從右軍借㸔深好之没時年二十四其母即取宣示帖殉葬修書𨽻行入妙跋樂毅論黄庭經臨本因記始末陶貞白啓梁武帝逸少有名之跡不過數首黄庭勸進樂毅像贊洛神不審此種猶有存否時武帝與陶皆疑樂毅微麄健非真不重也至唐褚登善錄右軍正書以樂毅第一黄庭第二武平一徐氏法書記云平一少育宫中所見真蹟楷書二十餘巻别有小函可十餘巻所記憶者是扇書樂毅告誓黄庭唐人珍重樂毅為第一代令能書者臨摹黄庭不能並也及神龍時歸之太平公主太平敗為老嫗竊取縣令追急付之竈火而樂毅亡矣樂毅論既亡開元五年收大王正書三巻遂題黄庭為第一畫贊第二告誓第三及潼闗失守之後訪黄庭真跡不得或云張通儒將出幽州莫知其處而黄庭又亡矣真跡永絶得見此妙手臨摹令人悲喜不置記淳化帖世綵堂翻本淳化絳帖俱可亂真其客廖瑩中精于摹搨王用和工于刻石故也先是韓􅇑胄有羣玊堂帖亦其客向若水所手摹二奸亡國先後合轍其博古好事乃亦有不謀而同者使能移此以為國用人豈不家國俱榮乎跋羣玊堂帖帖有十巻舊名閱古堂帖後名羣玊蓋侂胄誅後籍入秘省嘉定末年所改也以首巻皆南渡後帝書故得存耳二三四晉隋唐帖五巻後盡是宋人書全刻失傳久矣此本零星收拾僅得四冊雖逸少書有過肥之病然刻手極精紙墨亦好又所錄李邕詩今不多見或云是中唐人詩似有理然不知北海何故得書之跋曹全碑余酷愛漢𨽻而不能學近覓此帖連得兩本時時展對如見典型正不必手摹為快也帖以晩出幸完好昨有惠予漢滎陽令韓仁碑者亦是元至大間始出令李天驥再立石而翰林趙閒閒記之慶韓君循吏至是始顯然其字已多磨滅矣吾安知四百年後此碑不更磨滅如韓碑也耶宜廉讓曹子之寳愛此本直欲使四百年後賞鑒家有所考據耳題丁太翁小影伊川先生謂影堂之制使有一毫髪不相似便與拜他人父母何異然昔人有雕木為像而奉其親者宋承㫖為其作傳不以為非孝也况于圖像之逼真者乎先君没于途次倉卒召工寫真未肖予在京邸嵗時忌日僅書官贈于片紙如古人設幣之狀瞻拜饋饗而已以此銜恤終天木公年兄敬事其尊甫愛菊圖像雖逺客江湖未嘗不奉之以行也可謂永言孝思者矣今日以視予予因之有感題曰思其所嗜采籬之菊僾如愾如江湖一幅題毛闇齋採芝圖漢初黄綺采芝山中于時傳經有大毛公采芝之歌灼灼其華經傳于後詩正而葩我歌我詩復餌其芝彼何人者毛公之支邈矣髙風相望異代石泉蒼松披圖斯在題查庶常臨各種帖贈行京師人士往來賀遷贈别皆有詩詩貴多無少貴長無短貴律而排無古而散得此三者則無問工拙彼此之心皆快然無憾而非是以為不稱故予于茂名錢明府之行多與長無有焉亦賦七律一章為贈明府知子之拙也而不以為嫌者狥俗之例如是足也查庶常與明府同年至好獨不為詩臨古帖各體裝冊贈之今人作書與詩類不好古其目力所到至宋人止耳庶常詩取法三唐溯源漢魏其于書也自鍾王虞褚之輩以及宋元明書家無所不臨摹得其運轉變換之法如此冊種種風格可重也明府攜此以行嶺外村墟山館鳥聲淒斷人煙稀絶眺望無聊之際出此展觀之必當欣然獨笑而有會于庶常之詩也以視諸君子贈行之什雖興㑹各自不同然意味深長要無踰于此者矣題宋搨十七帖唐張懐瓘論草勢云草之體勢一筆而成惟王子敬明其深詣故行首之字往往繼前行之末逸少草書雖圓豐妍美乃乏神氣無戈㦸又云逸少草書有女郎才無丈夫氣子敬草逸氣蓋世千古獨立家尊纔可為其弟子耳懐瓘以一筆成書連牽不斷為草書之精非知書者也所謂草書者草其真也草書在乎㸃畫拖曳之閒若斷若續而鋒稜宛然真意不失此為至精至妙唐文皇集羲之書取其尤者為十七帖其晉書御製羲之傳贊曰煙霏霧結狀若斷而還連鳳翥龍盤勢如斜而反直知此者可以得其集此帖之意矣臨聖教序跋後臨二王書須略得㡬分晉人筆意正以蘊藉為宗若專務險勁但論氣質便似唐人效劉義慶作世説語雖詞調豐蔚終離本色又唐寺塔碑文集右軍書者多矣然獨此帖盛行者以御製文故重之也不作是書殆三十年在天津與友人查浦同寓命予書之搨本下劣轉得一快以神氣不為所奪耳書自作書後古人倣書有臨有摹臨可自出新意故其流傳與自運無别摹必重規叠矩雖得形似已落舊本一層矣然臨者或至流蕩雜本摹者斤斤守法尚有典型余于書非敢自謂成家盖即摹以為學也傳與不傳殊非意中所計又逸兄以此屬書晩唐五律隨意寫付之字不足觀數詩皆當時名句時一展㸔知古人下筆不苟也柳公權榮示帖中云有赤箭多寄三五兩以扶衰病赤箭即天麻苗陶宏景曰其苗為粉久服益氣力長陰肥健輕身増年唐太平公主與宫人元氏謀于赤箭粉中置毒進元宗白香山齋居詩黄耆數匙粥赤箭一甌湯公權所須亦此類盖是唐時風尚猶晉宋間朝賢之服散石也為人臨衞夫人書帖窗外微霰毫閒凍澁勢不得騁特于體制無失耳逸少蘭亭是其最得意書亦必于天朗氣清時得之也題清溪老人江山卧遊圖程芳朝湖廣人石田去後雲閒畫派單行專以姿韻取勝矣此巻蒼茫逺勢不減相城風味是百餘年所未有其落筆時蕭然塵外之意可想也簡可兄知寳愛此遺墨清溪公自可不亡正不必如米家阿虎規規家法也題嚴蓀友留别和韻詩後以拙手用退筆書處處著礙視前人所作如蒹葭之倚玊矣光武云見卿使人慙此書長存余慙不止也臨右軍法帖書後右軍為㑹稽内史與藍田相失誓墓不出竟行其志可謂振古豪傑書法皆與所臨宣示戎路諸帖相表裏其細書黄庭曹娥别是一種樂毅像贊有絶相類處此可以意會不可以言傳也大令求展墓表自是父子不愧家風二王外之能為鍾書者王仲將僧虔蕭子雲而已唐以下此種㡬絶嵗在乙丑為毘陵楊鳬令兄寫此帖長安筆價竒貴以折鋒毫盡此不覺意盡題玊板十三行右軍父子真書雖同出于鍾太傅右軍斂鋒大令拓筆觀樂毅東方諸帖與此可見賈氏刻玉板余二十年前曽見之武林乃觀橋葉氏質之王氏者是時從友人乞得一紙今此刻不知又落何家余所藏亦失去久矣再過數十年恐搨本便不易購水村之喜得而寳藏之亦見及此歟書官奴小女玉潤帖後官奴子敬小字劉夢得酬柳子厚詩還思寫論付官奴謂子敬也註柳者謂是逸少女名誤矣彼不知玊潤是官奴女名也逸少尚有官奴婦舊復委頓憂之深一帖可証逸少七男一女極子孫之盛而一女疾病至于憂之燋心引罪自責其慈祥樂易可見他日又云得一味之甘剖而分之以娛目前宜其誓墓于未衰之年不能以此而易彼也書詠懐詩後張子寄此紙屬書詠懐詩因寓中無全本僅書文選所録十七首是日閏三月朔日有食之既時北平薄子聿修宿遷徐子壇長遇寓齋㸔書相對閣筆嘆息者久之憶昨初書作意或小拘束今早書第三四頁覺少放五六以後至景陽雜詩則神來之候娓娓不自止矣跋黄州詩後楊君鳬令遺兩筆可作細楷余疑其未佳輒作大行草五六幅餘一支偶試為真書良善及取行草者楷書之鋒鋭已脫矣此是也世不乏佳士以意侮而失之者多矣然余之所失者筆也猶珍藏其一其壞者拂拭而用之亦可盡其餘長筆之于余可無憾矣彼人之見屈于不知而終以頺廢不振者可勝道耶况又有既知而故抑之者彼其何能以無憾于心耶余于此有感書冊頁後友人曹子廉讓復攜此來曰願書滿此冊兩日適無事隨意塗抹不覺紙盡然不知何所用鴻爪雪泥寧與世人計多少哉梁武帝書評後此從漢末至梁三十四人乃以兩本彚而錄之一云二十八人今得三十有二袁昂古今評普通四年所上大率相類蓋武帝用其語斟酌成此耳然中有張融書如辯事對揚獨語不困行必㑹理蕭子雲孤松一枝下有壯士彎弓雄人猶虎心胸猛浪鋒刃難當顔倩書如貧家奠果無效可受少乏珍羞王彬之書放縱快利筆道流便蕭特書雖有家風風流勢薄猶如大小王安得相似也郗惲書縱横廓落大意不凡而得體未備郗愔書得意甚熟而最妙時難踈散風氣不無雅舊庾肩吾書畏懼收斂少得自充共八人評論而此書不見豈以其辭未雅馴而削之耶抑是後來附㑹原書固未嘗有耶中于孔琳之蕭子雲諸人書俱不下貶語獨深文于大令比擬不倫豈為公論袁昂書評有云張芝驚竒鍾繇特絶逸少熊熊獻之冠世此語為得其實云又題帖此隋僧智果書字非一體當是積日所成玩其行楷亦精研於鍾傅者而李嗣真書評比之委巷之質豈其然乎題絳帖絳帖在南宋諸本雜出已不可辨單炳文曹士晃所論至為詳密然較之此本其巻數皆非舊識字畫波磔更無論矣舊有二十巻而此只十二巻終巻是孫過庭諸人恐唐人書亦未必更有八巻則此為全本無疑當亦如寳晉齋之有米曹二本多少並行也司農孔君新得此出以見示其紙墨黝古今時亦不易遇洵足珍也題米趙書跋語徐子道積曰君規摹魏晉人書偶一為此終不脫向來本色答曰惟有向來本色所以貌得宋元人書譬如今詩家目不識古詩十九首蘇李贈答為何物而哆哆蘇李到底是兩家門外客也題洛神賦後或傳子建得甄后玊鏤金帶枕感嘆不已還濟洛水忽若有見遂為此賦初名感甄後因明帝見之改名洛神愚意不然子桓兄弟猜忌必無與枕之事即與而子建敢斥名賦之乎果爾則無以異于桑濮之淫辭王逸少父子晉代名流決不輕書也蓋子建師法屈宋此直摹宋玊神女賦耳逸少今所傳有二本子敬喜書洛神多至數十本亦愛其辭之工麗而有體也余固戒為綺語者因某之請遂書此與之聊亦自附于昔賢之風致云題黄庭經黄庭經或云是右軍換鵞書或云換鵞者是道德經非黄庭自陶宏景始以此書與樂毅論並稱為右軍有名之筆蹟後入唐宫中武平一所見是扇書恐别是後來臨本矣其書亦旋散失開元五年購得右軍正書三巻第一是黄庭後函闗失守内庫法書復散落人閒事平遣使搜訪獨未得黄庭真跡相傳為張通儒將向幽州莫知去處據此則黄庭自唐中葉散失已久後人摹刻者不知竟是何本余所見宋搨非一此白下蔡崗南兄所寳藏其彩色鮮好予展巻嘆賞留置案頭臨撫再過不識與真蹟相去㡬許若撫刻則近來收藏家殆未有過之者也崗南屬予以數言題後并記其始末如此題十三行此武林綠石本世推為十三行第一然筆法方整頗類趙松雪豈即其摹刻耶昨楊子楚萍出予所鉤唐臨墨跡共觀之不覺咨嗟嘆絶惜楚萍猶未見其真本古人手蹟日就零落雖刻本之善者將不多得則楚萍之寳愛此本未為過也戊寅八月六日記題畫平林逺岫毫尖圓動墨汁薫蒸盤礴之妙宛然寫生空林蕭條茅屋靜整定知有人門迹雙屏人不可見名不可聞悠悠逺山往來白雲如此逸蹟誰為寳者邈彼朱門何殊林下題孔琳之書後孔琳之字彦林草行師于小王時稱楊真孔草王僧虔曰琳之書天然絶逸極有筆力規矩閣帖僅得此數行人少習者以其語非吉祥然梁制彼此弔答中言感思乖錯者州望須㓨大中正處入清議終身不得仕其重如此故武帝嘗與儒臣講喪禮而子弟亦家習之有以善講喪禮得舉者大抵六朝風氣似此後世忌諱煩多而人情益通脱反以晉宋人為放誕何也戊寅九月二十三清晨臨帖隨筆記之又題聖教序唐世右軍遺跡猶多空門碑板尤喜集其字如盧藏用建福寺三門碑胡霈然大智禪寺師碑越王貞大興國寺舍利塔碑僧行叙懐素律師碑皆集右軍書而為之者非獨懐仁一人也世傳懐仁居恒福寺摹集右軍稱精熟其徒胡英效之亦時集王書勒石盖僧徒欲借此以久其師傳耳董文敏據舍利塔碑謂集為習乃好竒之過不知舍利亦集王書殆是以習通集耳不然今聖教碑與逸少諸帖並行豈懐仁之遂足以方駕右軍耶十七帖今往絲布單衣示致意宇文周武帝詔庶人以上惟聽衣紬綿紬絲布圓綾紗絹綃葛布九種註絲布以絲裨布縷織之今謂之兼絲布也觀右軍帖則知絲布之稱晉時已然矣晉樂府有云絲布澁難縫唐制凡賜雜彩十段則中用絲布二疋跋書蘭亭叙定武本為歐書比之褚登善所臨特為端楷近惟東陽何氏所藏石刻為得其真然搨久漫漶余特以意摹之大扺去古愈逺則失真益甚古人作書俱有口訣面授今既不可得矣但審知用筆之法臨書時自于手腕間消息庶乎古人不逺耳跋張即之書楞嚴經張即之號樗寮書法歐陽率更加之險峭遂自成家今停雲館收刻只數行余家有其所寫楞嚴經全巻遭亂播遷僅存此二十二頁停雲所刻有云慈溪有王昇者出入吾家二十餘年吾邑多張書其皆王君所得乎世傳其為水晶書能禳火故藏書家多寳之題困學書李潮八分歌余家藏伯機草書蘭亭及李潮八分歌蘭亭帖戊午攜至京師客久困乏為有力者購去獨此帖留家復黴爛去半截偶于竹笥檢得割裂其行數命工裝之雖斷文訛缺若遇中郎猶足為柯亭之賞也書石林詩話古人語不可輕駁葉石林云劉子儀楊大年皆喜唐彦謙詩以其用意精巧對偶親切黄魯直詩體雖不類然亦不以楊劉為過如彦謙題漢髙廟云耳聞明主提三尺眼見愚民盜一坏雖是著題然語皆歇後一坏事無兩出或可略土字如三尺律三尺喙皆可何獨劍乎蘇子瞻詩有買牛但自捐三尺射鼠何勞挽六鈞亦與此同病六鈞可去弓字三尺不可去劍字此理甚易知也其語甚辨然予按漢書髙祖本紀曰吾以布衣提三尺取天下師古曰三尺劍也下韓安國所云三尺亦用而流俗書本或云提三尺劍劍字後人所加耳此語及註甚明是歇後語班固已然而石林止凴史記從夢中彈駁古人不慮子瞻魯直胡盧地下耶即石林論詩亦未當其賞王荆公晩年詩律精嚴不見有牽率排比處而所舉王詩含風鴨綠鱗鱗細㺯日鵞黄裊裊垂鴨綠指水鵞黄指柳題見水柳字可耳不然鴨綠鵞黄竟是何物反不如三尺一坏之猶自然也且鵞黄古人亦以比酒與三尺律三尺喙何異然云提三尺自是劍不聞三尺喙三尺律可提也若捐三尺則未妥書劉禹錫淮陰行五首後無奈脫菜時清淮春浪軟脫菜魯直疑其不可解周益公二老堂詩話謂嘗見古本作挑菜按五首本集止四首末篇為紇那曲詞脫菜本集作晩來尤明題三好圖查林先生以此圖屬題予展巻諦視完然真面目也適禹鴻臚來謂曰此公之貌所以神似者以有三好可尋耳吾胸中一念不起于物一無所著君何從而物色之哉禹曰杜詩云落月滿屋梁猶疑照顔色評者謂太白風神千古如見是杜之善于為李寫照也今清風明月何處無之余何為無以得子耶相與一笑而别遂記其語于後題摹古印譜自秦相變古法作蒼頡篇爰厯博學同時並著于是八體有摹印其法屈曲縝密皆仿秦璽文為之而頡籀古文遂廢魯壁所藏汲冢所出雖深沈博古之士至不能識其大全况後之學者去古益逺欲其分别文字以不失作者源流胡可得也摹印僅八書一體然自分𨽻盛行之後篆書賴此得存使其由斯篆以上溯頡籀遺法安在古文不可復興于今日余最愛近時程山人穆倩所作而時輩競譁之以為鬼怪不經穆倩已矣百世而後當必有識子雲者今觀劉生稽古堂印略猶能得其彷彿于方幅之上蟲文鳥跡絡繹雲布余雖淺學不能驟辨其于古真似何如然可謂有志者矣題項霜田小影僦居湫隘庭前春盡不見寸草一枝之䕃比于瓊樹盖都下寓居皆如此不獨予也聞之老居京師者云五十年前公卿邸第門宇靚飭雜樹踈映街衢闤闠槐柳俱成行列士大夫公餘散步間入列肆繙閱圖史摩挲古敦彞窰器翛然而返不碍車馬余因此想見唐人落葉滿長安之句今日項子霜田手攜此圖相示老樹突兀在吾眼前既是快所未得又著此蕭踈閒遠不受一㸃塵埃人物觀其挾筴趺坐意不在書使人之意亦消時金行初届殘暑猶灼與客同觀如有涼風拂拂從巻中出矣跋家藏唐石蘭亭叙此石背面刻蘭亭叙二種前一面較低一字明嘉靖閒吳門黄君者工畫人物偶得此知是唐摹石因贋為北宋人清明上河圖并搨如舊本獻之一貴人其人以遺分宜相後潢匠索賂不得發其事貴人以此見忤而黄亦坐是窮死其子名景星字平泉跛而知書亦善繪事與余家有連攜此石至慈老焉此石向藏余第三叔祖家叔祖沒後余尋得之舂碓閒石廣二尺長尺二寸厚一寸許質光潤可鑒字體多類聖教序盖唐懐仁所集本也近見武林錢孝廉栴摹帖其叔相國跋云得善本于京師前有趙文敏蕭翼辨才圖遂摸刻之余諦觀正與此前一面低一字本同所謂善本者此也而神氣去之逺矣自後在京師又得髙麗揆文庫收藏本有宣和御璽則文敏圖在焉細翫其紙墨良是宋搨與背刻本又毫髮無異只髙麗本盛字上成字鈎微起而此逕帶下放字彼楷此行靜字右脚低于左青而微縮為不同及視石則三字已損即用前完本嵌補紙上補痕猶隠隠可見然後知此石之流傳真千餘年物也吾子孫當善藏之勿令俗工妄搨損其真氣康熙己巳年九月朔書于京師之停舟書屋嘉話錄云王右軍告誓文今之所傳即其藁本不具年月日朔其真本云永和十年三月癸卯朔九日辛亥而書亦是真小文開元初年閏月江寧縣瓦官寺修講堂匠人于鴟瓦内竹筒中得之與一沙門主八年縣丞李延業求得之上岐王岐王以獻帝便留不出或云後借之岐王十年王家失火此書亦見焚按今法帖所刻皆具年月豈後人因夢得言而増入耶然其摹法頗古臨鍾太傅四表跋後孫權初議摧曹操嘗言孤與老賊勢不兩立其後輸欵於操者一稱臣於丕者再今考之於史闗侯與曹仁相持徐晃連營逼權出師躡後自足掩取江陵無藉於操乃獻表欲擒關侯自效何邪後之稱臣雖以蜀師東下權宜為之然丕勤三駕臨江而反終不能損吳之毫髮其不能困吳明矣而自同囂融甘心北面殆失計無恥之甚者初建安末操始受權降鍾繇貽太子丕書曰顧念孫權了更娬媚太子答書轉相嗢噱其為曹氏君臣玩㺯如此豈不為父兄之遺愧哉權稱臣奉表在黄初二年十月至三年八月而孫與曹之交絶繇此表當在其二三年閒當呉之始臣於魏也邢貞知其非久為人下劉曄以為憂蜀偽降而繇之言曰權之委質外震神武度其拳拳無有二計未㡬呉叛終魏之世不能再服繇為虚言矣其智出貞等下豈耄及之耶右宣示帖云戎路兼行履險冒寒者謂漢前將軍關侯圍曹仁於樊操以建安二十四年十月親自洛陽南征時也操駐軍摩陂至次年正月還洛陽死吳潘璋害關侯在十二月此閏月當在十二月後征南將軍曹仁也胡修魏荆州刺史傅方南陽太守時皆降於關侯侯威震華夏操議遷都於許以避之而吕陸之徒懼其功成見逼遂密謀擒侯使曹氏得銜持兩家而坐收其利次年丕遂簒漢天下大勢遂在曹不在孫劉矣當時蜀漢君臣計不顧此聽其孤軍深入坐失荆州後諸葛雖數出師漢中以闚中原亦何益哉此古今一大變局攬斯帖者所尤痛心切齒於孫氏之君臣者也操自開國漢臣即以天子禮事之故雖建安紀年語悉稱臣表式百尾一如漢制後但署東武侯者以是年九月繇坐魏諷反免相國故也右戎路帖後漢百官志侍中無員掌侍左右贊道衆事顧問應對建安初置六員表言先帝遣侍中王粲杜襲又云乞使侍中與臣議之盖當時機密之任也至晉後其職益重粲襲為侍中在魏國初建時時始定制為四員云昔人評此書柳葉溶曳於光風象微臣之御寵蓋此亦右軍臨本也右力命表唐文皇評鍾繇書謂字長而逾製黄長睿疑長是方字之誤然鍾行書若墓田丙舍長風新婦諸帖結體頗長方者特其真書也鍾書存於今者一手是右軍摹本薦直表為其真蹟有河東薛紹彭印章元袁泰評㸃畫之閒多有異趣可謂幽深無際古雅有餘盖是漢𨽻初變不可以其晩出而疵之也惟季直不見傳志差為可疑右薦季直表湛園集巻八
