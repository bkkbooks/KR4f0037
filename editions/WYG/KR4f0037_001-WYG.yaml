body:
  text: 湛園集巻一翰林院編修姜宸英撰序恭頌巡視淮河臨幸江浙詩序臣聞巡狩著於虞周有五載十二嵗之别肆覲徧於方岳垂陳詩納市價之文雖時有不同而舉無非事要皆法天行之不息求民瘼於永寧為神聖惓惓之至意也然或千乗萬騎之紛馳必致諸司供設之滋擾欽惟我皇上德光上下治洽平成文物聲名丕觀謨烈之盛干戈撻伐無殊締造之奇至化翔被於無垠休徴協應於有象惟是淮揚下流為河漕要地徃者廵逰至止上厪宸衷捐内帑以鑿中河歴海壖以疏下淤漕既無虞河行就理至今而上溯南廵之嵗月又曠歴十年矣水勢不常浸成下潰民方憂乎堯墊帝旋切乎禹思爰降明綸躬親閲視以今年二月癸夘吉辰恭奉皇太后鑾輿南幸兼以省觀民俗上悅慈心同黄姚東狩之期為青陽布令之始舟皆魚貫岸絶騎行迺裹餱糧悉先儲峙驛遞無頓置之苦役夫豐扉屨之資是以所過郡邑桑柘之行列不亂市肆之闤闠寂如籬落聲讙與櫂謳而偕沸旄倪目送隨帆影以俱長然後駐蹕河干沿流上下命司空以授方畧約河伯以就疏排經畫必出於萬全無容苟且而貽事後之悔隄防悉期於可久勿恤多費而煩再舉之勞既喜行地有時猶恐民天未足詔截漕糧先後二十餘萬石賑貸各被災州縣銀米無數慮如此其周也徳如此其厚也於是吳越父老望幸益勤縉紳大夫連章上請皇上俯念而憐之乃不辭逺渉曲狥其意躬奉皇太后渡江而南厯覽山川祇奉色笑顧以沿途所見閭閻生聚視昔少殊謂有司撫字之未周則奨廉懲貪以肅官方蠲稅停征以蘓農困裁征關之浮額旅集千航罷煮海之増輸烟開萬竈寛罣誤赦𤯝災以啟人為善之途廣生徒校騎射以闢人功名之路而且敬修前代之陵寢優賚百嵗之耆氓詔㫖朝宣温文軼於西漢封章夕發旰食過乎周文褒賢德以降宸章盡是麗日輝雲之翰墨對江山而發睿詠無非高天厚地之襟懐盖皇上體徳惟乾視民猶子聖學邁隆於千古神謀卓絶於百王而又本之於至誠推之於大孝所以鑾輿未届而童叟歡迎翠葆將旋而攀援載道興盛事於十年之内沛恩膏於三月之中河淮既已底定齊魯悉被沾濡自古帝王過化存神之妙誠莫盛於今日者也臣向因編纂之餘謬應射之選恭荷皇上念臣老生食俸有日㧞之儔軰置以殊科自愧衰庸報稱無地謹製七言律體八章上祝皇躬之仁夀敢竊比於扈從如親覿乎光輝執巻多慚濡毫増悚恭製蕩平沙漠愷歌序臣聞王者之師有征無戰其不得己而用兵非為生民除患害萬世貽治安則勿舉也我皇上文武聖神之徳度越前古自御極以來削平三蘗内消藩鎮尾大之虞開郡海疆外控扶桑萬里之國神樞闔闢出天潛地廟算指畫雷動颷馳固己遐至邇安中外禔福埀卜世無疆之祉矣厄魯特噶爾丹者向䝉國家覆庇厚恩不知感激反肆其爪距屢懲不悛皇上於是惻然思為民除之以為㓂不可長不一勞則不永逸也乃上稽於天内㫁於心遂下親征之詔令所司儲峙既周分師三路帝車中運禡牙之日祥風來應軍行出境屬國羣瞻自初發迄於回鑾首尾纔八十日已絶大漠渡克勒河朔徧躪賊境至於拕諾山逼巴顔烏喇賊方驚我師從天而下喙奔不暇而皇上所遣西路大師已分師逆擊大破賊於昭木多地方矣夫親屈萬乗之尊逺臨絶轡之野勞身損膳以為民攘患至仁也大計一定不撓衆阻不避艱險平行大漠若從枕席上過師黄鉞一麾所向披靡三月之間頓成掃蕩至勇也若至選將授律决勝帷幄因機制變鬼神莫知此非天下之至明極聖不足以與於此臣草茅下賤䝉皇上㧞置史館纂修明史復分纂大清一統志屢因顧問及臣名字至今糜俸一十五年念君恩深厚未知圖報之地值膚功告成還師飲至普天率土無不額手稱慶喜遇昇平若夫作為文章以敷揚盛烈臣忝列詞館亦與有職焉謹案周禮大司馬王師有功以愷樂獻於社大司樂王師大獻則奏愷樂愷樂者即後世鐃歌鼓吹之所本也漢世謂之愷歌臣愚不敢妄擬前人之作自同雅奏輒製成愷歌十章雖辭義淺薄懼不足以發皇聖功萬一特區區歡愛之誠懷不能巳或亦使天下之仰懿鑠希末光者謂臣身依輦轂耳目所親聞見以視他日金石之奏竹帛之傳亦有足考信將來者也謹稽首頓首撰列如左東祀草序丙子秋皇上北征凱旋以祭告武功之成遣使四出翰林院侍讀學士溧陽史先生奉命祀少昊帝堯陵寢先師孔子闕里當是時先生之不出京師十有六年矣自釋褐中秘校書内殿起居在鉤陳豹尾之間枚馬之賦頌蘇李之應制其餘遊覽登涉未數數然也及乎攬轡出國門雲山入目竒思横流數銜命就道之日至訖事還朝共得詩六十四首其祇謁陵廟則肅穆峻整慿弔山川則俯仰悲壮酒塲文㑹之激昂而趣逸思親懐逺之悽愴而情深體擅衆美不主故常然先生之詩實非有變於前也獨其天然自得之趣根抵於性靈藻繡於學植至是而始暢所欲言耳張燕公王右丞豈曽學為山林枮槁之習哉乃燕公居岳州所作音調悽婉偹騷人之情思右丞望春興慶陪宴從㳺與其輞水雲溪竹洲花塢之逸興何以異哉盖古之達人君子以泉石煙霞為性情之窮之顯無徃不存雖然使山林枯槁之軰終日含毫以求肖其所為蕭散閒逺者而已不勝其寒窘之態矣况於清廟明堂煌煌巨製其可矯而為之與今聖人有道區宇寜謐二三儒臣出奉簡書入資啟沃以發為詠歌藹然治世之音天下将有想慕其遭際之盛如在皇古邈不可即者顧某以老生淺學猶得逡巡其後辱先生復命之序出其荒蕪之辭以竊窺見夫作者之意㫖何其幸也史彚序太史公司馬遷變春秋編年之例作為史記後史家皆倣其體而因史記成書者又數十家或發明義例或詮釋音韻或訓詁名物皆得以其名自列於後世江都前孝廉元長先生之史彚亦是類也孝廉分史記所載為十集立治原正學將畧諸門文與事各以類從使讀者知太史公所作其關切於治道人心如是其不苟可謂司馬氏之功臣然遷遭難困辱自序其著書之㫖歴引文王孔子以及屈原左邱明孫子吕不韋韓非之徒而曰此人皆意有所鬱結不得通其道退而論書䇿以舒其憤思垂空文以自見孝㢘遇時變遷鑿坏肥遯者三十年所寓意惟在此書此與太史公著書之㫖何異而孝㢘之苦心尤有難與流俗人言者讀者當自得於文辭之外也孝亷有孫曰繩武字存恕懼手澤不傳徧求於有力者謀梓其書以與余有文字之知故不逺數千里來請為序史公之後惟外孫楊惲有聞譽孝㢘遂有象賢如吾存恕者此可謂幸已晉執政譜序古之賢執政相繼於時傳累世而不絶者未有若晉之盛者也盖晉以上卿将中軍執國政必博謀於衆而後用之故其舉不失而自文襄以後世為諸侯盟主者無他以執政之得其人故也按春秋傳晉執政終春秋之世十有九人文公四年蒐於被廬謀元帥趙衰舉卻縠曰説禮樂而敦詩書城濮之役先軫以下軍佐超将中軍上徳也箕之役先且居代父将之蒐於夷用狐射姑而陽處父復蒐於董而廢之立趙盾焉其重且難如此趙盾之後次卻缺次荀林父次士㑹次卻克次欒書次韓厥次荀罃次荀偃次范匄次趙武次韓起次魏舒次士鞅次趙鞅以終春秋而晉亦分矣凢此十九卿者大半皆晉之選也當是時與晉匹者莫齊為彊而高鮑之族無聞焉楚置令尹其世數姓氏皆可考然賢奸互用治亂相半不得與晉比晉自趙文子後政在侈家韓宣子為政不能圖諸侯則執政之權始移於大夫矣大夫多侈求欲無厭其弊皆始於執政韓宣子受州田於鄭而易之樂氏范獻子取賂於季孫晉是以失諸侯楚囊瓦私裘馬之利囚唐蔡二君二國叛之幾至亡國則皆貪利階之禍也甚哉利之為害於人國也盖執政好利則百官尤而效之将惟利之是圖下以浚民之膏而上以奉君之欲則其國必貧執政好利羣臣皆貪冒無耻則風俗壊而尊君親上之誼衰攘竊盗賊之禍作士大夫㢘恥不立小民廹饑寒輕犯亂則國幾何而不亡趙文子遊於九京曰吾所歸者其隨武子乎利其君不忘其身謀其身不遺其友而文子亦生不交利死不屬其子焉是以能光輔晉國夫范宣子賢執政也子産猶戒之以非無賄之患而無令名之難况下此者哉余故比次卻縠以下綜其行事而譜之觀其所以盛跡其所以衰詩曰秉心宣猶考慎其相晉之盛衰亦有國者之明鑒也可不慎夫唐賢三昧集序新城先生既集古五七言詩各如干巻復有唐賢三昧之選盖選五七言者所以别古詩於唐詩也然詩至唐極盛矣開寶以還盛之盛者也選唐詩三昧者所以别唐詩於宋元以後之詩尤所以别盛唐於三唐之詩也昔夫子刪詩不斥鄭衞而三百篇中有滛辭無俚辭俚之病至於無所不盡既無藴藉停蓄之意于中則其于言也求其依永而和聲必不得矣夫鄭聲之宜放以其滛也然其聲故在也詩至於無所不盡而俚將并其聲而亡之而風雅委地矣故朱元晦謂今人之詩如村裏雜劇誠惡其俚也然今人之厭苦唐律者必曰宋詩且以新城先生嘗為之此知其跡而不知其所以跡也先生自序此選謂别有㑹於司空表聖嚴滄浪之㫖錄盛唐詩尤雋永者自王右丞而下得四十二人近時能詩家每極論嚴以禪喻詩之非而於高廷禮之分四唐則按以當時作詩者之年月而駁之曰燕公曲江亦初亦盛孟浩然亦盛亦初錢起皇甫冉亦中亦盛夫詩不可以若是論也余以毛詩考之作誦之家父見於桓公八年來聘十五年來求車為東遷以後之人矣其於詩也不害其為小雅黍離行役之大夫及見西京之䘮亂嘗為東遷以前之人矣其於詩也不害其為王降而風故初盛中晩亦舉其大概耳而盛唐之詩實有不同於中晚者非獨中晚而已自漢魏及今有過之者乎盖論詩之氣運則為中天極盛之運而在作者心思所注則常有不及其盛之意所為不渉理路不落言詮言有盡而意無窮擬之於禪則正所謂透徹之悟也不求之此而但廓落其體規取浮響慢句以為氣象而托之盛唐此正嘉來稱詩者之過也於前人乎何尤或曰然則唐文之與詩何如曰論詩於唐以後與文不同古文自韓栁始變而未盡其徒從之者亦寡厯五代之亂幾没不傳宋初栁穆闡明之於前尹歐諸人繼之於後然後其學大行盖唐與宋相賡續而成者也詩至中晩已小變王元之軰名為以杜詩變西崐之體而歐蘓各自成家西江别為宗𣲖至南渡而街談巷語競竄六義其間能以唐自名其家自放翁石湖而外不可多得或者謂反不如西崐之浮艶其聲存也然則是集成而復唐已墜之響於千有數百年之後庸詎非承學者之甚幸哉余聞先生里居著文溢百篇嘗謂今之學唐宋為古文者逐貌而失神余文所以矯其弊意者論文於今日亦其當變之㑹乎乃余數請而秘不以出也故今所論列止於此奇零草序余得此於定海命謝子大周抄别本以歸凢五七言近體若干首今久失之矣聊憶其大概為之序以藏之嗟夫遠塞風寒羽書旁午身歴戎行而沉星隕氣於窮荒絶島之間猶能自出其光焰以為有目者之悲喜而幸覩雖揜抑於一時要以俟之於百世欲使之終晦焉不可得也客為余言公在行間無日不讀書所遺集僅十餘種為邏卒取去或有流落人間者此集是其甲辰以後将解散部伍歸隱於落伽山所作也公自督師未嘗受强藩節制及九江遁還漸有掣肘始悒悒不樂而其歸隱於海南也自置一椑實糧其中誓糧盡而死邏卒至門忽有二猿跳躑哀鳴牽裾尼之公乃毅然出就執既被羇㑹城逺近人士下及市井屠販賣餅之兒無不持紙素至羇所争求翰墨守卒利其金錢喜為請乞公隨手揮灑應之皆正氣歌也讀之鮮不泣下者獨士大夫家或頗畏藏其書以為不祥不知君臣父子之性根於人心而徴於事業發於文章雖厯變患愈不可磨滅厯觀前代沈約撰宋書疑立袁粲傳齊武帝曰粲自是宋忠臣何為不可歐陽修不為周韓通立傳君子譏之元聴湖南為宋忠臣李芾建祠明長陵不罪藏方孝孺書者此帝王盛徳事為人臣子處無諱之朝宜思引君當道臣各為其主凢一切勝國語言不足避忌余欲稍掇拾公遺事成傳畧一巻以偹惇史之求猶懼蒐訪未徧将日就放失也悲夫尊聞集序韓退之集序文者貫道之噐先儒駁其本末倒置是已然所以謂文為末者文不與道俱故也善乎濂溪之言曰文所以載道也文非道何以載道輪轅飾而不為虚車者以其所載者道也其載之者亦道也文特其形而下者耳豈得謂道自道文自文乎然車不載物始謂之虗車任有物焉充之斯不虚矣文不載道而詭譎誕漫滛艶剽竊之詞勝雖有載焉豈得不謂之虚言哉既謂之虛言夫其離道愈逺也而鄙之為末宜矣今之為文者大抵有二其為詭譎誕漫滛艶剽竊者常薄儒先之說為無用用之不足以成家而見為迂腐及視其所為按之其中無有也矯其弊者奉一先生之言亦歩亦趨惟恐失之而不知有超軼絶羣者在謂其中盖有物焉則亦無有也若此者猶不得謂之虚車已乎尚書澤州說嚴陳公病之公之為文也其初涵泳於六經四子之書排二氏之虚妄斥儒家之異論一折𠂻於新安朱氏而擇其尤粹者以立之本於法則左國先秦兩漢朱子之書無不取於體則唐宋元明之作者參伍焉無不備猶未敢以自信也久之集始出合詩文經解雜著共得八十巻某受而讀之見其理弸於中而文暴於外其所言者皆得乎性情之正而所述者無非仁義道徳之㫖也則可謂富哉信乎其為載道之文歟雖然夫無所於載者謂之虚車可也車既飾矣載既美矣執䇿者從之或東焉或西焉或南焉或北焉雖終日馳不至矣公方以道濟時其篤於踐履發於事業而施澤於生民者孰非其文之至其所載於册者此是也不東以西不南以北從其道而隨所之焉雖重且逺有不至者哉讀是集者可以慶公之遭而無病於道之難行矣日下舊聞序古地志九丘之所述土訓誦訓之所傳不可得而聞矣禹貢於帝都首列冀州僅兩言而舉餘州所至可知其境界因以見尊京師示王者無外之意此書之體例也商頌稱亳都曰景員維河景景山河大河員言大河之旋繞於山文僅四言而山之髙大水之縈迴形勢之雄壮險固俱粲若指掌此立言之法也文王治岐及豐二南所咏多在江沱汝漢之間無一言及於岐豐土俗者舉逺可以見近也盖詩書之言約而該其㫖微而顯而志有地理為史家者流義取詳覈辭有不必然者余觀自古帝王建都之地多且久莫如關中今則燕京而已關中自漢黄圖外若葛洪薛寘蕭賁之所輯無慮數十家獨唐韋述所譔西京記宋宋敏求演之以為長安志十巻最稱淹博若燕剏都於遼歴金元及明更世七百餘年其名雖燕舊而西自恒山滹沱易水以屬之邯鄲為趙地西南漳衞為魏及邢衞之境東南自大河附之海為齊接壌盖奄有數國之封畧故其所錄不得不廣其建國於五代搶攘之際非有周文武成康之基業與秦漢隋唐以來聲明文物之舊也而故典缺如蒐輯者尤難之友人秀水朱君竹垞檢討居京師久乃博採經史子集幾千巻及游覽所至所訪聞於遺賢故老者集之為日下舊聞分為十門搃其巻得四十有二間以已意辨論其疑似援據精確辭雅意暢前此未有其書也葢自郡國寰宇之有記至元始編為大一統志明踵而修之其所載者天文分野户口貢賦山川城郭宫室坊市津梁廟寺陵墓之名數與夫各郡邑之人物土宜亦云紀其大凢而已矣若夫歴代遷徙因革之不同風俗好尚圖史金石彝噐淵沈土瘞山銘塜刻之剝蝕殘脫而僅存者人妖物眚仙釋怪誕虞衡之所志靈異之所錄禽獸草木詭形殊状非是書不偹也誠能倣其例於十三布政司志各配以是書行之志為之經此為之緯識大識小兼羅並蓄學者一開巻而坐見六合之内極古今之變豈不甚快惜乎竹垞已老而作者之不易得也是編掇拾止於前數朝軼事然觀其所述非徒以侈浩博也其於世運隆替君臣謀議政治民風得失之故瞭然矣法戒之實不在是與其以翼經而補史之所不及者尤作書之深意不可以不察也姚石村南遊日記序初虞山姚子石村赴粤東觀察蒋使君之招以甲子嵗八月自金閶發舟十月抵粤省署又一嵗還吳道途徃返所經必有詩詩必先以小序指次分明詳畧有體名為南遊日記以投余於京師余纔一開巻而江山萬里恍然入目此豈非所謂摩詰詩中有畫者乎石村故善畫昨余過慈仁寺海棠院見其畫壁老松排空偃盖蚴蟉奇特趙恒夫黄門書側謂石村與王石谷山人俱出虞山同師指授畫格故不相下今石谷名重天下而石村旅况寥落如故故時令其畫壁以當子昂之琴其為名流愛重如此然黄門之所賞猶以畫也余觀石村詩雖不工於畫亦自有足傳者獨蔣觀察序以奉命繪輿圖特招致姚子董其事又不知觀察之所賞於石村者䆒竟於余與黄門何如也觀察下世久石村尚存其序於集中盖已不勝一人知已之感矣萬青閣全集序君子之立言也内必有其實之可循外必有其事之可據内無其實也外無其事也然而其言傳焉則君子勿貴也况乎其言之㫁㫁勿傳也亦終歸於無有而已矣所謂實之有可循者其理足乎已故其詞溢乎外若宋儒先之說關閩濂洛之書尚矣所謂事之有可據者其見利害明故其决成敗審若趙營平之議兵事賈長沙陸敬輿之言治道是已是人者非今所尤急急求之者與今觀趙給事恒夫所著書其幾是與給事初仕為交城令今嵗夏從弟友棠為晉遊自交城來為余述其邑中父老言邑境聨塞距河綿亘一千里自明季㓂盗盤聚積為三晉害累任兹土者噤不敢問幸俸滿無事去自前令趙公至即計除賊既鉤得其姓名與所囊槖部署已定一日大㑹飲賔客宻諭司更者促其籌夜中報五皷客未散装出門徉為閲軍於邑西之静安堡者雖所偕將卒逮丞尉俱不知行四十里黎明休軍始下令分騎歩入山搜𠞰賊偵者官軍不由西路乃從北入遂大驚相告各奔潰墮崖塹死無算留二旬盡誅其頭目二十餘人餘或死或降無脫者而民間寂若無聞百年大盗根株盡㧞邑遂安枕至今復欲為民開高離山鑿巖石一千餘丈通水道出之龍門渠溉田十萬四千餘頃功未及成而去而生祠遍邑中猶尸祝之不絶也余聞之而嘆曰明之末季盗起秦晉交静諸山逼處太原左掖尤為淵藪當時經畧督撫大臣軰出撫𠞰失成算㓂起一方蔓延楚豫卒之糜爛徧天下使得給事者一二人付之兵柄相犄角其間則皇甫真朱㑺恢蕩之功不難再奏惜乎給事所試止一邑其生時之幸而不可謂非其才之不幸也其所上當事書及檄移案牘言用兵方畧賊平善後事宜條晰動中窽要發越震掉文采横溢彼豈暇沾沾為文士之習哉不期文而文自生者所謂利害明而成敗審也君既以功擢郎署改授諌垣㑹有謡諑翻然逺引既上知其枉詔起來京猶偃息寓園徃來信宿僧寺閒與客把酒賦詩鬪奇角險一韻或叠至數百首不止或者謂給事於世非果恝然聊藉是以耗磨其壮心然耶否耶然觀其窈𣺌巉刻而一本騷人之㫖其中之所存必有深思而黙㑹於文字之外者則請以俟後之君子董文友文集序余自去年冬即立意不願為文字將歸而鍵關以息吾志而未暇也余之所不願為文也嘗與董子文友言其故董子以為然昔元黄文獻公之論文曰作文之法以羣經為本根遷固二史為波瀾本根不繁則無以造道之原波瀾不廣則無以盡事之變此言約而能要宋文憲公屢稱之以勵學者余少嗜書於古人之微辭𦕈義亦能時時獵取渉其藩籬既奔走於科舉之學十五六年見時之所謂科舉者非獨無藉於古人雖其音節之稍似則同軰者羣指以為譁笑不待試之有司而後知其牴牾也於是姑暫釋其所學隨時骫骳務悦於觀者之目乃學廢而所求益以不遂始自念得失有命少壯不可復得将竭吾之年嵗以深探於六經之㫖二史之法然後放而之於百氏使其發於文章而道之粗有聞焉其可也然竊觀今之為古文者日益衆跡其所為又不殊於向之所為科舉之業者以號於人曰唐宋已西漢已特不知彼之所謂唐宋與西漢者果不盡非耶其已可傳耶今為科舉之業則吾滯而彼速化焉彼之變而為古文而可傳者安在其不可必也吾第歸而求之俟其學之至而確然有以自信於中毁譽得䘮之不得而入如是者雖終吾身可也傳不傳奚有哉吾之所言於董子者如此今年董子刻其集成屬余為序余讀董子之文稱引繁博根蒂經史吾之所欲為董子言者董子既已習聞之雖董子自視若不足然極之變化以要其至吾知其無易於是而已余與董子同應舉有司兩人年又相若乃董子獨能卓然自信成一家言不待余之久而知悔此則余之所有愧於夫人也懐葛堂文集序友人寜都魏徴君氷叔雖隱居不仕益讀書好觀古治亂之跡以逆揣其成敗得失之所以然所著書已畧見其意者有左氏經世一編康熈戊午年或應詔以博學宏儒薦竟不可起有弟子梁君名份字質人徴君謂可以傳吾學者自徴君没後數年而君來京師出所為懐葛堂集示余其為書鉤貫經史包括古今以立言究其㫖歸嘗慨然有濟物之意何其一似吾徴君也使梁君而得志則徴君之學得矣然君言師志退守窮約年過四十不求仕故其身愈困著述愈富今徴君没既久而其學愈重於天下者亦君之力也君嘗叅幕西陲著西逰圖說未及成書適撫寜按察張公前駐節西安以千金資君縱逰塞上君以孱書生隨數騎結束出闗徧厯河湟四郡以極之朔漠重地覽其山川城郭之險隘退而厯訊之老将戍卒得其可以資守禦習戰攻者凡用兵之地所至各繪之圖圖有說西塞三邊部落二千里之形勢瞭然在目是書余尚未得見以君平時著書所嘗聞於師者觀之則信乎其為有用之學矣夫智謀之士俛仰規畫乗時抵隙以赴功名之㑹亦時有所論述及試之有效不效者其為已之私勝也苟利於已將不難緣飾利害冀以速售其説已爾君於世無所求於已無不足而又其識足以權變其筆力之馳騁足以逹已見而言人之所不能言則其書之成以為世利益無疑也余滋喜徴君之得所傳因牽連及之紅蘭室詩序紅蘭室主人詩三種一紅蘭室集一玉池生集一出塞集與其客朱君襄顧君卓校讐既定都為一編凢若干巻嘗考漢時賢王稱河間東平兩王皆好經書被服儒術然河間傳離騷東平能賦頌歌詩此外惟長沙廣川見於藝文志者辭賦數篇僅存其名而已盖作者之難也竊怪唐以詩取士振風雅於六季滛靡之後哲匠代起四百年間而宗室有屬籍者其文辭轉不少概見即汝陽漢中兄弟與高杜諸公逰所謂文雅見天倫者宜其皆有之而至今篇什寥寥豈其先有而後失傳耶抑王侯之家聲色靡曼足以移易其志氣雖有文采過人之姿亦將迷溺而不得出也今皇上天縱神聖覃思六藝睿藻所被雲漢昭而江河流其間左右珥筆賡颺之盛蔚然挈一代之著作與雅頌比隆已惟是作屏王室實有其人紅蘭室主人者乃先安親王之季子而今王之介弟也自某畱都下不敢輕有曳裾主人延之至再不敢固守不見之義今年冬始隨使者至邸出其所為三種集者酌酒而屬為之序竊不揣固陋評其詩於兩集中體兼濃麗清逸者義山致光之遺調也奇情慷慨湍馳飈激而不可遏者出塞諸咏鮑明逺之跌蕩高逹夫之悲壮也主人年少修謹學古之外無他嗜好尤愛禮文士與敦布衣之交見者無不厭心而去夫河間東平之得稱賢者惟其能讀書為善也而漢時諸王之名能詩者亦卒莫過焉今主人之賢其視漢二王無所遜則其發而為詩也固有不求工而不能不工者矣朱顧二公皆吳中號能詩家主人日與唱和親禮之厚甚嘗傳言引陳思王書百世而後誰定吾文之語請余掎摭其利病虚懐若此於詩方日進而未已也然則吾今之所嘆為絶工者庸知俟之他日不更有大異於今日者耶於以鳴國家之盛業而躋斯文於兩漢之盛其自命甚重吾又何足以知之古香齋集序古香主人手輯其近詩自出居庸闗至邉外憶友諸什為出塞詩附以還京後諸作合之共為一巻丙子春皇上親征漠北命主人駐守歸化城防㓂奔逸路任親賢賢也按歸化城在唐豐勝二州境主人與其從行生徐蘭按之圖經謂隂山千餘里草木茂盛多禽獸為匈奴苑囿今大同起西陽河堡邊外之山皆斥鹵惟此山土暖而幽深夏多奇花卉山脉甚長知即古隂山也又地里志朔州有連山其山中㫁兩峰峻起名曰高闕亦與今歸化城西北山所開之闕合王昭君墓在其地至今其塜草木猶青云是隂山高闕皆在歸化城界内此昔趙武靈之所經營而秦䝉氏父子漢衞霍諸名将所徃來提戈用兵處也主人治兵之暇按轡循行週視險隘在在皆有經畫遭遇皇上神武天授師行出境捷書屢報謀臣猛将無所用其智勇因得以其間與客登臨懐古風乾草枮之際極目蕭條思從中來每一詩成輙令壮士歌之其音調激昂悲壮聞者無不扼臂増氣志逐伊吾之北者及蕩平既奏歸臥朱邸良夜桂苑清嘯孤引蕭然若不知有戎馬之事其自號谷園荷鋤而詩之閒曠恬適亦如之矣古之有道者隨時舒巻不滯於物即其所傳隻言片語猶足以宏奬風流而况乎處昇平之運以發為文詠之盛如是顧不足為論世者之慨慕也哉燕山偶草序余在都數聞於士大夫有素堂禪師者自南方來此雖寄跡方外性特疎放京師老儒夙将詩翁談客所聚處多樂從之逰論經說劍茗飲而賦詩者坐榻中日以數軰師攘臂其間豪氣勃勃不自禁而皆醖釀之以為詩所居城西郭圓教精舍寺中戒律精嚴禅板肅穆師或時與客言詠至夜挽留不聽去笑呼聲出戸同侣至闔門驚避明日客去而詩成長篇短韻已藉藉播人口矣余自海淀歸枉道訪之師一聞余至相見遂如舊昔劉夢得論江右僧詩謂如么絃孤韻漸入人耳非太音之樂賈法曹行道苦吟垂老成就止傳五字豈若師之觸景興生落筆泉湧滔滔有國士之風也師貌臞善病少噉余傳以涪翁服兎絲法逾月来報近胃强加飯日數匙矣計今身益健詩思亦當益雄然余以髪齒衰白嘗欲撥棄書巻棲心静境師學佛者徒方將裒輯其詩沾沾問序於余何耶其言吾教中以無離文字説解脫相為第一門事苟其足寄吾道雖謂之解脫可也即其所論詩有超於今之禪者一等矣祭告紀行詩序遼陽古幽州東界自漢開四郡厯代為戰争地東漢崔亭伯三國管幼安邴根矩僑居甚久未有所紀錄而自唐以來士大夫之往來其地者題詠亦不多見何哉豈非以其僻處邉徼風土荒陋無以發騷人羇客之逸興而助其蒼凉懷古之思故雖今志乗家多方採輯亦無得而傳焉本朝肇基東土陪京並建陵寢宫闕所在周廬環列官廨棊置野有干掫館有饔餼仕宦者指以為都㑹盖聲明文物之盛視昔有加矣然風雅之作猶寂乎未有聞也嵗戊寅秋今大鴻臚阮先生以通參奉命祭告遼太祖陵出雄闗經長城望渤海睇毉巫閭徃返間得詩數十首壮言慷慨沉辭怫鬱雜以比興間以諷諭有風人之㫖焉自此而風雅繼興有日矣然先生軺軒所至僅錦州太守所治地使過此六百里觀留都天險營建鴻麗感豐鎬之遺績慨然而賦比於孟堅兩都平子二京之作顧不偉歟盖吾讀紀行諸詩知其才之足為此不難又惜其限於所至地不得早為之也王阮亭五七言詩選序文章之流弊以漸而致六經深厚至於左氏内外傳而流為衰世之文戰國繼以短長之䇿孟荀韓荘之書奇横恣肆雜出而左氏之委靡繁絮之習冺焉無餘矣此一變也自是先秦兩漢文益奇偉至兩漢之衰體勢日趨於弱下逮魏晉六朝而文章之敝極焉唐興諸賢病之而未能草也迨貞元大儒出始創為古文易排而散去靡而樸力芟六代浮華之習此又一變也惟詩亦然自春秋以迄戰國國風之不作者百餘年屈宋之徒繼以騷賦荀况和之風雅稍興此亦詩之一變也漢初蘓李贈答古詩十九首以五言接三百篇之遺建安七子更唱迭和號為極盛餘波及於晉宋頺靡於齊梁陳隋滛艶佻巧之辭劇而詩之敝極焉唐承其後神龍開寳之間作者坌起大雅復陳此又詩之一變也夫敝極而變變而復於古誠不難矣然變必復古而所變之古非即古也戰國之文不可以為六經貞元之文不可以為兩漢明矣今或者欲狗唐人之詩以為即晉宋也漢魏也豈學古者之通論哉余嘗譬之富人之室其子孫不能整理日即於壊廢後有富人者居之閈閎崇如墉垣翼如非不霍然改觀也然尋其途徑則非問其主人而支𣲖已不可復識矣夫六朝之頺靡固亦漢魏之支弧也唐人之變而新之其霍然改觀固然矣無亦富人之代居而不可以復識者乎故文敝則必變變而後復於古而古法之微猶有黙寓於所變之中者君子既防其漸又憂其變也新城阮亭王先生五言詩之選盖其有見於此深矣於漢取全於魏晉以下遞嚴而遞有所錄而猶不廢夫齊梁陳隋之作者於唐僅得五人曰陳子昂張九齡李白韋應物栁宗元盖以齊梁陳隋雖逺於古尚不失為古詩之餘𣲖唐賢風氣自為畛域成其為唐人之詩而已而五人者其力足以存古詩於唐詩之中則以其類合之明其變而不失於古云爾先生之選七言體七言雖濫觴於栢梁然其去三百篇已逺可以極作者之才思義不主於一格故所鈔及於宋元諸家至明人則别有論次焉學者合二集觀之以辨古詩之源流而斟酌於風㑹之間庶乎其不為異論所淆惑矣集中分别部次具有精意已見先生自為凢例中不偹述朱竹垞騰笑集序騰笑集者友人朱君竹垞所自名其入仕以後文也余癸丑在京師葉文敏公得君集讀竟嘆曰古雅固所不論尤難其無一語夾雜是時君方襲處士服溷跡公卿間文敏所嘆為其能不為世俗語也後君起制科聲譽焯然自貴公豪家五方㳺士無不欲丐一言為重君伸紙䑛筆日盡數牘或非其雅意所欲為倦則隨手應之咸足其願而去以此積文至多君裒為集若干巻示余余曰是不可以負文敏為削其冗長者存僅十之五六既取而觀之則精彩血脉煥發呈露有若嶄然而高者出於層霄之上而冽然而清者决於重淵之下盖積君十餘年之窮蒐博取與其所内得之於心者日新月變雖不難追古人而與之並顧其雅尚所寄一徃以深耿耿然有不與塵俗俱冺者視文敏之所讀而嘆者無以異也君曰王通云心跡之判久矣心不可以衆喻也然余自知之子亦既知之矣夫迹者人之所徇而羣耳而目之者也吾姑托以名吾集而庸以自晦焉可乎余曰然陳其年湖海樓詩序詩雖所以吟咏性情然亦可以考其人之里居氏族與其生平遭際之盛衰君臣交遊之離合而人之一身有先榮後辱有始困終遇若此其不同也則其性情之所見亦各異焉余厯觀前世詩人自建安王劉軰遭漢季失馭羇旅厯落有憂生之感下逮六朝分裂之餘衣冠失職徃徃播遷為羇囚唐自乾元光化以後則一時文士抱其巻牘以外依方鎮於幕下者所至皆是其間强弱吞併出彼入此曽不容瞬士生其間譬如墜秋風之籜於狂波萬折之中轉輾洄洑及於淪胥而不可止此其可悲者也自余之讀陳子其年之詩識其所遇以想見其為人而及今之邂逅於廣陵也已十五六年矣其年生長江南無事之日方其少時家勢鼎盛鮮裘怒馬出與五陵豪貴相馳逐狂呼將軍之筵上醉臥燕姬之酒肆其意氣之盛可謂無前故其詩亦雄麗宕逸可喜稱其神明及後遇四方多故夾江南北殘烽敗羽驚心動魄之變日接於耳目廻視向時笙歌促席之地或不免踐為荆棘以接冷風故其詩亦一變而激昂歔欷有所愴然以思愀然以悲時入於少陵沉鬱之調而不自知亦其遭時之變使然也其年起謂余曰余所裒集自十七八嵗始更今幾三十餘年始得詩凢若干首然則其年之性情見乎此矣既而反思前代之人其遭時不幸至於顛隮失所及天下始平干戈不用而文士出而斯人已窮困以老或死不及見矣豈非其命歟若陳子則年始强仕足以身遇太平遂其懐抱夫志和者其音樂也於是又將變其激昂歔欷者比於朱絃疏越以奏清廟而儐鬼神而出於前代詩人之所不及見則陳子之於詩殆將終身而已嚴蓀友詩集序無錫為縣居蘓常兩郡之間居是地者徃徃出為天下偉人貞士而其為詩者自南朝湛茂之唐李公垂以来亦代有聞人有明海内詩家體凢數變北地信陽瑯琊厯下竟陵代起而新其製本如雲嵐之出没於山谷間聴其自起自滅可矣而竭蹶以馳者至謂能窮日之所入而不知其將道暍而死也獨錫山風氣頗能不詭於一時之好尚故其詩之可傳者常衆亦由其人之性情能不為浮薄之所䧟溺而然也余徃在吳門見有所謂秋水集者其詩宗黄初建安以還五七言近體時出入於温李之調蔚茂而婉麗卓然能自成家者也在錫山始知為嚴子蓀友作蓀友為人蕭散冲悒意氣浩然有國士之風宜其必能為詩而為詩則自不䧟於浮薄者余既喜得蓀友蓀友遇余亦交臂歡甚念當别去於是屬余為序其詩以余之戅愚不諧於俗雖久逰四方熟嘗人情變態而志氣硜然愈不可易故人無論貴賤甞視以為難近獨君能暱就於余而不余怪則其性之不移於風氣可無疑也余固拙於文辭於詩尤不能工顧獨嚴於論詩以為世之風從波靡者皆無與於詩人之事故余雖不能為詩而一時之名能詩者亦終無以奪焉然獨心折於君之詩至此則君詩之能不痼於習俗而足以取信於天下者亦愈可無疑矣而君不亦益知所自重哉君富學殖所著詩且日多余取其已輯者序其端王黄湄過嶺詩集序今京師以詩名家者稱兩王先生其一為新城阮亭少詹而一則郃陽黄湄給事也新城詩最富集成者數種牢籠百氏不名一體於是海内稱詩後進各隨其意之所指而趨之皆能自超風格有聲於時然新城數稱郃陽給事詩不去口嘗令其從學者徃就之甲子嵗大比給事奉文典試粤東事甫竣而新城復使祀南海爾人所過留題山程水驛登臨宴賞酬和之作落筆都為人傳頌嶺表詫為盛事比新城北旋余告歸省而都下之言詩者乃專歸郃陽過嶺集者其奉使徃還時所作也惟古之君子一出入不忘其君而古者諫無專官行人輶軒所至采輯風謡上之太史則十五國之風所為褒美刺譏以感諷乎君上者莫不有諫之義焉當給事之徃也楮墨流傳逹於甲帳主上數對從臣嗟嘆其才以今廟堂之宵旰求治而所取於給事者豈獨以其文辭之善哉意其平日敷陳披對讜言正論必犂然有當於聖衷者故因詩而知其志之所存也然則給事之詩之志可知矣是集所錄雖僅百餘篇其藹乎忠孝之情何其不殊於風人之㫖也天子誠得而諷詠之則蠻荒萬里之外民風土俗政治得失可以一開巻而瞭然於心目之間其為益豈不大哉新城前示余粤遊諸咏余覽其大意粗不相逺而給事諌官也余於是篇尤致意焉若其鋪陳排比腴詞逸韻為學士家之所愛賞摹擬而不能釋者此夫人之所共知而余顧有所不暇盡述者也史蕉飲蕪城詩集序鍾嶸論詩起東京及江表大抵盛衰三變而其由衰而之盛也必有英傑為之領袖若陳思陸機謝客是已自元嘉以後文體綺靡至唐而陳正字振其頺波及五代之餘迄乎宋初西崐之體盛行而王元之歐陽永叔歸諸大雅是數子者豈獨其才之有殊於衆哉其志氣堅定不為時俗移易所謂世人之無常而徐公有常也故余每論詩取其不為世俗所移易者而已以吾之有常勝彼之無常殆久之而無常者既定風氣漸有所歸而隱操其移易之柄者常在此不在彼今世稱詩家上者規模韓蘓次則撏撦楊陸高才横厲固無所不可及拙者為之弊端百出險辭單韻動即千言街坊讕語盡充比興不復知作者有源流𣲖别徒相與為聒噪而已於此之時而有擷王盖之遺芬標錢劉之逸韻思以大變乎其積習譬如披凉風激清流以灑執熱而拂埃􅅽使人快然不知煩懣之去體其有功於斯事何如耶余讀廣陵蕉飲史先生之詩而知風㑹之有所歸也先生五言古澄淡精瑩直窺開寶風格七言古調尤能兼乎漢魏樂府被以新聲近體取裁豐贍湔削清警總之無一塵俗語讀其詩而接其人泠泠有世外之賞先生為人散朗孤岸脫畧形跡故其詩飄灑絶俗亦如之其同時相唱和者湯編修西崕兩人氣誼詩格頗相類皆所謂有常而不受移易於世者使仲偉復出品題其詩以次於古作者之後必有難為主客者矣遂初堂詩集序韓退之論書謂喜怒窘窮憂悲愉佚怨恨思慕酣醉無聊不平有動於心必於書焉發之後人甞取之以論詩而其言情炎於中利欲鬪進然後一决之於書與夫淡泊相遭而頺墮委靡潰敗不可収拾審是則退之不得為知書也夫書之入神惟其垂縮徃収藏鋒不露能得意於行墨之外耳張伯英王逸少風流標格高出世俗故其書亦妙絶古今而豈以求工於劍㧞弩張之態哉推此以觀古人之詩陶淵明左太冲張孟陽韋蘓州白樂天其人品皆高潔薄於世味故其詩亦閒淡真率稱其生平至如潘岳之乾没沈約之詭譎唐沈宋之躁兢雖其才高辭麗令人讀之索然無餘思者不得澹泊故也不澹泊則志浮動志浮動則本不立彼既惟利欲之是求而復返於性情之正哉夫惟澹泊是將者為能得其性情之正故其翰墨馳騁無適而不可厯觀詩人鮮不以此為重今石峰先生其幾是者歟先生弱冠能詩丁時板蕩放浪山水有浮游於塵外之意後廹於大夫之命出應科舉浮沈州縣十餘年復由郎署視學齊魯計其所渉厯是非利害紛紜日變於前而其翛然塵外之意所不與世故汨没者時時見之於遇物感興之際故為吏則所至稱治有循良之稱視學則師嚴道尊士風翕然丕變於古不知其人視其詩則皆可以一吟咏而得之也先生自山左歸懸車不出坐臥半隱園中中為霄漢樓左瞰大江右眺龍川百子諸峯羅列几案與故人慿眺其上飲酒嘯呼絶不聞戸外事而且詩益恢奇宏放不可以一律拘吾以是益知澹泊者之於詩為能發舒其性情之正而情炎於利欲氣沮於得䘮營營者之不足以與於斯也聞先生年少積詩最富遭兵火散失所存僅若干首長公田子大行編次成集以示余屬為序亦先生意也田子人示余先生手抄杜詩二巻盖先生守磁時甞得明趙邸北宋賜本閣帖至老猶臨摹不輟故其作字遒逸得晉賢風致有足與其詩相映發者十峯詩刻序自余少時即知梁溪有錢君者既因縁人事舟楫往還曽不得一顧而問焉記癸夘秋將適潤州泊舟西郭下慿艫眺望見江流抱城縈迴如帶山色蒼翠隐映數里外其左右疎籬脩竹隨流曲折俄有小艇從水門出列坐四十人中有哀絃急管之聲亂夕陽而逕渡余目送久之黙黙傷嘆居人之自得如此而余以貧賤奔走去恵山咫尺耳無由一至其處又還望君之廬則未嘗不以為深恨也比再至吴門君辱書及詩於余屬為之序其髙弟秦對巗太史長者也每與余論文則曰吾所聞於師云云又曰吾師吟子之詩亦云云然則君之於余深矣宜乎余之始慕其人繼讀其詩而益為之咨嗟嘆息不已也初余觀君詩疑若不經意以出者及讀其自序所為十峰集格几數變要之以真至為宗則其屢變而益上以求當於風雅之㫖者不可不謂工且久矣余故特表出之以愧世之言詩者且以志君之於余其不相識而相知之深有如此也他日過恵山之麓飲清泠之泉讀其詩而一樂焉亦可見人生於朋友山水之趣均有得其自然者初不必身至其地親與之周旋而後快也李司空詩集序詩之必本於志今學詩者皆知言之矣顧其勢有不盡然者貧士終日吮毫為人客作何與已性情事而承明侍從之臣珥筆左右鋪陳美德莫不鏗鍧其辭黼繡其章以言乎應制則工矣然此昔人所謂金華殿語無闗至極者也惟夫身居廊廟之中心寄江湖之上其意之所之徃徃與山水景物别有領㑹斯則蟬蜕塵埃而蕭散閒淡與比興為近者也己巳年今大司空廬陵李公嘗被命出祀岱嶽望祭東海輶軒徃返得詩數百篇項又合癸酉在京所作為一集辱以示某惟公碩德鉅望簡在帝心將命祇肅奉職匪懈有古大臣風節非如世之爭工於聲病間者乃其興㑹所發抉竒呈奥有専詩家鏤心剜賢所不能到者而約其大㫖一以冲淡為宗至讀所謂醎菜二十首則羔羊大夫正直節儉之風宛然可見盖公久宦京師未嘗買第而居賃宅湫隘嘗兩嵗三徙都人士皆嘆息歌咏其事迹其襟懐所寄非所調蕭散閒淡而與比興近者與嘗疑諸葛武侯之在隆中抱膝而吟梁父一曲耳後為相封侯竟不聞有吟咏之事然其自言寧静淡泊此其相業所存亦即作詩之本也若武侯可謂深於詩者矣公物望方新旦夕揆地要其事業文章本領在是讀公之詩者當於此乎得之趙文饒詩集序嘉定趙進士文饒先生需次家居赴師友之難被吏牽染幾殆事既白上名吏部部持之甚堅未得用其同年友唐來江儀部招與同寓去余寓咫尺於是余三人者嘗相過從論詩無所不盡要自不與外人同集前後詩凡數種屬余論定趙子之詩廣博奥衍氣渾以醇溢為竒怪如頡文籀篆三代之敦彝恣突如崩堤勁健如屈鐵一言以蔽之曰古而已或謂趙子近體大半妍美不可以古概之余曰夫深山之大木百圍輪囷轇轕狀若神鬼春至發榮滋生繁花彩艷掩映風日凡草木之麗者不能過也如此可謂之非古乎疑者乃服然趙子詩愈古身愈困彼爭新競艶於字句之間者灑然自得過而不問者相輩也洵古文直無用於今世獨吾與東江讀之嘆息而已趙子幸自愛古道其終不可冺也世復有吾與東江者而力能振子之詩則此集將不為風氣先哉徐芝仙出塞詩序徐子芝仙善為詩前年王師北征芝仙亦以書生衣短後躍馬出闗經榆林土木登祁連渉瀚海南望北斗跡明文皇之用兵處所歴砂磧險巇剽將健兒喘汗不得前芝仙方緩轡縱觀哦咏自若嘗夜經古戰塲見燐火蔽空如流星萬㸃乍明倐滅中有巨火獨明甚衆燐隨其廻轉若將領指揮之狀俄聞鬼哭啾啾漸來逼人特為詩弔之其詩一徃雄健如快馬斫陳勢不留行要必盡寫其意中之所得而止至遇竒花怪石土風詭異𤨏屑攟拾偏饒有風致古稱鮑明逺岑嘉州工為邊塞之詩如芝仙之以歌咏代紀述前人所未見也余偹員史館見今一統志外裔考數年排纂未就幸採掇其中數條上之亦足資博覽之一助云樵貴谷詩序文章必有為而作故作之為可傳而其傳為可久余嘗苦為人詩序既立戒以謝客而求者猶請之不置不應則怒應之無諛辭諛不稱其意則益怒故今為人詩序大抵怵於人之多怒而無所為而作者居其大半吴子與余逰幾三十年余素服其篆籕之工不知其能詩也客有刻其樵貴谷稿者一日吴子以貽余余開巻覺其有異竟讀之則益嘆其異以為今詩人自新城王阮亭没後少有類此者因不待其有請而許為之序大抵吴子之詩尤長在五言才調鮮華渉筆渾渾入古不必借逕於中晩兩宋以洗滌其塵䝉之氣要與今之規模初盛者區以别矣盖其不欲以詩自名故其於詩自非内有動於中外有觸於物則不暇以為為之且不暇而猶蘄於人之知之者乎是則吴子之詩之所以不可及者雖然客既為吴子刻其詩余今又為之序以文之是倐興忽之相遇於渾沌之地也吴子其亦善自計矣周𢎞濟臯懐詩鈔序同邑友人周君𢎞濟中進士三年攜其詩巻來京師謁選與余談終日言詩益妙而頗見其有厭薄為吏之意余退謂人曰周君之於吏治也盖有餘客曰何故曰夫吏道至今日稍雜而多端矣而縣令尤甚彼欲為之者如此其急非果能為天子收養小民也有入貲縣官朘民之膏厚自取償者有多端設施號武健勝任者有好意嘔煦善事上官邀聲譽者要之始終經營一官而止耳此外畧無餘意如此生民安得不困乎今君之視其官也蕭然若無與而應之泛然如不得已其不剥民以自養生事以立名尅下以奉上可知去此三者而民之受利已十得八九矣或疑其以好閒廢事余驟讀君之詩冲淡閒逺誠有落落如世外之人不可近者顧其中寄託深逺常嘆司牧失職閭閻虚耗飢寒勞苦之不恤而王徳之不下究閔閔然有不任其憂者故知君非無意當世人也子美之詩史樂天之諷諭其中寓意無所不有推是道也以及於天下斯民其有濟乎而何區區一邑之足為嗟乎奔利騖名滔滔皆是君之道誠難矣獨絃哀歌激太古之音以邀里耳之聴其能不嗑然以笑者誰與吏治之不古詩格之日下有嘿同氣機者焉余撫此巻蓋不勝感慨係之也張聲百秦遊詩序同年友張子聲百寄余秦逰詩前後二集秦逰者張子覲其尊甫觀察公於西安使署所作是行也自燕歴晉至秦二千四百里中更太行井陘極天下隘險處行旅之所掉慓眩顧而不敢前者張子獨意氣迅發快馬馳上下坂觸目㑹心口占筆記及乎登華嶽望大河臨終南肆眺於鄠杜㶚滻文武周公秦漢以來之所經營處而發為咏古之詩至二十篇所述古今事變與夫名臣碩儒隱逸詭怪之跡多矣其辭氣飄𣺌恍惚若不可測要其寄興所在求之嗣宗以下射洪曲江以上各有其磊磊不可磨滅者而聲百為之坦懐古誼向朋友抒寫無所不盡俗人或不能知之而余知之獨深因謂其詩之無愧於古人者亦多得之此也去年津門讀君仲兄逸峯詩喜而為之序既又贈詩相訂入關余既以事不果行自嘆此生老矣無復再徃理經年悒悒繼得是卷讀之恍若身至其地而親與之馳騁角和於其間也豈不幸哉今聲百將以季秋之杪復覲觀察公皖江計其山川經歴大抵皆逸峰詩巻中所流咏地也聲百逰吴詩從此當益富即逸峰秦逰諸什聞亦盈帙矣兩人之詩皆得南北江山之助觀察公從而寓目焉一時父兄師友之樂概可想見余之序其詩將不一而足也古有嘆老疾俱至圗書所經履名山於室中以當卧逰者余以君家棣蕚之詩資卧逰之勝比於古人差謂無恨矣䝉木詩集序居京師作詩多苦俗下應酬失雅調然古人之傳未嘗不以此也孟郊曰文章者賢人之心氣也心氣樂則文章正心氣不樂則文章不正當正而不正者心氣之偽也今人横方寸地以勢利栽栅其中盡天地清靈之氣不足以入之則其出也為溷濁腐餘所以中心慘怛生病造熱者鮮不以此也居京師既苦塵雜又益以此物終日聒噪其間令人懐抱至不得開今觀歴城鍾君詩其得心氣之正者與其能釋吾懐抱而使吾目之昧者廓然如覩雲錦之章而聴之熒者􅀈然如聆鸞鳯之音與君之詩所與俗應酬亦了不與人異然何其與古之作者相似也聞君里居安貧嗜古其至都也屏跡破廟中不妄交一客及所與逰必天下賢士大夫其為人如是則其於詩也有不然者與故心氣既正即日應酬不害其為可傳也不然者望塵投拜終日乞憐雖對清泉白石而吟求其無俗不可得也清苑令吴君徳政詩序漢薛宣為左馮翊奏粟令尹賞與頻陽令薛恭換縣二人視事數月而兩縣大治今順天巡撫郭公用是道也以激揚吏治郡保定當畿輔西南道撫道所駐劄亦漢左馮翊地也尤繁劇難理始令吴君治廣宗以稱職聞廣宗僻逺小邑未展其用撫軍遂拜疏調君清苑君至威恵並施一時老奸宿弊剷削藏匿訟庭寂然而案無滯事由是頌聲大起咸戴令君之賢以撫軍為知人也余聞而深嘉嘆息竊有進者以為今天下府州縣大小繁簡至懸殊也法有調用固善然當著為令又于調用中稍寓古遷轉之意峻其品級増其俸秩異其考成待其課績有效則優以不次之擢如是雖同一守令也大小繁簡之制判然有别人得自見其長而得人為易矣守令得人天下清和咸理不難致矣巡撫雖不得叅廟堂之議亦何惜不為百姓一痛切陳之矣陳濂村詩鈔序自去年丙子及今年丁丑春大駕三提師出塞親征不譓掃蕩漠北振旅而還廷臣獻賦頌述美上功徳者以百數獨今大司農澤州陳公所進册為皇上亟稱賞於時長公濂村先生方選授庶常先後奏詩五言排律四十韻七言近體十六章皆冠之序都下傳誦為之紙貴大抵公詩鋪陳盛徳則清廟緝熈揚厲武功則江漢常武尹吉甫之著作也而庶常序辭典贍有風則嫓美燕許詩格整麗叙事詳核大厯才子之遺調也天子常稱公有子顧以年少逸才於散館日用國書特絀其名第將試之以民事蓋皇上於司農公相待不啻家人父子然於其子弟所欲曲成而裁就之者其用意深逺有非愚賤之所得而窺測者也某獲以編纂隨侍司農公辱引為忘分交者十餘年尊聞集成嘗屬為序言暨奉命進呈而蕪穢之文亦得上塵甲帳經寓目焉庶常不久將復入為侍從典校中秘其文亦當貯在延閣廣内之間余之衰鈍復得掛名其末此公家兩世濟美之盛而皆余之所藉以不朽者也白燕栖詩集序子獲交問亭先生即請余為白燕栖記諾之而未就者行十年矣白燕栖者先生讀書之齋以嘗有雙燕來巢其色皆白故異而名之以此余初至其所於時春也野卉雜花蔓開庭除紅白滿地次年再過之庭前兩榆被霜風吹索索有聲落葉侵入屐齒牕外蘚花被砌蝸涎縁壁左右視不見人佇立久之始有蹩􅍷老閽來看客而入殆忘其為王孫朱邸也此則白燕栖之大概余是時不待讀其詩而知其澹蕩有意趣深于詩者也今年二月先生出其詩數求序復令余一一展讀而次第之雖一字句未安必停量再四定去留焉蓋先生為人標格既髙而又濟之以研摩之力加之虚受集益宜其詩之清麗閒逺直似古人且日進而未有已也昔人論詩謂逰不出五百里者不足以極比興之致今先生禀長白之奇鍾天潢之秀朝請闕下閒行郊墅非有幽深汗漫瑰特之觀足以暢發其心志也然一下筆輒居然有重山疊嶺烟雲廻洑之勢由是觀之使李杜王孟之輩不徧逰名山水歴覽竒勝將不得為諸公之詩乎故知立言家所貴其神明超俗耳語曰不善逰者務觀其外善逰者務觀其内蓋耳目之取資者有盡神明之所含蓄者難窮此有待與無待之别也髙户部詩集序舊嘗徃來欈李得徧交其中賢士聞子修髙先生名最久然至輒不相值已而先生舉進士從官河北十餘年後遷郎署來京師余適還里比余再入都未數月而先生喪車已就道矣時聞先生為縣及州守有恵政終以不得一識面為恨今年長公涇縣君孝本字大立初謁選吏部僦居與余邸纔隔垣余久慕先生之賢自嘆已矣終無由一見而涇縣君文行超軼有謂余仿彿如有先公者幸不余鄙辱與之交至厚一日問及先生君縷述前後為守令時事言無溢美事實完備余欲𤨏録之如唐人之傳何易于元紫芝者而君出先生遺詩一編命為序余讀之終巻益知先生之為人淡泊修潔恬於聲利於其詩見之矣於涇縣君得仿彿先生之為人又於詩得先生為人之賢之深然則余雖未見先生視世之所稱為先生者或未有過於余者也迺可無一言以序其垂世之文乎先生之為内鄉也地與襄陽接壤始至當兵火後村落無十家之聚綏輯再期流民四集烟火相望為安州發倉賑飢不待報聞輒散民無道殣其他政稱是以故兩地百姓及隣縣所嘗攝署地無不戴之如父母於其去扳留之載道沒而赴京弔哭者不絶於路也蓋自先生為守令十一年未嘗携家到署去任囊衣篋書自隨而已清苦過人亦其天性家居時與禪僧詩友相習時襆被宿僧舎累日忘返生平獨行已意亦不以忤俗故其為詩一以雅淡為宗匠心獨運蕭踈閒逺而自與古法相合視世之角立家數喧囂於唐宋之分界者無有也余之自謂得先生之深者以此涇縣君又示余樂春軒詩樂春軒者其隨任上谷臨行所作絶句三十餘首以視先生之詩無以異也然則君之為政于涇也有一不如先生者乎古有以循良世其家者相傳有理縣譜猶未免俗吏之為若先生父子之於詩其為譜也大矣緑楊紅杏軒詩集序文章古稱韓栁尚矣若韓之於詩硬句排奡横騖别驅以文為詩者也今之言詩者争趨之而獨以蕭散冲淡為栁詩之宗自非山林老退躭閒寂寞之士則未有究心于此者余以為蕭散冲淡固栁之所以為妙而栁之長篇古律縋險出竒七言古詩鍛鍊精刻實不主冲淡一家若其酬韶州裴使君諸詩之用險仄韻逰南亭敘志諸詩之出竒無窮固非退之不能辦而漢家三十六將軍長歌之排突雄悍尤與退之争勝于毫釐者也學栁不先識其似韓者而遽求之於蕭散冲淡將有如韓之所謂頽墮委靡不可收拾而詩家之峥嶸氣象索然無餘地矣昔人論韋應物歌行初亦放縱後歸平淡韋栁一體也故學韓而工者未有不可以為栁者也蔣子静山詩學初亦本於退之旁及子瞻人見其詭譎而横厲夭矯而放溢莫不以為韓蘇之接武矣而余獨舉栁以為言者以平淡必本于絢爛雖子厚猶然蔣子盛年壯氣其才之浩瀚肆出不可遏抑冝有如是者又安知其融鑄之久不歸于蕭散冲淡不止者乎是始終善學栁者莫蔣子若也且蔣子生長子厚之鄉聞見相熟也吾知其於兩家之詩必有能㑹而一之者矣野香亭詩集序夫人之有懐也言之所不能盡則見之于文辭書之于册而已見之於文辭書之于册而猶有所不能盡者於是乎有詩以道其不能盡之情蓋古之人有有其聲而無其辭者矣聲之所感雖辭可以不設未有無其聲而可以詩者也故余之論詩必以意為主以身為用嘗薄毛序鄭箋不識詩人比興之義惟朱子集註略轉換一字句間使人反覆吟咏自有感發此為得之盖作詩之體至唐畧備論詩之法至朱子而始明余每自信其言不妄向讀諸城汪中允詩嘗舉此序其首又於中允所見野香亭詩集野香亭集者為合肥編修丹壑李先生所著編修之於詩也既本之于今相國家學其冥搜心得取境近而藴義逺有陶韋王儲之風至其才思所溢間旁出于韓蘇諸家特用以開拓其境界而已不以自詭其法也余尤喜其樂府古淡婉切迴環可誦雖張王撡筆無以過也以為詩必如是則意與聲㑹始可以返而復之古蓋嘗屢言之云爾編修謂為知言即屬余書之然編修以名公子年少登第滯史館十五年泊然無競進意其所寄興八九常在酒鎗茗椀山村水野之間冝其風格之超脫如此至其經途觸目凡田家疾苦吏治清濁與夫南北風土之險易厚薄無不習知所以感切諷諭而發之以忠厚之㫖傳之以和平之聲者又不一而足古觀人者往徃于其人一吟咏間知其有以天下為已任之意若編修之詩之志吾殆不得以詩人命之已谷園續集序今河南提刑按察使茨村胡君為贈少保少宰宛委公令嗣胚胎前緒年少稱詩向有以谷園集見示者序者稱其飄逸清新是已頃余留京師有使從中州來投詩五言三章發緘得谷園集一巻辱不鄙命為之序而詩以致其慇懃之意按察君自起家郎署歴官武昌歴下十餘年今其續編起自已已嵗南返㑹稽上先塜移節河東及遷臬河南之作纔五六年所逰跡半天下更歴事益多所得詩幾千首大抵馳躪於少陵之閫域視前所謂飄逸清新者一變矣其尤致意者自以少遭孤露僑居薊北又内艱新闋纒綿桑梓之慕悽愴蓼莪之感往往連什累紙使人増欷嗚唈不忍竟讀抑非獨如是而已每所聞朝廷寛大之詔及創行諸盛典輒次第其事頌述之疾吏貪墨憫俗澆敝亦時時託諸諷諭此則仿彿於昔之稷契自許者由其道可以施於為政則君今日之明慎用刑聲譽焯然外臺其諸得于詩教者深歟昔舜之臣二十二人所與舜載賡歌於朝者唯作士之臯陶一人而已二十一人者無與也蓋温柔敦厚者詩教也臯陶之作士以之使人皆知温柔敦厚之可以作士而明刑弼教則無論三百篇也彼律令格式凡所以殺人生人之具莫不有風雅之道存焉惜乎俗吏不知所以用之而後世能詩之士昧於其本又薄之以不屑為按察使君之于詩既見之為政者如此其入而侍從左右歌咏明聖徳嫓美風雅庶克踵于前人一研齋詩序吴章得罪而門人不敢復名其師説張禹為相封侯人人傳其論語章句而餘家浸㣲文字之聲價以勢利為盛衰自古而患之矣始櫟園周司農以雄沈堅峭之詩倡起後進為學者甚衆及司農失勢稍稍去之今死而言其詩者或鮮矣今讀吴子介兹前後二集詩展巻未終其雄沈堅峭之色望而知其為司農弟子也介兹當司農盛時不為熻熻熱今去其死時三年詩雖變益工然守其家法每論詩稱櫟園不去口及其嗣君交久而彌篤介兹誠貧士使其得志操利權于時其肯違行易心棄生死之交翻手下石哉書曰詩言志若介兹之詩之志不獨今之學士大夫媿之亦逺勝于古之人也陳集生詩序文章之道古人雖謂有得于山川之助者而朋友往來意氣之所感激其入人也更深子所見于三百篇者如風雨凄凄鷄鳴不已中心好之曷飲食之之類其言皆至深婉足以發人之性情而動作者之思然在春秋時列國儐介往還所至必賦詩贈答誼至殷勤然特以取諸古人之成什已耳未嘗必欲其自己出也而漢時稱公卿好客有汲黯鄭莊汲鄭皆不聞能詩終西漢之世河梁執手寥寥數章而已而宴餞投贈之作顧多得之建安以後何也毘陵陳子集生嫺于詩尤好交逰旦日出過存諸公間脩脯之贄鷄黍之設日接乎逺近不以貧故少廢以是其知交日親名日聞而詩亦漸積至若干首本之于意氣之盛而發之為和平之音殆近于孔子之所謂可以羣者也陳君得此亦足以自雄矣然今海内言詩者日衆予意必有卓犖命世之才足以含跨往古而領袖來兹惜予特迂疎寡合其蒐取十不能二三若君之博聞廣見而猶謂無所得焉豈其理也與君居甚乆君即不暇為詩以遺我罄君之所聞于賢士大夫者盍為我取酒斷章而賦之吾將以附于三百篇之遺焉吴虞升詩序吴門吴子翊自弱冠從其舅氏京師其為詩雄麗排宕與作者上下所至名公宿儒多樂與之㳺相唱酬若兄弟然然其意黙然殊不自得也予聞之其先曾祖都諌諱之佳者當萬厯朝儲位未定有㫖册封上所愛鄭氏為皇貴妃時宸英曽祖奉常公給事户垣首抗疏力争不可且請早立東宫上震怒謫雲中尉從此淪落三十餘年而都諫同時亦相繼與張公棟葉公先春論儲事削籍歸伍世所稱東吴三諌者是也然先奉常至光宗時被召内遷雖不久復廢而都諌竟以黜死惜哉自國本議起朝論各有向背門户之見紛然于是閹釁冦氛伺隙萌芽相為熻張迹其終始雖罪有攸歸而一時匪躬諸臣亦未免過為張皇以激成清流之禍況其間依聲附和十百為輩此與異時諸公建白之意何如卒至矢没寢陵薦及京闕而光廟隆準之子孫與向所謂愛子如意之子亦且與盈廷水火漂爍俱盡迄今鮮或存者悲夫獨先奉常以垂老復起為璫黨薛鳯翔所擠亟奉身退而都諫亦以早殁得脫于鉤黨至今喪亂之餘兩家子弟猶幸不失其世守風燈雨館蹙顰相對追念數十年來君子小人互為消長之故與其所以勝敗日累月積禍所從來宜其皆可為拊膺扼腕太息而見之於詩不獨誌逰覽之壯觀為一時之唱酬已也夫稱先民述祖徳以相贈答者詩人之志也昔子美贈閭丘僧詩盛稱其祖審言與閭丘之祖均同年䝉主恩為榮然審言倖進女后之朝謟事張昌宗易之兄弟以罪死宜也即均亦無足稱者今以吴子之才發而為詩使其屢為之不止何患遽不如甫子雖瞠乎後哉然其家世亦足以誇于子美矣吾與吴子勉之而已夏無易詩序無易夏子于古人之詩無所不讀然皆資以為詩之用故其為詩益専而工于古人之能事亦無所不有性不樂仕宦嘗再任視施州衛學當山水竒僻處人蹤斷絶蓬藋蔚然輒收視返聴神騖八極戛然大放厥辭已復捨去乗興逰京師忽持一巻詣子曰趣為我序而歸之吾行南轅自此以往將無所不逰不復與公等接矣其逰益勝其寄託益逺則其詩必益竒然予又懼其溺于物外之觀無乃飄忽汗漫一往而不返乎將必晦其迹韜其光而不耀則是集不可以無傳也送髙詹事歸養詩序上既起詹事髙公於里命之總裁政治典訓復三次扈從親征蕩平漠北中外寧謐矣㑹典訓亦告成於時太夫人亦在京師賜第公乃上書陳情乞賜歸飬大畧謂臣母年七十有三生臣一子早嵗孀居與臣伶仃相倚昔在京項生一癭醫藥罔效回南五載南方生長之地水土和柔獲平復今來京重發氣衰少食兼一嵗之中痰厥再三風燭不保思就故鄉風土或可再望消除少延嵗月臣荷皇上厚恩自當夙夜匪懈勉修厥職惟是親年已逼桑榆廹思鄉里為人子者隠而不告於君父之前苟且嵗月希叨榮進縱人見臣母子同居不忍苛責而臣清夜捫心何以自安按律父母年七十以上者獨子許令終養謹循例叩請伏乞聖恩俯賜矜憐上覽疏憫然越五日温㫖奬諭且進公正詹允歸侍養官署於義固無不可然老人意緒多戀舊鄉非獨其風土素習也凡親戚之往來室宇之洒掃與夫物産風味無一不恍惚入其夣想久失其意鬱挹悲思疾疢旋生若是者可謂之養志乎彼其忘親逺宦至老不歸以自干於律文之誅者又無論已故曰志養難也今讀公疏至誠悱惻務在先意承志得親之歡心而已固非徒以一去鳴髙者然下則辭寵於方盛之日上則推恩於將去之時此其君臣相與之際非古人所不一二見者乎盖皇上方𢎞錫類之仁於天下而公遭際明聖因得自陳其私以無憾於古所謂將母之意用是恩數便蕃豈特為公一家之慶哉於是變士大夫之風尚敦孝弟而化浮薄崇退讓而重廉恥其在此行矣是日也太夫人建八座之旌棨列騶前導彩輿出國門詹事公緩轡從其後供帳填路萬目竦瞻喜可知也作詩文頌美者合朝野凡若干人而某特序以送之汪中允秦行詩畧序吾讀中允汪先生詩而嘆古風之於今猶未亡也盖詩者本古之樂章以志為本以聲為用志見於言而為詩其歌而有聲也長短清濁之不同於是乎三分損益其律而用之然後被之於樂所以諧八音而和神人盖孔子刪詩三百篇皆取而絃歌之苟其不可以絃歌者孔子弗收也後世樂經散失作詩者猶不失其意漢魏詩或五言俱反或全句皆平其律具在也唐開寳大厯以還而氣格與聲調俱備矣於是才人賦客吟咏脫口即播樂府凡稱為詩者皆可歌也今則不然目涉淺薄率已自是無論市兒村嫗罵街誶室俚鄙之說皆强取而韻之謂之為詩此學究之陋借宋人以自詭者也揆於古言志之義可謂徒有其言而已不知何取於詩然且一唱百和呌囂滿耳其弊將使人束書不觀風雅道喪此中允之所憂也中允姿力深厚秦行諸作陶汰既精效法尤古王孟之閒淡髙岑之悲壯東川之宕激龍標之聲駿皆耽思窮研採掇其精粹其間有未安則聴掎摭於同志或再三易稿至得當乃已推其意必不欲落開寳大厯以後一字詩必如是始可謂之正宗矣吾蓋以其聲得之也或曰中允之詩其盡于聲已乎曰詩有志有聲數十年以前學者競為浮響者志失今時競為鄙俚者聲亡二者均病而鄙俚之病于今為甚矣古人之論學其求于聲也盖詳循聲而按之可以得其志矣故吾之所以測中允者㣲矣馮梧州贈行詩序自古詞人以文詠倡酬自建安鄴下以來無若京師之盛者而近時輦下詩學大熾尤古所未有其少年而才名最著者雁門馮君敬南其一人也君姿挺雋茂弱冠登第得徧交于耆宿大儒而講論研切以究極夫古作者之遺意故其為詩尤端雅有法度人皆以君才冝在翰苑乃僅由中書出得梧州司馬以去鮮不為君惜者顧君自以生長邊郡足跡未及東南梧之為州當嶺外山水竒絶處都嶠勾漏間所在有神仙遺跡道家所傳為福地洞天者吾皆得寓目而有之以資為吟咏之助其在兹行也諸君子顧不當以我為幸耶而作詩以寵我行也宜有不徒然者矣於是同㳺者聞君言莫不稱善遂相與誦述其山川之美道途登眺之樂如君之所自喜者而為詩以贈之終期其政成而速來者往往亦見于篇盖朋友之誼當爾亦古詩人頌禱之體也余時未及與故畧道君與諸君子之意以附名于巻末郭髙旭贈行詩序文士之運其塞之也甚易而開之也甚難余覽史漢經秦芟儒之後賈誼以布衣發憤欲有所更張而絳灌沮之趙綰王臧議興文學而太后不恱元朔初平津與天子協意定制始下郡國貢士之法開東閣以延四方之英俊當是時司馬相如枚臯莊助兒寛之徒固巳布列在朝其後嚴徐主父輩上書闕下言事者益衆延及宣元之際任用儒相一變而為經術西京之文至與雅頌争烈無他其時使之然也使生數君子于髙恵文景之世則不免于抱書淹鬱以老即其文亦不盡傳今班氏藝文志所載辭賦諸家其在建元以前者殆十不一二見也國家初定世祖雅意右文然遣調四出吏士腰鞬而馳者絡繹于天下一時文士猶未得盡達故雖以吾郭子髙旭淹雅閎博之才閉環堵深藏者亦十數年于兹今上嗣位海宇寧謐無氛塵之擾廷議條復舊制詔有司嵗貢士如前于是郭子始得以名上禮部值今縉紳在位多經術大儒孜孜汲引士類觀其用意非直漢公卿比郭子以名御史子挾䇿逰京師此千載一遇也故諸公皆為詩以餞其行慶郭子之得時諸公雖善為文辭率浮沈里閈無足為郭子地今懐器以往以待賢公卿之求而其道將益光顯焉異曰有稱天子讀其文恨不同時或歎相見晩者必郭子其人也諸公咸以是為言其知郭子也深矣巻既成而為之序柯翰周餞别詩序柯子翰周再逰京師覲其尊君給諫公將歸士大夫燕餞賦詩以贈行者二十餘人翰周亦自為詩一章答其意今其歸數閱月矣余寓武塘去京師三千餘里外讀其詩如親見其賔主之盛歡笑流連而丁寧之又愛惜之無已諸君子之于詩固可謂工而其于情亦綦深矣今朝廷清和給諫公以老成宿望當主上眷注每一封事出海内無不想望太平願炙其風采而諸君子輻輳輦下相為引重又愛公子之才念其别期其父子之後先繼美也一篇之中三致意焉非區區供帳之設執手之感巳也㣲公子能無眷眷于斯集乎公子偕其伯兄寓匏前年往返南北有紀逰詩各一巻余讀而愛之是刻成又將挾之南逰自衡湘以歴之大嶺以南也吾知是詩流傳海内之讀之者慕給諫公之風采又樂其父子之繼美而京師承平日久一時勝流雲集飲酒歌詩風義之深厚巗居堀處之士必有撫巻長吟而不能釋然者余為之序竊幸附名其後廣陵倡和詩序廣陵為古淮南雄鎮方其盛也上林瓊臺楊栁之堤龍鳯之舸延袤于重江複闗之間而相為縈帶諸公或建旄節盛叅佐從四方竒士相與選勝賦詩賡颺太平而異時如韓魏公之與荆岐數公者賞花置酒一時主客之集後先繼秉大政傳為盛事當天下無事時仕宦者得以其間從容於㳺宴之樂而述為詩歌民生其間何大幸也然而烟塵稍警則淮南之受兵必先鮑明逺所謂通池夷峻隅頽者嘗間世而一見也而風嘷雨嘯之場詩人之響或幾乎息矣然則詩人之聚非廣陵之所以盛衰而天人之治亂所從出歟前世無論自明甲申乙酉之際載經殘馘余時過其故墟蓬蒿蔚然淒涼滿目如此者幾二十年矣太倉端士王君之同年友新城王君貽上來佐斯郡始稍稍披荆棘事吟咏用相號召君於其秩滿而去也以舴艋渡江而相與登昭明之樓尋謝公之宅拂磨斷碣按行舊壘一字之賞一石之竒必吚唔竟曰而去故君之詩為絶句者至五十首殆浸淫乎供奉龍標而掇其勝者也集成以示余余讀之喜曰此其太平之徴乎盖自是廣陵之風雅復振矣去年余客江北未嘗一詣新城陽羨陳子其年為余言王君見子文輒嘆息以為作者今遇太倉亦云余謝不敢然兩君知余余敢自謂不能知兩君乎故於是集也粗述其所聞若新城之詩雖未暇合梓然其風流亦大畧可覩矣賀王子歸娶詩序王子年十九隨其父任淮北將歸娶於其鄉其同學賦詩而賀以送之者數人而請序於余或謂余曰古者昏禮不賀故娶婦之家三曰不舉樂思嗣親也今者賀之禮與曰奚為而非禮耶禮不云乎賀娶妻者曰某子使某聞子有客使某羞蓋娶婦之家不可以是為樂而婣戚之情則自有不可廢者然不曰娶妻而曰有客若謂佐其鄉黨僚友供具之費而巳是其所以為不賀也曰予聞之鄭氏進於客者其禮蓋壺酒束脯若犬而巳不聞其以詩也以詩賀亦禮與曰奚為而非禮詩間關車之舝兮說者曰宣王中興士得親迎其友賀之而作非今詩之祖與文王新得后妃而關睢以咏亦此物也然關睢不過於哀樂故孔子善之車舝五章未嘗一言及於燕昵之私其卒章曰髙山仰止景行行止記曰詩之好仁如此太史公至用之以比孔子之徳而今人多工為浮詞以相波靡失朋友切摩之義矣諸詩雖亦未免漸染於是而卒歸之大雅方之古猶庶幾焉張𢎞蘧制義序余交張子𢎞蘧十餘年所嘗讀其詩文而重之去年張子以貢入京師其所學益精議論恢張逈出時輩然余尤喜張子制義見輒把誦之不置或曰此特張子緒餘耳子何愛之深也余曰不然夫八股之道㣲矣學者視為功令而趨之其體則敷衍經文詞不巳出也株守集註義無旁雜也其習之相沿則有上承下逗前虚後實單行複序截章換字之法候氣衡纊傳神優孟似排而非儷體比論而無章法學者童而習之村師腐生一見便解萬一功令復新舉今之所謂八股者而廢之則雖日陳王唐瞿薛之文於前誰復能辨其畦徑識其㫖趣者乎余故曰時文者速朽之物也至近世金正希楊伯祥吴梅村陳大士陳卧子黄藴生諸公者出始博取先秦兩漢唐宋人以來之文大發之於帖括經史子集縱其驅䇿横豎鉤貫無所不可而機杼自出一空從前作者此猶杜少陵之於詩韓昌黎之於古文顔魯公吴道子之於書畫古法雖從此一變而天工人巧則巳極矣故此數公者雖其文不名為制義亦可自作一書以行而能使讀者了然自得於文字之外今張子既以其所得於古者而沈湎於數公之文如此則余之愛其八股義也猶之愛其詩古文辭而巳何疑哉抑明制重館選嘗間一舉行故以二陳之才而不得與若藴生則固其所不欲就也張子幸年少入窺中秘翺翔禁闥其異時著述視數公更當何如則余之愛而欲把誦之者又將不一而足也李東生制義序同年之誼自古所重近制三年上春官所得士僅百五十人比往額為少其留宦京師者不過三十餘人而巳日相與逰處於百五十人之中數加少而情愈加密焉其尤密者意氣孚感若同氣兄弟然雖家庭委𤨏無不可相告語者則蔚州東生李君之于余是巳余兩人既暱就無間論文之暇旁及制舉義竊視東生年少耳乃諳熟經傳諸儒義疏如老經生其為文體兼衆家類非一時襲取可得嘗㣲叩其所以東生則手其文動容謂余曰某學力淺薄敢自謂其能其得有此以連受知于主司者皆吾伯兄元生之教也始吾父為郎在朝以吾屬兄令督之成立而吾兄素精舉子業餼于學宫久矣中棄不事獨任家政躬侍養之勞令吾得一意向書某感其意攻苦異往時或偶病輟兄則就問所苦何若徐謂某祖父在堂屬望惟汝一人祖母及母早没非汝成立無以慰兩孺人地下汝不自愛為負吾吾不于汝極言吾負吾父命矣某聞之竦然雖困未嘗不力疾起也比乙夘名落副榜兄復詰某汝所學誠未至耶今佹得而復失豈其有遺行耶視其形蹙然若不任其憂者既舉于鄉罷南宫歸誡之如前加厲今幸博一第而兄喜可知此所集若干篇為余十餘年嘔心所得亦觸手皆吾心血也子言足垂信願為我序其意而文之余以東生之兄之才雖自取髙第不難乃辛苦成弟之名至不避勞勣不辭煩數必求副其祖父之願而後巳雖古所傳孝友者何以過此東生不以巳之得第為喜惟恐不列其兄之名于天下其兄弟之賢視古人俱可無愧然元生之所望于弟者直科第耳今東生既釋褐服官如元生㫖自今以徃以身許國其責不更有大于此者乎使東生一不慎伯兄之誡不旋踵至矣夫前之勉東生以祖父之志一家之事也今之為東生期者必將為朝廷建大議樹大業此東生之才所優為者其責既鉅則其望將益切是伯兄之為東生者無巳時也詩小宛兄弟相誡之詩也首章曰明發不寐有懐二人元生有焉其卒章曰温温恭人如集于木惴惴小心如臨于谷東生有焉余之視東生猶兄弟也昔北魏趙郡李産之兄弟相友愛隴西李榮至其門嘆曰此家風範海内所稱今始見之真吾師也願與連類即日改名為勞之吾雖未見元生于東生所聞之也巳熟不啻若連類矣此集一出為有識争賞得無有聞風景慕如勞之者乎使人人學問知根本孝弟資於事父以事君則從來舉子浮薄之積習可以立變是未必非東生屬余之意也李給諫東生名旭升初第時嘗屬其同年金㑹公檢討為此序今失之而金君巳歸里託許進士念中轉求余補作余久苦為人客作文字感其一家孝友為今世稀有遂勉成此以復於許君仍存之集中金名徳嘉與余最善許名志進今赴任鐵嶺知縣錢子文筠亭詩餘小序少時與客為長短句亦不下百餘曲然讀周栁淫冶之詞心竊鄙之不能竟學後見朱檢討竹垞之論詞盡洗草堂餘習獨標南宋閒淡婉麗飄𣺌出塵之韻為詞家正宗而以白石山人為稱首鉤脣戛舌冷沁心脾雖其境過清要自無一㸃俗艷以此於詞學亦不復心非而私怪今之為此者絶少也丁丑五月秀水錢子文特來訪余京邸出其所為筠亭集者索余序之余雖愛其詞無俗調然戒為詩文序乆矣固辭於錢子巳又介余同年友徐子个臣來徐子曰錢君竹垞快婿也子何可以無言雖然竹垞之論詞備矣錢子聞之既熟而於其所謂閒淡婉麗飄𣺌出塵之韻亦既極力摹擬而得其神似矣余雖欲言何所加於是哉抑聞竹垞近林居於詩與文持論尤别余固嘗從事於斯兩者而皆未有逮子歸聞而婦翁之言視此藝當益成而上其必有以語我也黄心甫自譜序黄子心甫年六十有一而病自為譜以授其友人嚴子蓀友曰吾生平好學所手抄書數十種試於有司者凡六而卒不得志至此今病且革矣卒不幸以死後世誰為哀我者子其為我請之姜子俾叙其端幸及吾之見之也予聞其言而憐之讀其譜大抵多生平交逰往還飲酒賦詩登臨嬉逰之樂而遇所失意處猶有憤惋不平之氣余聞心甫雖老病尚健飯可不至死然使心甫不幸而竟死是塊然之軀悠悠百年巳同旦暮即棄捐之土中幸不為狸狢蟻蚋噉盡然再過數十年將并其胔骼泯焉悉歸於無有與瓦礫同化矣尚奚有於生前之聚散離合愛憎喜怒即今視其譜中之所載得勢氣燄者幾人文彩炳蔚者幾人與心甫同而親異而讐者又幾人其存者尚有幾乎亦不待達者觀之而有以知其無異於浮漚之一瞬白駒之一隙也心甫著此而不悟則其神明鬱結於内形氣膠滯於外内與外交鬭而不巳欲無病得乎且吾聞之二氏之言皆歸於養生葆性而吾儒之學亦有不與生死為聚散者孟子所謂平旦之氣邵子所謂天心未起者是也心甫何無一言及此心甫姑置是譜也而求之吾心湛然寂然之間吾知其胸中將浩浩落落無一物之芥蔕而獨與其天者逰前此之紛紜酬酢皆於心甫無與也嚴子其嘗試語之而心甫試諦聴之吾知其病之釋然去體有不待其辭之畢矣大興張氏宗譜序宗之有譜有經有緯書堯典以親九族九族者註家謂自髙祖以至於曽元此本吾一身先後推之故曰經禮大傳繫之以姓而弗别綴之以食而弗殊雖百世而婚姻不通者周道也此本吾一身旁推之故曰緯上治祖宗下治子孫旁治昆弟是之謂有經有緯而譜法盡矣自周歴漢及魏晉以來雖當南北朝横潰分裂之際世家舊族皆能講明譜法不失其世守至於唐之既衰而氏族混淆収族之道漸㣲者譜學不立故也由明季迄今又五十年其間變革之故多矣以是大興張氏家失其譜今奉直君輔公至不能知其六世以上祖諱雖其贈公兄弟伯仲次序猶未得詳蓋數經兵火離散失所以致然今年春適余至津門奉直不鄙而與之商畧譜例本先贈公所手訂世次序自髙祖以下列曽祖大父父與其子為六世是為本支又旁及其曽祖兄弟以至於從祖之子孫得八世為旁支等而上之順而下之本支為經合族以食序以昭穆旁支為緯親親之道備矣則又於其成立者掇拾其行事履歴各綴小傳於後附之以封誥銘狀表賛家傳體例燦然足垂乆逺奉直曰吾家自曽祖中憲公以進士起家稱名太守後中科第者四五人掛朝籍者復數人今子孫散處或在大名或在河南幾不知存没將謀徧訪之未暇而其僅存者亦瑣尾不振吾經紀其衣食棲託有所婚嫁以時又揀其能者委之經營秀者導之學業凡以盡吾力之所能為者而巳迹今之所為其得此於今世也盖鮮抑余有為君進者大宗之法不講久矣始自贈公來津門則君適其别子為宗者君既能以其事力之所及盡其心以合於古収族之道矣若剏立宗法建祀堂置祀田設祭器斟酌家禮而為之冠婚喪祭之儀待君子孫之繁衍則張氏之宗風北方士大夫家必有慕恱來取法者此厚風俗敦禮教而復之古之一事願君之終勉為之也山西試録前序嵗癸酉天下復當較士於鄉所司以山西典試臣列名請皇上量材任使爰命檢討臣某及内閣中書臣某往命下時為七月丙寅日越一日戊辰臣某即戒裝軺車星邁無間晨夜至則將及瑣院與守士諸臣庭見備述皇上興賢育才鄭重大典至意一時聞者無不以手加額欣逢盛㑹既而惶悚受事各䖍厥職時則巡撫右副都御史臣某實任監臨紀綱整肅為内外率先布政使臣某叅議臣某提調綜密按察使臣某監試有法爰進提督學道副使臣某科試士幾千有竒偕同考試官臣某某三試之臣再三告誡以天道可畏人才難得使臣簡書在抱惟公與慎無敢不共時同考官十幾人各刓精疲神焚膏繼晷十幾日得士四十人如額既出闈輯三塲文凡二十篇以獻臣例得序書簡端竊惟國家定都北平山西實古冀州地雲中定襄飛狐之口犬牙恒鎮間不啻畿輔郡也故居其地者得京師之聲教為先而俊偉雄秀傑出之士又往往震發凌厲自春秋以來名著于諸侯之籍及漢魏唐宋至于今不絶而逾盛宜矣然臣所司者衡文之事也故不敢他有所援據而即以所聞於山右之人文言之夫文章之道不同也其分𣲖大約有四而今科舉之文不與焉太史公記事史家之文涑水通鑑為一例栁栁州經術之文閎博而未純栁仲塗元裕之為一例文中子中說理學之文薛文清讀書録為一例至於薛道衡王勃宋之問王維等辭賦之文其類猶不可枚舉是四者之於文雖有華實純駁之不同要皆能専工於所事各極其才力之所至卓然有以自立而不至泯没於後世此其最著者也然而詞章之士君子猶或鄙焉若今所謂科舉之學其去聖人之道益逺矣臣顧樂為多士告者臣蓋有感於歐陽氏之說也歐陽修謂年少志盛方欲取榮譽于世則莫若順時夫順時者掇拾剽竊從俗下為文正今日舉子所深患而修之言曰天聖中詔書勅學者去浮華其後風俗大變士大夫所為有彬彬兩漢之風矣盖修之所謂順時乃其所以善復古者也雖然使非宋仁宗天聖極盛之時斥華尚正丕變風俗則何時之足云然有其時矣徒欲齊肩於兩漢之士此猶為未至也今我皇上徳協聖神洪闡經學頒講筵解義孝經衍義於中外修闕里廟樹碑掲榜風厲學宫比之盛宋相去萬萬諸士當此時漸染教化治一經應明詔由鄉舉上之禮部具羔雁而見於公卿者皆五經六藝之言也其入對大廷者皆正心誠意學也其異日之服官任政者皆正誼不謀利明道不計功之朝講而夕究者也使其立志不回銳然深造於道徳將等四家而上之不難矣徒區區齊肩於兩漢之士臣有以知多士之不屑也臣江右末士竊幸備驅使一方得自託於以人事君之義是集中二十篇者雖不足以盡一科之盛然其能順時合古以不負所學者於皇上惓惓作人之意庶或可藉手以告也惟時有事兹土者例得並書湛園集巻一
