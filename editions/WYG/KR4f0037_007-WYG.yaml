body:
  text: 湛園集巻七翰林院編修姜宸英撰題辭書嵇叔夜傳後鍾㑹言于司馬昭曰嵇叔夜卧龍也不可起公無憂天下但以康為慮耳叔夜性烈而才儁急逺而思疎幽棲養性似無足當天下之慮者然當時典午之勢已成中外任事之人莫非其黨獨叔夜土木形骸不自藻飾而人以為龍章鳳姿昂然有不可羈束之氣此司馬之所大懼也王莽先殺鮑宣而後西漢以亡曹操先殺孔文舉而後東漢以亡司馬昭先殺嵇叔夜而後魏亡此三人皆忠正豪邁瑰傑之士也故必三人去而後天下隨之㑹之誣康以通母邱儉則康之不附晉明矣或謂數人雖在其如莽操懿之奸何不知數人之力雖不足以止奸而有以懾奸人之魄而折其謀者氣也猛虎在山藜藿為之不採况乎國之有賢者哉不然張禹孔光楊彪何曽之徒彼固儼然處三公之位非不尊顯也而奸人者方頤指而氣使之不啻若奴𨽻然其先靡耳阮籍受司馬之保䕶至為其勸進之文而康以疑被殺籍敗壊名教為禮法之士所深嫉而康終身無言行之失故嵇阮並稱而阮不及嵇逺矣書儒林傳後申公轅固可謂之能明經學而不可謂之能守先王之道者申公前事楚王戊知其荒淫不法年已八十餘猶應詔起帝已不悅其言猶受大中大夫職幾不免於臧綰之禍殆哉轅生不欲為黄老家言是矣隨下刺彘何其卑也萬一帝不與利兵刺彘一不隨手中生其不為彘死乎使生此時以正辭折太后曰臣官博士太后以禮使臣雖赴湯火其敢逃死若輿𨽻畜臣而命之鼓刀以從宰夫之後是使臣廢先王之道而棄其官守也臣死不敢奉詔如此太后必愧而謝生帝亦必益重生漢興㡬六七十年儒者與異端之教乍勝而乍詘訖於武昭未知所定亦諸生之區區講說無有以守死善道者動之也書左雄察舉議後按古者大司徒以鄉三物教萬民六徳六行之外必益之以六藝而族閭之師與黨正書之州長攷之及其在學也則又有中年比年考校之法當此之時固無徳行之民而目不知書者矣故止於司馬辨論可無事於語言文字之間也後世師儒之教不明雖行聞族黨不學牆面者徃徃而是以如是之人一旦舉以臨民授之以政即欲不以文墨試之得乎盖自選舉與學校不復相為首尾而一切闗防刻薄之事起雖明知法益煩弊益生士風亦日益壊然其勢頓有不得不極於此者魏黄初中三輔議舉孝亷不復限以試經司徒華歆憂其學業從此而廢至唐貞觀時汴鄜諸州所舉孝亷問以皇王政術曽參並不能答宋太祖開寳九年濮州薦孝悌者二百七十人召問於講武殿率不如詔猶稱素能習武試以騎射則顛仆失次太祖欲使𨽻兵籍皆號告求免不試而舉弊遂至此故後世無論賢良文學孝悌力田諸科一概試之以文墨之事亦其勢然也及其甚也則巍科厚秩皆取决於方寸之紙而竟不復問其立身之本末矣是其末流之弊愈失而愈逺以至於無可如何者也夫有志於斯世者其必復古族閭州黨之法而後可以行鄉舉里選之事歟書郭元振傳後張燕公行狀云太平公主竇懐貞潛結兇黨謀廢皇帝睿宗猶豫不决諸相皆阿諛順㫖唯公庭爭不受詔及舉兵誅懐貞等宫城大亂睿宗步肅章門觀變諸相皆竄外省公獨登奉天門樓躬侍睿宗聞東宫兵至將欲投於樓下公親扶聖躬敦勸乃止此則聞變不去保全聖躬為元振之功而其不從廢立之詔尤其大節之不可泯沒者也本傳僅云𤣥宗誅太平公主也睿宗御承天門諸宰相走伏外省獨元振總兵扈從宿中書省十四日乃休不著其廷爭不受詔之事失史家紀載體獨杜子美云定策神龍後宫中翕清廓俄頃辨尊親指揮存頋託羣臣有慚色王室無削弱盖極著其翊戴之功而後元振之盛業大節洗發無遺矣此所以謂之詩史也舊註因神龍年號謂平韋庶人之亂元振亦有功其間而史失之後之註杜者知其附㑹又謂太平安樂二公主用事俱在神龍二年故曰神龍後不思神龍時相王猶未立此後中宗尚有景龍建元子美豈得追數其始亂之時而遽以七年以後定策之功許之乎神龍當為先天之悮無足疑者書史記衛霍傳後漢良將衛霍論者多左霍而右衛余熟觀太史公之傳所謂兩人㸃次處則左衛也其於霍也多㣲辭矣傳敘衛戰功摹寫惟恐不盡至驃騎戰功三次皆於天子詔辭見之而太史公覈實一曰出隴西有功一曰捕首鹵甚多一曰兵所斬捕功已多而已豈非以天子之詔特據幕府所上功次其辭多鋪張失實而天子方深信之則姑存此以為傳疑之案乎觀大將軍七出擊匈奴斬捕首鹵纔五萬餘級而驃騎三出詔書三敘已不啻十一萬餘首級其虛偽可見此良史言外褒貶法也又曰諸宿將所將士馬兵亦不如驃騎驃騎所將常選然亦敢深入常與壯騎先其大將軍軍亦有天幸未嘗困絶也又云少而侍中貴不省士此數言者驃騎之將畧已盡於此矣書張耒邴吉論張耒之責邴吉不薦馭吏為沒人之善曰龔遂因王生一言天子以為長者遂不敢以為已出曰此乃臣議曹教臣夫遂之能歸功於君其善㣲而不冒人之善其徳厚矣方天子讓御史吉如曰臣與御史等耳臣之僕有先白臣者臣是以知之此其為能豈獨憂職思邊而已哉吉脫先帝於死能絶口不道必不貪一馭吏之功此不思之過也然耒之責吉亦可謂之不思矣按史此馭吏邊郡人習知邊塞發奔命警備事嘗出適見驛騎持赤白囊邊郡發奔命書馳来至馭吏隨驛騎至公車刺取知冦入雲中代郡遽歸府見吉白狀云云軍情至重至公車刺取大姦利事使聞於天子天子必震怒馭吏重得罪而公車令屬且以漏洩受法矣即吉亦豈得為無罪耶况此馭吏無他能因生長邊郡見持赤白囊馳来者知其為發奔命書隨探取之歸報而已非諳熟邊事者比何足以汙宰相之口頰哉凡論古人物非深觀其終始本末不可輕為訾議况於其賢者如世所謂翻案者尤不可也近見有小儒責狄梁公不當事周論至深刻此人坐不讀梁公傳耳觀梁公之處羣小間忘身直道屢陷死地活人無數而不知悔雖無最後一事不害其為大賢也嗚呼豈易言哉書王倫傳後向讀樓公鑰節愍神道碑載其奉使屢請用兵不頋身禍及逼之官而不屈從容南向稽首就死以為倫豪俠不羈之士而能以名節晩盖者胡淡菴許惇之疏特力攻和議不知其末後一著耳金史云倫被羈久困無聊乃倡為和議求歸至金遣還朱弁張邵洪皓强倫以平州路轉運已受命復辭曰此反覆之人也遂殺之賛曰王倫紈袴之子市井為徒此豈必有恥專使不辱者耶其言與碑辭正相反倫剏和議於韓岳用兵之際使宋主忘不共之讐而甘心為之稱臣是誠不得為無罪樓公自言謹摭行狀參以槐庭濟美集中興小厯遺史王銍父子御劍銘序揮麈録網羅舊聞以就此碑要非飾辭以諛墓者三史作於元世其於抑揚南北之間多所失實如倫未嘗仕金傳本不當入金史又不當附之叛臣若世宗所言反覆之人又别有謂盖是時撻懶宗磐宗雋三人合謀以河南陜西地與宋而倫依此三人以定和議者也及三人以謀反被誅倫奉使適至金主責問倫曰汝但知有元帥豈知有上國耶因獨留倫不遣此正所謂反覆者也使臣因縁遘㑹以就國大計此其常事史官據此以定褒貶何足以服倫之心耶傳云倫王旦弟王勉元孫按旦弟名旭非勉又衍一王字俱宜刋正書吕氏春秋作此者其墨之徒與者多引用墨者之言常以孔墨並舉其言墨者鉅子孟勝善荆之城陽君弟子徐弱止勝死城陽君之難曰無益也而絶墨者於世勝曰不死求嚴師賢友良臣必不於墨者死之所以行墨者之義而繼其業也孟勝死弟子從之者百八十三人而終屬鉅子於田襄子墨以不亡觀此知墨氏師弟之間所以固守其家學頗有似於後世講學者之營立門户而道徳之為天下裂久矣墨氏之葬以薄為道余讀其節喪安死二篇自古及今未有不亡之國無不亡之國是無不掘之墓也若親覩驪山之事而言之者又蕩兵篇古之聖王有義兵而無偃兵因用兵喪國而愝其是猶因噎而廢食因溺而廢舟慎勢篇觀於上世封建衆者其福長其名彰至他所議論固多戰國餘習然為書既富先王之格言善制猶往往及焉而始皇行事無一不與之相反諸儒之相驅而就坑以盡也亦其宜矣書春秋列國指掌圗稅氏與權為春秋指掌圗得國一百有七余間憶記覽所及隨録之復得數國有疑似之當辨者如黄在汾州為晉所滅非江黄之黄之近楚者按國策犀首伐黄過衛使人謂衛君曰黄城將下矣將移兵造大國之城下犀首魏官則為晉所滅者此是也若史記所稱黄帝末孫陸終之子封於黄其後為楚滅者國在今羅山縣西十二里楚子革對靈王曰陳蔡不羮此四國者專足畏也杜註兩不羮酈元謂汝水東南流西不羮城南是不羮有東西之稱矣酈氏又任城縣有詩亭即春秋詩國按詩與邿同魯以襄十二年取邿即其地俗訛邿為詩耳隠二年經曰莒人入向杜預注向小國譙南龍亢縣東南有向城又軹縣西地名向上者亦曰向傳所云蘇忿生之田及經曰盟向求成於鄭此向則邑名也自有封建以来其傳世久逺可攷者尚衆自昔楚始大而為其并滅之國五十有三故曰漢陽諸姬楚實盡之至秦為郡縣掃除盡矣然而江淮以南神明之裔淪在蠻夷種類散處者以百數迨後山東兵起而閩粤王無諸東海王搖等猶能起兵從諸侯共亡秦傳國建號久之乃絶古聖君賢相功徳之食報豈不逺哉故曰積厚者流光自然之勢也書宋潛溪謝皋羽傳後謝皋羽傳鄧牧任士林皆有述鄧錢塘人自言與翺最善翺服其為文病且篤懐以詩曰謝豹花開桑葉齊戴勝羽生藥草肥九鎻山人歸未歸然翺宋末義士而牧傳中無所述第曰繇役繁興不堪迫辱委務出遊過嚴陵故舊館焉其地與婺接故常往来兩州間所居産薪炭率嵗暮載至杭易米自給又自言為翺死友然翺之沒遺命惟託方韶卿鳳吴子善思齊及方幼學方燾馮桂芳翁登兄弟而牧亦未嘗聞訃其葬也牧自誇於翺為文嘗自出於胸臆罕讀古人著述此豈其真不讀書者哉又牧云翺於軍伍中購得一子相與竭力生産任傳中不載采云無子翺之臨沒屬及其無子當信豈前已購得而後復失之耶任傳詞㫖隠約以屈原比翺是為得之吴思齊墓誌亦可觀宋因任吴本特加潤色淋漓盡態讀之令人感歎不已盖遭勝國之後無所避諱而能然也國家破亡神器淪沒有權位者不必徇而草野失志之子有孤憤鬱悒而不知其然者豈不由於其性哉然不幸無傳之者傳之而失其志以此湮沒於後世者多矣愚觀漢新莽之亂士至有偽失明見其子墮井妻與人私而不頋者其堅苦如是末世好名滋甚憑藉權勢踵接侯王之門入則短後曼纓出則幅巾草服搖筆著書忠義奮發流播逺近邁迹巢許幸而其書不傳也不然又孰知盜跖之與曽史哉讀孔子世家太史公於孔子何為而世家哉余觀其自序每一國則必挈其事之至重者而著其所以作述之意如於晉則曰嘉文公錫圭鬯作晉世家第九於越則曰嘉勾踐滅强吴以尊周室作越勾踐世家第十一於鄭曰嘉厲公納惠王於趙曰嘉鞅討周亂於韓曰嘉厥輔晉匡周於陳曰嘉威宣能撥濁世而尊周然後知其世家乎孔子者同之於列國之諸侯也其同之諸侯奈何曰以其同尊周也遷序孔子曰周室既衰諸侯恣行仲尼悼禮廢樂崩追修經述以達王道匡亂世反之於正云云作孔子世家第十七其意以諸侯之得世其家者以其知有天子而能匡亂反正以天子之權歸之於周者莫如孔子之功最大故附孔子於世家者非尊孔子也推孔子之心以明其始終為周之意曰春秋非孔則周道㡬乎熄矣以孔子為尊周而尊周者諸侯之事也故上不得比乎本紀而下亦不得夷為列傳也或謂稱世家為尊孔而兩失者是未識遷之意者也困學紀題辭世有真道學然後有真節義道學晦而節義微節義不植則其於道學也亦偽而已矣黎眉先生歸田後著困學記自言余日間行事每至臨寢必端心危坐仰天而質之如是者十年纔覺違心之事日漸減少又曰學道須破名利關頭若乃周孔其口商賈其心弋名於道徳之林漁利於仁義之域是則謂之傭販聖賢負罪名教不小故自滄桑之餘絶跡遐荒至老不復見雖妻子不知其所向世皆疑其仙去而其家亦詭曰有之然孰知其為篤信好學守死善道之儒者歟余生也晩不及奉先生几杖其季子自天讀書安國禪院時相過從流涕而道其先人則詞音嗚咽至性迸發其交於某也禮恭而意彌篤然後知先生之學非徒以得正而斃耳而其修之身以為子弟法者又如此其至也余嘗讀兩晉南北朝史嘆其君臣之際侮慢猜忌無恩義可紀至士大夫家居孝友竒節疊書絫見驚心動魄如宏農楊氏一家實西漢萬石所未及以此其時無故國而有世家輒思倣古别録南北朝孝友一編貯於家塾乃先生所為三十二巻者已犂然明備余又知先生之學其植基深厚尤在於此而自天之能善繼其先志者亦能知其本之所在従身焉無失故也孝弟不立本實先撥而競為道學節義云者皆妄也人有言今有能世其家如史氏所紀者余謂必自郭氏始矣題傳經堂集後往余晤亮菴於武林胡氏之米山堂向疑其宿學輩行去余逺甚問之纔長余數嵗未及訂交而别常耿耿胸次也比於都中見其仲君明經次厚知亮菴里居閉闗㡬三十年無復當世意今年初夏次厚遊太學亮菴偕之来訪其故人既至假館僧廬倦卧不出於是公卿輿馬填塞街巷坐門問安喧鬨都下以至四方宦學名流帬屐子弟懐刺到門皆願得識面為快亮菴愈不自得急促裝南返余與之語頃即執手言别則其耿耿比前愈甚可知也臨行出示余傳經堂集連綴海内古文辭數百篇所以稱美卓氏之家學甚備余亦久謀歸擬築室於湖上陳經而讀之是時去亮菴居當不逺數舎艤舟水次造所謂傳經堂者瞻謁三先生祠啟其遺書従亮菴決疑發滯其必有益於余聞題程子卷後客嵗淮南逆旅中偶讀韓嬰詩傳至孔子遇道哭者甚哀而自言其始所以宦學而失養之故以至悔而立稿也而是時孔子弟子之請歸養者十有三人余既以前年拜違其親奔走於江之南北是日有感遂決南歸之志既抵吴門程君爚来手一巻形縦縦而過余余既喜交程君視其所攜皆曩所求於海内之賢者所為其母徐孺人傳志者也而程君之所自傷其貧賤不得養者則并見之於言焉時余歸志甚鋭君則為余買舟葑門之外共邀至家拜其尊君於堂與其仲父杓石咸儒雅藴籍衣冠狀貌質樸類古人風留數日始去去而復牽留之視其家之僮僕雞犬皆依依有向客狀若不忍其遽别者其好客出於天性可敬也今天下文士大率皆以家自累耳雖其間意氣自喜欲以廣致天下豪傑而奪於室中之反唇交謫者有之則其行之不成又非必盡出於懈弛而後然今程君家産纔不及中人自其母在時固已父子力學聲藉甚諸公間及其殁也庭除楚楚果蔬之行列巾履之位置無不整潔可喜男誦女織之聲燈火交出林落客之登其堂者鮮不為流連忘反樂其父子之賢而相忘於貧賤之累而又思其所以致此者則益悽然相對不樂盖程君之言曰吾父子何自而能然吾家之所以得與君燕飲於此者皆母之遺也雖其父之言亦如此若孺人者可不謂之賢矣哉欲知孺人之行於其夫與子可以得之余既有感於中又不忍爚請因書所見者歸之歸太僕未刻藁題辭太僕未刻藁其曽孫莊元恭所輯外吏牘申詳文移諸雜文字當另存其家不足録除此共得八十三篇太僕集一刻於崑山門人一刻於常熟蔣氏然余從元恭借觀其未刻諸篇多隨俗應酬造次之作故可存者尤少余輒為㸃定芟其蕪蔓殆十之七焉當明之有天下二百七十餘年作者林立惟太僕之文為能獨溯太史公以來得其風神而合之唐宋諸家體格粹然一出於正可謂豪傑之士矣惜其晩始得第為當時盛名者所摧壓而其所為碑銘序讃之類多不出鹿城數百里之間外家戚黨田夫餉婦并見疊出以與夫名臣碩儒爭名於翰墨之下抑末矣此歸安茅氏所謂入富人之家而所見唯陶埴菽粟者豈其才之不逮乎余之及此盖以歎夫士之好古而不遇者也求志軒集題辭韓退之為毛頴傳時人傳笑以為怪獨栁子厚深善之以為弛焉而不為虐息焉游焉而不為縦然此猶淺之乎知韓也凡古人文字不輕下筆雖一時游戲滑稽之文其中必有含諷譏切闗於比興惟其稱物小而寓意大屬辭近而取㫖逺故足傳也讀錢子文若諸詞賦可得其概矣文若為吾里耆宿隠居山中著書滿屋然不自表襮吾頭白歸里始一識其面邑子浮薄黨相揶揄或未聆其姓氏無足怪矣其詩於洸洋恣肆中不沒其家數皆所謂不輕下筆者也題蔣君長短句記壬戌燈夕與陽羨陳其年梁溪嚴蓀友顧華峯嘉禾朱錫鬯松陵吴漢槎數君同飲花間草堂中席主人指紗燈圗繪古跡請各賦臨江仙一闋余與漢槎賦裁半主人摘某字於聲未諧某句調未合余謂漢槎曰此事終非吾勝塲盍姑聴客之所為乎漢槎亦笑起而閣筆然數君之於詞亦有不同梁溪圓美清淡以北宋為宗陳則濫觴于稼軒朱則煎洗于白石譬之韶夏異奏同歸悅耳一時詞學之盛度越前古矣七八年来數君者存殁殊路南北方散處久矣夫余之不託於音也頃得蔣君度臣此卷按拍而歌之酒酣以往慷當以慨盖蔣君才豪而氣雄抒寫胸臆時時快所欲吐至其含宫咀商所冷然㑹心以自適於數君之外者亦復與作者之意何異宜余之既老且衰而復為之閣筆於此也家季孝俞為余言度臣多讀書詩歌古文辭累數百篇每落紙雲涌川恣詭變百出行為余盡發其藏則余之驚怖思閣筆於蔣君者何時已耶碧山堂元夕鬬酒詩跋後丁夘元夕今總憲徐公碧山堂之讌出所儲酒三十種飲客命客為鬬酒詩明日相繼以詩来者若干人而前總憲公先得絶句三十首手書小幀示某某謹受而讀之其體物精切寄託深逺至於聲調之諧美按之皆可歌也是夕某預末坐所嘗酒雖殊方異製大抵南北香味自相類嘗考漢書以上尊酒賜侍臣注糯米為上尊稷為中尊粟為下尊糯者今酒之南也而稷與粟者今酒之北也師古非之謂酒當以醇醨分上中下名非以米也且稷粟同物不可為二然酒性得糯乃益醇月令仲冬命大酋秫稻必齊而不及黍稷則古人之重稻可知注所謂粟當是梁之誤耳時座中皆南人多右南而左北公自序曰昔人稱北酒南茶北亦未可少也此言雖為酒調人然以三十種者較之實未易定其優劣矣自古譜酒者王無功焦革而下數十家至宋張能臣之記酒名元宋伯仁之為酒小史徵類以百數然鮮能徧致之以娱客者是席所列自内造法醖及坊務麯材逺而閩海粤嶠暹羅琉球荷蘭花實之釀蠟封藤繘梯航而至者皆得品量於一堂之上亦云盛矣使咏歌之弗稱則孰知夫今日者天下一家而輦下士大夫得乗其位暇流連觴咏以相賞於花晨月夕之為可也某屬病未能追和故合公詩為一巻以序而歸之題馮節母巻秦始皇上㑹稽山刻石其文有曰飾省宣義有子而嫁倍死不貞防隔内外禁止淫佚男女絜誠夫為寄豭殺之無罪男秉義程妻為逃嫁子不得母咸化亷清一與之齊終身不改者婦道也然改嫁之法禮制許之而秦獨名之為倍死丁寧其意於刻石之文者豈周末教衰其風尤熾而越俗猶未免歟然彼以帝王之尊而母子之間多所不幸夫亦有所感激云爾也若今山隂平母馮太孺人隨夫沿牒攜親歸里嫠面毁服辛苦以待其子之成立如是者豈不曠世而一見者哉子逺幸得為節婦子不以烏頭綽楔為母光寵而徧求賢人君子之文詞記述以當懐清之臺使採風者録之越絶一隅嫓美江漢矣其母子之間皆可敬也題南齊華孝子小像後孝子諱寳父豪晉義熈末戍長安時孝子年八嵗臨别謂曰須我還當為汝上頭既長安陷孝子七十不婚冠有問者輒號慟彌日按史劉裕以義熈十三年秋八月至潼關命王鎮惡大破姚丕軍遂入長安其年十二月裕將東還三秦父老留之不得以弱子義真都督雍涼秦州軍事留鎮之豪戍長安當以此時既而沈田子以掩殺王鎮惡伏誅長史王修被䜛死羣情解體夏王勃勃遂進據咸陽走義真積人頭為京觀號髑髏臺此十四年十一月事也豪豈以此時陷沒而不得還也従此中原分裂生靈塗炭於戰爭又百餘年然後合而為一其遺禍烈矣劉裕之罪可勝誅乎而孝子之所痛者特其父也夫自古簒竊之臣若王莽懿操父子俱未嘗親殺其故主也至陵零賊殺自後禪授之際習以為常裕之子孫亦嘗身羅其毒而君臣之道苦矣獨孝子終身思父不婚冠此其所闗於人倫甚大盖與晉徴士同人類之所以不滅頋失之上而得之於下豈不尤可貴重歟南齊時同郡有薛天生劉懐𦙍兄弟皆以孝行旌然余獨以孝子之所遇有足感者故疏其事於像左且繫之以詩平朔門前萬馬迴長安歡聲動疾雷羌酋反接渡江来南朝太尉作事乖心圗九錫苦欲囘十三兒子何為哉兩雄攫挐鬭不開忠臣斷頸起禍胚赫連潰師山崩摧參軍馬背䭾嬰孩草間求活真駑才人頭作山髙崔嵬三軍同時横暴腮傷心極望髑髏臺髑髏臺上悠悠魂七十無家難具論一朝旌旂忽南巻百年星日當晝昏小人憶父心煩寃父老哭君聲暗吞白頭舉事何紛紜沖年陵畔啼夜鵑君親大義死不泯赫哉孝子誰等倫東籬之外五栁門宋齊轉眼俱埃塵忠孝厯刼無沈淪君不見此圗戃怳正氣存題汪烈女傳後女子已字未行奔夫之喪而誓以死守或身殉之者歸氏震川嘗駁其非正以為亷恥之道存焉耳其立論最精然女之未嫁猶男子之未仕也古若薛方逢萌之于新莽費貽任永馮信之于公孫述謝翺方鳳諸人之于宋元之際皆未嘗委贄為吏卒之死不屈後人皆傳之獨行未聞以為非也而公卿大僚俛首乞憐于異姓之廷者百世而下猶將指其名而唾之其為人賢不肖何如也孔子思狂者過之彼雖蹈義之過苟可以風世而善俗斯取之已矣春秋于宋共姬備書其卒葬示予也君子曰伯姬女而不婦女而不婦過也猶為春秋所予然則未同牢而殉之死是婦而不女也婦而不女與女而不婦皆過也有不皆見予于孔子者乎􅄔源汪生敔姪女宫蘭許字同邑江某聞江訃求不得臨不得伺其母歸寧倉皇自沈于河生以其事徧白于在京士大夫論者猶齗齗未定也余特折衷歸氏之言正也余之言權于義而亦歸于正也嗚呼死生亦大矣而淟顔忍恥以游于世者何多乎然則吾之說其終不可廢乎其亦有不得已者乎說程處士篆刻說新安程先生穆倩善識古文竒字其所篆刻人爭購之或守之厯年不可得及其得意為之贈人無徳色非之者曰凡物之可貴者以適時而已今為篆刻舎秦漢而必曰三代鐘鼎之文此固為好竒而已於用奚當余謂此言過也夫自有書契以来文字代變于是有倉頡之書有史籕之書有斯髙程邈之書變而至于今之行草書極矣如欲趨時者則今之真行草書為已足斯髙之書且在所不取而况乎商周鐘鼎蟲魚詰屈之文宜其無所用於世也然余攷之周宣王時史籕始著大篆十五篇後秦李斯作倉頡篇趙髙爰厯篇胡母敬博學篇皆取之籕篆文省改之以為符印幡信題署之用則秦漢所用篆書頗與周不異而史籕之書或與古同與古異其體製亦不一也是則鐘鼎之書秦漢之時兼用之施于符印明矣大畧今人耳目當畧使近古昔有人欲盡削禇大所補史記者王元美曰漢人言所存于今㡬何而忍去之乎余當嘆息此言故嘗為之說曰古文之用協韻詩歌行之入樂府五言近體之入選體言草書之兼章草真書之間出八分雖無老成人尚有典型然今世破觚為圜日久而忽覩此書於俗學流便之中無怪乎惑之者衆也先生為詩光怪溢出似與書爭竒其為人朴貌厚衷年既老矣鬚眉皓素醉後瀾翻縦論西京天寳間遺事多人所不聞余謂天留此人於今日使後生末學猶得習其丰采而想見前世先生長者之遺其可重不獨在書也菊隠說草木之族唯菊種至多治之者有䕶芽分種接幹去蠧防風避雨之法積勞終嵗而取玩於一時故藝之比他種猶難按本草菊黄者味甘世稱陶公好菊亦其味甘叢生於籬落間者耳然余聞之種菊者曰凡塒菊不獨其花時可喜雖其萌芽藏荄凝露受霜隨時按候而驗其消息亦莫不有天地自然之生趣由其嗜好專一則雖用力之煩且久而亦不知其疲也有隠君子陸君翼王少事舉子業中遭感憤廢輟窮研于六經無虛日夜各成疏義十餘巻其自號菊隠余視其庭中無一菊者竊疑其所稱非實抑思菊之為性掩葩于艷陽之日挺節于嚴霜之候是屈子之所欲餐而陶公之所嘗采者也今以君之慕乎古也耽其精英擷其茂實至于窮厯年嵗塵視軒冕窅然若不知天地之為大而萬物之為衆以視乎種菊者之專一其所好而不移也則君之所自寓舎是其奚取焉錢黄兩家合葬說無錫黄君子某聘錢氏女未婚男女皆沒兩家父母謀而合葬焉邑人士與四方之客遊于兩家者為詩以詠歌其事而請余為之說余按禮男子年十九死猶謂之上殤不得立後而祀之終其父母之世女子既嫁未三月廟見而卒則歸葬于其父母之黨袝亦如之未婚而沒禮文不載盖不必載也周禮媒氏禁遷葬者與嫁殤者遷葬以死而求婦嫁殤以死而求夫皆非禮之正是以禁之以其未成乎夫婦之道也唯魏武帝愛子倉舒明帝愛女淑卒皆取他姓子女死者為之合葬史譏其違情背典至唐家人禮始有㝠婚之制此君子所不道也今既合葬必當袝廟夫婦袝廟必當立後使果為此此與曹氏之蔑棄典禮何異兩家父兄皆守道君子宜安所出或謂禮縁人情情生于人之所不自已今兩家各哀其所生至不惜越禮而為之其友又思助其哀而作為歌詩以相􅇺勉見睦婣之意皆本于其所不自已者也傳曰禮失求之野噫其野也其諸亡乎禮者之禮與友說贈計子甫草古者士有諍友荀卿曰庸衆駑散則刼之以師友友者所以濟師之道之所不及也中庸論達道五頋言朋友不及師弟盖君臣父子夫婦兄弟人生之於四者固有難言者矣夫師者其為分甚尊而其為勢則甚疎言人之所難言者甚尊之與甚疎皆有所不可者也然則孰為其綢繆之使無失彌縫之使無間耶此朋友之事也古之取友有以勢利相膠漆者有取其緩急相賙恤者有誓生死患難不相背負者勢利之交無論已緩急相賙恤生死患難不背負此謂意氣之感激則有之差異于世之面嫗煦而背􅙅訿者耳以語于道義之交未也古道義之交以贈言不以財賄以性命不以然諾以過相規箴不以名相標榜衆之所賤吾貴焉不以形迹嫌也衆之所棄吾取焉不以獨行疑也要之期攀依以同至于道斯已矣夫攀依以同至于道者非吾友其誰望耶昔者仲尼沒而七十子之徒自以其聞于師者相友教曽子數子夏三失卜子投杖謝過子貢乗軒而過原憲聞貧病之譏則逡巡失色以退若論語戴記家語中所雜載弟子辨難語大抵皆足以發明聖人徴言大義至今學者人知尊君親上以不至蔑禮犯分毁詩書滅仁義彛倫不至盡斁清議不至盡泯者此雖聖人之教以然亦其徒相與提攜之力也由是觀之則師之道得友而益彰信矣今世小生俗學甫離褓姆違其父兄之教則以奔逐聲勢為交遊以背公向私為任使以一唱百和無所可否為同志合道指道學為迂濶薄亷潔為無用士苟習是數者世俗皆謂之曰能而自君子觀之乃所謂市道交也市交之日聞古道之不作則業孰與進徳孰與講業無與進則邪者比徳無與講則過益積鹵莽於君父之間恣睢於禮法之外然且率天下而爭騖於是則人類㡬何其不盡滅矣僕藏此意久顧無足發者計子甫草善為文與僕交最厚其逺出乎流俗而不底乎道義不止也今天下無不籍籍計子名乃不以僕之拙訥顛蹶為可鄙而特以為今之人無志於古人者能志於古人者必其能為古人之文者也故每一文成則必俯以示僕僕時有所指擿疵類輒喜發於頰即力稱善無所短長則必愠曰是得毋徇我乎夫文章小技易為也計子之於文可謂成矣然猶不敢自是惟不得聞其失是懼况事固有大於此者其肯以苟且従事乎吾知計子之取於友者為異乎今之所取於友者矣雖然計子則何有於是焉夫惟君之自視也重故其望於友也益切其望於友也切則其施於人也有勿然者乎若僕固所謂庸衆駑散而文與行之無足採者也辱君之交冀以有成君盍以其自為之餘為僕謀所以勉進於道者作友說以贈書與子姪論讀書讀書不須務多但嚴立課程勿使作輟則日累月積所蓄自富且可不致遺忘歐陽公言孝經論語孟子易尚書詩禮周禮春秋左傳准以中人之資日讀三百字不過四年半可畢稍鈍者減中人之半亦九年可必今計九年可畢則日讀百五十字也東方朔上書自稱年十三學書三冬文史足用十五學擊劍十六學詩書誦二十二萬言十九學孫吴兵法戰陳之具鉦鼔之教亦誦二十二萬言凡臣朔固已誦四十四萬言此時朔年正二十二自十六學詩書至十八而畢又自十九學兵法至二十一而畢皆作三年課程三年誦二十二萬言毎年正得七萬三千三百餘言以一年三百六十日成數筭之則一日所誦纔得二百零三言耳盖中人稍下之課也夏侯氏東方先生像讃經目而誦於口過耳而諸於心其敏給如此今其所自誇大不過中人稍下之課可見古人讀書不苟非獨恐其務多易忘大抵古人讀一書必思得此一書之用至於終身守之不失如此雖欲多不得也贊石齋黄公墨寫魁星贊英年十五酷愛文公既得黄子公官稿想見其人公沒而升靈為星辰為世樞杓以建冬春為文璣衡輕重唯均洒墨染紙自圗其真平原之書忠義輪囷瞻仰生敬于斯亦云誰其將者水部左君厥兆文明奕世其珍漢夀亭侯闗公遺像贊并序公之忠義著於當時而神靈顯於後世其祠在當陽者始於陳光大中唐貞元十八年荆南重修玉泉寺遺廟董侹記之相傳為其寺伽籃則因縁智者大師傳而元虞集廣鑄禪師塔銘所為述其事者也其在解州者為宋大中祥符時建然此二廟特其生沒之地猶未及他處也自宋南渡及元而賜號稱王廟祀益盛明嘉靖間賊徐海就擒著有靈異督師明立廟常州唐順之記謂侯廟盛于北而江南諸郡立廟自此始然則當嘉靖前大江以南尚未有祀公者矣今聞東南日本琉球諸國西北口外無不轉相崇奉極土木之麗而其像設之雕塑圗繪如世俗所傳脩髯而美視者瀰滿兩戒如出一手含識之倫上自王公大人至閭巷士女强獷之將哮狠之賊無不絀其尊嚴戢其兇暴而瞻禮之恐後是其震悚乎人心者豈其靈爽有以獨異乎人哉亦其生時忠義討曹則功不終吞吴則志未遂憤懣偪塞之氣旁觸横牴發洩無所故久而後大溢于時而人不知其所以然也然予謂自古之善狀公者終莫如諸葛武侯侯之言曰未如髯之超軼絶羣盖并其形神肖之矣此畫不知于當時何如厯考記傳所載于公之威神度十已得八九因為贊曰操鬼也其臣魅魑孫為叢社纚維之赫赫劉宗張炎威公斮獝狂軒委蛇人不鬼防殄其師曹孫澌滅無留遺公之精靈星日垂凡百慙鬼公所治有臣不忠子孝虧瞻此俯伏其赧而方先生像贊古設賢良孝秀之科行修於身旌帛是加不聞有士厄窮而嗟其後不然變為浮誇錙銖程能誰辨鏌鋣所以先生終老於家有美先生秩秩其徳忠諫遺裔慈湖正脉服勞侍養帶不弛夕日短之懼誼同令伯峩冠裒衣經人兩師設席延明作我門楣念我先子實唯都講沐道薫徳溯流絶港曽不去口而師云云一經家傳弗悖所聞孰紹箕裘徴吾斯文垂之琬琰公有令孫賦帝城積雪賦凜凜嚴冬星迴次窮泉凝碧澗沍結丹楓乗坎布徳潤物施功亦集維霰有来自空時則陽烏斂彩曜娥隠暉屯隂疊嶺連氛重闈始悠悠而颺颺旋屑屑而霏霏資清於太虛之表儲潔於重隂之涯聴之無聲望之有儀覽之無迹挹之有輝包括宇宙布濩王畿爾其為態也屢遷其為質也多妍若夫纎條絶響萬籟澄寂徹宇無塵連天一色瀌瀌徐逝緜緜交積若將散而復整乍欲分而還結方舞蝶兮更輕擬飛絮兮尤密南陽之鉛澤辭鮮西崑之玉枝慙潔至夫朔風鼔厲轉騰増勢合沓彯撇雜糅膠戾狀似三軍之行士馬俶擾而騰裝又似繒􅌳之纒羽毛颮紛而蔽地動銀鋪與玉璫拂文㮰及彤砌啟建陽而猶寒墐北戸而増悸爾乃冪通谷捎林莽棲鳥静號獸聚九市迷塲三條惑路填坎坷於危途息塵埃於窘步綺寮都䕶之堂青槐丞相之府吹簫帝子之樓挾彈王孫之塢莫不縁檐入隙掩映階廡炙笙簧兮㑹嘉賔羽觴陳兮日欲暮西山峨峨列樹駢羅呈縞分巘結素同柯巖封而翠屏時掩瀑凍而匹練長拖恍惚兮失脩眉之逺黛艷朗兮生極目之㣲波俯瞰上林遙亘長樂萬户千門飄飄爭薄雲雀踶甍而却依蟠螭承楣而瑟縮金仙炫晃於層楹玉女掩嫮於重桷簌簌寒威河冰去来盧龍舊壘駿馬荒臺望紫塞兮何處鬱黄金兮未開蕭條兮處士之扉彳亍兮先生之屨漏正長兮天漫漫途已窮兮徒延佇於是天子御重茵之座襲翠鳳之裘詔公卿及庶尹諮萬方於九州延隠逸燭巖幽皇仁浹沛澤流従獵者挾纊負薪者忘憂炊家家而相接穫年年而有秋姑射之仙人自下洛邑之河伯同遊命太史而紀瑞屬従臣而賦詩瑞自同雲之慶詩仍白雪之辭辭曰筵桂椒兮白玉盤歌愔愔兮清夜闌恭承嘉祉兮不敢忘念吾人兮衣裳單歌既闋羣臣出開端門事朝日玉河春栁賦望京邑之翼翼縦緩步於郊坰和風宛其入懐林鳥嚶其相鳴爾迺春日遲遲春路逶迤流泉曲折列樹參差則有上苑移根灞橋遷植行行臨水枝枝踠地蔽北陸而成闗種西門而映肆騰氛霧而霏㣲冪平皋而薆薱千株萬株婀娜紛敷或交綺陌或傍金渠故夫玉河之為水也宛宛澶澶来自西山瀦而為湖滙而為淵踰乎髙梁之曲入乎芙蓉之園森漫蓬池經乎上蘭彌望直視鬱乎芊芊何地無栁何栁不妍鏡清流而黛濃如洗倚列雉而腰細堪憐於時條風始扇日和景良草抽書帶鳥弄笙簧柔稊乍吐弱蔓初揚招要舞態演漾波光竦纎軀而不定曳翠帶之何長若矜妝以競冶間桃李之紛芳馳青烟於平樂遞餘暖於昭陽曹子建曽攀折而不忍桓元子雖對之而奚傷若其連逵積素荏苒百五裁閣輕隂㣲停細雨林立兮姑射之仙人襹褷兮甘泉之玉樹緬芳姿兮濯濯宛深情兮縷縷黄鸎啼兮濕不飛羌管吹兮悲自語於是金張戚里趙李豪家佩舒連萼綬帶桃花俱將皓腕並按紅芽飛盖於青門之側張帷於緑水之涯枝低繫馬岸曲停車絮墮結而猶起影移尊而尚遮亦有西京大夫南國上士仙鷁同遊斑騅並轡問先生而得廬訪隠淪而過市玩絲隂之不已俯帶影於遙潯花輕似笑葉動如吟共憐碧玉并字青琴展慇懃於遐矚恐幽思之難任至若王命夙臨指車萬里貧士失職孤蓬自起祖帳東門唯吾與子眺碣石之遺宫歌蕭蕭於易水凄其夕照怊悵東風折一枝兮岐路結相思兮萬重况乎巖棲澗築河陽杜曲當衢瑣第連房珠箔莫不愛此妍華樹之芳陸拂塵於宛轉之橋送客於逍遙之谷羲馭曈曨春明漢宫斜鋪網綴半入簾櫳羅衫染薄玉簟飄重襯衣塵軟藉草泥融分標射葉别隊追風靈和則想風流於張緒長楊則研子墨於揚雄時則有萍蹤逺客来遊上國風翮經摧霜蹄屢蹴刺滅於懐經荒於腹撫劍無侣駕言出郭對開元之一株撫上林之三眠攀條執枝久而泫然張平子以四愁成賦梁伯鸞則五噫名篇盖有懐者物易感失志者袂易霑自古羈旅坎􅇄之子亦孰不歎依依於今昔而愴搖落於江潭文數賊文主靜先生夜讀書既倦退而就寢殘燼滅羣動閴撫枕輾轉交動胸臆其始也若檻泉之伏流泌泌瀄瀄其既也如遊絲之裊空不可㫁絶忽焉奔肆萬馬騰籍怔營怦悸僨亂血脈脅不得安睫不能閉屈起俛聴頻移漏刻然後瞿然驚覺收照屏息徐而跡之乃得一賊是賊也非處窔奥不穴墉垣其来無影其去無端善司者莫窺其踪跡善推者莫測其機闗潛入牢藏靈府是蟠錐鑿百竅鑽剔五官糺結榮絡洞厯肺肝𤣥扃暗啟業火自然抉清淨之秘閫闚恬淡之徳園竊嘉名於五徳紛晝夜以往還先生既得而數之曰賊来前賊来前自爾之掩處於吾身者㡬何年矣而吾不知詭譎瞀亂唯汝之為我今告汝以汝險巇汝其諦聴去而他之吾年八九蓄殖未固藩籬道徳苑囿典故一往志盛弦橋的赴㑹不汝防倐来穿槖自是之後汝跡益稠吾坐讀書七畧九流左次右摘瞬不停留汝竊吾視去而神遊終巻茫然昧厥端由勝賔雜座縦論幽討妙言解紛清談絶倒汝竊吾聴經營象表口酬客難目送飛鳥劖斵為辭正正竒竒經緯聈㝠與神相追汝竊吾意不見端倪易之氛濁嗟寒戚飢有時習静垂簾半趺南國隠几㗳然喪吾汝即跧伏匿跡陜輸藏舟於壑負之而趨羈旅逺客取歡酒杯故人乍爾笑口一開汝来施施挈朋與儕萬緒千端併集於懐燈青黯黯予孤易感汝不知其慘風雨沸號其境蕭條汝反呼其曹蟻穿壤潰蟲蠧木壊㣲纎不絶害豈在大吾何牽連少習於汝汝豈無家乃不舎予凡吾今之智識刋落記七遺八非汝之為祟而孰使予學殖之寡薄吾髪之鬒者變而為星目之瞭者變而為䁝非汝之予攖而孰使予終日之營營于是執之以訴於天鈞曰庶其懲而逺徙天鈞囅然而笑曰子知彼之所起不知彼之所止起其所以止止其所由起一起一止莫非子之以子不見夫水乎水聚成漚漚復為水子胡不澄其源而澈其委子潔而宫虛而庭以葆子之真彼將不生子充而内無炫於其外彼將為子之守以益子之所貴曽不是慮唯彼之去彼来何従去歸何所盍子之示以無有而彼今將安處先生於是蹶爾神動逡巡却立歸而毁樊撤籬解緘發鐍坐三日不言杳然若喪其身焉起而視賊失之忽不知其所出銘冬睡銘暖床密室低枕厚衾側身屈足閉目閉心渾渾沌沌如龍蟄隂氤氳一氣升降浮沈其覺徐徐其息深深悠哉睡鄉斯樂難任硯銘予拙汝鈍宜汝之近又紫間焦白遍地水藻烟霏霧蒸下巖之寳其縦八寸廣半厚二直方以大習無不利汝質至堅吾筆至銳力能汝穿豈不吾畏湛園集巻七
