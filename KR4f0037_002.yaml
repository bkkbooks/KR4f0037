body:
  text: 翰林院編修姜宸英撰序送王少詹使祀南海序嶽鎮海瀆之有定祀皆本於唐開元禮百川之水惟海為太而南海居委輸之極從廣州城南受三江之水分東西二道東南直抵甌關西南抵駱越以及東西洋以往諸國無所不到於四海之中號為尤大稱天池焉故祀典獨重南海在周頌般之樂章序謂廵狩祭四嶽河海而作則巡狩之祀海其來久矣今康熙二十三年削平巨孽中外無事皇帝將以時巡天下爰考古禮分遣諸朝臣告事山川而以詹事府少詹阮亭王公往祀南海惟國家撫有疆宇大海之中鯨呿鼇擲憑妖鼔怒於波濤之内山河為之簸掀日月為之霾曀如是者幾四十年一旦風恬浪霽纎塵不驚依島之國占風而至瀕海百姓含哺嬉遊使吾皇之徳化洋溢無垠神之功亦偉矣南海之神既大而靈以黙佑我國家其功尤偉天子特以使事付公豈無意哉按廣州志廟在州城南八十里本非島嶼而陸行山徑﨑嶇不若一㠶之便昔韓退之作廟碑於孔戣之親祀至誇為僅事亦以往時刺史怠職不䖍多委事於副而戣獨能稍稍自異為可述耳今天子既下南巡之詔惟嶺南地以僻逺不得至度公之往布宣上徳諭所以憂民疾苦之意至備吾知五嶺荒徼俚人蜑户必將如望屬車之清塵趨走恐後者民氣歡悦神嗜飲食由是言之則海南萬里清晏呈祥効珍用協贊我無疆之景運豈有極哉一祀事之躬親誠無足道是役也天子不以屬諸他人而必以公行其果非無意也已送鄭庶常假省序龎公隠峴山之南答劉表問曰世人於子孫皆遺之以危吾獨遺之以安遂擕其妻子隠鹿門山採藥不返此處亂世之道宜然若生逢有道而令子孫無失其家學澤及生民乃所謂遺之以安也王霸隠居見令狐氏子來容服甚光舉措有適顧視其兒曹蓬髪歴齒未知禮則客去愧卧終日不起是時當建武重興聖作物覩之㑹人爭以文學自奮生子不才叱牛傭耕正可恥耳其婦䕶前飾辭解釋真兒女子之見也而范氏侈之為美談過矣吾邑平之鄭先生醇徳舊學推重鄉里自以前代遺老不營人事屏跡杜門日以讀書養性為事屢空晏如也余友禹梅其長君本經術為文章務追古人致之實用數上公車不第今年始以其經魁南宫列館選遇覃恩封其兩尊人告假歸省行有日矣為禹梅賀者且疑為先生所不喜是惡足以知先生哉先生懐竒襲珍義不苟就度其心未嘗一日忘蒼生者舉平生未竟之志付之禹梅兹其所以為適也已余視戊辰一榜具慶者無慮數十人然皆少年速化無足深羨禹梅春秋且逾艾先生暨夫人偕老鹿車徜徉於鸛浦之濱早起宴息視聴益聰明飲食倍進此豈人力之所能為哉今禹梅歸不一年且散館復來自斯以往或乞歸終養或娛侍京師出則荷組黻之榮入則遂綵衣之奉事君事親兩無所欠余自維樗散放廢禄不逮養為禹梅述此譬如渴者之談酸津流被頰無濟實用徒自傷恨而已若夫鄭氏之樂豈有既哉送王白民南歸序禮聞來學不聞往教古之大夫士之致仕居其鄉者為父師少師儀禮鄉飲酒與鄉射禮所謂先生是也以教其子弟皆不出其里閭蓋古者師弟子授受以道道在故來學道尊故無往教夫子自行束脩以上未嘗無誨而不往教是鄉先生之義也自後周衰道喪師教益廢漢得遺經於秦火之餘諸儒人自為説國家有大議則必問以經義云何弟子講説必問其何所師受一大師門學徒嘗多至數千人御史大夫張忠辟孫寶為屬除舍欲令授子經寶自劾去引禮不往教之義忠不敢強蓋是時道雖不明於天下而人知尊經經非師不傳故其所以自待與人所以待之者俱不得以或輕凡以經學之重而然也古者尊道其次尊經皆不廢師其後科舉學盛則經學愈替國家取士不必通經士以専經取之不必問其家學所自於是士之抱經以處者慼慼靡騁田舍翁積十斛米得折柬而召之矣北魏元欽性鄙恡嘗託髙僧夀為子求師師至未幾逃去以讓僧壽僧夀性滑稽謂欽曰凡人絶粒七日乃死始經五朝便爾逃遁誠非去食就信之義欽乃大慙蓋當時之風俗已如此今世孤儒窶生常不逺數千里負笈以求為人之師猶不可必得幸而得之自非數習禮教舊家善族其視遇其師不啻厮養譏呵出入窘餓拘囚賓親不得通臧婢相侮笑至有流離顛踣無所於歸者師道之不立非一日之故也友人王子白民治經有法恬於進取特以詩稱江湖間久近且為童子師於京師七八年齒髮衰脱落拓塵市囊不蓄一錢今晨來别余告歸余曰行哉亟作詩送之又為之序其所以王子任真樂易無骯髒失意之色於去就間余為之序不悲王子之不遇徒以歎夫道廢經絀而時之不古若焉送陳紫馭遊永康序陳子以九月戒途遊永康余送而謂之曰子之是行以為知已報乎抑將因以有求於彼乎顧視子貌若有所不屑而强就之者然豈其亦有所慨於中乎余前年遇知於有司與子同已而失意又同計子交遊中知子宜無余若者以余之卑賤久羇於此所嘗人情險巇百端每悒悒不樂日思買田種萟杜門讀書鼔琴以自娛猶不能舍此而遽去而知子之必有慨於中者以予信之也子姑慎其所往哉婺州山水豐厚人物敦樸當宋南渡後衣冠避地多出其境宋元之際朱呂學延蔓於八邑至今猶有傳者子負才藝修仁義立然諾持是以往安在其無遇也永康之學剏於陳同甫同甫要為粗豪然朱子深愛其材與之往復辨難數萬言卒欲歸之醇正其緒言餘蹟亦垂至今子遊其鄉蓋亦虚往而實歸矣子之師為賢令於彼潔然仁以清無亦以吾言叩之人不學道老至奄忽遇不遇何足論哉送馮孟勉西遊序維嵗之春予友秦君别予而西未數日也馮子孟勉亦來别予將西適吳㑹放大江觀於洞庭匡廬之勝而税駕焉二君者皆今之賢君子也予非二子之與遊則不能一朝而樂而相繼以去予則予之悲可知也去年馮子客呉中寄予葛嶼十咏馮子曰葛嶼去吳江縣東五十餘里其地有禽魚葦蒲之樂灌溉之饒居人之環而食其利者百餘家中有唐隠士張志和祠蓋志和浮家泛宅往來苕霅中意此其經遊之處而後人因而祠之也宜馮子之有樂乎此也然予讀馮子詩自傷其親戚之違離朋友之失處憤悱哀怨若不知有文字之足樂與賢人逸士之蹟遺風餘韻之可愛而可傳者必其無所樂於中可知也即秦子之言亦猶是也予既悲二子之别二子亦復自悲其别然則二子之屢役於西方也其亦有不得已者乎余非能不為别也勢不得别耳别與處奚擇哉方秦子之歸也客有授其琴數引者為予奏之鏗然以和醳然其志油油然其自放焉蓋有得於中則忘其外其所得愈重則其於外逾輕矣馮子之往而復以詩貽予也予固知其不以悲而以懌也述世徳為魏南鄭贈行序余嘗聞友人沈太史芷岸稱其同年友魏君之賢不置也君自舉進士即歸里終養十年間先後為兩母持服盡禮極哀鄉黨稱之今來謁選得縣南鄭君不鄙其僻逺其議論常在濟物謙靜㢘儉無時俗媕阿態以此服太史之知人而私以得交於賢者為幸也八月君暫南歸謀完葬事趨任出其祖父兩世行述請余傳其梗概余覽之嘆曰宜哉魏氏之有後也蓋其積累逺矣魏久家繁昌自君曽祖光禄公再世同居官旌其廬所謂世徳是也祖諱之翹字楚材少與兄孝㢘君齊名入國子學日讀書好行善若不足孝㢘殁撫其子猶子卒以成立族人有以腴産來鬻者既悔之而力不能贖公立還其劵不取值夀七十二終嘗曰吾家種隂徳過百年子孫必有逹者惜吾不及見矣子待贈君一公公諱極君一其字也崇禎壬午覃恩選拔貢生試禮部上巻人以公才宜得上第已而遭亂棄去從酒人遊晩年結㥥亭偃息其中與道侶詩客往還賦詩口不言時事益躭經論結齋飯僧日以清談為樂然篤於孝友楚材公捐館年艾矣毁至骨立從弟中翰罹禍危甚脱身破産救之僅而免粥餓槥骼設漿以飲道渴者家幾匱不輟亦不以聞於人也徐孺人有賢行早置側室視㥥亭如已生子㥥亭者南鄭君所自號示不忘其先也公歿年纔五十七云自楚材公下兩世單傳繼嗣不絶如綫南鄭君年二十一連舉五子今為名進士作吏巖疆當西南倡亂時全蜀陷賊漢中為全蜀咽喉王師苦戰其地民膏血漬鋒鏑産力疲餽餉今十餘年木復也天子優詔重賉累選太史之才有守者作收其土用寛西顧憂君以經術起家視事首縣必能體吾君仁惠遺黎之意多方撫輯為諸邑帥且因以大發其家世積徳而完其祖父鬱而未竟之施則君之功業所至豈可量哉惟君之舊則既有徴矣曰萬盈數也魏大名也又曰公侯之後必復其始勉矣南鄭其在兹行乎贈翁同知之任黄州序黄在春秋時為戰爭之國至三國時為西陵重鎮其地外連大江南通雲夢宋承平無事時王元之蘇子瞻之徒愛其江山之勝始相繼為文詠流傳於後而至今宦遊者猶聞其遺風而樂之自湖南用兵以來三楚之間烽烟相接民卒流亡道路守土之吏供億繁騷朝不謀夕而仕於黄者無片甲之擾得以從容几案為天子牧養小民丞職當漢都尉之任才健者居之其力常出郡太守上至近時選授尤稱便所掌兵防巡徼而已催科案獄之繁一不以累其心不踰年報最則安坐而二千石矣余友杭州翁子武原謁選得此所知者皆為詩相稱賀翁子亦若色喜者而告余曰此吾得少展其志之日也雖然必得子之言以行惟余固有所進於翁子也今夫丞之職雖若無事然所以佐守而表率其屬吏者其職尤重表率之道無過于㢘士大夫㢘潔自好本非分外之事但言此於今日似見為迂濶無用者然余輩出身為民使不稍為其迂濶者則誰當為之人相率而不為則斯民之受困何時巳耶王蘇兩公之居黄皆以謫至其中有憂讒畏譏之意度不能盡發抒其所欲為然猶皆為民所愛慕至於久不忘孰如君之以選擢而得此其庸可忘也族姪華林陞平陽郡丞序余家舊籍淄川族姓繁衍散處他郡余浪遊河北每見山東諸同姓輒訊知其俗𣲖與之往還所見文雅雄雋之士不少其所心契而期以逺大能張吾宗者莫如今平陽郡司馬華林其人華林之先亦由淄川分居萊陽今附籍奉天推世系以叔事余余不辭而與之遊相暱如親從然也當丁卯嵗天子大比八旗之待選者而臨軒試之人持盈尺紙伏階墀下風掀日炙筆乾不得下人方窘促君就坐席展巻疾書成七言詩一章音調鏗鍧辭㫖蔚茂天子見之稱異破常格以其名付吏部選得樂陵令去樂陵故疲邑前政骩骳已甚君至則奮然振刷不為缿筩小數每夜身從數騎巡徼盜發輒得百里間震其威名無犬吠警潔已奉職聴斷明允朔望釋奠學宫與士子講論經義以季考其業而上下其等第士益自興起於文事遇佳客至設席談笑吟咏間作退食蕭然閉閤誦讀而已六年之中薦牘交上今年春遂以卓異遷平陽郡司馬方就道而邑人遮道留不得于是京師士大夫聞之莫不為樂陵惜而為平陽之百姓慶也夏四月值平陽四邑有地震之警當宁聞報驚怛勘災之使朝聞夕往疆場大吏猶以不敏被譴諸有事地方莫不惴惴從事而夙聞君之精勤練達則日望其至相與共事以無貽聖天子西顧憂君前仕粤有政聲繼治樂陵丰采益著而適當今日盤錯之任蒲州去郡城六百里而遥天幸全此一方以待君之設施也君之是行其可緩哉比者朝廷鼔舞吏治常不次用人自郡縣拔擢不一二年而輒超藩臬督撫者有之吾之期君以逺到者此其時也然朝廷方藉君之才以經營四方而吾徒區區欲私為一家之光寵者蓋親愛之無已也吾之序為君而作也豈無他人不如我同姓行哉行哉吾又將執筆而書君之最矣陳六謙之任安邑詩集戊午冬予友海寧陳子六謙謁選得安邑丞以去致贈詩至數十篇或謂陳子才地宜得膴仕不宜沿牒為州縣小吏予讀諸君之詩知其所期於陳子者或不在是也安邑故漢淮隂侯韓信所為漢首立功地信之事為君子所不道然其志實有過人者方其未立功時本與世之碌碌者無以異其始居淮隂也一市之中皆笑其怯至與趙戰背水而陣趙人皆大笑與楚戰濰水之上楚大將龍且曰吾生平知韓信為人易與耳又曰吾固知信怯也夫市中兒為怯宜也至使敵國之將聞之亦輕之而不為備然卒以此成大功則夫信之所以得此名於市中者豈一日之故哉士之志道徳者固無慕於功名者也其志乎功名者非其識之沈力之堅而急於自見者往必敗而無急於人之知者必得之若信是矣且天下之公侯將相其不為市中兒之見者幾何而汲汲焉欲其知之也不已過乎陳子抱盛才來遊於京師適當朝廷下詔求士之日孫陽之顧一衒鬻可得人方營營君棄不取曰丞吾樂也余微觀陳子本非無意於功名者今其言若是殆與營營者異趨乎則其中之所存豈可意量哉安邑故儉俗易治新令周君其同鄉又賢用陳子之才佐賢令以治易治之民政之成也可待鳴琴之暇相與登魏豹故城蹤跡其所從夏陽以木甖缻渡軍處然後執是巻而歌之當必有快然自得其志於千載以上者此非俗人之所知而諸作者之意亦容有所不欲盡也則予安得以無述乎贈翁祭酒遷少詹事序記曰行一事而三善備者唯世子而已其齒於學之謂也古者大司成教世子及士以舞干戚語説命乞言皆大樂正授之以篇章之數然後大司成坐於東序而論説之是凡教大學正徒授數而不論説論説者大司成也然大司成之職在論説猶不離於口耳之功先王之教世子以為口耳之功未足以成徳而尊教也于是乎立之太傅少傅以養之於父子君臣之道然後可以濳移黙化其志氣使之馴習於善而不自知故曰太傅審父子君臣之道以示之少傅奉世子以觀太傅之徳行而審喻之此其序也又曰樂正司業父師司成司成成就徳行尊為父師則必不僅主論説責效於口耳之間可知也夫其能博喻然後能為師彼為之太傅少傅者又豈與夫樸魯少學者泛而論父子君臣之道如木偶之拜起然哉故愚以為兩傅之職非司成樂正其人莫足當之古者天子師傅多兼官况世子與考古所謂太傅者畧近今詹事之制而所謂少傅者則今少詹事之職也然則今祭酒猶古之司成乎曰古者司成得教世子後世齒胄禮廢而今之祭酒所教者僅國之俊造而已宜其與古異矣前年皇上命東宫出閣講學文華殿特召歸徳湯先生於江南命以禮部尚書管詹事府事重徳行也逾年蘇州翁先生亦自國子祭酒擢為少詹事先生表帥六館盡去監中夙弊所條奏諸教育法凖於古制時議惜不盡用今而知朝廷之用先生其意良厚而其職則以古司成而行少傅之事無以異也據今之職則先生之論説方有事耳循古之制則審喻以太傅之徳行而使湯先生之道為不孤者先生得無意與嗚呼自秦漢以來二帝三王之遺跡盡矣今聖天子獨稽古禮文肇舉盛典擇人而畀之而先生適逢其㑹此余之所以親見之而尤幸而尤樂其與湯先生相與以有成也别葉編修序昔鮑叔既脱管仲於囚且進之桓公而以身下之其恩大矣然而管子既貴未嘗舉以為言其所言者乃在貧時與鮑叔商賈逐什一分財利與夫浮沈卑冗而卒伍厮養之事豈誠一時之感激有甚於生死而貴賤者與蓋嘗論之夫士固有蹈白刃輕千乗而不顧者矣仲雖伯佐抑其自待者重以為生死貴賤危相扶而安相擕者乃朋友之常道唯其平時知已有隠喻於形跡之外而不可以告人者此其不能以頃刻忘也故曰生我者父母知我者鮑子也其謂我嘗為鮑叔謀事多困而鮑叔不以我為愚知時有利不利也嘗三仕三已鮑叔不以我為不肖知其不遭時也余每反復此言竊怪以管子之智計如神舉齊國而用之唯所欲為何獨暗於小事而拙於謀身至此既思得其故則又不禁欷歔以起蓋嘗讀詩綿蠻之首章曰綿蠻黄鳥止于丘隅道之云逺我勞如何飲之食之教之誨之命彼後車謂之載之此微賤勞苦而求援者之所為作也賢者失志至一飲食之微不能自具而望給于人此其昏迷顛沛之狀必有可憐者矣然而自古豪傑之士如此者往往而有故人知我愚人得我失人愛我憎及其甚也舉目投足無一而可殆所謂行拂亂其所為者而管子之才之賢其猶不免于是歟當此之時有能飲食教誨之者幸也即不然而詆侮訕笑之隨其後甚且非意加之極之其所往人非甚堅忍鮮不喪其所守矣愚嘗以是求之古人而欲如鮑叔之于管仲者何不數數也幸而有之是可不為之流連而三嘆已乎以予之得遇君于此也今之去也不能以無感故書管子之事以見志焉誥贈中憲大夫沈公崇祀鄉賢詩序先是松江府學諸生某等以故贈中憲大夫按察司副使沈公宜崇祀狀上之府太守以上于督學使者既得請遂置主卜吉迎祀之如禮于是鄉之薦紳先生及四方賢士爭為歌詩以紀其盛且以悲公之遇慶公之没而得顯而以慰憲副公之孝思於無窮也屬某為之序某竊按公生當前代太平之後懐瑋蓄竒藴而不揚其死於崇禎之十四年豈復自意其今日也歟然當公死時天下亦大亂矣且以漢永平播遷之後下第寒士裹衣牽裳之徒猶弛負擔而位郎署者四十六人唐昭宗天復之二年皇輿初定則詔取耆宿五人與於禮部試者遽授之官時人謂之五老榜蓋古人于坎軻失志之餘其遭逢之竒又有如此者公生亂世不遇以夭命也然古者瑣尾零落若此者蓋不勝記即其低首受書飢寒勞苦之不恤思一發抒其胸中所聞見而及其顛踣不偶久之而無所成也則㤞憏鬰悒以死而其魂魄之寄所託之隂風曀雨松柏之哀號猿猱虎豹木魅山鬼之所俯仰蹢躅而悲嘯者又不知其幾也然而生既屯蹷于前没又無聞於後者此非夫人子孫之責而誰責耶爰自憲副公始長即手父遺書飲泣而讀之既起家甲第上玉壺歴清禁持節於嵩少大河之間聲譽赫濯猶時時痛父不置以鼎養之不及也對客則慘悽増欷會朝廷亦軫念賢勞不忘其所自特贈公如子官今又爼豆之于鄉以春秋奠侑而饗祀之然後贈公之賢與憲副公之孝始焜燿在人耳目矣此與側身荆棘龍鍾一第者其于命又孰得孰失耶或謂公孝第聞于家行誼著于鄉鄉之淑其徳者相望也此謂合于古有功徳則祀者歟愚謂正不必以此例也夫公非有所瑰行絶竒以震炫於世也但使經公之祠者見其終身阨塞而今獲遂顯榮如此則人誰不思力善教家以得名於身後見憲副公之賢辛苦以列其親之名於天下則誰非人子又誰不思黽勉繼志期無忝於所生於以發仁人孝子之思彰聖天子風勵天下之盛皆于是乎在此諸君子相為咏歌之志也愚不敏敬述具所以鄒君針灸書序古之髙蹈者流若伐檀之君子稼穡狩獵以為業而詩人美之以為不素餐此豈僅謂其能自食其力而已哉蓋即其堅忍之操刻苦之志以知其必能待時而有為以不至自廢於無用之人故曰不素餐宜也天之生人無論出處貴賤而皆望之以共相生養之道也如謂髙尚其志即可放蕩流佚聽人之自生自死于天地之間如秦越人之相視然則亦謂之素餐而已矣予在京師識鄒君時稱述其尊甫聞望君蓋隠君子也予去年病困客言用艾可愈延醫治之鄒君從旁指穴數處時有所駁難醫者不能違也予因叩其從來歴言隠君故讀書既自放棄則學醫尤工針灸挾此技數十年能立起沈痼實不取人一錢故術雖工而其家之貧益甚後予啓視其篋衍則手訂書針灸藥脉各二巻在焉其意以無資鋟行其書使吾父利益之道久鬰不廣求予一言以告于當世之有力者予嘗嘆後世事日趨便而古意浸微醫其一也即如靈素諸經所言針石之法必與方診藥齊緩急並用而後有效而病在腠理者尤以針石為宜然在漢時砭石法已不傳僅得者針耳今醫家所用惟五苦六辛草木之滋味其於人也末矣而視針灸特自為一門習醫者反視為旁家外道而不之數則其為術安得不疎余故不諳醫未暇讀隠君書輒欲依太史公之傳淳于意及近世元遺山序李杲明宋景濂贈周漢卿例件繫其已試之效於巻端使人知其術之竒中如此則此書之行活人當不可數計隠君者雖隤然自廢何害哉漢郭玉有云腠理至微隨氣用巧針石之間毫芒即乖神存於心手之際可得解而不可得言也輪扁之對桓公曰臣不能以傳之臣之子臣之子不能以之受臣鄒君本以善奕遊京師然而其于父之學也則固已得之於心手之際矣跋家藏唐石蘭亭序此石背面刻蘭亭叙二種前一面比後刻較低一字明嘉靖間吳門黄君者工畫人物偶得此知是唐摹石因贋為宋人清明上河圖并榻如舊本獻之一貴人其人以遺分宜相後潢匠索賂不得發其事貴人以此見忤而黄亦坐是窮死其子名景星字平泉跛足知書亦善繪事與余家有連因擕其石至慈老焉此石向藏余三叔祖家叔祖没後余尋得之舂碓間石廣二尺長尺二寸厚一寸許質光潤可鑒字體多類聖教序蓋唐僧懐仁所集本也近見武塘錢孝㢘栴摹帖其叔相國跋云得善本於京師前有趙文敏蕭翼辨才圖遂摹刻之余締視正與此前一面刻低一字本同而神氣去之逺矣自後又得髙麗揆文庫收藏本中有宣和御璽則文敏圖在焉玩其紙墨良是宋榻與背刻髙一字本又毫髮無異只髙麗本盛字上成字鈎微起而此逕帶下放字彼楷此行靜字右脚低於左青而此微縮為不同及視石則三字已損即用前完本嵌補紙上補痕猶隠隠可見然後知此石之流傳真千餘年物也吾子孫當善藏之勿令俗工妄榻損其真氣康熙已已年九月朔書於京師之停舟書屋許君印譜序余久聞許君黙公名於士大夫間恨未接其緒論即其所為谷園印譜亦未及寓目也昔歐陽公終身惟一印記名近文董諸公書畫徧宇宙鈐尾圖章亦未見有絶勝者蓋圭璋特達無取繅藉以余之泥塗姓氏而欲附之琬琰以不朽非其宜與余嘗為新安程君穆倩鐘鼎刻説謂今人耳目當稍令近古極言俗學詆譏之為非是聞君嘗問竒於程君則所謂谷園印譜者余固不待見而其源流之合亦不俟余之贅辭矣已卯順天鄉試録序皇上以今年二月南巡狩車駕所過惠澤旁敷尤以人才為致理根本慮有懐竒抱徳伏處山林者必殷殷延訪及章縫秀士有挾所著書與詩文來獻者輒停輦霽容受之叩其底藴詢及素履思得真才而儲之以為天下國家之用意甚盛也回鑾之後逾月適届順天大比期禮臣列典試官名上皇上特命臣宸英入貳闈事臣才識謭薄聞命惶悚屏營累日竊念臣曩以布衣被薦䝉恩食俸史館厠編纂之末者迄今垂十八年丁丑獲舉南宮對策闕下臣名列第七皇上親閲臣巻拔置鼎甲臣才謝平津白首被舉凡海内淹滯耆宿聞臣遭際無不濯磨思奮喜遇明時而在臣私心感激所思捐糜以圖報萬一者又當何如也兹幸得以賔興大典忝與司衡於以少副我皇上求賢若渴之意此臣素所蓄積特自以賦性庸拙兼年齒衰暮精力刓敝持三寸之管而噐人於糊名易書之下又安必其能拔十得五也顧臣之所硜硜自信者惟有一誠而已臣偕修撰臣蟠始入鎻院即與十六房同考官設誓神前凛以國法惕以鬼誅此臣自為諸生時所夙夜自矢鏤心刻骨而即以質之於明神即以是白之於我皇上者臣既自盡其誠則凡臣心力之所未逮目力之所未周同事諸臣必有能殫精竭思以協成一科之盛典盖臣之以誠自矢而知諸臣之有不期而同然者其於人臣以人事君之誼一也雖然夫取人於文字之間安在其人之才識品量足以當天下國家之用而謂可以仰副皇上求賢若渴之至意乎不知文章雖末事而用人途轍終不外是昔人有言求之賢良方正則賢良方正即此人也求之孝弟力田則孝弟力田即此人也聞有能文而行不克副者矣若舍文而别求所以取士之法與舍八股而别求所以取文之方臣固知其不能又不必也我皇上聖學淵宏斟經酌史闡天人之微妙萃道徳之精華菁莪雅化沾被斯人而京師首善之地人才淵藪其沐浴于教澤也尤深故能以風簷寸晷畧盡所長使臣等得藉手入告兾稍免於罪戾者皆幸生夀考作人之世而然臣既颺言巻末并語諸士其尤不可不知所自也翰林編修臣姜宸英謹序夀宋牧仲僉憲序今年丁卯孟春月僉憲宋公初度其屬州司馬陳君偕同僚數人圖所以為夀者公固不許則相與謀曰盍走京師乞言於姜君乎公聞而色喜伻來請文余謝不敏而以公辱與文字遊且久不能辭也遂徇其請而為之序曰世之䜿功立業草野崛起之士以能自見者不乏而春秋以前名卿大夫都由世族至如西漢之韋平金張東京之黄王袁揚諸名族父子祖孫相繼秉政流光史冊降及魏晉南北朝尤以門第相尚宋歐陽公修唐書如為宰相世系表其言唐宰相才子孫數世而屢顯唐終世不絶迹其所以盛衰者雖在功徳厚薄不在其子孫然而其子孫之賢乃前業之所藉以不墜豈不尤重哉余於唐史中獨嘉李文饒以名公子恥從白衣舉遭際雄主文章事業卓然聳出於唐一代名臣之上而唐之社稷幾衰而復振誠所稱豪傑之士而後世鮮及者間黙數本朝相業於歸德太保宋公首頓一指公當世祖初政用前朝舊徳參預密勿天下方想望其丰采會不久拂衣大業未竟時僉憲公方年少耳風貌清整學殖該富其時見者無不相欽挹以為能為公家文饒者非是而誰未幾起家通守黄州吏事精敏居然有當官聲及郎官比部讞决精明每奏疑獄援據律令傅以經典多從矜恕上官恒屈意從之而吏不得因緣為奸自公在事所全活以無數用是天子異其才特命監司持節通永盖處之三輔股肱郡以觀其所設施而將以大用之也公至則威徳並敷請屬杜絶屬吏望塵逐影竦息帖服雈苻匿跡闔境大治於時公餘閉閤垂頭讀書手執鉛槧口事呻畢乗興遊覧把酒角句主客狎進清言獻酬盖當時所謂雪園文社者零落盡矣公獨振其頽響於簿領倥匆左支右掣之際士類且靡然從風此可謂精力之過人而文章事業兼而有之者也公春秋方富屬當令序開衙召客計爾時之分曹授簡歌九如而效三祝者方鏗耳炫目而余獨以君之濡染家學為能施於有政彷彿於古世家之風故樂從諸君之後為之誦説他日有系公於宰相之表稱為本朝盛事者必有驗於余言也夀冢宰陳公五十序古之大臣佐天子出治其功績隆宇宙聲施溢古今宜無不可釋於天下之望矣而一士之不逹則引以為已憂此一士者亦以為我寧抱道坎坷終身於貧賤吾心安焉彼誠賢公卿耶而不吾知吾之恥也誠知之吾之幸也故有遺棄萬鍾塵埃軒冕而獨感激於一言之知至於窮老而不悔非獨公卿之能知士而然也彼士之所以信之者其亦有素矣如此而猶有遇不遇之異者誠係於其命焉君子之於人也視其人之足以知我與否耳遇不遇之説不以存於其中也某辛酉冬來京師東海兩徐先生曰盍往見澤州公乎當今名公卿能以其學復文章於先秦兩漢之盛者莫踰公矣某心折焉固願聞名於執事然初見公聳峙山嶽邈乎其難企也及厠史局日領謦欬公覧某所為傳志而悦後凡得某之文輒拊掌稱善竊垂老不自量間隨俗為時文尤為公所賞識嘗置某文懐袖間逢人必出與共讀迴環雒誦及某佹得復失業自委命無何每見公相對必扼腕太息輒凄然復起淪落之感而公之於某深矣公今為尚書吏部稽之於古則天官冢宰職也足以進退百僚而今自黄綬以上循階拾級吏部不能以其意為伸縮况得開口薦一士耶然而中外共以公輔之業歸公無異詞者以公不忍於一士之不達而引以為已憂真古宰之用心也昔孔子之人管仲第舉伯氏没齒無怨一事司馬遷傳晏嬰止載其能拔越石父而晉叔向之得為君子亦以能感於堂收噐之一言則夫一士之微雖若無係於天下而觀古相業者必因之如之何其可忽也公太公封都憲公今年稱八十夀某曽為文鋪揚盛事而公亦於今年冬為五十初度自此黄髮台背弼成聖天子鴻業豈有涯哉某謹自述感恩之私以代擪絲吹竹而藉手侑觴於庭亦承公知已之意不敢以浮詞溷也詩曰神之聴之終和且平某匹士之言也邀神之聴意者其在是與閻徴君六十一初度序徒為詞章之學而已聖人之道不存焉聖人之大指在六經能有功於經學者是道之所重也韓退之曰每逢學士真儒歎息踧踖愧生於中顔變於外不復自比於人以退之之才而心屈於儒者如此則經學豈易言乎漢承秦火諸老儒口傳壁匿斯文得以無墜是時伏生傳尚書年九十餘中培轅固傳詩培八十固九十餘胡母生為博士傳公羊歸老於家度年亦當在八九十間張蒼傳春秋年過百嵗獨樂失其傳文帝時得魏文侯樂工竇公一百八十嵗獻樂章即周官大司樂篇也然則經學之不亡者徒以諸老儒在耳天既厄之於秦而又以其傳分寄之於諸儒以黙相而安全之使不夭閼於危亂之世及乎真主出而文學興其所係豈微也哉國家之興五十年矣功令非六經四子之書不以進然士子荒經蔑古於今為甚其陋者抱殘守缺期足應舉而已而一二狡者穿穴破碎聖人之微言以誑誘承學之徒而規取厚利為名髙患將不知所止獨友人太原徴君閻先生為諸生時即能脱落舉子業閉門治經亦不喜聚徒講學日抱遺經校讐傳註得失其辨古文尚書之非真所引據書出入經史百家讀人文喜指摘其利病人服其博而畏其辨卒莫能難也先生於諸經亦無不淹貫然不能拘分刌度繩墨為世俗文字與世詞章之士異趨用此矻矻至老今年六十有一先是一年先生嘗為文告其所知曰先君六十生日以余母之喪未及禫除不忍奪子之服以稱觴遂展期一年而余不可以無遵也適長君復申孝㢘在都至是謀歸為夀徴文於余余特援古儒先以為先生祝謂經術之係於先生甚鉅其夀當逺視古人不難也余行告歸道淮隂將訪先生於其廬平生讀經宿疑積滯無慮數十兾少留相從剖决曹孟徳曰老而好學者惟孤與袁伯業耳余竊自附斯言先生其必有以益我也封君陳公八十夀序前年天子覃恩海内嘉與士大夫於是今大司農陳公得再封其太公為都御史比今年三月制下門下士之在都者皆舉手加頞稱慶而公顧若有所深念者良久曰吾䝉恩遭際至此入侍禁闥備承清問出掌度支與謀國計惟是夙夜匪懈以圖所報稱於萬一者而未得其方乃我親於今年七月稱八十觴矣我兄弟五人中外子女數十輩羅拜堂下顧吾以長子而不得奉沃盥承色笑於其旁也子以為我心能樂否耶某等進曰此乃夫子之所以為孝也經不云乎孝始於立身中於事親終於事君豈非以其得君而仕推其所以行已者於天下使無一夫不被吾君之澤而因以揚親之令名於無窮乎盖仲尼之望曽子以卿大夫之孝者如此若夫屏居子舍朝夕定省以謹修夫菽水之養是則所謂士庶人者而巳以士庶人之孝孝其親夫子必不為孰謂太公而願夫子之為之乎且某側聞太公之為人也少慕漢田子泰之風磊落負濟世志初事舉子業見伯兄侍御公起家成進士慨然曰我可以無事於此矣退綜家務雖好施急病而生業日饒值明季横流寇盜充斥乃出聚家資率親黨築土堡保聚賊往來不敢犯後遂擴其堡為小城而適當國初叛帥反據大同聞太公名必欲招致之公則手裂其書抵其禮幣於地賊怒益師來攻登陴固守數十日得救圍解一村數千家不終陷于不義者太公一人之力也此與田子泰之堅辭袁氏辟命聚衆徐無山中盟誓約束歸命中朝者何異及乎功成身完褐衣蔬食自溷閭井則子泰之不欲賣盧龍以易賞禄之義也然太公濟物之志常存胸臆雖老矣猶亹亹論天下事利病不休既夫子連舉進士官中秘受兩朝不次之遇復慨然曰吾果可以無事於此矣遂摧機息幢於十畝之間訓課子弟務為明理達用期以所學上報君父而甲子之役次公某登賢書諸象賢復蒸蒸起矣聖天子嗣大歴服無疆惟休亦惟是一二耆耇曰篤不忘在昔唐楊於陵僕射入覲其子嗣復方知貢舉率兩榜門生郊迎宴新昌里第嗣復引門生列兩序元白諸名士俱在坐賦詩以為榮異時夫子翊贊元化躋世仁夀而太公安車至止膺憲乞之典某等門下士二百人次第上夀邸中意必有如元白其人者倡為歌詩播之樂府斯乃太平之嘉瑞國家之盛事非獨稱艷於一時一家已也司農公於是欣然而笑曰有是哉是吾父之所願聞也遂命書其辭以歸而侑觴焉大司農陳公壽讌序甲戌春大司農員缺天子以度支重任非得有學識持重大臣付之不可時澤州陳公讀禮家居三年矣先是公嘗長是部及吏部以應陞姓名疏聞天子持司農印特造六里中付之有司敦趣上道公至陛見天顔歡霽慰問寵渥中朝士大夫皆慶君臣相得之盛而知上之所以倚毗公者未有涯也公既莅任一年釐剔夙弊告誡司屬以約束吏胥舉天下會稽之録中外出納之數繩貫絲聨一一時其盈縮而次第布之然其大意無非仰體聖天子恭儉慈惠之徳務以省費節用藏富於民而為國家千萬年根本之計盖周禮天官冢宰所與其屬日成月要嵗㑹以周知四國之治者正古者宰相之職掌故自漢以來居是官者咸謂之計相而本朝以是入政府者亦多有其人公以老成寛大再居厥職天子賴之十四司拱手受成庶績咸理皆感公之賜而不知所以報也于是季冬下浣值公初度辰相與謀舉觴稱祝階下又謂不可無文以先之也以余為知公深者則羣請致一辭焉余謂諸君子曰公等以今日之獲庇於司農公為徳也亦知公平時學問陶鎔涵養所以發輝光大而見之於事業者乎公自志學即以聖賢自期得心法於其鄉薛文清公讀書録比通籍受知兩朝官禁近凡入講幄開陳王道攘斥異端詳端竟委必期積誠感格而後止一總憲綱五長部曹諸所條列動著功令即意所不可侃侃持論絶不為利害小有顧却盖其歴官事業卓有根本者如此至其所著尊聞集詩重風骨文尚體要惟其涵茹古今而出之粹然一禀於正有古人所不得與者故一時知者不敢以文人目之而皆以為有徳之言也今上春秋鼎盛公以魁壘耆碩託寄心膂行將待公從容論道輔致太平而不復煩以政事余幸得厠同列庶幾備聞緒論不致隕越是懼則今日之拱手受成為諸君子之幸者余又竊以自幸也已爰是不辭而為之序李少司空夀序初今年仲春大駕將征漠北既諏日類告乃遣才望重臣分行天下祭告嶽瀆及前代帝王陵寢于是今少司空昭陽李公奉南嶽之命以往甫逾月四月上旬為公五十初度其門下士仕于朝者皆謂公體聖天子重神至意必能恪恭齋祓妥厥祀事受胙獲福于神之靈惟是朱陵之臺赤帝攸館金簡玉文神禹所受數千年以及本朝威命遐暢盛徳洪敷皇上親駕六龍於大漠之庭飈馳霆擊維嶽之神必將奔走趨命之不暇其去來風雨享祀飲食既醉既飽所以保翼我皇躬而蕩滌羣氛奠安區夏者及今凱旋之日肹蠁既著矣先是公未至衡時湖海間旱魃為虐禾未下種千里若焦農夫釋耒以唏守令蒿目坐嘆公下車莅祀祝冊昭告甫畢隂雲來凑水氣上騰曽不崇朝布濩徧野蠻氓歡舞合辭同聲以告於守土大臣謂聖天子明徳惟馨幽明協應而公之精䖍孚感亦宜受祐于天督撫具疏其事旋䝉温㫖識者已知寇不足平矣比公還道過維揚拜太夫人於庭下被褕翟之華奉鼎烹之養親族歡飲上夀閭里瞻嘆以今月吉日入都門適當回鑾飲至之時而公以祀事有成復命拜賜喜可知也公家累世台司當前朝穆宗初年文定公實首揆席與新鄭同心合謀决封貢之策百年狂猘帖首受縻從此邊烽永息中國享無事之福者五十年洎謝事歸里入子舍修温凊禮猶黑頭宰相也東南至今傳為盛事公胚胎家學噐宇宏碩由侍從參機禁襄贊良多轉佐冬官聲望彌起是役也師武臣迪果毅侍從者執鞭弭公亦以明禋奉使翌成大功祖孫遭際前後同轍時議謂上眷注方殷不久當以鈞軸相處一如文定當年詩江漢不云乎虎拜稽首對揚王休作召公考天子萬夀盖腎臣能開敏其先世大功則天子且敬舉萬年之觴其身受多祉無疑也某誼託譜末值公歸舉夀讌而待余一言以侑樽也因即公今日使事而推本其先烈并敷揚國家盛美使奏之賔筵比于聲歌殆不止為公一家之慶云爾京兆吳公夀序國家設翰林院以儲公輔之選其期之甚重而待之甚優每三年一選士教習之然至三年散館之際則例有所去留以出為臺省郎官者相望也至及第三人則無所致問常優游侍從之班不十餘年而踐台鼎斷國是矣然從容養資不經世務論者或以為屈于實用故前朝建議屢有内外互調之説本朝順治間遂遴揀才望出補方面其弊也一出而不復入而向之以才望稱者且沈淪州郡不免有積薪之嘆矣我皇上鋭精圖治尤加意儒臣三十一年親擇宫僚十人改任京朝官使之練習故事親職理政至有所游幸及賜宴賦詩則十人者常珥筆扈從均禮如初盖使人各盡其實用而不至有内外升沈之感至良法也是時語水匪菴吳公以司業得通叅旋擢京兆丞京兆號為天下繁劇丞之職于是無所不領居是官者多自貴重不事事以為常公獨親攬簿書一切案牘以時行下民間訟牒至庭即與斷理一一慰遣之民皆得願以去而吏竦畏之若神畿輔學校丞専掌也每試鏁門圍棘請謁無所通用經術程課而考之以行誼振幽發錮才雋畢達自其前為司成時已然所採録四方名下士無數相繼登鄉榜取髙第去一時負竒抱偉之士無不稱述詩書砥礪名教號為吴公弟子也于時九月上旬值公五十初度辰相與約為詞以祝而問言于余余唯古之為大臣者必魁壘耆艾碩儒公當登第日既以學業聞望推重海内今雖年力强壯容貌豐偉不異於往年而士大夫中相與推老成宿望已無不歸重于公矣以天子素所眷注之從臣貫串古今通達治體又試之以繁劇之任所處無不當而滋謂其可以大用也經曰五十曰艾服官政又曰五十而爵盖天下引領以望公之設施也久矣而章甫縫掖之秀罄折序立階下捧觴以為公夀考之祈者豈獨其私心之愛慕已哉無亦仰體聖天子企望之殷而欲以其身及見明良之際遇意甚盛也余承乏政府自愧報稱無路唯是以人事君之誼不敢有忘喜公之道之將大啓而其年適及乎此時也故不辭諸君子之請而為之序郡侯張公夀序夀之有文起于近世以為養老而設然余觀詩書所載其君臣上下之間動以夀考相期有不待其年之已及而始致其頌禱之意者盖其風俗之淳厚忠愛纒結於心而形于語言言之不足又為辭以文之固其宜也今年春郡大夫張公初度吾邑侯方侯偕其五邑之僚屬請余文以祝之侯見余文而嘆賞以為有當于古之作者而惜世人之不盡知因為座客歴指文章離合反正起伏轉換映帶之法洞中肯綮以是知其究心斯事者已久其能以文章為政事而使吾邑之人民被其徳澤而沾其教化者豈偶然侯春秋尚未及彊仕今三月日為其懸弧矢之辰邑之父老喜而交祝以夀考者一如古詩書所稱而又謂不可無以文之也遂以屬余維侯所生里乃朱蔡諸先生講學地侯與其尊甫沛令某公同舉于鄉比謁選而南纔下車問民疾苦雨潤日暄一當聴斷雷電交發官署肅清㒺干以私以故邑比嵗不登至是大稔民咸以為公徳余嘗慨前朝士大夫之議論苦守令者一拘于資格而才傑之士無所得奮其用今世則不然吏道雜而多端邑令長間得一經明行修之士民望之不啻景慶而其人又有不同者詩丘中有麻曰彼留子嗟言其居下親民所在見理也繼之曰彼留子國美其子本於其父也史稱傅琰父子為令並著竒績時謂其家有理縣譜彼果何術以致此哉無過於以經學相傳授而已漢尹賞誡子以吏殘賊見廢後思必復用薛宣過子彭城令署不教誡以吏職且謂吏能不可學此直佐史故習非儒者所貴公既生長理學之鄉其家庭討論而饜飫於仁義道徳之㫖者匪朝伊夕矣以是小試之於一邑其為吾民之幸宜有過于單門倔起聞見淺狹者萬萬也余聞之長老往吾邑有治縣去而為公卿于朝者宦成里居其縣之百姓相要饋問於其家歴年不絶也吾邑風俗淳厚待公之施澤既久敭歴中朝鬰為耆碩他日黄華白鶴之間有扶擕而羅拜於堂下者必吾慈之人也請以今日徵之已黄昆瞻先生壽序予從事兩館間行十年所得交編修硯之黄先生相與商畧舊聞多所剏獲其為人年少靜氣不以才地自矜炫獨其心所嚮往乃在古忠孝廉節之行講學取友之事故以余之衰老失業人所厭棄而君獨能䁥就之如素交今年春余奉命同總裁東海公還南纂修一統志有同館挽其請行者編修私謂余曰吾亦亟思歸耳顧吾父逺宦塞外吾在此息耗日聞衣食什物所須續往不匱是我處京師猶膝下也吾不可以復南言訖凄然若不勝孺慕之色余益心服其純孝既問之廣平公蒞官行已甚詳則以為編修君之賢其得之家學者有素余于是復思從廣寧公游而不可得編修曰吾父以今年十一月下旬稱六十觴矣公盍以文序吾父生平畧道吾所不得侍養之意而致君相慕之誠其可也余唯唯盖公自戊戌通籍歴今三十年矣初節推劇郡壯年鋭意辦職沈寃滯獄一訊立遣人以其間代守令教養之具聲譽卓然自許功名可立致已緣他郡案牽連鐫級他郡守即公鄉試舉主也是時上官多勸公辨復者公義不以一官易所天之誼從此淪落浮沈幕僚所經黔筑萬里蠻烟獠瘴殆非人境已而南下洞庭東騖遼海計人間危險地巳身歴其大半然所守不踰一令所至動必奏績今在遼數年日以邊邑蕭條居人愁困欲稍為經理之然未盡得展布所蒿目撫心見之歌詩者識者比之元道州舂陵之咏皆知其有憂天下之志矣公宿儒舊望人譽所歸列卿臺省舉足可到方今賢公卿滿廷必有起而為公任斯事者父子接武中朝流光史冊誠甚盛事或謂公懐遂初之志久矣太邱一長公卿再世即江夏父子間名位相懸亦公家故事徳髙位絀于道何損意者行公之志而杖策歸里闔門私第擷商山之紫芝飲南陽之菊水嘘吸沖和頤神養性從容以待聖天子蒲輪之召可乎編修君其亟持吾言以往必有以博公之開口而一笑也大司寇徐健菴先生夀讌序戊辰冬十一月大司寇東海徐公初度之辰其南宫所得士居翰林者三十有七人共謀所以稱觴者於予且曰公所好者子之文也子無固辭雖然夫公之知余則豈徒以其文之謂哉盍即余所知於公者言之余識公二十餘年矣當其為孝廉時即毅然以身任天下之重自後洊登髙第踐歴三事所經渉事變益熟而胸中所貯書益多其入而以孝弟仁義淑其身也如嗜慾之惟恐不得所求其出而宏奬人倫扶植善類也如飲食疾疾之在已其作而謀天下之事也上求可信于君而下求無不可告于人此余知公立身之大端也及其游覽百氏根據六義而發之文章則必其實可以立誠居業救弊起偏而不為一切譎詭浮漫無當之説所惑此余所以知公立言之大端也然又有余所深知而世之所號為知公者或未盡焉則以公之于是其心實有所歉然而未足者也公自遭際分直内廷綜理部務在公少暇日暮歸第坐客請問以數十輩論文晰疑酬酢盡意乃止則精力刓弊對食欠伸微視兩髩垂垂白矣然日以為常不厭也今年春自惟直道忤時拜疏求退天子念其誠欵詔許解職總裁諸館事留直如故公于是閉閤謝客日取周張二程先生及朱子遺書熟讀而精思之俟其反復推尋融釋脱落而久之乃得其所為灑然者比余再三訪之則見其氣益加靜而貌加粹體加充矣記曰君子莊敬日強明道曰人不學則老而衰君子之所謂强者乃在道徳之充盈而不在乎氣血之壯盛也君子之所謂衰者乃在不殖而將落而不在乎年齒之逾邁也夫文章小道也功業外至也朱子曰人常有以自樂則用舍行藏之間隨所遇而安之此公向之所歉然而不自足者余今乃自信其知之獨深也今朝廷勤求化理方待公以鈞軸之任而公亦宜不得懐道匿徳恝然自釋于天下之重然古之君子身處巖廊之上而其心浩然與天地萬物者游彼誠不以富貴移其心也循公之志或者功成于未老之日退而倡明斯道辨統緒之毫釐晰㣲顯之一致其深造也必窮理盡性以至於命而後命自我立其兼成也必理學與事功相配而後體用不至于偏則予請從諸君子之後勉而卒業焉斯為之夀不亦大乎請即以此言進之定海薛五玉四十壽序有士於此不役役于聲利不雷同于世之是非取舍恬澹寡欲而遊于世斯可以交與予固非此弗以友也而少聞薛君之名已而東至海上以隂求其所謂恬澹寡欲不役役于聲利不雷同於是非取舎者既於數十百人之中得其所願交而如恐不得交者兹於薛君遇之焉聞君少時倜儻善議論所至傾一坐中與之登山而臨水雖終日極困不厭意必慷慨自喜之士而惜乎余未之見也葢君今年乙未冬已四十矣或曰君少不得意於有司今適合古强而仕之時雖不遇未晩也予竊以為不然夫古者八嵗出就外傅至十五則凡民間之俊秀皆入庠序王公卿大夫士之適子皆入國學教之窮理正心以修乎身推之於天下國家將無所不備焉既乃升于太學爵命之葢其時日之講貫服習章程之精細詳密有不待二十五年矣四十而仕者極之中人以下也孔子弟子列傳載樊須公西赤年皆極少及孔子時仕度其年皆不滿四十又非必顔淵子竒而後然即令如是士之有才而無命泯滅者不可勝記矣數年間天下競於兵爭災祲疾疫盜賊之患日夜不絶而民之轉死相望矣此宜仁人君子之惻怛於心席不暇煖救之猶恐不及而君子以無事而至四十豈不可惜與使君之堅其才老其識恬澹寡欲以集事其為世利益滋甚而予之為是言者亦欲使世之知有薛子者惜其少年英鋭之氣無使英雄有遇不及時之嘆乗其及今强壯之可用而使天下少享仁人君子數十年之利則凡余所願交而如恐不得之人無事以至于四十者其亦庶乎其鮮矣馮宗一壽序余家縣東巷與馮氏隔水居世相好也自余舞象執經於馮先生之門先生有子曰孟勉曰宗一孟勉與余同庚生幼同學長益相善當甲申乙酉之際經涉横流抛荒舊業而余與孟勉從播遷之餘終日扺掌談縱横王霸之畧無復當世意又以其間商確經史旁及詩賦每侵晨出外舍一榻坐對至夜分始各歸寢明則復然如此者僅十載已而兩家生事漸促余先出遊孟勉繼之三十年中計聚首時或隔嵗不得一見見輒復别去及余旅寓京師孟勉辭余為廣徳之行未幾而元伯見夢生殁異路矣其後宗一數數至京師未嘗不過余余對之便執手於邑常嘆以馮先生之盛徳宜有後而孟勉所就止此疑天道幾不可問又私意謂宗一淳蓄深厚意先生之鍾報將在於是今年余歸里其仲子進謁跪而有請問其所以則宗一已於今年壬申春夀開六十矣曰吾父方客濟上吾兄弟曠焉定省庶幾齎先生之文往而介壽于前一開老人之懐抱余謂宗一神氣充實志畧方壯出其緒餘足以完父兄未竟之業今僅年杖國似不足為侈者然余所以不辭其請者既悲孟勉之不幸又喜宗一之足以幹家于是言之不足又深致其祝辭以將之者葢兩家世好之情親愛之誼有不容已者也侍讀徐公嵇夫人雙壽序代前年癸酉初冬為吳興侍讀徐公七十初度時公元配嵇夫人年六十餘華髮相莊宫諭君偕其令嗣暨諸孫鞠􅎽上壽禮成燕飲雍穆之風縉紳稱嘆未幾公謀拂衣歸山夫人亦以有子侍從足以上報國恩願偕遂鹿門之隠相與棹舟而還疏池藝圃徜徉杖履苕霅之間多古髙人竒蹟稚川丹竈桑苧茶經王右軍陸魯望之徒所觴咏而嘆張志和之所浮家泛宅而游者公藍輿至止未嘗不流連日夕及入而與夫人相對則欣然遂忘其貧以時與子弟坐家塾誦説經史道先賢故老舊事夫人則抱孫含飴分燈課織其旁若無軒冕之在身而禕翟之耀體者其視世之奔遂勢利刓精神勞苦而不知止者何如也今年孟夏夫人始夀開七十同鄉親串莫不嘖嘖夫人之賢而見侍讀公之以老成碩徳與之偕享五福之盛則又爭慨慕之不已㑹宫諭君以逺在京師令嗣任可在家稱祝請予一言將郵致之以侑觴蓋予聞夫人為名孝㢘女素嫺姆訓自盥饋以往侍奉周旋動循禮則某太夫人病困夫人調侍湯劑至兩月不解帶以是妯娌化之一堂聚順迹其閫教古列女不能過也而其佐侍讀公以成名尤為世所難能者公少貧績學名重士林所締交皆海内才儁中更憂患家道轉落然席門窮巷户屨常滿負笈請業者所至成市夫人悉庇具修潔黽勉有無以應之而公不知也壬癸間公既連取髙第列從臣矣夫人彌自謙抑自中外親黨以及村嫗竈婦待之各盡禮意絶不見其貴倨之色所與公相鷄鳴交誡者惟是夙夜在公之誼為惓惓故公在史館凡所撰述進呈天子見之無不稱善所造就成均學者及京兆大比所得士皆矩步詳雅學有家法望而知其為南州弟子侍讀公之樹立偉矣抑亦夫人相助之力居多也自公之歸今三年宫諭君聲望益隆宸眷優渥將以大展公生平未竟之業而君顧思戀庭幃南望於邑本欲因介夀之期歸而承歡于其側也夫人則寓書教戒當國家多事之際臣子驅馳効力正在此時慎勿以吾兩老人為念余與公先後同官氣誼最篤兩舍弟又與公家稱同年兄弟交在紀羣間故每見宫諭君必舉公家庭所教戒者以解其離憂而釋其獨勞之感又為述所聞於其鄉人者備頌美之辭致之賓筵以為難老之祝今主上倚宫諭君甚厚顧惟舊徳必復致公左右潤色鴻業而夫人亦將起居六宫為命婦班行之首此時再奉養京師從容上壽吾知士大夫觀感興嘆者必益倍于公七十時而宫諭君又何必眷眷於白雲之慕乎遂次第其語為壽讌序錢太君七十夀序鄞邑東南有地曰甲村其山由四明發脉迤邐東下迴抱前後水自金峨分派兩流滙合而王氏聚族其間千餘家某有學業至性人也寓京常過予言吾宗望出太原自宋南渡至今詩禮之傳不替不獨其子孫濟美亦代有賢婦人焉髙祖總憲定齋公為正嘉名臣其母金太淑人身教至嚴所遺詩文蘭莊集數巻皆班誡七篇之類也吾子孫世守之先君遭亂棄舉業不治生計蕭條吾母錢太孺人蓄㫖代匱室無交謫先君以是益忘其貧不幸中年捐館愚兄弟三人尚幼也吾母弱婦搘門足不踰閫限内外整整挾筴課子帥以禮訓某兄弟粗識文義以不自墮於昏愚不得罪于鄉黨朋友者惟吾母之教是賴某今恭遇新令幸邀安人封誥上榮膝下將藉此以進稱七十之觴顧非得先生一言不足為鄉閭光寵予聞而善之謂太君之賢可無愧于蘭莊之風也自惟浪遊多載今老矣家鄉名勝屐齒多所未到明春决計請告冀以殘年徧遊浙竒山水先取道金峨雪竇杖策四明二百八十峯中訪其所謂過雲石窗之勝出而艤棹甲村拜壽母于堂就君信宿談話桑麻周行阡陌太夫人其必能減茅容之饌以食我也張母何太夫人夀讌序代蒸民之詩尹吉甫之所以頌仲山甫也其第四章曰夙夜匪懈以事一人明乎山甫之生保兹天子也然孔子作孝經至引之以明卿大夫之孝何哉予以是知山甫之為忠臣抑以其孝子也葢卿大夫之孝非必其晨脩夕膳之是急也如詩所謂王躬是保出納王命敷政四方似與門内之行無涉然必如此乃稱所謂夙夜匪懈者而忠孝之道盡是矣今年八月某日為今京江相國母何太夫人八十誕辰太夫人時在里相國既喜其親享無疆之夀又以身不得歸而洗腆于其側也則屬其數人者各為一言以叙已所以在公而不得即歸之意因而稱述太夫人之徳以資賔筵之一笑亦庶幾乎詩人之義也太夫人之始嬪吏部公儒素耳黽勉有無不自言瘁既而吏部公冠冕南國洊登上第文章聲價翕然増重海内則皆太夫燈火佐讀之餘也及乎内總銓司裁量人物外持文柄樂育人才遂以治行徵為天下第一朝命方新遽返初服此則吏部公之髙風曠致而太夫人能贊成之且又為之潔庭除庀肴醴相與從容舉案有終焉之志是時長公編修君已對策大廷魁天下矣相國與祠曹民部弟兄先後起家甲科今諸孫天門復捷南宫選入中秘詩書之澤相望也自吏部公殁後幾十年而門户鼎盛日甚于曩時此孰非太夫人内徳之所成就也者而一不自矜每見有所遷陟彌加抑損朂子孫以無忘先公之遺誡相國偕其兩弟謹守家訓清白自將用以上當帝心綏和有夏則今日海宇之羣帡幪于相國燮理之徳者又何一非太夫人之賜也耶太夫人雖夀八秩筋力不啻如盛年時嘗綵輿畫舫就養南北間屬今初度之辰三黨姻親雜沓上壽里閭子弟踵門稱慶而京師縉紳及四方知名士亦無不躡相國之階效華封之祝者吾聞之昔三代之盛鄉飲酒禮燕禮皆堂上鼔瑟歌鹿鳴四牡皇皇者華是為工歌三終明君臣之相得也既歌而笙奏南陔白華華黍是為笙入三終見家庭之和樂也外盡君臣之誼内洽家庭之歡所謂夙夜匪懈以事一人為卿大夫之孝者于今日張氏之堂見之矣今聖天子方孝養長信宫盡愛盡敬徳教洋溢而相國適當此時亦得致其不匱之意於所生雖其隔在數千里之外其與朝問膳而夕視寢者何以異也余不敏備官卿貳幸從稱觴之末而樂觀其盛是為序送姚子南歸為其母夫人夀序今國家定制仕宦無兄弟者得歸終養而凡仕于京朝之官歴俸六年例得請告歸省此制初不見于三代之世葢三代仕者舉不出父母之邦茍非行役在外則朝温而暮凊日可無廢故終養之典不著然其君之所以體恤乎下下之所以仰望乎上者猶惟以將父將母為惓惓一不得則君懼無以使臣而臣亦不免哀怨以思以懼其不能盡心于所職如北山之歌陟岵之感是已况于後世背離膝下踰越數千里以事君而東西南北之唯所命夫至是而不思所以審處而曲慰之者有國家者之過也至于例許得歸而不歸吾未知其何説矣余在京師久所見公卿間多以官為家其位益峻禄益厚則决去益難有未葬不除服數十年而襲紫衣朱自若也葢縉紳之清議不立久矣大臣如此則下何觀焉以故風俗日偷而盛朝光明駿偉之烈不炳燿于世甚非所以稱聖天子以孝治天下之意一日友人姚子歴初過余辭行問其奚往姚子曰吾母以明年正月屆七十夀行歸省欲得子文以佐觴耳余曰今仕宦于京朝者絶不聞以母子相依為人生可樂事子以寠客思親急裝出國門意不返顧天下名教獨身任之固當既又曰夫子之親亦幸子之不為士大夫耳不然子亦且如諸公者以身許國之不暇雖欲返歸衡茅烹鷄炊黍召㑹鄰里上壽於老人之側得哉子姑行矣勉之然姚子積時求養於外一旦以親故垂槖而還不以介諸懐其志趣過人甚逺使異時得遂其禄養意其樹立必不出古人下風俗之變而清議之立吾不于姚子有厚望乎姚子尊甫文學公為先君執友余垂髫數過其塾太夫人輒飲食余視余如親子弟以故諗知其閫徳甚詳既稱未亡人治家内外整整收祀參議府君而上失祔之主數世疏數有序魚菽之薦必潔以誠其大者如是則其他所及以貽為歴初兄弟無疆之休者可知矣余客居無狀先太孺人厚終之事忽忽未舉者有年每拊膺旁皇中夜不知所出而樂稱姚氏母子之間如此者豈敢以望於人亦因以志吾之愧而已送申學憲赴任過里為茅太夫人壽序今僉憲申君任禮部郎至京未久也太夫人在里春秋髙矣每思念不置會粤西督學使缺廷議擇可者乃越次以授君君一不自喜而以益逺太夫人有愀然之色又念是役也當過家省覲而行適値某月之初太夫人八十初度則求于能言之士為詩文進之以冀太夫人之一笑也以慰其離憂之思而請某為之序愚維古之君子其未仕也有為養以求仕者矣及其既仕也有以不得遂其養為憂者矣故方其憂不及養則惟恐其仕之不早及其羈絆于王事馳驅於道路而汲汲然憂不得遂其養之志則其視一官之為累也又惟恐其去之不速此二者皆過也夫親之不可以無養固也若夫仕不仕天也而豈吾之所可預必其間者哉惟有道者不然時不吾與蓬蓽而行粟水而奉非儉也時已遇矣道已行矣而内顧吾私有不可以兼遂者則資于事父鞠躬盡瘁而初亦無害于吾之為孝葢事親誠則能使親忘其貧事君忠則能使親之不樂私其子使親忘其貧者士庶人之孝也并能使親之不樂私其子者此可謂卿大夫之孝也此古之君子所以推心任運無入而不自得者也曽何有于二者之足患乎吾聞太夫人故吳興副使鹿門公孫女及歸為相國文定公諸孫婦佐先大夫成名而以盛徳稱中外閫範者數十年彼其於君臣父子之義講之有素則于僉憲君之是行必有欣然願其去而樂其志之得行者也君以此思之宜其中亦無不可灑然者粤西當用兵之餘王化再沾人文日起計僉憲君報政在三年大比之後復取道里門北上而是時太夫人方健飯于是隨計偕諸生執經逡巡磬折階下後先而上夀亦人事之可喜者也僉憲君益可無憾于是行王母申太孺人夀序康熙二十五年蘇州府縣學諸生以王母申太孺人守節狀請旌自縣以次達之撫院旋以事聞奉㫖給銀建坊如制鄉里莫不謂榮再歴年而太孺人春秋稱六十矣于時嗣子東發方以才選載筆史館暫假歸省其同年生二十九人謀所以稱觴者以余之同事館局且知其兩家世澤甚詳遂請一言附東發之行而往夀焉余觀太孺人之苦節及東發之能以才顯揚其親使卒有聞于載述而益嘆文恪公之遺徳逺也當明宏正之際八奄亂政大臣相繼斥逐宗社阽危公甫入政府苦心調劑嘗論逆黨以士大夫之可殺不可辱所保全善類為多然終于不合潔身逺遁當時大臣之能明于去就不罹清議者惟公一人而已其自贊曰貴戚赫奕不能附麗權璫狂猘不能媕阿一有違言超然不辱葢實録也自後子孫承藉先徳咸能以名節自砥至於閨門肅穆家法之嚴整尤為吳門士大夫家稱首若太孺人之艱難守死其尤著者也太夫人曽王父曰文定公事在國史植根華閥夙嫺姆教嬪于先府君織絍佐讀宛然寒素也甫年二十四而遭變時即欲以身殉姑涕泣曰吾不忍見婦與子一時畢命即如此藐諸孤將誰託太孺人感之勉進飲食既而朝夕所以奉養其姑者益䖍無懈殁而殮送之如禮時節薦享之必竭其誠宗戚内外皆以先府君為未亡而喜見東發之成立者至叩其學問蓄積又以為非得嚴父之教何以至此葢太孺人之于王氏始終稱無負矣今聞其女嫁松陵沈氏者亦早失所天勵節如母氏以此服太孺人之身教不獨能成就其孤而且有以化其女子葢文恪公之流風遺澤逺矣彼其沾溉於數世者如此其盛此所係于人心世道非獨侈為一家之僅事而已也余聞之禮云寡婦之子非有見焉則勿與友此非以戒其友葢所以深責備于其子者也非有見焉則勿友矣苟有見焉斯友之矣東發少遊京師發聲太學最久服官禄養為二十九人者譽之無異辭且欲自同猶子以介夀於賢母之側惟恐不得其歡心此其家庭朋友之間皆有可重者也余故樂敘其事而傳之贈董子為其母夫人壽序往年晤董子吳仲湖上時余未識董子董子亦不余識也接其容藹乎其可親與之坐久之雖儔人廣衆之中有以知其為董子無疑也董子尊君孝㢘公母范孺人皆長余兩大人年三四嵗兄弟四人皆讀書修行足繼其家聲每家庭侍寢膳議論古今事成敗雜以鄉閭耆舊事迹可傳述者輒人出一見持不能决請之尊先生然後得定其一家師友自足娛樂如此而余兄弟三人無他技能足以稱家大人㫖又時時扁舟逆旅動輒數年或逺間三四千里外一遇佳節時至衆歡獨酌之際則對食悲愁以思雖居者亦泫然不知其為樂也以此不及君兄弟逺甚然董子之言曰菽水吾大人所甘也吾力尚不能具今人間言養親者則曰孝在志養奚必甘㫖哉是竊取好名自予而極其志至於以天下儉其親不顧也吾不忍為之故與其兄三人日夜攻苦不絶庻幾少得所欲則築廬于山水之濵具車輿几杖弋于野而釣于淵奉我親以老焉吾豈有求于彼哉而其志適有與予類者今年秋為其太夫人五十初度問予一言為夀予謝不敏而贈董子以言使其歸即為予跪進之可也顔母朱太宜人夀讌序唐李文公翺自稱其序髙愍女楊烈婦為不在班孟堅蔡伯喈下其言以遷固敘述之工故讀者詳而事迹愈著而嘆後作者之不盡然此固然矣余以為古忠臣烈婦之不欺其志義炳日月雖其文之不工于傳無害况其原無待于傳耶惟其勢窮運極瀕于阽危矣乃事會之逢適有天幸名完而身亦不虧以至富貴顯榮享有夀考此豈非人生之至願而古所稱吉祥善事者耶則雖其心之無待于傳而因事咏歌頌述之以風厲于天下宜其聞而興起之者多矣余自少聞客談闕里顔太宜人壬午殉節事至烈私謂所嘗見古所傳烈女間有其人晩近世决無此事然貯之胸中已三十餘年今居京師與編修考功兩君遊始知兩君皆太宜人所生而與奉直公所親教督而長成之者葢太宜人今年已屆七十夀余向所疑古烈女傳僅有其人者今果得親見之謂古今人何遽不相及又見其富貴顯榮夀考為天之報施善人而嘆古人之身名俱泰所謂吉祥善事如此類者何不數數見又疑今人遭際逺勝于古也盖太宜人為故奉國將軍某公愛女以天潢貴冑作嬪于奉直公大賢世裔嫺于禮教者素矣方其出與奉直公同難也倉卒被驅邏卒詈不絶口卒擊折其左臂將加刃焉散髮披頸不殊僵踣道左積日始甦以指自刺指强不得入則取隣女所擕刀自頸人不入時沍寒夢神人䝉以絮而明日小婢來伏其旁呼之忽醒有遺奉直公以金創藥者傅之得無恙夫節義之報不疾而速如此此所以更三四十年後綿慶延祉益繩繩未艾葢有神相之者然也今朝廷恩數重疊自初封孺人累三封至太宜人京師士大夫多編修考功及季子孝廉年家故舊稱詩上夀以百數余愧不文無能敷揚盛蹟勒金石而播管絃也異時太宜人年益髙國家太平益愈久嵗時置酒髙㑹戚里抱曽元膝上絮述年少亂離百死一生之狀歴歴如在目前于是相傳為承平世家盛事必有班蔡之倫載筆而紀其烈如李文公所云者矣當是時也殆亦有徵于余言也歟徐母李孺人夀序今年辛酉夏為徐子亦沆元配李孺人五十初度孺人父某公于吾母為中表其祖大理公之館甥于吾外家孫氏也與先君子為忘分交孺人之母葉也婺居苦節嘗隨其姑歸迎車廐里第與吾母居止情意甚欵時孺人纔數嵗然已能盥櫛衿纓隨母定省姆傳授内則女誡畧能上口舉止如成人矣後歸亦沆吾母嘗嘆曰徐氏有婦矣以大理公之盛徳而無後天其或者鍾報于是女耶當是時吾鄉承兵燹後巨宗勢族日就零替大理公之舊業已不可問即亦沆先人侍御公瓢笠入山溷迹緇衲亦沆竄身荆棘中數從其尊甫風飡雨宿暇則膏筒鉛槧摘次呻吟不問家人産孺人于時孑然季女也搘拄中外租籍市券手籌筆疏各有條理上恤姻黨下撫婢僕恩意周到無不人厭其心以故亦沆得一意學殖名譽日起又能以其餘力佐夫子課三嗣君成立今皆補學宫子弟籍有聲矣向微夫人則亦沆之艱難固當百倍意天之憫李氏而鍾之報者適所以為徐氏之福耶今春予寓郡二子澤泳謁余而請曰吾母天性孝友念外大父母蒸嘗逺隔則設像于别業以祀之嵗時擕諸甥上塜酌奠而去歔欷竟日自恨終鮮兄弟而以公之逺托於中表也能縷述其家事故嘗冀聞公之言以為喜今誠得公文以侑觴庶其足慰母心乎余自罹家難神思耗潰絕未嘗為人作文字然每見母黨輒憶吾母生平不置故能為孺人夀者誠莫如予宜孺人年纔半百偕亦沆從容舉案三子雍睦諸孫五六人奉觴而進之鄉里傳歎以為盛事故知天之鍾報於其身者信未有艾也微二子請余其能已於言乎湛園集巻二
