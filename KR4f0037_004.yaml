body:
  text: 湛園集卷四翰林院編修姜宸英撰論東漢文論西京承戰國先秦之後故其文雄峭多竒氣朝賈諸疏是也承平既久士氣薾弱見之於文章者為嘽緩曼衍而不振朱子所謂衰世之文也東漢因之雖以光武之講論經理明章之崇儒重道而文體日趨駢儷遂濫觴晉魏六朝不能遏也豈風氣使然雖甚權力不能與之爭乎昔司馬遷文尚矜竒故公孫宏董仲舒傳不録其對䇿而班固收之東漢之書成於蔚宗其所授述時人書疏多更刪潤是三書者遂各成一代之文則著作之家固風氣所從出也可不慎與然東漢人矜名節師弟傳經期作明理而已與夫西漢大師相授受為發策决科取青紫者不侔也至魁壘耆碩正色立朝封事屢上讀之有使人欷歔絫涕者其為益於名教甚矣豈異時杜谷輩淺儒所可望哉而郭泰黃憲徐稚之倫文辭不概見何與夫人之信有得于已矣則其於外宜有所不暇者此又學者之不可不知也梁將王景仁論王景仁嘗為楊行密將而救兖州斬朱全忠子友寧于陳全忠自鄆州還攻望見景仁指揮歎曰使吾得此人為將天下不足平也後景仁以楊渥之攻奔吳越全忠遣人召之因間道歸梁全忠者唐季之羣盜耳然頗能用其術籠罩豪傑得其歡心以景仁之屠殺其子而不怨反寵任之以為大將可謂有英雄之風矣卒能脅制羣雄遂其逆謀非偶然也昔者田橫烹酈商之兄食其不忍與商比肩而事高帝吾獨怪景仁者親戮其君之子䝉恥而立于其朝于是乎喪其羞惡之心盡矣且彼亦未審利害之熟也何以明之夫將者以氣為主氣以心為主氣之餒焉而欲其將之無怯不可得也心之不安焉而欲其氣之無餒亦不可得也考景仁自淮南歸梁之後終其身僅兩將兵一為北面招討使帥梁精兵救趙與周德威戰大敗于柏鄉橫尸數千里一攻廬夀軍戰于霍山復敗走遂以亡梁視其為王師範力戰青州時召諸將飲酒飲已復戰左右顧盼氣吞强敵彼全忠者方且從高望之而動容太息又豈能料其後之摧折若此哉此無他殺其子而食其父之祿其心有所不安焉則其氣之餒而不振無所往而不躓焉宜也昔亷頗嘗為趙將矣已乃避讒之楚戰輒不利曰我思用趙人頗非宿怨于楚也一為趙則利一為楚則不利夫非其氣餒而不振之故耶又况于䝉面事仇亷恥道喪而欲其立功晚蓋難矣此禮所謂僨軍之將亡國之大夫而孔子以為不可與于矍相之射者也五代之際其人才本不足論吾悲夫世之功名之士苟且祿位自託于射鈎斬袪之遇而不知其卒無所成也孟子曰枉尋直尺而利亦可為與今則尺亦不可直徒枉而已矣然且相率而為之者何其不知悔也故因景仁之事表而出之為世大戒春秋四大國論齊晉秦楚歷世之修短吾既已言其故矣然此猶論其大勢也非其所以受病之處夫人之禀命於天夀天不同然其將死也必有其所以受病之處知其病而消弭之於早則病者可起死者可生不知其病而預為消弭之則亦已矣晉之六卿齊之田氏此其受病之處也國之有强臣如身之有痞疾齊晉之君不知消弭而聽其塊然于胸膈之間方其未發手持足行耳目便利視之猶人也及其既發而塊然者已不復圖矣秦楚之君之治其病也唯不待其既發而圖之故其治患也不勞及其患去而國之元氣亦以愈固蓋權臣之竊其國也類非一世之所能為也其積之有漸故其治之有因且其初非必皆國之小人也彼陳敬仲趙文子之徒豈逆知其子孫之有是事哉勢之所趨極重而不返則雖有賢明之君忠正之臣常不能保其後之不為亂夫秦楚之君之善治其病也亦揣其勢之所必趨而逆折之無使之至于不可反斯已矣楚之有令尹也此大權之所萃也令尹之佐有大司馬左右司馬政出於令尹而兵柄則分掌之司馬子木為相為掩為司馬使具賊數甲兵既成以授之子木故曰司馬者令尹之偏王之四體也昔者子元鬬椒俱嘗為難于國中矣既不旋踵身被禽滅其時之家臣宗老不聞有擁甲以觀變者兵柄不屬故也令尹之權既分而其制國也尤有法分國為縣縣設公以處之內有變則入而靖亂于內而强臣不得縱恣以為內之大患子元伐鄭還處公宮而申公鬬般殺之白公稱兵而葉公諸梁自蔡入而討之是也外有患則即發其縣之賦以征討於境外救鄀之役申公子儀息公子邊以申息之師戍商密繞角之役公子申公子成以申息之師救蔡隂地之役司馬昄起豐析之衆以臨上雒是也齊晉大夫之有采地以封植其私家故曲沃據而欒盈叛邯鄲入而荀寅叛晋陽修而趙􅀈叛渠丘封而雍廪叛而楚則不惟使之不可叛而反能因其力以外備諸侯而內制其强臣齊晉之衰以家之有藏甲而楚以令尹之權欲舉國而唯吾用之而且有所牽制而不可動其制使然也楚令尹之權既分其制國也有法而其因事杜害也尤有漸昔者子南為宰其士觀起無祿而有馬數十乘康王聞之車裂觀起尸子南于朝薳子馮繼之所寵者有馬八乘聞申叔豫之言謂之生死而骨肉夫宰臣之寵士而使之有馬自常情視之非甚大罪也然楚之君臣涕泣相告若危亡之立至而誅殛隨之則其慮患也不亦密乎秦公子針出奔于晉有車八百乘謂晉大夫曰若能少此吾何以得見乃知秦與楚同一氣也公子針親景公弟終景公之身不敢以返國則人臣而富者是秦楚之所深仇也其後秦昭王一聞遊士之言逐穰侯華陽君之屬而出之境若去毒螫夫秦之日夜思芟鋤强臣而欲已其病者如此其至也故封建之不得不廢亦其勢然也秦之祖宗固欲廢之矣且此豈獨秦之意使秦不得天下六國之君得之吾知封建亦必廢何者强臣在一國則一國病而在天下則天下病也自漢以還封建廢而天下未嘗不治秦廢封建而以無道行之焉此其所以得而復失之也二氏論朱子謂佛氏之書其徒採取老莊之㫖為之其後道家既失其傳反竊取佛氏經教之最膚淺者為道經譬如巨室子弟亡失其先世所遺珍寶乃從其人竊得破釜甕之器誇之以為已有由是言之佛與老雖異其言初不異也其說精矣然自東漢至于宋未有分佛與老為兩人者也袁宏漢紀西域天竺國有佛道焉其教以修善慈心為主不殺生專務清淨其精者為沙門沙門漢言息也蓋息意去欲而歸于無為此佛教初入中國之言也而所謂清淨無為者則老氏之說矣東漢楚王英傳晚節更喜黃老學為浮屠齊戒祭祀桓帝立黃帝浮屠祠于宮中言黃老即曰浮屠者明其為教本一也至襄楷上書桓帝始言老子入􅊂狄為浮屠道經亦云老子入關之天竺托生維衛國王夫人晉顧歡􅊂夏論亦云又于闐西五百里有比摩寺云是老子化胡成佛處其言固怪誕然楷東漢人時佛教流傳中國尚未久其言當必可徴孔子思行先王之道于東􅊂老子悲周衰去之西域為浮屠亦其類也而或執所聞見以為難信吾意老子出關之後其去留存沒當亦不至寂然無考使其一無所傳述既以屏棄老死長為戎羌之鬼矣則孰與其以柱下終也而自﨑嶇于流沙萬里之外此何為者太史公書言老子即老萊子年百六十歲又云二百餘歲又疑為太史儋夫老子一人耳一以為李耳一以為老萊子一以為太史儋當其在中國時已難定其踪跡如此則去之西域一變而為浮屠亦理之無足疑者也孔子曰龍吾不知其所變化此為深知老子者至其徒始髠而自私其教曰吾佛也彼老之徒方瞀然不能復名其師之說然後二氏之黨始判然其不可一矣豫謂今之為老之學者譬之老氏之嫡子也為佛氏之學者譬之老氏之庶子也嫡失其世守而丐貸于庶子之家則今之道家之謂矣然其本固一也尤可異者若今之儒家者流剽取釋氏虛無幻妄之言一舉而附之孔子講解傳習流染蔓延是真所謂竊人之餘以為已寶而不知愧者也然而道家之惑以其先世之失傳耳至吾孔子之教五經六藝之文譬如日星之垂列江河之流衍蔽之而愈明淆之而愈清一舉正之斯昭昭然白黑分而邪正别矣是其寶固未嘗一日亡也舍其家千金之璧而羡人之瓦缶釜甕以為美然且不惜穿穴而求得之若今之儒者是二氏之徒之所竊笑者矣黃老論漢自曹參為齊相奉蓋公治道貴清靜而民自定其後相漢遂遵其術以治天下一時上下化之及于再世文帝為天子竇太后為天下母一切所以為治無不本於黃老極其效至于移風易俗民氣朴素海內刑措而石奮汲黯直不疑司馬談田叔王生樂巨公劉辟疆父子之徒所以修身齊家治官涖民者非黃老無法也蓋漢當秦焚書之後詩書放失其一時之人心志耳目蕩焉無所寄而黃老之教不言而躬行縉紳先生之所以口傳而心授者所在皆是則乘其隙而用之以施於極亂思治之後故其致理之盛幾及于古淳悶之化余考班氏書為黃帝書者幾家為老子書者幾家大抵皆出于漢初人所為所謂莊周者備道書之一家而已太史公書雖老莊申韓並傳不聞有以莊子配老氏者古今人表僅次周于第六等中下之列則當時之所尚可知矣蓋老子之教以虛無為本以因循為用而其㫖卒歸于治天下莊子者徒樂為猖狂恣肆無涯涘之說以自放其意而已觀其人雖有聖人者出將不為用也而魏晉間之樂縱誕者必曰老莊習其猖狂自恣無涯涘之說欲舉之以移易夫天下則天下幾何其不亂且亡矣而老氏之弊豈至是哉漢武帝表章六經羣書輩出黃老之教漸微然儒者曲學阿世文士浮薄無用在朝之臣僅有一董仲舒能明王道而不能用漢治亦愈衰于前豈孔子之教不如老氏哉老氏得其傳孔子之教失其傳故也自孟子殁後數百年而得一董子又千餘年而後宋之諸大儒出焉發明理學體用微顯之要然後世始曉然知儒者之學內足以治其身心外足以開物成務以致乎天下國家之用而卒不知所以用也則孔子之道之得傳于世其亦難矣士先器識而後文藝論士先器識而後文藝是已以四子之不遇早死驗其器識之淺薄此為不可夫器識豈可以貴賤天夀論哉審如此言則屈原為浮華之祖離騷為導淫之篇而子蘭子上得先幾之識䝉老成之譽矣昔先王于矇瞽侏儒百工一技之士必有所以區處之使不至於失所况文章為天地之精氣所存士得之百無一二為國者豈可不知所以愛惜之哉若慮其浮薄而預為之教以要之有成如古大樂正之法斯可矣不宜反挫抑之使不竟其用也王楊盧駱杜子美至比其體為江河萬古之流自唐及今如四子者代不幾見雖其淹鬱于一時終炳爍于後世以視彼名德不昌而坐享期頥者其器識為何如也明劉健亦賢相薄何景明不使入館閣夫館閣儲文之地以景明之才猶不得入不知朝廷設此何用健斥李杜為一醉漢吾知使生李杜於明時其受屈抑必甚於開寶間矣大臣不重文學此非細事則天后見駱賓王檄已文曰有才如此而使之淪落不偶宰相之過也一才士淪落至歸過宰相此真人君之言其能籠絡豪傑使為已用亦非偶然也蕭望之論班固曰望之堂堂折而不撓近古以來社禝之臣豫謂望之守常而不知變知嫉小人而不能容君子社禝之臣豈如是哉始望之與史高同受宣帝遺詔輔政而高者帝肺腑之親也昔魏相謀去霍氏之權因平恩侯許伯奏封事復因許伯白去尚書副封以防壅蔽是時霍氏雖切齒于相而終不克加之害者以許伯之為主于內也史高雖與恭顯相表裏然為腹心之疾者恭顯也恭顯去則史高者一豢飬之具臣耳何足患哉為望之計莫若姑舍史氏而無與之爭且與之周旋于其間設疑而多為之間則其黨可離而恭顯可逐也不知出此乃欲一舉而並去之夫與人同受顧命于先帝未聞其有大罪極惡輔政未幾而其所排擠者乃在肘腋之間此自常情視之亦必以為疏離骨內專權擅勢也二語用望之獄詞况元帝暗主哉卒之使恭顯得見德于史氏而藉之口實者望之也望之可謂不知大計矣且恭顯之宜去不當在元帝而在宣帝之世宣帝任用法律寵二人以為中書令樞機之重歸于宦豎昔蓋寬饒嘗知以此為患矣以其地疏而言訐故終于不納望之為宣帝敬信大臣則當力陳履霜之戒請還中書之選更置士人罷二人而去之宣帝明主必能見聽不聽則以去就爭之可也既不能防患于未萌之先而徒欲强制于橫決之後固且不可况宣帝以法律任恭顯而望之先以法律佐宣帝則豈唯不能去之抑且教之使用也何以言之嘗考宣帝之世無罪臣之被殺者四而獄成于望之之手者有二焉始附魏相則劾趙廣漢後去左馮翊惡韓延壽之聲名出已上因劾韓延壽二獄詞之上史皆云天子惡之惡之云者史臣之微辭也蓋其文致之乃有以深中其忌矣夫其果于用恭顯而不疑者以此哉吾觀望之量狹而妬前以霍光輕已則謀霍氏以丙吉居已右則短丙吉馮奉世斬莎車王大功也而止其封爵張敞舊交也元帝欲大用之則沮之使抑鬱以死夫張敞與廣漢延壽奉世之數臣者皆强幹忠正有力之人也望之縱不能前去恭顯使其能保全善類隂留之以待嗣主之用則危疑之際必有所濟計已大失至于顛仄乃反恃一憸邪讒讇之鄭朋而寄之耳目焉欲以是除君側之惡豈不悖哉大臣當國如望之之所遇不可勝數欲治小人則當先散其黨欲小人不為害則莫若內植其君子之交既不能用小人以外披其心腹又不能樹君子之交以自固其氣勢反使小人得以乘機抵隙于其間終至禍發身死害貽國家未可謂之不幸也周亞夫論劇孟特一博徒之雄耳吳楚七國反周亞夫至雒陽得孟喜曰吾以為諸侯已得劇孟孟今無動吾據滎陽滎陽以東無足憂已恃之隱若一敵國此言詐也戰國時齊田單與燕戰自言天與我神師求之軍中有一小卒妄言我乃是單即東嚮事之以令于軍中敵人聞之皆以為燕得神師也此兵家所謂詭道也亞夫提孤軍入梁郊七國連橫之師正鋭當此之時天下洶洶向背未有所定然其衆烏合易搖也而劇孟方以任俠聞天下故誇七國以劇孟而疑天下以七國之無能為所以亂其謀而解其勢嗟夫亞夫雖倔彊人其用兵顧多竒計能制敵所不及料故卒能困吳敗楚饑其軍而叛散之走吳王而斬之東越豈彼博徒者之足係其輕重哉方七國之兵起也在漢則有若鄧都尉料敵之神在吳則有若鄒枚見幾之早臨敵决勝則張韓弓高灌夫欒布任安之輩或在梁軍或蒞漢將莫不併智協力以成大功而劇孟碌碌其間漢賞亦不及異時亞夫上功之餘亦不聞有所薦揚也其不足為輕重明矣故愚以為亞夫之喜得劇孟也是齊奉小卒之智也蘇秦張儀論蘇秦張儀皆天下之辨士也然秦嘗自謂才不如儀是時秦方說趙王相約從親以擅有關東之政而使儀得用于六國則其寵移矣故召辱儀庭下又隂資之使西入秦然後秦肘腋之患始去當此之時儀方感恩之不暇又何暇顧墮其術中則不得不反而為吾之用故亦曰吾不及蘇君明矣以此知兩君者其平時皆以才相慕又相軋戰國之士多竒變而其術非從即橫故皆不可以並立于諸侯之國龎涓之于孫子心害其能必欲計除之故反為其所殺如秦者可謂工於用妬者也然自儀入秦而六國之患日滋終于破從解約暴秦過惡為天下笑非儀負秦且說士之常態也則孰與久要以成其業哉秦始皇論人之所由存者神明也其亡者神明去也斯則形骸之不能為人存亡也審矣彼秦始皇之求神於海上以為仙人不死之藥可立就而安期羡門之屬可招手致也吾怪其求之如此其至然竟隕沙丘為世無神仙不死者夫其治徒驪山上具天文下錮三泉罄百萬家養生送死之具以照狐兔于泉下則可謂至愚者矣夫吾骨已朽矣而此纍纍者獨何為哉蓋彼方以塊然能飲食之軀為可以致長生後天地者故深居宮中極土木之麗美人鐘鼓之奉如雉之護尾雀之守翠不知其有水不濡而火不熱者在也斯盧生徐市之徒得因而市其利趙高胡亥之謀已成于外螻蟻已思穴其臟腹腎胃而猶以形骸為性命之所寓也因循不悟以至于死然猶且戀之徒滿藏而瘞焉不謂之大惑與老氏曰吾之所患以吾有身故君子後其身而身存愛其所患內其所外指路人以為之手足誠又惑之惑也故神明之于形骸也祭祀之于芻狗也存則藉其用去則委諸地而已漢文帝終身節儉遺詔薄葬史傳其嗜黃老家言此始皇之不得為黃老歟續范增論夏商之季其君無道而湯武誅之以臣弒君而不謂之篡取其天下而居之而不謂之貪何哉其故在于順人心而已夫天立君以為天下也彼斬刈其民惟恐不勝而吾出死力以除之以救民于水火之中則亦安然以為爾之君已矣二世之惡浮于桀紂關東之師正于湯武于此之時而有能顯暴其罪于天下奮不顧危如夏商之季之所以誅其君而弔其民者雖為之君可也惜乎項氏有取天下之資而范增以其計誤之也方項梁與羽謀殺會稽守西嚮渡江以會諸侯之師約共亡秦非有所禀命而行也以項氏之世將聞于天下非如他之所謂暴受大名不祥者也當此豪傑並起智略輻輳之際角帝而帝角王而王風起塵涌以爭勝于鋒鏑之下者何可勝數增也以七十之布衣與羽相遇抵掌而談當世之務不乘此時導羽以收拾人心延攬謀士急伸大義于天下而特勸之以扶立義帝提牧豎之手加之十數强悍諸侯之上增以為非此不足以制秦之命乎夫無故而奉一無功之匹夫甘心以為之臣而不辭雖聖賢有所不能增以羽為終能臣事之乎推增之心不過謂藉其虛聲可以速致天下耳不知懷王以嬖讒客死楚人特憐之而非有德於天下也使天下樂秦願為之死雖百義帝何益不然秦之當亡誰不知之天下方皇皇焉欲得吾以君之而又何有乎無功之匹夫取其昏庸殘孽相率而為之下乎且增亦未聞天下之大義也夫既一日而為我之君矣則其勢不可以復臣非勢不可理不安也彼范增徒目擊夫廣勝之事詐稱扶蘇足以鼓動天下之視聽而不顧其後之將有所不安夫即使其後之幸而獲成也亦不過如莽操懿裕之故事名為揖遜而其實足以詬厲于天下及其不成則相尋于廣勝之餘轍而已嗚呼此山林草竊之見赤眉王郎之所以踵死而不悟者孰謂好竒計者而竟出於此耶議者曰羽之失在不先赴關中而急救趙俾沛公得因之以取天下是殆不然羽之救趙義帝之命也羽安得而違之乎帝之約曰先入關者王之顧獨遣沛公而令羽救趙以後約絶之使不得終王關中此見殺之由也蓋權有所制則其勢自有所不得伸而其計將有所變故其使羽負惡名于天下者增也若夫沛公既轉戰以及關中矣此樊噲所謂勞苦而功高者而增也于羽之焚燒咸陽誅戮子嬰天下成敗之關其孰大於此乃卒不聞一言以爭而惓惓于擊殺沛公為事一沛公可殺諸侯之謀士如雲秦民之思漢日甚增能悉制之無一反耶亦可謂愚而拙於計矣夫沛公義帝之所遣也苟可以成項王之事者增猶將不顧其不義而欲殺之何有於卿子冠軍議者謂殺卿子冠軍者是殺義帝之漸也不知此亦增之謀也增之去羽不于羽殺義帝之時而于羽受漢間之日羽之疑增亦不于義帝未殺之前而於漢間既行之後然則義帝之死增亦與有力焉况增之資漢以名也非一日矣彼義帝亦幸而見殺于楚以死耳使其不死以及于漢之將王漢將安所處乎度終臣事之不能也計無過封為大國名不為臣拱手揖讓以代之君其去于九江之利刃一間耳而縞素以從天下卒使漢之得委罪于楚者增之謀實為之也或曰漢王長者必不為此是又不然人情之重孰如父子方羽之與漢王臨廣武而軍而置太公于鼎上也其危不容以毫髮而漢王且從容而謂分我以杯羹夫其親之不恤而何有于君哉吾故曰增之資漢以名也夫楚得增而亡漢用子房而終以獲濟亦其謀之有善有不善也初楚圍漢滎陽或勸漢王立六國後撓楚權賴子房諫以止卒消諸侯牽制之患者子房之力也其後光武肘掣于更始耿弇諸將勸之早絶而河北之功成明太祖初設韓林兒座劉基獨罵不拜曰此豎兒安足奉太祖從之而金陵之鼎建彼數臣者豈樂導其主以寡恩哉蓋誠有見于帝王光明磊落之業慮為可居之功而不屑為山林草竊之計以徼幸于一時之便故烈光於前世名炳於竹帛唐高祖不知此義起兵太原以誅楊廣湯武之業也其事本順而終於代王之禪致唐祚不得正其始此則謀臣劉文靜輩不學之過為可惜也項羽殘暴失人心無終得天下之理要之范增者所謂無謀之甚者也考增事羽終始無可稱述唯勸立楚後與日謀殺沛公而已而其計皆不足以有成增不去羽亦必亡增之不得為人傑明矣楚子玊論淡臺滅明濟河中流有蛟挾舟求璧滅明斬蛟投其璧於河君子之於人也不可以威故怵不可以利故誘遇異物怪類而可以威怵利誘焉則亦不足為君子矣楚子玊為瓊辨玊纓與晉將戰于城濮夢河神求之不與榮季諫不聽戰竟敗時人以為歸咎而左氏傳之是何諫者之愚而左氏之好怪也子玊之敗以剛而無禮不由河神使子玉㢲順以處已廣益以集國事雖不與河瓊辨玊纓何害若猶是剛而無禮者拂衆犯難衆實怨之于河神奚有焉榮季之諫當謂其不狥衆不班師不當咎其不與河瓊辨玊纓也水有四瀆王者以禮秩祀之次于五嶽享王者之祀蒞晉之境許人土地威福自擅不忠啖人以利以貪其愛不亷挾私敗成殘民以逞不仁不忠不亷不仁是謂淫祀子玊違淫祀者不聞其以違諫子玉不與河瓊辨玊纓可不謂之守正乎守正而見譏為善者滋懼矣晉文公聞子玉死而後喜可知也曰莫豫毒也已夫子玊晉文之所懼也豈能縮恧為河神下哉楚昭王有疾卜河為祟大夫請祭諸郊王曰不榖雖不德河非所獲罪也卒不祭而死孔子曰知禮蓋君子不言禍福而禍福之來有適與其事相值者好事者遂從而實之嗚呼其亦昧於道也甚矣楚子文論大臣之患不在於彊直果遂任怨生事而在于儒懦迂緩名為蘊藉而其實持祿苟容之人漢之初用申屠嘉周亞夫可謂戅矣而天下卒以治至於元成之際任匡衡張禹孔光之徒以為相卒至釀成衰亂大盜乘之遂以移國蓋持祿苟容者嘗選愞避事其禍隂中於國家而言者欲舉之則無過可指任事之人日夜揣摩利害以身當其艱能使一國之紀綱風俗翕然振動而不可散然及其計左事敗而其罪常至於可殺夫與其用一可殺之臣罪歸舉者則孰若姑取一切無所短長之人而進之利可分功而謗亦不及於已歷觀自古國家之委靡潰敗浸淫而不悟者有不以此也夫左氏傳楚令尹子文使得臣為令尹薳呂臣曰子如國何曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾余讀之而歎曰嗟乎子文之言失矣夫令尹楚相也相之任所以統攝百官贊理宏化非其人莫得居之而豈賞功之職哉及子玊死薳呂臣實為令尹左氏曰奉已而已不在民矣蓋惜子玊之亡而信子文之非失舉也然後歎子文之心非左氏其孰知之也當是時齊晉迭强楚威幾頓矣子文唯以奉已碌碌者之不足以託國以支齊晉而制諸侯之勢而子玊剛愎又非執政之器然而一時之人才實無出其右者則以權舉之可也特其暴貴任事慮不足以服衆故因其伐陳取焦夷而還而授之以政而託之以功賞所以厭衆人之心而明呂臣之不足以深言也其後又使之治兵於蒍俾得斬斷於中國以重其權而國人始曉然於子文之意矣蒍賈者姦人也其言曰子玊剛而無禮不可以治兵過三百乘不能以入矣夫子文能知越椒之狼子野心于始生之時豈不能知子玉于執政之日必待稚子而後决哉蓋剛而無禮子文之所知也子文以為剛而無禮者之不足以易庸庸者之禍深也故寧棄其短而用之子玉之死晉侯聞之而喜可知也故當時之知子玉者子文與晉侯也向使成王於此能如秦之用孟明晉之用荀林父俾之復位修政息民以待其隙并力而再舉則晉楚勝負或未可定當城濮之敗績也左師既潰而子玊猶能力收其卒全軍于奔北之餘安在三百乘之不能以入哉傳記鬬般為令尹蒍賈譖而殺之乘機以取司馬其處心積慮欲阻撓有功之臣而奪之位者非一日矣故子玉憤憤於一戰願以間執讒慝之口蓋謂蒍賈也然則子玊之敗亦蒍賈有以激之也已嗚呼自古人才之難得也用一人而人得而撓之則功不可以成子産之得有為於鄭也以子皮力持於上而後强族不逼子玉之不終天也即使子文聽間者之言而廢子玊不用楚固不至於大敗然苐取碌碌奉已如呂臣者而委之社稷之事將百姓何望哉才臣之取敗其禍在一時庸臣得志而潛潰其國家其禍乃見于數世之後漢匡衡張禹孔光之徒是已大臣之用心固不可以目前之成敗論也論詩樂大司樂以樂語教國子興道諷誦言語注背文曰諷以聲節之曰誦疏文王世子春誦謂歌樂歌樂即詩也以配樂而歌故云歌樂亦是以聲節之詩古者謂之樂語又謂之歌樂蓋樂主人聲而文之以金石管絃八音之器其實八音之器之聲由人聲而凖故樂必以詩為本稱詩者亦必言樂詩與樂一也孔子曰吾自衛反魯然後樂正雅頌各得其所解之者曰孔子正樂必先刪詩或言孔子無刪詩之事樂正雅頌自然得所此皆分詩樂為二物不知孔子所言樂即指雅頌其曰正即得所也直上下相足成文耳豈有二義哉故教學者之詩必以誦節其抑揚高下之聲而配之金石管絃八音之奏是故春誦則夏必絃絃誦者凡皆以習樂也習樂而詩在其中矣故學詩者必於成均均者樂之調也蓋詩者不可以理義求也孔子曰誦詩三百孟子亦曰誦其詩誦之者抑揚高下其聲而後可以得其人之性情與其貞淫邪正憂樂之不同然後聞之者亦以其聲之抑揚高下也而入于耳而感于心其精微之極至於降鬼神致百物莫不由此而樂之盛莫逾焉當時教人誦詩必各有其度數節奏而今不傳矣詩之度數節奏既失則八音之器雖設亦具文耳於是後人之說詩者泛泛焉無所主而專求之文字之間其說支離畔散理義多而性情少此詩之所以益亡也好古者猶欲追黃鐘之音而於六義既亡之後截嶰谷之竹絫中山之黍布緹室之灰法非不善也而古樂終不可復作故古之為詩征人思婦田野之農夫皆優為之而今非學士大夫則不能以為蓋古人於聲音之道家習而戶曉之雖擊壤拊缶可諧律呂采風者得之又必稍節文之而播之於樂後世人不知樂言詩者第以其文字而已文字非積學之久則不能工求其工於文字者宜乎雖今之學士大夫而于詩猶有所未暇也論日本貢市入冦始末自漢武帝滅朝鮮倭驛使始通者三十許國至建武二年奉貢朝賀使人自稱大夫倭國之極南界也安帝永初元年復入貢魏時朝獻者一入貢者二至晉前後貢使以六至隋開皇三年遣使詣闕大業時亦一至唐興貢獻益數天寶十二載以新羅道梗始改貢道由明州其後使者仍由新羅考宋端拱元年倭僧奝然遣弟子表謝有曰望落日而西行十萬里之波濤難盡倭開洋至寧波才五日耳不得云十萬里此由新羅之徵也至乾道九年始附明州綱首以方物貢及元至元八年則復隨高麗使入朝自此元數招諭之不報遂至兩用兵其地一航不返而貢使亦絶矣蓋自漢魏至元二千餘年間倭未嘗一窺中國至元末方張竊據旁海郡縣敗後豪傑多逸出航海明洪武初元稍稍因緣寇竊議者謂使是時中國潛為邊備而聽其自去來於海上不問一如元宋以前時亦不至為大患乃二年遣同知趙秩賜璽書盛誇以天子威德且責其自擅不臣其王初欲殺秩繼而復禮秩遣僧隨之入貢然使未至而寇掠溫州矣是年有詔浙江福建造海舟防倭秋遣行人楊載齎書往五年遣僧祖闡往倭亦屢貢寇不常其貢也或無表文詔㫖詰責其使至付三邊安插亦隨謝隨寇十三年始詔絶日本之貢以僧如瑶來獻巨燭中藏火藥且與故丞相胡惟庸有謀故因發如瑶雲南守禦而著為祖訓絶其往來以其僻在一隅不足以興兵致討云於是起信國於鳳陽出江夏於閩嶠設城建堡冠蓋交於海上終太祖世不復言貢事矣永樂二年命太監鄭和從兵下西洋日本先納欵獻犯邊倭二十餘人即命治以其國之法縛置甑中蒸死帝嘉其誠遣通政使趙居任厚賜之又給勘合百道令十年一貢每貢毋過二百人船毋過二隻限其貢物若人船逾數夾帶刀鎗並以寇論尋命都御史俞士吉錫王印綬敕封為日本王詔名其國之鎮山曰夀安鎮國山上親製文勒石賜之然倭入寇益不悛九年寇盤石十年寇松門金鄉平陽十七年寇王家山島都督劉江破之於望海堝自是不敢窺遼東而浸掠浙江益甚蓋西洋之役雖號為伸威海外而華人炫於外國珍寶瑰麗倭使來中國奸闌出入主客相糾以故寇盜滋起而倭貢道自此一由寧波久之益習知其島嶼曲折則吳越之間蠢然駭動固其宜也蓋倭之得以為患我中國一由於明高帝之通使再成於成祖之許貢而成祖以好大喜功之心置高皇之約束於不用其禍延及於數傳之後塗毒生靈幾半天下亦云慘矣當洪武時以貢舶之來衆設三市舶司於福建廣東浙江聽與民間交易而官收其利廣以西洋福以琉球浙以日本然獨日本之使號為難御其來也往往包藏禍心變起不測成化初忽至寧波守臣以聞鄞人尚書楊守陳貽書主客力言不可以為倭賊僻在海島其俗狙詐狼貪洪武間嘗來而不恪朝廷既正其罪絶不與通著之為訓至永樂初復許貢於是往來數數知我國中之虛實山川之險易時載其方物戎器出沒海道而窺伺我得間則張其戎器而肆侵陵不得間則陳其方物而稱朝貢侵陵則掠民財朝貢則叨國賜間有得有不得而利無不得其計之狡如是至宣德末來不得間乃復稱貢而朝廷不知詔至京師燕賞豐渥稇載而歸則已中其計矣正統中來而得間乃入桃渚犯大嵩燔倉庾焚廬舍賊殺蒸庶積骸流血如陵谷縛嬰兒於柱沃之沸湯視其啼號以為笑樂剖孕婦之腹賭决男女以飲酒荒淫穢惡至不忍言吾民之少壯與其粟帛席捲而歸巢穴城野蕭條過者隕涕於是朝廷下備倭之詔命重師守要地增城堡謹斥堠大修戰艦合浙東諸衛之軍分番防備而兵威振於海表約七八年邊氓安堵兹者復來窺伺我軍懷宿憤幸其自來送死皆瞑目礪創欲寢食其皮肉彼不得間乃復稱貢而當事復從其請以達於朝是將復中其計矣今朝廷未納其貢而吾郡先罹其害芟民稼穡為之舍館浚民膏腴為之飲食勞民筋力為之役使防衛晝號而夕呼十徴而九斂雖雞犬不得寧焉而彼且縱肆無道强市物貨調謔婦女貂璫不之制藩憲不之問郡縣莫敢誰何民既譁然驚懼矣若復詔至京師則所過之民其有不譁然如吾郡者乎矧山東郡縣當河决歲凶之餘其民已不堪命益不可使之譁然也且其所貢刀扇之屬非時所急價不滿千而所為糜國用蠧民生而過厚之者一則欲得其向化之心一則欲彌其侵邊之患也今其狡計如前則非向化明矣受其貢亦侵不受其貢亦侵無可疑者昔西旅貢獒召公猶致戒於君越裳獻白雉周公猶謙讓不敢受漢通康居罽賓隋通高昌伊吾皆不免乎君子之議况倭乃我仇敵而於構釁之餘敢復逞其狙詐以嘗我其罪不勝誅矣况可與之通乎然名為效貢既入我境而遂誅之亦不可竊以為宜降明詔數其不恭之罪示以不殺之仁歸其貢物而驅之出境申命海道帥臣益嚴守備俟其復來則草剃而禽獮之俾無噍類若是則姦謀沮息威信並行東南數千里得安枕矣守陳言不用至嘉靖二年而有宗設之事故事番貢至閲貨宴席並以至時先後為序時倭主源義植失歡諸道爭貢大內藝興遣宗設細川高遣僧瑞佐及宋素卿先後至寧波素卿潜餽市舶太監寶賄以萬計因令先閲瑞佐貨宴又令坐宗設上宗設怒於坐間起與瑞佐相忿殺太監以素卿故助瑞佐兵殺都指揮劉錦大掠旁海鄉鎮素卿下獄論死宗設瑞佐皆釋還給事中夏言奏禍起於市舶禮部遂請罷市舶司市舶既廢畨舶無所容乃之南澚互市期四月終至去以五月不論貨之盡與不盡也於是凶黨構煽私市益盛不可止會有佛郎機船載貨泊浯嶼漳泉人爭往貿易總督都御史朱紈獲通販者九十餘人悉斬之一切貨賄不得潜為出入內地商販因負資不償積逋至千萬金豪家貴官為之擁護利倭亟返輒以危言撼官府令出兵驅之去而蜚語中紈使得罪以死倭商大恨不肯歸徜徉海上未幾而變作矣時主事唐樞建議以為宜復互市曰市通則寇轉而為商市禁則商轉而為寇通政使唐順之曰舶之為利也譬如礦然封閉礦洞驅逐礦徒是為上䇿度不能閉則國收其利權而操之自上是為中䇿不閉不收利孔泄漏以資奸萌嘯聚其間斯無策矣今海賊據浯嶼南嶼諸島公擅番舶之利而中土百姓交通接濟殺之而不能止則利權之在也宜偹考國朝設立市舶之意毋泄利孔使奸人得乘其便又疏請許貢以為朝廷能止其入貢之路不能止其入寇之路尚書鄭曉論之曰洪武初設市舶司于太倉黃渡市舶司尋以近京師改設于福建浙江廣東七年又罷復設所以通華裔之情遷有無之貨收征稅之利減戍守之費又以禁海賈而抑奸商也當倭亂之時因夏言疏罷市舶而不知所當罷者市舶內臣非市舶也若必欲繩以舊制十年一貢之期而後許之彼國服飾器用多資於中國有不容一日缺者安能坐待十年一貢之期而限以三船所載之數哉彼既不容不資于我而利衆之處人自趨之以禁民之交通難矣此皆言市舶之必不可罷也然猶未揆其本末而論之夫浙江市舶專為日本而設其來時許帶方物官設牙儈與民貿易謂之互市是有貢舶即有互市非入貢即不許其互市明矣貢之期以十年則必十年一至而後可謂之貢今止言市舶當開不論其是期非期是貢非貢是釐貢與互市為二也將不必俟貢而常可以互市矣此政前日之所以召亂者也可乎哉且貢舶者王法之所許市舶之所司也海商者王法之所不許非市舶之所得司者也日本原無商舶所謂商舶乃西洋貢使載貨至廣東之私嶴官稅而市之民既而欲避抽稅省陸運人導之改泊海倉月港浙人又導之改泊雙嶼每歲以六月來望冬而去嘉靖三年歲凶雙嶼貨擁而日本貢使適至海商遂販貨于倭倩其兵以自防官司禁之弗得西洋船仍回私嶼東洋船遍布海岸而向之商舶悉變而為寇舶矣然倭人有貧有富富者與福人潛通改聚南嶼亂後尚然雖驅之寇不欲也此無待于市舶之開而其互市未嘗不通者也貧者剽掠為生每歲入犯雖令其互市彼固無資也亦不欲也故不知者謂倭患之起由市舶之罷而其實不然夫貢者其國主之所遣有定期有金葉勘合表文為驗使其來也以時其驗也無僞中國未嘗不許也貢未嘗不許則市舶未嘗不通何開之有其來無定時驗無左證乃假入貢之名為入寇之計雖欲許得乎貢不可許市舶獨可得而開哉自嘉靖末年海患既平貢使亦絶以至于今不聞其國之服食器用有缺而必取資于中國也亦不聞倭之日為患于中國如前也三者之言猶未盡矣雖然有貢則商舶宜禁貢絶則商舶者適所以為中國利也未見其害也初自宋素卿創亂之後十八年金子老李光頭始作難勾西番掠浙閩至二十二年許棟住霩􅛾之雙嶼港為朱紈所逐其下王直改住烈港併殺同賊陳思盻柴德美等遂至富强以所部船多乃令毛海峰徐惟學徐元亮分領之因而從附日衆倭船遍海為患興販之徒紛錯于蘇杭內地潜居其中國者亦不下數千家為之謀主挾以入寇自此致亂而通番之禁愈嚴然近海之民以海為命故海不收者謂之海荒自禁之行也西至暹羅占城東至琉球蘇祿皆不得以駕帆通賈而邊海之民日困以故私販日益多而國計亦愈絀至萬厯二年浙江巡撫龎尚鵬奏請開海禁謂私販日本一節百法難防不如因其勢而利導之弛其禁而重其稅又嚴其勾引之罪譏其違禁之物如此則賦歸于國奸弊不生然日本欲求貢市斷不可許蓋過洋自我而往貢市自彼而來自彼而來則必有不測之變自我而往則操縱在我而彼亦得資中國以自給之利二者利害蓋大不同也先是隆慶初年福建巡撫涂澤民請開海禁准販東西二洋萬厯初巡撫劉堯海請舶稅充餉歲以六千兩為額于時凡販東西洋雞籠淡水諸番及廣東高雷州北港諸處商漁船給引名曰引稅自四年溢額至一萬兩其後驟增至二萬九千餘兩然則海民趨利之情與商舶通塞之利病可睹矣顧尚嚴于日本之禁其刋行海稅禁約一十七事一禁壓冬以為過洋之船以東北風去西南風回雖緩亦不過夏唯自倭還者必侯九十月間風汛又日本無貨止嬴金銀凡船至九十月回無貨者必從日本來縱有給引仍坐之又以呂宋地所出少所用止金銀商船多空回故稅販呂宋者每船别追銀百五十兩謂之加增商人多折閲破産及犯壓冬禁不得歸流寓長子孫者以數萬計同安奸人張嶷者謬奏海中有機易山地産金可得成金無算詔遣使臣勘視吕宋聞之大恐以中國將略取其地流人為內應于是盡坑殺漳泉之在國者二萬人事聞張嶷以欺罔首禍置極刑巡撫因招諭私通及壓冬者罪悉宥免而私販日本之禁稍疏矣萬厯末以東事告急啓禎之際劉香老李魁竒鄭芝龍等為盜外洋重申海禁然芝龍兄弟既撫後通洋致富賂遺權貴海上建閫者卒用此牟利由此私販雖日多而國家竟不得其利云大抵私販有二有中國之私販有日本之私販中國之私販齎貨至彼必勾引倭徒緣貢為名而乘吾之不備鹵掠人民互分其利許二王直葉宗滿之輩是已日本酋長為衆所尊者曰天文彼中故事每遇閏年則諸島富家各輸資于天文請得勘合入貢實則貿遷有無以侔厚利利勢在上天文所欲者後因奸民通販加之假稱名號者竊録勘合私通酋長遂至往來無稽而天文之利權下移矣故私販者中國之所惡而亦日本之所不樂也然而以中國之奸民與日本互為紏結其遺患於中國也滋甚而皆起于進貢之途不絶貢端絶則日本之販舶不至日本之販舶不至則我內地勾引接濟之奸不能挾倭以為重如此雖有高檣大桅羣聚而輩往者不過將其絲素書畫什物之類以往返漁利而已于我固無損也况設之市評以收取其稅如萬厯之于東西洋者其有裨于國用又有甚利者哉臣愚故以明之貽患不在于私販之有無而在於通貢之一失明太祖既誤之于前而成祖復甚之于後然貢既已絶而猶欲禁商使不得行是何異懲羡而吹虀有見其患而無見于其利也國家初患海孽未平撤界而守禁及採捕康熙二十三年克臺灣各省督撫臣先後上言宜弛航海之禁以紓民力于是詔許出洋關收其稅民情踴躍爭奮自近洋諸島國以及日本諸道無所不至四𣙜關之設異于市舶之設上操其利權譏其貨物而下不得以為纖芥之害中國主其出入而島人潜處帖伏而不敢動比年以來報課日足比之唐宋則利倍之比之于明則絶其隱患此所謂不寶逺物而逺人格者與夫疲敝百姓以逞志于荒服之外者異矣或者設為萬一之慮得無有私挾彼人窺伺中國假稱朝貢希為互市者乎此端一開召釁不難矣誠嚴詔守土之臣時禁闌出之條絶勾引之萌杜生事之漸重禁溢額以勸來者皇上又垂誡萬世無得受其貢獻如今日使倭之片帆不復西指視中國如天上焉而吾民日取其有而轉輸之于以仰佐縣官之急充戍守之用而私以自寬其民力于耕商之所不及是則上饒而下給之道奠安萬世之良策矣臣故備述原委附于海防之後亦以明設險者之在此不在彼也海防總論國家混一區宇聲教覃被訖於無垠唯是東南綰波而州者千餘里一二狂孽弄兵島嶼烽烟時接吳越間至不得安枕而寢皇帝御宇之十八載神謀潛運削平反側從疆吏請以次用兵於臺灣樓船直指繫組待命厥角稽首恐後遂略定其地天子乃案輿圖置一府三縣設之官府綏戢之易鱗介為衣裳於是依島之國為我邊略海隅出日罔不率俾皇哉振古無前之偉烈雖詩書所載何以加兹先是海寇鄭成功盤踞金門厦門間尋奪臺灣居之遊䑸入犯飄忽南北軍吏苦於奔命康熙初廷議以為徙民內地寇無所掠食勢將自困遂悉徙粵閩江浙山東鎮戍之在界外者賊計果絀降者接踵二年立定界樁連歲遣官巡閲邊海諸郡縣八年有詔稍展界縱民得採捕近海十三年成功子經乘閩叛游居漳泉王師收閩寇遁疆臣再修邊備而海壇金厦復置戍兵矣十九年六月福建督撫臣議處投誠之衆奏請給還民畍外田地以無主者俾之耕種且曰方今海外要地已設提督總兵大臣鎮守是官兵在外而投誠在內計可萬全無慮詔許之閩界始稍稍開復二十三年五月克臺灣十月兵部議請各省開界得㫖江南浙江福建廣東沿海田地可給民耕種諸要地防守事宜其擇大臣往視焉乃以工部侍郎金世鑑都御史呀思哈往江南浙江吏部侍郎杜臻內閣學士石柱往福建廣東上面諭遣之許以便宜設防守事竣奏聞世鑑等往㑹督撫巡視遂盡復所棄地與民各就地險易撥置戍兵疏上報可自是沿海內徙衛所巡司墩臺烽堠塞堡關隘皆改設于外略如明初之制民內有耕桑之樂外有魚鹽之資商舶交於四省遍於占城暹羅真臘滿剌加浡泥荷蘭呂宋日本蘇祿琉球諸國乃設𣙜關四於廣東嶴門福建漳州府浙江寧波府江南雲臺山置吏以􅊩之使泉貨流通則奸萌自息此上䇿也而諸番緩耳雕腳之倫貫領橫裙之衆莫不纍譯款貢叩闕葡伏請命下吏凡藏山隱谷方物壞寶可致之珍畢至闕下軨積於內府於是恩貸之詔日下德澤汪濊耄倪歡悅喜見太平可謂極一時之盛然而帆檣接於內地則盜賊生心互市通於外國則狡焉思逞此前代己事始未嘗不警誡而後稍弛防患輒中之宜皇上之惓惓南顧慮此至重也始明太祖吳元年用浙江行省平章李文忠言調兵戍海鹽海寧各州縣洪武二年命參政朱亮祖副平章廖永忠取廣東遂命亮祖鎮守建置衛所七年詔以靖海侯吳楨為總兵都督僉事于顯副之領江隂廣洋橫海水軍四衛舟師出海巡哨所統京衛及太倉杭州溫台明福建漳泉廣東潮州諸衛官軍悉聽節制事權專而責亦綦重矣十七年起信國公湯和於家使巡視浙江福建沿海城池和至浙則建議北起乍浦南汔浦口縈回二千里設九衛築五十九城及諸所巡司民丁四調一為戍兵是年江夏侯周德興亦築福建海上十六城置巡司四十有五按籍練兵十餘萬戍並海衛二十七年敕都督僉事商皓巡視兩浙城隍簡閲軍士又命魏國公徐輝祖安陸侯吳傑練兵海上時廣東都指揮同知花茂上言請徙廣屬逋逃蛋戶為兵增設依山碣石等二十四衛所城池於要害山口海汊立堡撥軍戍守詔從之而命傑董其役故閩廣浙江一切海上厄厄城堡傑德興和所建設為多蓋是時中國數被倭冦二年冦山東並海郡縣又冦淮安三年冦山東遂轉掠浙閩自後南北並受其患太祖深憂之先後設衛所屯軍所轄於衛衛轄於都司而總屬之五府其卒伍之設每百户所旗軍一百一十有二千戶所一千一百二十衛列五所及衛鎮撫軍凡五千五百有竒各衛屯田軍率十分其七守城三屯種屯軍一人賦田二十畝而官征其十之一軍屯錯列分堠而守自粵抵遼延袤八千五百餘里烽火相望而並海以南迫近倭故其戰守備尤密云廣東瀕海之府八其六府分為三路東路惠潮接壤閩疆商舶通番所必經也左挈惠潮右連高雷亷而為中路者廣州倭冦衝突莫甚於東路而中路次之西路高雷亷又次之高雷亷西洋貢道之所從入也守廣者以三路為扼要福建設水寨五而漳州曰銅山泉州曰浯嶼興化曰南日山福州曰小埕福寧州曰烽火門皆控制於海中浙江立沈家門水寨兩浙衛所戰艦協哨南哨至玊環烏沙北哨至馬蹟洋山而歸重於舟山定海江南之邊海在蘇松松有海塘而無海口其要在陸金山衛為之衝蘇州之沿海多港口者各設水兵堵禦而崇明為賊所必經地故兩處皆設重兵鎮之至狼福山與圌山三江相呼應又為南北海防第一門户江北之戰水陸兼用登萊三營連絡曰登州曰文登曰即墨其外島嶼環抱迤邐以及遼陽而金復海蓋旅順各衛星羅碁布足嚴守望此其大凡也自成化後迄嘉靖初倭警寢息者五十餘年邊備廢弛衛所屯田并兼豪右軍戶亡耗不復勾補水寨移於海港墩堡棄為荆榛哨船毁壞不修而奸民逸囚漁人蛋户咸伺隙思釁勾引山城失職之貢使嘯聚稱王騷然蠢動一旦烽突四起武夫喪氣抱首鼠竄賊無亡矢折刃之衄蹂躪遍於江南城野蕭條白骨填路矣然後謀臣猛將分道出鎮增兵設屯人人扼掔而談戰守起壬子至癸亥首尾十餘年中國始得安息此浸失祖訓之故也善乎總制胡宗憲之言曰夫謂之海防者則必宜防之於海猶江防者必防之於江國初每衛各造大青及風尖八漿等船百餘隻更番出洋哨守海外諸島皆有烽墩可泊後弛其令列船港次浙東於定海浙西於乍浦蘇州於吳淞江及劉家河夫乍浦灘塗淺閣無所避風吳淞江口及劉家河出海紆回又非海防要地故議欲分番乍浦之船以守海上洋山蘇松之船以守馬蹟定海之船以守大衢則三山鼎峙哨守相連可拒來寇而又其外陳錢諸島久為賊衝三路之要宜以總兵屯泊其地每於風汛時協軍巡哨使不得越島深入則內地可以安堵總兵俞大猷亦曰倭自彼島入寇過正東風經茶山入江以犯直𨽻則江內正兵之船可以禦之遇東北風必由下八山陳錢清水馬蹟蒲嶴丁興長途衢山楊山普陀馬墓等嶴經過然後北犯金陵西南犯浙江請於浙江共設樓船蒼船數百隻分伏於諸島往來巡探攻捕名之曰遊兵而逺遏之於大洋之外議者多是之或謂海棲經月必有颶風巉崖復礁亷厲侔劒㦸不可下碇癸丑俞大猷圍王直於馬蹟蛟龍驚炮起幾至覆沒師旋賊逸乙卯秋浙直會兵大衢殿前邀賊歸路暴風雨大作飄舟以萬計是邀擊海上之難也蓋倭從南來晝行夜止依山棲宿始至必泊陳錢次馬蹟次大衢次殿前洋山若驛傳然可逆數知也然海波無際賊覘知諸山有備東西南北何所不適嘗聞海中長年云避颶風者舍山泊泛大洋多得全逆知死地不避寇知豈出其下哉故必依此四山嚴會哨應援之令潛師伺敵發無不中此與設官屯駐顯示之標者利害相去懸甚右通政唐順之疏曰臣竊觀崇明諸沙舟山諸山各相連絡是造物者特設此險以迂賊入寇之路蔽吳淞江定海港口國家設縣置衛者以此而沈家門分哨之制至今可考今宜於春汛時用兵備數員暫駐崇明舟山而總兵以下分海面南北會哨晝夜揚帆環轉不絶其逺哨必至馬蹟而止副使談綸甚善其說而謂陳錢馬蹟諸山在內海之外止可出哨不能設守蓋海戰之弊有四萬里風濤不可端倪白日隂霾咫尺難辨一也官有常汛使賊預知趨避二也孤懸島中難於聲援三也將士利於無人掩功諱敗四也昔江夏侯五水寨舊址設在大洋後人以應援不便移其三於海岸致寇無門庭之限議者謂宜復如舊制或謂復之不便而信國經營浙海棄下八山不守謹置汛於沈家門人卒便之非江夏之先見不逮信國浙閩之勢異故也然賊自五島開洋諸山曠逺蕭條無居人得採捕小民嚮導以來近岸常無覺者自嘉靖乙卯後禦洋之法立哨探嚴緊官得預偹則籬藩之守其法終不可廢故必哨賊於逺洋而不常厥居擊賊於內洋而不使近岸斯䇿之最善而當時之議亦卒未有能易此者也初日本之犯中國山東寧海成山諸衛數被其毒及嘉靖之亂首犯福建以及浙直而延蔓於淮揚獨山東竟未嘗被兵何也蓋明起南方大兵所聚北地置戍猶少故寇時躪入然東南猶不免焉逮防守既密南北少事承平日久士卒生長南方風土脆弱兼之衛所軍部衆不多兵力散渙而瀛渤之間風氣堅悍如故寇來獲少所失亡多所以日夕垂涎江南北或比壤一日而破數縣又或千里同時而殘諸郡其時召客兵募土著徵調煩苦民力大竭必待督撫重臣前後彈壓而後定本朝創業撤都指揮千百户之兵而槩統於將軍提督總鎮分領於城守協鎮以下大者宿兵纍萬次亦數千各城保守要害清野以困跳踉之賊如是者三十餘年而卒制其命賊不能以流劫諸郡縣生民不至大困者兵力之出於一故也時勢不同代各異制考之古三代以前尚矣秦命南海尉任囂築隴口漢陽嘉中亦詔緣海益屯兵偹盜賊至晉咸和間趙將劉徵師衆數千浮海抄東南諸縣殺南沙都尉許儒南沙今常熟縣地尋寇婁縣武進郗鑒擊却之此自北而南寇道之始通而海上自此漸以多故及晉末運恩循道覆相繼倡亂始入會稽上虞終於廣州始興又寇道自浙入廣之始也時謝琰以會稽督五郡軍事率徐州文武戍海浦今自龕山而東至閩風石堰鳴鶴松浦蟹浦定海皆其地劉裕戍句章吳國內史袁嵩築滬瀆壘後裕與盧循相持潯陽潛遣水軍從海道襲其番禺則其戰守皆在吳越之間史記恩曾一走郁洲今臨朐縣東北有郁洲山而未嘗逸出為民害然則防海之亟於江南舊矣顧其制不槩見考宋時嘗於明州招寶山抵陳錢壁下置十二水鋪以瞭望聲息然宋終始未嘗罹倭患也至有明之世建置詳矣謹次明自洪武以來所設官立軍以防海外海港海岸事宜各省會哨海界及日本朝貢入寇互市始末然後備列今制别為篇如左嗚呼强弱因乎時也盛衰本乎治也明太祖不勤逺略來則撫之二則絶之選將練兵修備日如寇至故不庭之國再世來王後人反是卒以召亂今皇上端拱穆清之上暗昧幽阻罔弗耀以光明以故天威所震陸讋水栗猶數諭邊吏慎固封守毋敢邀功生事疆場之臣亦朝夕討訓以稱上德意今坐享太平視所經略若纖悉過計一旦有事舉而措之成法具在始知創制者之用意深逺不可測量而以遺萬世子孫之久安長治者豈其微哉臣所撰次依海道所經自廣東西路始福建浙江江南登萊天津衛遼陽以次及之又括海南北所經各省郡縣自為一卷其沿海山沙寇䑸入犯分合日本輿地皆有圖江防總論岷江會衆川之流出峽而後滔滔東下然其勢猶未極盛也至過江陵則漢江統西北之水而趨鄂渚洞庭合西南之水而出嶽陽又經黃蘄而向潯陽則彭蠡會饒徽贑袁諸方數千里之水以南出湖口東北納淮南之衆流泄宣潤之陂澤所受天下水幾十之四五自九江以下兩岸南北涯涘無際汊港縱橫故小則漁徒鹽戶時出沒藏姦大則巨盜之揚帆鼓棹挾風濤而負固者不可誰何也明制用都御史設操江署於應天府之新江口上起九江府之南湖汛下至南直圌山三江會口一千五百餘里以時分班操練水師又設南北兩巡撫兼理兵務操臣任江中撫臣督岸兵互為策應而兩御史巡閲之於是取民間之少壯充弓兵巡司保伍聨結制姦人無所得出入洲渚港浦步步設備營柵相望櫛比而鱗密矣本朝定鼎初設操江駐池州改駐安慶康熙元年始議撤巡江兩御史裁操江而以其職并轄之於總督都御史規制稍變焉臣謹按古之有事於江者未有不因江之利者也易曰王公設險以守其國夫長江固天下之至險也而亦有國者之所恃以為守也徒知其害而不知其利因用之以取勝豈謂善識時勢者哉然而有南北之分勢有創業之大勢有一統之全勢所謂南北之分勢若孫吳東晉五代及後唐南宋是也時則以金陵為居重以上流為控扼以全蜀為根柢蓋自京口而至秣陵是為長江之險自武昌而至江陵是為荆湖之險守長江者以二淮守荆湖者以襄漢南宋李綱論守備之宜請於淮東西及荆襄置三大帥屯重兵以臨之分遣偏裨進守支郡上連下接自為防守其說偉矣南唐罷瀕淮把淺之戍周師得以深入楊行密與朱溫亟戰於淮上溫不敢渡江而楊氏遂能以淮南一隅與中原抗此則淮江相為唇齒之效也晉羊祐據襄陽險要開建五城紿吳人罷守石城杜預得以收江陵之捷晉陶侃取襄陽命桓宣守之而趙人不得越漢沔以取荆此則襄陽與荆湖相與唇齒之效也然而根柢尤在於蜀者江之所從出也我不得蜀則長江之險與敵共之矣晉之滅吳隋之平陳元之蹙宋皆先取蜀而後舉兵隨之其己事也獨典午南渡未嘗得蜀而得晏安江表數十年無西顧之憂者以蜀之未與中原通也苻堅既克漢中復平蜀密令人預備舟師於蜀將以入寇於時蜀漢之軍順流而下幽冀之衆至於彭城使其不輕身先進徐以待東南萬里之師水陸俱下以壓區區之江左豈有幸哉故蜀固而後襄漢得為荆湖之藩蔽荆湖守而後兩淮得為金陵之門戶此偏安之勢然也宋之取江南也所出之道一此沿江而下之師也晉之取吳也所出之道六而沿江之道五隋之取陳也所出之道八而沿江之道四元之取宋也所出之道二而沿江之道一則上流之勝勢斷可識矣獨明太祖起兵淮甸日决勝於吳楚之間其始由和州渡采石取集慶尋取京口以斷張士誠絶江之路既而陳友諒襲太平犯龍江不與之爭於境內乃溯流直上而西殪之於鄱陽進兵武昌而東南大定矣此所謂因江之利而善用之以取勝者開創之盛業帝王之極功也至於承平已久風波恬息持籌長算之士無所得騁其間其視長江衣帶固漁人舟子之所以泳游而玩狎之者也然而備又不可以不預也昔吳紀涉之對魏主曰江自西陵以至江都七千五百里疆界雖逺而險要必爭之地不過數處猶人身七尺之軀靡不受患其護風寒者亦數處耳彼所謂數處者不過西陵荆州九江采石京口迫江諸險要而已此特就其國言之也若夫有天下者則其風寒之所當護者又有大於此者焉試以明事徵之正德間劉齊之寇泝流而上至九江又下南京往來者三如入無人之境然其始亂則近畿也其末也賊張獻忠由黃州團風鎮飛渡武昌陷省會全楚魚爛同時郡盜豕突池和廬鳳悉經焚掠烽火照於江南然皆自秦豫來也如是病有所從起患有所必備雖七千五百里之外孰非吾一體之所當護者乎而況即此七千五百里中水陸之路斜汊支港傍溪曲徑觸處成險雖節節分營而於各營之中又自有其護風寒者其規模宜廣其布置宜密故善為防者必合天下之全勢而計之務使逺邇聲息真若一體之相周流聫屬而不至有一旦不可救之患而已此在一隅偏安者苦於掣肘而若有所不及為今舉天下之大唯吾所欲為之而不至有猝然不可救之患者非萬世一時哉故曰有一統之全勢者此也我朝撥亂之餘功令一新所遣將軍都統以下星列棋布於荆州江寧京口諸重鎮竒兵游兵巡江諸營或守禦非常或往來探哨千里之遙應若呼吸隔江南北若運指臂以故比年以來滇黔兩廣外暨九真日南珠璣孔翠異香文犀罽毲賨幏之貢浮江而入河者若過於枕席之上巴蜀之名材荆楚粳稻連檣接艫而輸於天府散給吳越者若取諸左腋之下可不謂盛烈哉然而芟剃萌芽墐塞罅漏圖大於其細制近於其逺吾之法一定而天下之變日出而不窮其不得以太平無事而忽之也明矣臣謹按明制江防與唐宋經略微有不同者嘉靖以後懲於倭患江防與海防相為表裏也江自京口金焦起下與海接為第一重門户外訖於廖角嘴營前沙南北相對則為入江第二重門戶也江南以及通泰之吕四場掘港諸處與海相通者在在皆所經畫凡以防江即以防海此其所以視前代加重而我皇上於今海氛既靖之後猶不能無加意於門戶之守者聖主之意周乎天下誠非前代帝王所能及也舊明操江臣洪朝選故有江防要覽諸書後吳時來作江防考王篆繼輯之本朝順治間操江李日芃具有成書皆略載當時見行事例而己不及有所證明臣今紀自明世以及本朝設官各汛要害參伍古今備志沿革而於大江源委亦詳著於篇明史刑法志總論自漢承秦弊歷代刑典更革不一迄隋開皇間始博議羣臣立有定制其最善者更五刑之條設三奏之令而唐世因之髙祖命裴寂等撰律令本前代法故為書而一凖乎禮以為出入禮之所棄律之所收也故唐律為萬世法程其後放軼於五代之際至宋始採用之然其時所重者敕而已律所不載者則聽之於敕故其法時輕時重終宋之世無一定之律也金元以來類因事立法及其積久而綱維蕩然明興太祖詔定律令丞相李善長等上言歷代之律皆以漢九章為宗至唐始集其成今制宜悉遵唐舊帝從其言凡更律者三至三十年始申畫一之制其所以斟酌變通而損益之者至纖至悉子孫守之羣臣有稍議更革即坐以變亂祖制之罪至嚴也而後稍陵夷矣大約立法之漸失者其弊始於人不知律人不知律遂以律之不足以盡情僞之變也於是因律起例因例生例例滋而弊愈無窮自此以往一定於宏治再申於嘉靖三酌議於萬厯不清其本而徒為此紛紜如此揚湯止沸勢不灼爛不止故舞文之吏從而汨亂之其端不可究詰如枷死重也不引律而反引例矣梟示尤重也律無斬例則梟矣以此為穽於國中徒使高皇帝之約束不信於後世是有司之過也昔太祖定律特設講讀律令一條使內外風憲官考校有司之不能講解通曉者以差罰笞降級百工技藝諸色人等有能熟讀講解者得免罪一次永樂十年命進士詣法司理刑獄正統前監生教官諸項考選御史者皆令各衙門問刑半年而後試之職成化四年以辦事進士邱俊等與見任官一體僉書問刑又以刑部尚書董方言擇進士楊茂元等三十人於刑部問刑主事缺即選補之宏治間馬文升為吏部亦上言請敕法司堂上官督令所屬官外三司督令斷事理問并各府推官人置律一卷朝夕講讀不時按治考校庶使人精法律獄無寃氣時㫖雖敕行具文而已由此奸吏骫法妄立人罪或希上官意指或伺人主喜怒隨意比附鍛鍊周內即如天順間欲誣于謙王文之迎立外藩不得則曰有其意而已而于王棄市矣宏治間以妖言坐斬劉槩矣嘉靖間以詐傳親王令㫖殺楊繼盛矣以言大臣德政坐馮恩以子罵父律坐海瑞矣骫法如此欲天下之無寃死得乎至如律有取自上裁及特㫖斷罪臨時處治者謂罪在八議不得擅自勾問與一切疑獄罪名難定及律無正文者設非謂天子可任情生殺之也其後元惡大憝案如山積而㫖從中出則任其兔脫矣或本無死理而片紙付獄百口莫辨若世廟之於李默創為臣罵君例加等坐死此尤不經之甚者而所司不聞執奏此弊自英憲以後無代無之祖宗三尺法非天子自廢之乎蓋法者所以制刑之輕重者也人者所以用法者也而君人者尤所以用人以共守祖宗之法者也然而法果可以獨任哉書曰明于五刑以弼五教期于豫治言刑以輔德而用則教可作而治可興也及觀太祖之設施則亦有不盡然者其自謂當元綱廢弛之餘務苛急以繩其羣下乃大召天下耆民禮之以歸使得縛其有司之貪殘若勢豪致之闕下所過阻者處以極刑讞實則厚賞其民而抵所縛者以法於是有挑筋刴指刖足斷手刑臏髠首鈎腸之刑而名各府州縣衛所廨左廟曰皮場吏受賕至六十金者引至場梟首取其皮以待後任者設之於坐以示警造清淮樓令校尉下瞰城中所見民吹彈蹴踘摴蒱六博亡作業者輒捕至樓中水飲之久之羣相枕籍死二十三年以京民為逆不已在京之民廢及一半遷於化外者亦一半太祖謂廢為殺也其他徙邊實都墾田築城自贖及株連死者不可勝數當其時朝野惴惴朝臣至以鴆染衣帛早訣妻子入直或佯狂避職猶不得免其操切如此然亦時時有所矜貸既為三誥示天下而犯者不止一日讀老子書民不畏死奈何以死懼之慨然興歎以徒刑之無益也遂悉罷極刑令議獄一從寬厚又著祖訓首言法外用刑此吾一時權宜非守成之君所宜用以後子孫為皇帝止守律與大誥不許用黥刺荆劓閹割之刑臣下有敢奏此刑者文武羣臣即時劾奏凌遲處死豈非仁者之用心哉迹其所為疑於慘刻寡恩而卒能享國長久海內晏如者以其忠厚垂訓為子孫後世之取法者有此具也竊按明律比前世加峻復本大誥意創設上言大臣德政及姦黨暗邀人心交結近侍諸條蓋所以尊君卑臣而防患於未然故其後亦終無權姦專制之患及其弊也士大夫朝簪紱而暮纍囚者有之他或建言觸忤立時與杖司寇不具爰書廷評不暇讞駁御史臺不及彈奏搒掠所加血肉糜爛上避殺諫之名下有屠身之慘至於堂亷亡等士氣不立而亷恥道喪其所由來者有漸要之詔獄之設為禍尤巨行之二百餘年雖有哲后曾莫知變馴至亡國悲夫故綜其大略著之篇而以厰衛終之厰無列傳故備列其姓名使有所考議嚴父配天議古論者謂明堂配祭東漢為得孝明以光武適符嚴父之說章安二帝因之弗改最為合禮唐代宗用杜鴻漸等議配考肅宗宋世仍之南渡後至以道君侑享侮天極矣初神宗詔謂文王宗祀乃在成王之世成王以文王為祖則明堂之祀非必以考配明也司馬光謂孔子以周公輔成王致太平之業而文王其父也故引之以證聖人之德莫大於孝答曾子之問而已非謂凡有天下者皆當以父配天然後為孝也錢公輔曰以周公言則嚴父以成王言則嚴祖也政則周公祭則成王安在乎嚴父哉我將之詩是也是數說者皆足以破泥古者之惑然愚竊有疑焉周公之輔成王凡所告誡天下一則曰王曰再則曰王曰成王在焉而周公自以嚴父配天豈人臣所宜出哉武王末受命周公成文武之德追王太王王季上祀先公以天子之禮蓋公之以文王配天也非獨不自以為功也并不敢以成王尸其事曰此武王之意也孔子之謂嚴父主武王言之也唯武王之意而周公能行之故曰周公其人也我將我享祀乎明堂也皆為武王之自我而其頌則作於成王之世此即孔子之所謂嚴父也當是時也故文王而為武王之父也則可以謂之嚴父文王而為周公之父也而周公固人臣也如之何其嚴父哉此一舉也臣子之大防備焉學者所宜盡心者然則非嚴父亦可以配天乎曰周公以始祖后稷配天而文王功大不可以無配故享后稷於郊而宗祀文王於明堂以配上帝所謂義起之也後世始祖無后稷其人則開創之君宜專配南郊而上帝可以不配上帝不配則明堂可以無立近制有郊祭而罷明堂之祀庶乎得禮之意矣辨釋奠必有合辨釋菜禮輕也釋奠禮之次輕者與釋菜者唯釋蘋藻而已無牲牢幣帛釋奠者釋薦饌酌奠而已無迎尸以下之事故釋菜輕而釋奠於禮為次輕也禮釋奠有六唯天子視學釋奠於先聖先師其它師還及四時入學皆不及先聖而四時入學則詩書禮樂之教官主之各祭於其學之中天子不親行禮也則次輕之中此其尤輕者矣故釋奠有合樂者有不合樂者周禮春入學合舞秋頌樂合聲及月令季春大合樂則天子視學命有司興秩禮祭先聖先師于時則遂養老此合樂者也其餘四時之奠不及先聖主之有司者如春夏教干戈則小樂正樂師奠之秋冬教羽籥則籥師奠之一有司專家之事耳豈必合樂哉雖有司之事亦有舞有授器然周禮大司馬司戈盾之屬祭祀授舞者器謂凡祭祀皆授之不止釋奠也凡祭祀之樂不言合樂獨於釋奠言合樂非也且月令於仲春季春之合樂皆曰天子親帥三公九卿諸侯大夫以觀之則其重在合樂不在釋奠也可知故合樂則必釋奠釋奠則不皆合樂合樂之文著於經文者唯此其他則不槩見鄭注文王世子謂合先聖先師於鄰國其說是也自宋諸儒創為合樂之說與鄭異義陳氏集傳因之其解有國故則否謂國有凶喪之故則雖釋奠不合樂夫凶喪廢樂此國常禮也不必釋奠且學記曰未卜禘不視學禘為夏祭說者曰後使其為天子之喪喪三年不祭而謂猶視學可乎若曰此非指天子行事者有司耳則有司之奠又不當合樂如前所云也以此較之鄭義明甚諸儒論之甚詳要之漢儒之說未可輕廢矣不喪出母辨吳氏澄因子思哭嫂知其有兄因其有兄而鑿空為奪宗之議曰子上雖有父在而不得為出母服者蓋子思兄死時使其子續伯父主祖與曾祖之祭既主尊者之祭則不敢服私親也此禮昔所未有子思以義起之者又曰子思有兄則支子爾子上則繼禰之宗子也古禮有奪宗謂宗子死無後則非宗子者代之主祭也然以支子奪宗子不若以繼禰之宗進而為繼祖繼曾祖之宗者為順或曰不立後而但奪宗可乎曰禮惟大宗無子者不立後而但奪宗也此大不然使子上主尊者之祀而不敢服其私親則不但不當服出母之喪亦當降服於其父也何者以曾祖祖視其父則子思為支子不當主祭之父既不當主祭則子上為世父後以繼其曾祖祖後無論父母皆私親也服安得不從而降今但以續世父主祭為不服出母之證於義安乎傳曰天子建國諸侯奪宗謂諸侯為一國之主雖非宗子亦得移宗於己此所謂奪宗也禮自大夫以下支子不祭或宗子有故而代攝之祭則必告於宗子宗子為士庶子為大夫以上牲祭於宗子之家祝稱孝子某為介子薦其常事宗子有罪適他國者庶子為大夫其祭也祝亦如之而禮有降等庶子無爵而居者望墓為壇以時祭宗子死稱名不言孝凡禮言支子代宗子祭者如是而已皆不得謂之奪若宗子無後者則必以支子之子為之立後矣夫支子代宗人之祭其昭穆同也固不可以為後而支子之子繼大宗者必繼其禰未有越禰而直繼其曾祖祖謂之奪宗者喪服傳曰為人後者為其父母報言繼禰也禮為大宗無子為立後非大宗則不立後不言大宗不立後而但奪宗為此說者以禮適子不為後故遷就其說於奪宗以騁一時之辨可耳不知其下貽末世議禮小人之口實其為剌謬豈不甚哉且子上誠為世父後則子思不當云為伋也妻者為白也母子上既不為世父後為伋也妻者為白也母矣而何私親之足云乎設使子上既不後世父又不後其私親天下有無父之人則可也不然吾懼守禮者之進退無所處也古者士惟一廟以祭其禰而祭祖於其禰之廟子上士也不祭禰不立其禰之廟矣雖有曾祖祖之祭不知其將安設此尤理之不可通者也然則為子上者宜何居曰有孔氏之禮在矣記言之孔氏之不喪出母自子思始志變禮也明其為變禮從而為之辭者皆後儒之過也鼻亭辨栁子厚為薛道州作毁鼻亭記謂象以惡德而專世祀不可至明王文成為靈博山象祠記以象為己化於舜故至今廟祀之其識似勝子厚而兩公皆未及象封邑所在按靈博山在今貴州境非象所封地孟子舜封象於有庳即今湖廣永州府之零陵縣一統志云在道永二州之間窮崖絶徼非人跡可歷愚嘗考之舜罪四凶其所誅流竄殛皆不出今中國之治幽州在密雲其地有共城崇山今澧之慈利即嶽州境比零陵尤近三危在沙州漢燉煌縣東南三十里羽山在萊州即墨古不其縣南所謂投之四裔者以其為東西南北之界也其實皆中國版圖所𨽻當時舜都安邑若封象在今零陵縣地則陸踰太行水絶長江延迤三四千里然後得至又有洞庭不測之險俗與椎髻為伍而驅其愛弟使披箐篁涉風濤犯瘴癘於此地此與四凶之放何異而猶以為仁人之親愛其弟吾不信也漢文帝弟淮南王長廢徙蜀袁盎諫以為淮南王素驕而暴摧抑之帝必受殺弟之名後淮南王果道死而帝悔不用盎言象之凶傲甚於淮南有庳之險逺不啻巴蜀使舜避放弟之名而封之以險逺必死之地是何漢文之所終悔者而舜行之不疑也孟子曰欲常常而見之故源源而來越湖絶江踰河陟嶺以至京師比嵗一至則往返萬里其勞己甚數歲而數至則日奔走于道路之中且時有登頓之憂風波之患若三年五年一朝見于天子如周之制又不可謂之常常而見源源而來也以此推之則零陵必非象所封地象所封地必近帝都而今不可考矣栁與王之說雖善然祠廟之建毁均于象無與史記注引括地志曰帝葬九疑象來至此後人立祠名曰鼻亭神此為近之然世俗之附會古蹟名似而實非者多矣余誠不敢穿鑿以求之也姚明山學士擬傳辨何元朗云衡山先生在翰林大為姚明山楊方城所窘時昌言于衆我翰林不是畫院乃容畫匠處此二人只會中狀元更無餘物而衡山名長在天地間今世豈有道著姚淶楊維聰者哉自無識者稱快此言載之於詩選中而明山之後人未知也余辛酉年以纂修之命將北上姚氏數人持東泉尚書父子傳志見示復出明山存集刻本中有贈衡山先生南歸序一篇又送衡山出灣馬上口占絶句十首其序大略云自唐承隋後設科第以籠天下士而士失自重之節者幾八百餘年然猶幸而有獨行之士時出其間如唐世之元魯山司空表聖陸魯望宋之孫明復陳后山諸人猶䏻以學行自立而足以風厲乎天下今則惟衡山先生足當之而先生之秉道誼立風節明經術工文章尤有高出于數子之上者其却吏民之賻以崇孝也麾寧藩之聘以保忠也絶猗頓之游以厲亷也謝金張之餽以敦介也不懾于台鼎之議以遂其剛志也不溷於猶褒之招以植其堅貞也天子賢之擢官翰苑官僅三載年財五十餘既慨然起南歸之興吾每謬言留之不得竟三疏得請以去榮出於科目之外貴加于爵祿之上罻羅之所不能取樊籠之所不能收翩然高翔如鳳凰之過疏圃而飲湍瀨下視啄腐鼠以相嚇者何不侔之甚已其言曲盡嚮往之志極贊揚之詞而於詩章曰豈是先生果忘世悲歌盡在五噫中與序中台衮猶褒有悲憤時事不敢指稱而相與為隱之意其知衡山也深矣俗儒不考漫筆之書近有史官自刻其稿者復著其說于擬傳不重誣耶明山可傳不獨議禮一節其居官屢有建白援據古今義正辭核惜其中年凋喪不竟其志而何氏謂今世遂無道及者彼自不識明山於明山固無損也復按家傳志銘皆云楊文襄引公同修明倫大典公恥不肯與同館皆嫉之而擬傳云淶雖以議受杖後與修明倫大典不終其節余在史館疑而請之監修徐公公命取大典檢閲同修者絶無姚名遂命删此一段然其稿猶傳播人間也此是姚公一生大節所係彼既罹禍于生前復被誣於身後史筆之陷人豈必在張桂羣小下哉余特為表出之以告後之君子誓誓書維康熙三十八年歲在己卯八月丙寅朔越初八日癸酉考試官某同考官某某等同致告于場中文昌司命之神曰今當己卯大比年皇上於江浙諸省特命講讀諸臣往涖試事而京師首善之地某以新進小臣學識粗陋猥䝉簡命入闈惶悚惟懼隕越即十六房名姓亦係御筆親㸃委以分校之任是某等之受知皇上均也所望協力贊襄克光大典兹于聚奎堂焚香公誓祗告明神務期滌慮洗心矢公矢慎一毫之曖昧莫容勿以在公而作營私之計各卷之搜求宜遍勿以今日而負初日之心如違斯誓暗納苞苴致佳士沉淪匪才幸進則明有國法肆市之罪難逃幽有鬼誅讀書之種永絶敢告䇿問第一問己卯鄉試皇上神明天縱備內聖外王之學尤崇重經筵表章正學則經之大意學者所當盡心也自漢以來言易者多主象占至王弼始暢以義理而崇尚虛無故功令黜之然伊川每教學者先看輔嗣易則弼注亦有可採者歟本義之說多本程傳然其中亦有互異者可得聞歟尚書壁中古文至晉始得皆謂今文獨艱澀而古文反平易遂疑其非真然格言要論多出其中何也明初正蔡氏集傳之失為書傳會選其得失何如歟詩有小序朱子闢之甚力葉石林馬端臨俱力主小序謂使淫詩而孔子有取焉則其所删者何詩歟然朱子同時鄭夾漈亦有小序辨妄六卷又何說歟今儒生誦習小戴禮朱子曰儀禮是經禮記是儀禮注解欲定為一書先以儀禮三百篇目置于前而以禮記冠昏等義附於其後作古禮經傳通解使其書得成古禮果可復興歟而朱子又謂其繁重難行何歟舊學宫取士春秋四傳並列今功令雖獨遵胡氏安國然自啖趙以後數十家不有可相參訂歟而歐陽氏以三傳誣妄至欲從經而廢傳何也諸生研索已久當悉著于篇以應聖天子文治之盛第二問問守令為民命之所係唐貞觀中嘗書刺史名于屏間坐卧觀之以備黜陟又命內外五品以上各舉堪為縣令者以聞此吏治之所以日隆也皇上留心民瘼于山陜要地郡佐以上特令部臣列缺上請親自補授其他守令新除亦必以次引見躬加訪問而後遣之是宜人知感勸治效日臻比者南巡所過目擊閭閻生聚非昔嘆撫綏之不得其人則為守令者可不兢兢奉職無負委任歟嘗考之兩漢所紀循良文翁以好學通春秋被舉龔遂召信臣以明經致通顯及潁川四長皆彬彬學道君子也則必以經術飭吏治斯無愧于忠信之長仁惠之師歟奈今之有司自催科盜案凡百鞅掌一挂吏議鎸斥立隨宜其教化有所未暇歟或者操凛四知志氣清明雖處繁劇而丰裁可以愈厲歟則奬亷其尤要歟皇上選擇督撫之潔已奉公者使之表率屬官慮無不恪供厥職矣然而非時舉劾果盡公歟調煩留任果無私歟常例餽遺果盡絶歟今欲大法小亷使追呼無擾盜賊屏息和氣薰蒸民生樂業其何道之從願悉言無隱第三問聞之先儒曰自古備荒有二䇿一感召和氣以致豐穰其次惟先儲蓄之計而已我皇上仁愛元元宵旰圖治所謂順五行修五事以安百姓者亦既上孚天意下浹民生矣今因巡幸所過截留漕糧以濟被災州縣江浙山左皆蠲免夙逋畿輔捕蝗旱不為災憂勤如此其至則所以預小民蓄儲之計者凡在羣下可不力圖報稱乎夫法重常平固矣然議者謂常平外有利民之名內實侵刻百姓以近事觀之名曰樂輸而里遞追比甚于正賦吏胥盤踞恣其中飽則謂之侵刻亦宜意立法本善而奉行有弊歟胡氏曰賑饑莫善于近其人隋置義倉于當社饑民易于得食則常平果不如義倉之善歟朱子社倉亦義倉遺意陸象山急稱之而憂其一遇歉歲有散無斂欲兼制平糴一倉代社倉之匱然則義倉社倉固所以補常平之不足而平糴一倉又所以為社倉久逺之計歟今州縣虧空日報然在事之日鮮有以虧空被參者一經解任弊端立發是影射與庇狥其責惟均也亦何法而使清查得實民沾實惠歟諸生痛切民隱盍略去陳言亟詳其弊第四問問周禮無鄉校之官其閭胥族師黨正鄉遂大夫之所書所考皆國子教學之法也是即其官也至於國學而其官始大備然教法獨詳于春官之大司樂而司徒成均簡不帥教之法獨見于王制何歟夫欲移民風先端士習今皇上頒朱子小學于天下為取士之的意甚盛也詩歌城闕其患在于不學意者讀書所以興行歟抑其要尤在師儒歟唐貞觀時令徵民間有通一經者任以助教博士而使之分教其弟子其法可倣而行之歟夫大司樂教國子興道諷誦言語即詩也詩自三百篇而後有騷有樂府歌行雜體至于律體興而流變極矣其㫖趣風格與三百篇離合何如歟司馬光曰備萬物之體用者莫善於字自蒼頡創造古文貫三才綜百行為萬古文字之宗中間大小篆分𨽻真草飛白之遞興許慎李陽永徐鼎臣林罕之所論著其得失可臚列歟皇上仰觀俯察聲律身度萬幾餘暇矢口四聲則諧和雅頌揮灑八法則焕爛星雲今淵鑑齊御製詩文法帖俱已垂勒金石冠絶古今爾諸生躬際文明之運必有洞晰厥㫖足以鼓吹休明者願詳述所聞幸大雅之復作焉第五問問古治安之世不能無盜而有弭盜之方先王制保伍以定民居使能相保相受同其刑賞此防盜於未然者也至於後世政教無聞而法令廢弛冦盜之作往往有之則慎擇良吏者尤所以為弭盜之要歟若夫畿輔之地五方雜處自古稱為難治歷考前世或有用鉤距擲伏如銖兩之稱奸盜無所容者矣有赭汙衣裾窮治所犯而枹鼓稀鳴者矣有搏擊强暴而探丸行劫應時斂跡者矣此皆京尹令長之己事也今國家定制以五城御史九門提督巡察內外而三輔要地則擇捕盜同知分疆緝捕其勢與古專任者異矣昔人已試之法尚有可用者歟我皇上仁心善政洋溢寰宇雖爰書已具跡涉矜疑猶時有赦宥俾之更生宜無不回心革面矣乃各省之盜案日積輦下之寇攘時聞何歟豈失事之律愈重而諱盜愈深諱盜愈深而盜益滋歟夫嚴行保甲此備盜之善經也豈其法有未行抑行于閭里而猶不行于營伍乎或謂在外之盜治之宜寬當重卓魯之循良近畿之盜治之宜嚴當用趙張之明斷然歟否歟其各抒所見以對第一問癸酉鄉試古無經名也六經之說見于莊子自後戴聖記禮遂有經解之篇漢當秦滅經之後諸儒掇拾于煨燼之餘各相傳說使聖人之道不泯于後世而有宋諸大儒因得以尋流而溯源厥功偉矣鄭氏夾漈至謂漢窮經而經亡不亦過歟易家有施讐孟喜京房其後費直以彖象文言雜入卦中至王弼又分爻之象辭各附當爻胡翼之劉原父之徒謂古文淆亂自二人始然程傳本義皆從費學其意本欲使人易讀耳故至今遵之而施孟京三家之說不傳矣尚書伏生口授二十九篇孔安國復增多二十五篇或者謂伏生背文暗誦乃偏得其難而安國考定于蝌蚪古文錯亂磨滅之餘反專得其所易至所為之序亦不類西京文字則梅賾所奏上之書亦未必為壁中之真本然而要言格論亦出于其間故學者不能廢也詩齊魯韓三家皆立博士魯人大毛公為訓詁河間獻王得而獻之以小毛公為博士毛詩獨後出而齊魯韓三家之說亦廢韓嬰詩雖存外傳真僞各半雖其真者于論詩之㫖趣亦無當也至朱子為集注則并斥毛詩而後之學者又以小序為不可盡去則紛紛之論至今未有定矣春秋三傳左氏紀事公榖獨傳經義其後有鄒夾之書惜其不傳自唐以來多主趙匡啖助而陸淳之書所戴兩家之說往往有存者然今功令獨遵胡安國傳朱子謂春秋多不可解安國之說亦未見得孔子之本意則謂其附會時事過于牽强耳今學者于胡氏而外數十家之注解或亦有可以參觀而互考者不必株守一家之義也高堂生儀禮十七篇后蒼傳之與大小二戴之禮並存於世今所用者戴聖之禮也朱子曰儀禮是經禮記是儀禮注解欲定為一書以儀禮篇目置于前而以冠昏等義附于其後作古禮經傳通解而惜乎其書之未成也鄭康成于易詩書儀禮周禮皆有箋注唐孔賈等共為疏義皆就其所立說以證明其意非有能領略聖人不傳之㫖于千百世之下者斯文未湮周邵程朱輩出乃就經以發明絶學剖决性命而後天下後世始曉然知經之所以載道而百家異說至是而統歸于一是矣若宋元諸儒羽翼六經各有著述大抵本於朱子之學而不能無得失其間學者兼存而節取之可也今皇上神明天縱直接精一之統以發揮于治道而又表章六經崇師重道宸翰照耀萬方作覩可謂曠世一時矣今愚更有進者夫經學之與理學一也理不外于經而經乃所以明理自元以來史臣無識纂修宋史取道學與儒林而各為之傳于是談理者高論性天薄文學為無用而窮經之士亦不復以致知格物為事此經學之所以大晦也後之秉筆者必合道學儒林而一之使天下皆知明經所以造道而不至徒事于口耳之功其亦扶進人才之一端也與湛園集卷四
