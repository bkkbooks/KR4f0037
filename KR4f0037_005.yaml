body:
  text: 湛園集巻五翰林院編修姜宸英撰傳新城王方伯傳公諱象晉字子進山東新城人祖重先布政使司左叅議父之垣户部侍郎贈尚書公季子也中萬厯甲辰科進士授中書科舍人癸丑考選同鄉為京朝官者皆欲以臺省處之適伯兄宫保公象乾方以薊遼摠督召為本兵而故事父兄官内閣及六卿者子弟無得居言路其見居職者或改翰林官故宫保欲暫歸為公地即來而翰林可得也公力爭不可以私恩宿君命遂平調禮部儀制司主事人皆服公之正而宫保公之友愛以為兩得之移疾里居久之中忌者以京察調外補江西按察司知事未赴再遷禮部精饍司員外郎聞路太夫人病急請歸路公繼母也時三原户部來公復名善醫來方筦臨清倉遂躬冐氷雪馳四百里邀之來視比至病已急乃禱於嶽祠乞以身代母命太夫人聞之為之感慟欷歔至殁服闋補本部儀制司陞按察使副使備兵淮楊已已通州奸民亂猝起聚衆數千燒刼豪家勢汹汹及官府公自泰州馳赴之擒戮其首禍者數人事遂定既以叅政督蘇常鎮糧儲道平漕卒之亂於俄頃民不知變其持重能處大事概如此陞河南按察使司蘭陵王母劉誣訐許州諸生五十人廵撫下其詞以召捕公爭之百端得止於是宗室驕行縱恣於郡縣賴公勢稍戢為按察使經年所部稱平遷浙江右布政使司冬左使姚某入覲公攝其事時崇禎十有一年也是時冦訌歲飢上計吏視賦入為殿最唯謹姚至京以觧征缺額下獄公急勅主藏吏籍所貯悉諭之吏辭以考成不便公曰若所言吾豈不知顧姚事急吾視事日淺即不及降秩耳姚禍且不測與人同僚瀕危而忍秦越視之乎于是擇吏趣觧到部課如額姚遂得釋還而率其子弟頓首謝門下曰微公吾不復至此吾餘生皆公賜也起相持手泣數行下公為人寛中及見義勇决不擇利害為趨避然終不為崖異嶄絶之行其以京察降外也時羣小朋比攘臂力翻辛亥之案因坐公以浮躁公在家聞之怡然曰此軰自圖報復耳非朝廷意於吾何損或謂公方為部曹非時所輕重故其言云然然余按辛亥京察其首爭金明時之調外者刑郎秦聚奎也於是朝士意皆有所左右門户角立蠭起東林中如丁元薦李朴者皆以郎官出死力爭之為黨人切齒數年間奏訐紛然如所謂秦𣲖淮脉崑宣之黨擁帯爭雄諸不根之説見之章奏者猥瀆煩瑣無復人臣禮自丁已察後衆正氣落不十餘年間而黨釁成矣其延及於崇禎之末南渡之餘尚忍言哉小人之貽禍昔人所謂吾黨當分受其過者若公處通塞之際蕭然若無事使搏擊之爪距無所復施含射之竊發不得以中豈獨既明且哲以保其身亦謀人國家者之所當取法也公未衰致仕有子四人諸孫今侍讀君士􅍬為某言其季父死節事甚烈則公子御史與𦙍也御史忤執政歸里聞甲申三月變搤􅒆曰吾父老矣且致仕久吾不可以無死乃與其妻于孺人子士和同登樓縊死于是公益絶人事自號明農隐士門闔謝賓客不為通雖郡邑長吏屏車騎到門匿不與見先為自祭文飾巾待盡而已生平喜淡泊室無媵侍盛暑整衣冠危坐讀書不輟常舉唐柳玭言誡子孫無矜門第務力學為善故其家累世貴顯至於今尤盛卒時年九十三謝工部傳公既歿之明年其季子景昌走太倉求呉祭酒為其懸繂之辭而屬傳於余既歸而請之者再余辱公愛至厚微景昌之請其能已於言乎公諱泰宗字時望别號天愚山人明崇禎丁丑進士為漳浦黄公道周所得士先是庚午黄公主試浙闈得公卷而竒之以同考摘抉被放後七年應禮部試復出其門黄公耿介名臣公以文章兩被知遇益砥節自厲謁選得番禺令番禺蒞省治俗澆務殷公下車振刷威德並行盤古十八峒者百餘年逋冦也制府數奉詔征之不克其魁蘇鳯宇遂自稱王犯境及公涖任制府即檄為南路監師合軍督𠞰而公時出竒計遂擒得鳯宇以歸賊既平叅將某者懦而倖功欲戮降數百人㑹公將白事制府某前以金盤玉帶為壽戒即入勿言公峻却之而極論其枉降者得釋叅將以降級去於是制府論功遂上公軍功第一始公少時受學於其季父廉使公廉使公名渭為人雄毅有智謀毎讀書暇即與公講論孫呉兵法後涖蜀受命討奢酋深入賊營數百里嘗露宿洞中背噤痒覺寒甚寒裝盡濡夜半移軍去取火視所卧處則冰上也卒以是成功而公之監師亦露處谿洞者數旬或見繞山火光起部曲盡驚公不為動曰此必賊焚巢自遁耳覘之果然葢其所用兵方畧得之方伯公者為多以功擢工部都水司主事旋中蜚語謫福州幕署泉州司理時天下所在騷動山海之間鉦皷沸然公帥吏卒乘障廵徼無虚日故相黄公景昉行道遇之從輿上舉手嘆息曰安得如吾謝侯者數輩則東南安枕矣踰年陞南安府推官值亂觧組歸順治三年王師下東浙督府張存仁疏薦浙才六人於朝皆以疾辭公即六人之一也公即屏山中益深自晦匿日著書賦詩自遣其天性孝友予少時館其家見其兄弟間日召客飲飲即連晝夜不輟或夜久聽鐘鳴客皆散去公復呼家人起邀客還坐酣飲久之視庭中日復奄奄欲落矣亦未嘗數數課其子弟顧其家無長幼無不謹勅力學者然自予别去十年間公兄弟羣從大半没其賓客酒徒亦多死亡者顧獨與其母弟時素把盞相對日黯黯不樂予去年過之公以久别予置酒歡甚未幾予意䦨欲起公挽留之不可則對案黙然徙倚而後罷雖予自今猶恨之公在閩時嘗携得黄公所著書兩篋後因亂失之時對客嘆息大抵公之才不盡見於用其已試者略與方伯公相上下而其至老好學不倦與其立身梗概庶幾無愧於漳浦之門人者子四人景昌諤昌從予遊初公殁時無疾方對客飲須臾欠伸索茗盡數杯即逝景昌為予言之如此董公傳六經之書皆所以垂教而易詩之傳最廣詩之變而為騷為賦為歌行近體多羇孤失志貧賤之所為作故雖避世之士長往而不返者尤好之至如易遭秦焚書之後僅以卜筮得存自後隂陽占騐之説益繁莫不假經設誼依托象類其説至詭譎不經而司馬季主嚴君平之徒多傳用其術溷跡隱見之間故夫易與詩二者之教此山林隱逸之士離世而自全者所樂取以自託者也而易之及人也遠故君子尤重之予邑往有廉使陳公頥正善易學旁及風角遁甲之術無不精詣嘗夜泊淮河見寶光起水上心知其有異筮之曰是宜得寶鼎即令善泅者蹤跡得其處久之以一鼎出欵識蒼黝公識曰商周間物也遂携之歸其他雖家人米鹽瑣屑一訊如響同邑䕫州守楊公汝昇得其術值奢酋煽亂賊發即知之掩捕無不得者時相傳以為神至今其遺書猶有藏者董公者隱士漢孝子黯後黯至孝舍旁忽湧溪水甘取以奉母至唐開元改邑為慈谿以孝子故也董公少而受易於其婦翁呉公遂屏棄舉子業不事卜易市中意專在於導人為善凡與人言利害必以其事推之教人趨吉而避㐫一依於正道後事應亦輙如其言以此遠近坌至錢滿座間隨手以散貧者所留餘取甘脆以奉母公弱冠喪父後母龔性悁急凡事必長跪請命間有所拂意不能即觧者走請諸親故以觧之嘗病癰危甚號天願代為之再吮而旋愈母大感動於是邑人皆以孝稱之先是董氏有遠祖㑹稽縣尉墓久没荆棘中公按家譜得之表石墓左尉後見夢於龔曰汝子純孝施及於吾吾當有以報當是時陳楊兩公家稍中落矣或曰隂陽之家天道所忌然公至子乃逾盛公四子兩中進士長允升直𨽻淮安府知府次允茂福建叅議公前後受四封綸章稠疊皆言其孝感然性真朴不好為富貴容初隨養長公莆田後一至淮浹月返曰無久溷汝長公為治園所居側不時至其處率手一編坐吟小室中足未嘗一渉公府幅巾杖履逍遥城市遇少年子弟與之談笑立踰時乃去故人無知不知鮮不樂敬而親之其誡子居官以亷潔忠厚為本後兩公兄弟所至留去後思人亦以是多公卒時年七十有五自公父子殁後數年天下始大亂長公子嘉餼於庠當需次吏部輙棄不就獨絃哀歌於荒山大谿之間人莫測其所以也顧其詩往往流傳人間故董公殁而其後又以詩著公諱時彦字叔元先叅議贈太僕公傳略髙祖諱國華字邦實别號甬洲年二十四中嘉靖丙午鄉試丙辰舉禮部以憂歸已未殿試賜進士出身授工部營膳司主事時三殿經始公賦功庀具省度支以萬計遷本部郎中分司治張秋決河陞河南按察使司僉事轉陜西布政使司右叅議時鑛冦充斥梗商洛間刼略吏民為害所在逐捕不能得公從容指授方略渠帥授首陜東西四千餘里威懐並著無何中忌者摘判常州稍轉南刑部郎中歴廣東按察使司僉事公仁心惻隱前後治請誠多所平反尤潔已自持粤有土司為怨家中傷械繫獄公鞫得其寃出之其人感泣謝去數日槖千金來公峻却之曰吾豈以貧故喪吾生平哉公性雖樂易然見義奮發不能以時俗圜轉附和以是再得斥遂終身去官不仕去而苗民思之為立郤金亭亭至今尚在公宦遊二十餘年持節河南北關輔粤東皆仕宦膏腴地然歸家環堵蕭然舊田四十畆分毫無所增宗家故舊乘間言何故累却餽遺不為子孫計是時太常公初成進士公笑曰此吾所以為子孫也使吾用闇昧得金今目中詎得復見此耶太常公改户科之三月為萬厯十三年首抗疏爭鄭貴妃冊封且請早定國本疏入未下中外傳上震怒禍將不測語聞至里中家人皆憂泣公謂其同年友御史顔公鯨曰吾垂老不復意兒能作此等事雖受竄殛不恨矣顔公故忠直名臣時被讒家居舉酒慷慨起屬公曰公有子能死諫闕下公不以戚諸懐反用此慶幸方今父子以名節著聲如公幾家此吾所以為公賀也遂飲極歡而罷後太常公量移餘干令迎養三年卒得年七十太常公親為志藏於墓公仕世宗朝時朝廷綜核名實縉紳之士敦尚風節顧惜淸議公律已淸苦尤甚為里中士大夫倡時有某某罷官歸里被不飭稱諸公毎公事期㑹縣廷中覘知某某先在便疾驅返或某某後至知廷中有人亦望風避去至今長老猶能傳之公加惠鄉里尤渥既殁民感公父子兩世恩德請于官建祠城北環湖水為尊德祠歲時父老子弟致祭不絶泰昌元年太常公被召起以覃恩贈太僕寺少卿長子諱應麟即太常公别有傳次諱應鳯郡文學博學工文善草𨽻書名于世𤣥孫宸英奉祖户部公命謹著傳略如左先太常公傳略先祖户部公嘗命宸英曰汝曾大父筮仕先朝功在國本殁之日山隂念臺劉公嘗誌其隧道之石也予欲載詳之家乘俾我世世子孫無㤀先烈是汝之責也宸英受命惶悚久之不敢屬筆今先祖捐館八年自後宸英載經創痛神思怳惚及今不自勉厲閟先徳不著格尊命不就罪戾滋甚悔將何及謹按行狀志銘考之遺集并所聞於祖父者掇拾書之以俟世之君子有所採取而潤色馬先曾祖諱應麟字泰符别號松槃為嘉靖已丑進士累官陜西叅議贈太僕卿諱國華號甬洲公長子公中萬厯癸酉鄉試癸未進士選翰林院庶吉士改户科給事中是時萬厯十三年九月也至明年二月有㫖加封鄭貴妃為皇貴妃先是壬午年皇子生為㳟妃王氏所出時鄭妃寵冠後宫已三年矣初姙邠哀王上與之戯逐而傷之生三月不育鄭恚甚上憐之與私誓即更舉子則立汝子為東宫至皇第三子生賚予特厚其父揚言於外謂神器且有所屬未幾加封之命下中外危疑益甚而禮部已具册封儀注將上矣公憂之闔扉飲泣草疏家人守之不得就一日晨起入垣中鎖吏繕寫成即上疏曰臣惟正名定分國家所以安别嫌明微君道所以著事有出於無心而繫四方之觀瞻發於一時而關萬世之綱常此明主所亟欲聞臣下所為耿耿而不容已於言者近見大學士申時行請册立東宫奉㫖元子弱少俟二三年舉行復覩聖諭封貴妃鄭氏為皇貴妃竊謂禮貴别嫌事當愼始貴妃以孕育䝉恩豈曰不宜但名號太崇其於中宫不已偪乎且貴妃所生固皇上第三子也猶然亞位六宫則㳟妃誕育元嗣翻令居下揆之倫理則不順質之人心則不安傳之天下萬世則不典非所以重儲貳定衆志也伏乞俯從末議収回成命以協輿情臣愚不勝大願且臣之所議者末也未及其本也臣愚以為皇上誠欲正名定分别嫌明微莫如俯從閣臣之請發德音下明詔册立元嗣為東宫以定天下之本則臣民之望慰宗社之慶長矣疏入上震怒抵之地乃徧宣二十四監掌印至諭所以册封貴妃非為東宫起見而科臣指斥過甚不堪之意以手拍御案幾裂中官環跪叩首上即欲批㫖意在予杖而手顫不能御筆如是者三怒稍觧奉㫖册封非為别故因其敬奉勤勞特加殊封立儲自有長幼姜某沽名賣直窺探上意著降極邊雜職云云得廣昌縣典史去初公疏上次日即下中官傳某親自領㫖甚急左右皆怵公懼有不測盍先服藥往公固不肯聞命即日䇿蹇出都門國本之議自公首發受嚴譴凡在京九卿科道及南都臺省申救者疏凡十數上不省而主事孫如法科臣沈璟至被杖幾死自後言者蠭起至於三案互發黨議相軋垂六十年然自立儲自有長幼之㫖出言者皆得藉口以取必於主上朝廷雖厭之而終不能奪也故事官降雜職者多投諜去鮮之官者公曰孰非君命耶吾焉避之居廣昌四年量移餘干令丁外艱服闋至京時太倉相求去公上書責其不宜乘機委卸詞甚切直别載文集中首相同郡沈公一貫公館師也嘗為人言皆吾君子也語傳播遠近公値之朝昌言曰國本未定諫官相繼得罪公何以謝人言沈公曰事至此即十張子房亦無益公曰如某所見正不須一張子房祖宗養士二百餘年豈無忠臣義士願以一死報朝廷者公但主持於上諫臣以死爭之於下殺一人復一人進殺至數人不止皇上亦且寒心此時公出而徐以一言囘之可不勞而定今大事之去留在相公公奈何遽出此言失天下望時聞者皆為頸縮沈公愈怒退復草疏尤激切其略曰臣既以身許國而陛下復以信許臣臣之初心未竟者十有六年陛下之大信未成者亦十有六年事在悠悠猶堪有待危機已著更待何時故臣不先不後欲以此日責大信於陛下以畢臣之初心且惓惓以釋危補過望陛下非得已也為國家安危慮為萬世綱常慮至急也初臣為諫官因册封皇貴妃有愼封典重儲貳之請陛下降㫖云立儲自有長幼以臣疑君賣直而斥是臣之罪在不能仰體聖心謫有餘辜也繼而禮官沈鯉有免斥言官之請陛下降㫖云因其寘朕有過之地故薄罰示懲是臣之罪在不能仰成聖德謫有餘辜也信斯言也陛下惟恐見疑於羣臣以得罪於天下後世將朝更夕改之不暇不意陛下之過舉猶故中外之人心轉疑初謂二三年舉行今且五之矣初謂睿質清弱今且強壯矣初謂先册立後冠婚今則反欲倒行矣夫冠婚可委曰清弱册立何嫌於強壯愆期不舉當機復靳假手於人借言於激人將有以窺陛下之微矣又奚怪乎盈庭之嘖嘖也彼偃仰風議之人方且怵威投䑕甘心煬竈坐視陛下孤立於上徐視隂陽之定而坐収其利即有曲意調停者亦不過就中轉移望風瑟縮殊未聞有招不來麾不去如古大臣之風者且此非特不忠於陛下而已究豈有工於為宫掖藩邸計而善成陛下之愛者哉夫有却座之諍始免永巷之菑人彘之鑑燕啄之禍非不炯炯也陛下奈何溺袵席嗜美疢甘為子孫賈無涯之禍而不顧耶夫弓不抑則不揚矢不激則不遠士不臨禍亂則忠憤不激烈以祖龍之酷尚奪氣於茅焦之解衣危論以嬴秦之暴士尚有建節􅀈屍闕下而不悔陛下欲以威刼正人而成其私竊恐威未及殫而大亂已成可不戒哉嘗讀史至晉獻公事重有感焉夫獻公亦中才之主其天性好惡非與人殊必且以並后匹嫡為無傷者而孰知用意一偏禍延再世社稷幾墟故人主之託身不可不愼託身賢士大夫不引而致之明盛不止託身於宦官宫妾不引而致之於亂亡不止陛下神聖英斷御一皇貴妃何足為患然亂自女戎三代已然其寵已極其度必移今道路之言日有聞矣咸謂册立不决由皇貴妃牽制所致甚者以為窺伺璇宫懐逝梁之非望又甚者以為齮齕震器徼壓紐之適然揆之理勢或非事實迹其隱微夫豈無因萬一外戚中涓有以邪謀綴皇貴妃者恐皇貴妃不得自由也萬一諧臣媚子有以家事悞陛下者恐陛下亦不得自察也臣又思之陛下動以祖宗為法而尤憲章世廟為兢兢夫大本之建列聖皆豫唯世廟差晩耳則陛下所法宜何適從哉若必欲取法世廟雖不建儲猶不殫令景王之國以絶羣疑而杜覬覦此又不定之定不立之立也獨不可法歟夫事關宫闈則夫綱宜正事關長幼則父綱宜正事關臣庶則君綱宜正嬖倖可從兩宫何為不可從冠婚可行册立何為不可行軟熟不激忠言何為而獨激此陛下所不能自觧於天下者也欲天下之無疑已難矣哉臣前為言官而言以職諫也今不為言官矣不當言矣然臣之官可奪而臣之志不可奪臣待罪五載不忍遽去臣非有所戀也受陛下之恩深義不忍去而坐視國事之日非陛下倘有感臣言即發德音册立冠婚一時並舉臣雖死猶榮若罪臣出位加臣沽名則臣已席藁括髪待矣㫁不願與中立觀望全驅保妻子之臣同視息於天壤也疏上留中公欲再疏爭之沈公鯉不可挽公手以付公座主敖公文楨曰君家好門生宜善成之敖公曰子不欲立東宫耶即欲立東宫不宜過激乃止執政既銜公嗾主爵無得隨例補除毎用啓事特奏之而上之始譴公也有不許朦朧陞用之㫖特疏公名於屏風執政覘知之故啓事上上見輙嘿然凡待命七年不報辛丑十月有詔立皇長子為皇太子公喜遂歸杜門垂二十年人皆惜公之不用以去且老公則謂吾身雖廢棄而其言幸已行行而宗社之計定天下以安是上之知我深逾於寵禄我也故雖貧無儋石儲而未嘗有愁苦不自聊之歎光宗立起太僕寺少卿御史逆案潘汝楨者舊為邑令多所乾沒公諷之亟至成嫌隙伺公抵京則隂令吏科薛鳯翔劾公老病失儀宜致仕鳯翔亦逆黨也公曰吾此行欲一見新君哭舊君耳豈能與若輩爭進退哉朝廷方下部以國本建言舊臣命從優議覆而公遽引疾去矣公釋褐庶常改給諫服官任事僅四閲月而謫謫三十餘年至京坐席未煖旋報罷蓋是時逆熖濳萌相與譸張為患者蟠結於中外如潘薛之輩其醜正嫉賢而欲亟擠而去之者宜也然公忠義偪塞所得自見者國本一疏耳猶遲久而後定中扼於柄臣後尼於羣小至不得使其身一日安於朝讜言碩籌鬱而不抒就其中如福清吉水諸公皆坐視顛蹶歎息而已不能一引手救何論其他天啓之敗政至於網罟塞路䜛夫髙張於公之一去兆其機矣此豈獨公一人之不幸哉識者謂公不去必與於清流之禍小人之忌公適所以為公而安全之也然豈公之本志哉公尉廣昌日進羣士而課之學宫延名儒秦先生為之師士苦府試囘遠則言於臺竟以名逹學使者著為例邑有白狼為害傷人積千餘公檄於邑城隍神捕得遂殱焉三淫祠歲殺人男女以祭否則巫言且為禍公下令焚其祠而民無譁者令餘干尤多異政有孝亷訴妹殺於其夫者夫監生某再殺其婦而及於孝亷之妹公受訴立至殯所將啓棺騐焉陸拊棺哭之哀公亦心動至夜夢婦被髪來目盡出手掐兩乳迸裂血流殷體且以告其夫曰不爾吾甘受罪及啓視則席藁以生納於棺宛如夢中所見者夫詞服而前所殺之兩婦其寃并得雪宋丞相趙忠定公汝愚墓道為守塜方氏所侵方宗彊其子孫茹恨不敢言公聞親勘還之為文以祭忠定未幾雷捽其人擊而斃之於墓下如倒植然樹碑禁民佞佛溺女所活民女子無萬計公不以謫官自處盡心政事亷潔明斷而本之以仁愛故凡所為兩邑興革利弊不可殫述而民皆得䝉其利歌思之至今此其尤稱道人口者公家居三十年坐卧一小樓於書無所不讀著五經緒言史論手緝二十一史平衡録醫學地理書各數種尤精於易有周易容光易㑹諸書皆晩年心得行楷法顔歐所讀書皆手書之累數千巻天性剛直遇意不可若雷抨矢激人無得撓者事過恬然不貯於胸待子孫威嚴若朝禮動必以法於鄉黨宗族以恩通籍四十餘年守先世遺産數十畆分毫無所增益租入不充而常欲節衣食以給貧者位不過四品闔門養重而人常翹然如利澤之及已萬厯季年税使四出令韓盡括邑中契劵所搜索盈萬金猶不已將開告訐之風名為覆實意主於破碎富户人情驚怖思變父老頂香至門求觧於公公謁令使強出其契事得止邑人感之為立尊德祠於北湖壖尸祝之而令遂切齒於公令故潘汝楨同里戚黨故汝楨之排公也益力然公自再詣京師目擊時事遂無意於用世嘗寓書族人曰吏部以掣籖官人兵部以封婚媚倭大臣皆持禄養交日夕如雷震轟然在頭腦上脅息無敢出一言為天下者中原陸沉恐不難致吾此身不可以再嘗試矣懼人怪吾狂言誡勿出其書自當時觀之宜士大夫之弗以為狂者百無一二也孰知其應在十數年之後若親見其事而言之者然不幸公竟以守困老矣鳴呼使公之得行其志其設施亦未可量也公三子長諱思簡户部司務次思素思復皆諸生崇禎十三年户部公請䘏闕下從子御史思睿亦上言之有㫖賜祭葬贈太常寺卿蓋異數云李節母邱太孺人傳婦人有從夫之義其不幸當死喪之威截髪剺面之死靡他此其節烈見稱者也其教子若雋母之見决獄多所平反則喜嚴母之以天道惡殺為誡此則明智最優者也二者俱足以砥淬末俗流光彤史今李母邱太孺人備是二者之德嗚呼是安得而不紀也哉孺人户部主事某女孫大行某女而今庶子掌坊事鎧之母也歸先贈公文學靜孺公公與其伯仲俱以文章有名於時世所謂淮隂三李者也孺人以孝事姑以和接娣姒而以勤儉治其家故自孺人之歸贈公家務日飭而兄弟師友歡甚交游亦日益進年三十遭變躃踊長號數日水漿不入口姑丁夫人勉慰之以養姑撫孤大義得無死次年㑹贈公伯仲相繼殁遺孤俱幼三嫠婦支持破屋奉一老姑甘㫖服物得無缺而丁太夫人拊孺人特憐之曰此吾李氏孝子也及姑病侍湯藥喪葬如禮兩娣姒卒字其孤如已出焉順治辛酉庶子成進士得蜀綏陽令母子不忍離萬里迎養於官至則命庶子亷得縣蠧弊數事乃焚香於庭令次第革除之誡以母擅鞭笞輕民命勿以絲毫取於民吾與若惟飲綏陽一杯水耳庶子入而禀母之命出而與吏民相見有所施設必曰非吾能為此吾母之教也即有所寛貸曰吾母不忍於汝也如是者三年民既順令之為教化淪浹亦翕然歸譽於母曰非是母不能生是子已聞孺人疾劇父老爭醵錢集社神祠願減算十日延母壽琳宫梵宇建齋醮無虚日死巷哭聲沸天白衣冠持喪者三月喪歸所過執紼號送男女奠酒漿跪拜匍匐不絶於道傳之所謂豈弟君子者庶子當之要之孺人之所以致此者不虚也攷古史家列女傳當居何等或謂婦人考終善事不足書則書其尤異者自古甘棠之思有及其母者乎即過而見思有若綏陽之民之於令之母者乎此而不書吾懼無以勸天下之為婦貞為母賢及為吏亷者也遂節其大概録之孺人卒時年六十五生二子長樾次即鎧論曰余從庶子於史館見其積學多聞而恂恂樂易長者毎暱就之不厭今年余將南還過其邸出母行述請傳其事適左右以綏陽邑子書來啓視之猶稱母之賢而惜其没累累百餘言計去母殁時已十餘年矣庻子方以文學當上知蓋異時不獨以其吏迹見稱者也周節婦傳古所傳列女有苦守無子或有子不嗣者有子姓成立而身夭閼天年不及終亨者又有堅貞白首子孫不克負荷門户零落以致終身茹苦而姓氏阻於上聞者彼其所得於天者已薄矣而人事之缺䧟又往往為其鄉閭所不樂道以是勸懲不立而節烈之寥寥無聞於世無惑矣若林母周太君以二十一歲喪其所天時已舉二子矢志不改親教子成立年八十守臣上狀受旌于朝如故事九十三終子孫男女四十餘人死之日服緦麻而位哭者八人焉此於天為獨豐於人為無憾於世為可勸於事為可傳者也先是癸酉年太君孫世榕來京謁選以與余通家世好過予述太君事請為傳未果今年四月伻來以行述俱且曰吾世父與父不幸皆先吾祖母殁今求先生為序者亦以抒吾之哀云爾予聞周氏為澄海望族太君祖諱某起家進士累官廣西按察司副使父文學諱某娶方伯鄭公女生太君十七歸文學公時文學祖户部侍郎忠宣公與其夫人俱在堂及舅姑兩世㫖甘柔滑唯是朝夕之奉養皆以太君為宜文學淸羸嗜學過勞得疾不起太君以撫孤故忍死進來終喪無笑容時長姒亦孀居命兩婢私舁篋金至請以仲為後太君辭曰繼嗣應否有舅姑之命禮子婦無私貸蓄此金何為者却之後姒改適而主其兄公之祭祀必潔以䖍以舅姑命也其課兩子也聞吚唔聲則喜或見篝燈至丙夜則又急止其讀每私念文學以苦讀傷性輙澘然出涕久之以是不忍過篤其子然終不令子知也自鼎革後嶺外久困兵燹癸已潮叛帥為變太君被賊執將刃之伯匿樓上踉蹌下救㑹仲亦自城奔赴母子相持哀號賊聞其節婦也憐而舍之前後㓂抄被厄者數矣闔門完聚卒無一及於難者人皆以為節孝之報其卒以康熈壬申八月至次年孫世榕之任藍田五年中治行日聞人謂太君之教有素報方未艾也此所謂于天為獨豐于人為無憾者乎余為之傳不惟其世好之謂亦以是為勸也已太君二子皆明經長曰某仲曰某昌化教諭世榕昌化子已酉舉人見任藍田縣知縣碑工部尚書睢陽湯公神道碑工部尚書睢陽湯公卒于位其孤以其喪歸葬于某原明年以官世治行來請銘余曰噫公之死宜得余銘久矣爰按公狀又徴之太史而以余所立朝親見者備銘之石俾揭於墓道序曰公諱斌字孔伯號荆峴一號潜菴順治五年舉于鄉次年㑹試中式又三年成進士改庶吉士邸舍不避風雨常坐讀書不妄有通謁給事中蔚州魏公吏部湯隂王公皆以清節名於時毎過門輙緩轡徘徊嘆息乃去甲午授檢討時議修明史上言宜依宋遼金元史例録南渡後死事諸臣執政詫其言疏上夜半傳㫖召至南苑人皆為公懼乃世祖皇帝顧與温語移時不以為罪也乙未詔選翰林科道出任監司公得潼關道副使是時黔師屯成都漢中經略兵屯湖南關中徵發四至民逃匿十二三公下車約束毎大軍至使人逆之境外無得入城總兵陳德之調湖南也至關欲留公謂二萬人坐食於此勢必不支然其母病不可彊遣也于是陳檄車五千輛騎報曰陳將軍實用軍二千其餘待折鏹以行公潜遣人僦車二千而民率匿車河下還報車少將軍乃謂公曰我自僦車盍畀我錢乎公曰甚善顧必以人量車毎車坐幾人使民知其不足而補之陳遽傳令軍中公乃出坐關門上揮士以次升車滿十輛即遣出關而河下車皆集漏盡四鼓悉出無一人譁者因設祖道關門外請將軍出將軍聞鼓聲大驚欲追還軍士公曰吾民一散不可復聚且軍已出關不得入也遂倉皇去至洛陽其母死留治喪匝月軍變焚殺上聞而關城以公故得晏然無事未幾流民歸者數千户歲早無麥而春夏兵餉例支麥麥價浮於榖公請發倉榖以代軍帥以為若是兵且變督撫徵麥益急公曰吾民乏食將為餓殍公憂兵變獨不憂民變乎即發倉榖與兵約今歲無麥食此明年將補支若麥而若以榖償官皆喜曰願如令於是關西數千里麥征悉停兵民賴之公蒞事精敏訟無留獄環境五十里聽質者皆不齎宿糧從卿士大夫咨民疾苦隨罷行之或有以私干者見公輙縮朒不得發嘗行勘荒遇雨止大樹下民朱欄其樹外時人以比諸甘棠焉量移嶺北道叅政轄贑南二府甫三日清積案三百餘李玉廷者明舊將以所部萬人入山為盜公以書約降之未及期七日而海冦犯江寧公䇿玉廷必變計夜馳至南安設守畢而冦果至見有備遁去隨請於制府用將士分屯要害五六處誡令固守毋妄動玉廷所向與兵遇遂就擒其黨亦解散公持身清潔所至欲為地方興利除弊其志甚鋭其才足以濟之而一本之於至誠故上官雖時有所牴牾而終釋其意不疑以有成功自潼關移任僅擕僕二人往返八千里既定大亂念封中憲公病甚即謀歸省督撫惜之例外官若非特薦不起公故有異母弟甫六歲督撫欲令權宜以終養請公曰奈何以此欺吾君也且謂無兄弟而歸吾父必不樂竟以病告罷年纔三十三云初明末冦䧟睢陽公母趙恭人以節死順治間始得旌公之歸也日侍中憲公及軒恭人色養備至而為趙恭人建祠于所居西徧每朔望謁家廟畢必至祠瞻拜歔欷里人私識其來時刻先後十餘年未嘗少差丁中憲憂服闋走蘇門孫徵君門請受業與同志為志學㑹講求玩索所養日充粹官長稀見其面有同年任方伯者見郡守問公近狀郡守對言實未聞有此人方伯益嗟嘆不已今上戊午詔舉博學鴻儒司冦魏公以公名上試補公翰林院侍講同纂修明史辛酉充日講起居注官轉侍讀典試浙江壬戌充明史總裁次年直講筵纂修兩朝聖訓公先講一日輙正襟端坐潛思經義比入講敷陳詳切務以誠意動上聽歴左右庻子擢内閣學士兼禮部侍郎居四月㑹江寧廵撫缺上命公往陛辭諭以朕非忍出卿于外顧江南風俗奢靡訟獄繁夥以卿耐清苦特令往撫之冀有所變革因賜鞍馬一綵緞十白金五百兩比行又入見上徹御饌賜之復賜御書三軸曰今當遠離展此如對朕也時上將南廵急抵任至則文案山積數日迎駕北渡江就舟中判㫁晝夜不假寐者六日而積滯盡淸公扈蹕至江寧上再賜御書一軸蟒裘羊酒傳㫖令逕歸署蘇松舊患積逋相仍有司不滿歲即罣誤去以故皆不自愛而私規近利上官隂持其短索賂益急虧公帑繫訟者纍纍公至則進州縣吏盡斥其所為且曰今與若更始苟稱職吾不吝薦引即不能以考成罷歸猶得完身名守墳墓奈何日坐堂皇引前官妻子對簿勘産反蹈若所為皆頓首涕泣曰公活我又誡司道郡守不得責屬吏餽金皆指天自誓曰不敢于是除耗羡嚴私𣲖淸漕弊汰蠧役行保甲革鹽商匣費一切皆以身先屏絶請託居數月乃劾其貪暴尤甚者去之自制府將軍下皆傳相戒不受所屬一錢奉使京朝官往來過客迅棹疾去停傳無斗粟之費吏治廓然大淸公之陛辭也上諭以積逋當以次漸理故公為政先謀寛民力興教化培植根本為務嘗請改並徵積逋為分年帯徵免十八九兩年灾欠减賦額寛考成豁逃丁調驛困免蘆課買銅除邳州板荒捐明萬厯年所加九釐餉聞有灾傷弊政不問部議可否疏立拜發亦恃上之知其誠悃故見事無不為所告無不盡也初至報睢寜沭陽邳州灾上為之蠲賦數千兩又報泰州灾並永蠲前二年賦次年淮揚徐大水奏免賦十餘萬兩又盡免髙郵寳應泰州興化鹽城等州縣賦復幾十餘萬鳴呼上之信公而加惠於民至矣公所以將順而宣布之者豈非所謂主聖臣賢千載一時者歟公猶以救荒之法為未備乃發常平倉粟及丐將軍提鎮𣙜關輸粟往賑又檄布政司以庫金五萬告糴江西湖廣或謂公宜先奏聞公曰吾君愛民必候㫖往糴民不溝中瘠乎遂遣兩同知行誡之曰若至極言淮揚飢狀米斗一金令遠近聞之糴財及半運未還而大賈爭泛舟下江市中斗米直百錢而巳後歲熟償庫國帑無損而民所全活者以億萬計有司請報湖蕩蓮芡公駁還固以例請公曰例自人作寛一分則民受一分之賜且蓮芡或不時熟一報部即為永額後欲去之可得乎凡禁遊冶驅優伶倡伎嚴市肆淫辭邪説之流行刋布者禁有喪家無得火化及久停柩者令下一歲報葬者三萬餘棺五通神者祠廟遍江南巫射利誕妄士女怵于禍福奔走如騖公取其像投湖中民始大駭巳而妖遂絶廣立義倉社學聚民講孝經小學月吉讀上諭律令舊俗丕變而或勸公以講學者公謝曰吾知盡吾職不知講學也又請為公立書院公曰吾不講學安用書院葢公之學主於隨處體認天理其要歸於自得而外貌闇然不自矜飾故人非久相識者不知其嘗學道也其學於蘇門也師法姚江而不以先入之言為主故於濓洛關閩之書尊信之尤篤與夫世之標宗㫖樹籓籬以自炫鬻者迥然異趨唯其一本于誠而已其樂閒靜甘淡泊天性也居官不以絲毫擾於民夏從質肆中易苧帳自蔽春野薺生日採取啖之脱粟羮豆與幕客對飯下至臧獲皆怡然無怨焉民間至以公姓為諧語謂之豆腐湯云蠲漕及地丁分年帶徵以部費為名前後𣲖銀四十餘萬布政司屢以為請且為樂輸公不可請之亟公怒將發其事吏叩頭謝久乃已及奏銷部核當罰俸特㫖免之歲大計籓臬託治裝遷延無行意公曰明日不行行劾汝矣不得已遂空手入都而他部毎郡縣坐勒費至三四千金不止公見屬吏必霽顔色告以君恩不可負民命不可殘懇懇如家人語故其下皆畏而愛之方整刷未竟㑹上諭吏部特授公禮部尚書管詹事府至則命公坐講問路所由及地方利病公以鳯陽灾對上遽遣官往賑尋充經筵講官總裁明史與㑹議上所以任公者甚至然公嫉惡過甚在呉時已有不便公所為者以為形已之短而忌之而公亦已久勞簿領精耗神疲殿幄起居動見抉摘部覆革職者再降調者一翰林院及詹事府公劾者皆一賴上寛仁曲全僅鐫級而已公請養母求去不得又自惟奉職無狀久留不可闔門屏營席藁待罪上特宣入則涕泣叩頭請死上惻然為之動容未幾遷工部尚書方受事而病已不可為已上遣御醫胗視疾稍間奉命詣潞河勘楠木感風寒歸遂大困臨沒戒其子曰孟子言乍見孺子入井汝輩須養此真心令時時發見久之全體渾然可逹天德若襲取于外終為鄉愿無益也復以聖恩未報母養未終為言挽子溥手以指畫草遺疏謝上五字遂瞑上聞遣學士多竒翁叔元奠椒酒命馳驛歸以尚書禮祭葬公忠孝亷潔出於天性臨事制義充之學問平時見為迂濶而當幾磊磊立斷馭下凛不可干而所在務寛小過撫呉時行取縣令二人于功令不當薦部議駁還上特破例用之今都御史郭公琇其一人也蘇有髙士徐枋居西山四十年不入城公屏騶從歩行造門枋終不肯出公嘆息而去時議兩高之其聞召將去吳也百姓啼號罷市十餘日投匭歛錢謀叩閽不得則老幼提攜奔送自吳門至江北千里不絶于道其没也無知不知皆哭曰正人死矣人謂公撫吳亷直似海忠介而去其煩苛精敏似周文襄而加之方正至其學問純粹有體有用藴之而為道德發之而為事業而人猶惜其用之未盡則有非二公之所得而與者矣其家居室無廣厦侍無姬媵日以讀書養親為事所著有洛學編二巻補睢州志二巻詩文二百餘篇公移條約十餘巻藏于家享年五十有九元配馬氏封㳟人子四人溥濬沆準女三人皆適士族銘曰惟湯於世寛始祖遇明之興奮厥武積功神電衞百户孫襲千户其諱庠自滁來遷家睢陽易守岷衞祖烈光六傳希范趙城丞子敏孫契州諸生三世棄武名一經尚書生也為國器性躭典籍弱不戱學播仁種耨以義朝出蓬山暮華隂遺愛衍溢留䖍南華山髙髙貢水深歸棲子舍矢不出再返玉堂詎意必掌帝絲綸預機宻帝憂南顧余汝賢公出整頓未兩年民蒸俗熈吏恪䖍帝曰汝歸司胄教夫彼已氏豈同調蜮含狙伺術已巧事有變遷理則那主恩前後無偏頗千載視此石嵯峨兵部督捕理事前浙江道御史徐公神道碑本朝有名御史曰徐公越者其仕在順治時及今上康熈之十三四年間而人望之若前世人其僅遷一官以謝歸其里未久也而人想其言論風采以為非耳目所常得聞見是不可以無傳也葢余伯兄大司冦嘗為之文以勒諸幽矣而嗣子覺復以墓道之碑跣請於余者以余兄弟知之尤詳也敢不敬諾公字山琢存菴其别號系本太末世家句章明洪武中以軍籍徙淮安衞自曾祖某以上皆不仕祖某父某誥贈中大夫祖妣王氏杜氏妣楊氏王氏同贈淑人皆以公故公舉順治九年進士外艱服闋授行人司行人十七年御試擢浙江道御史移疾歸康熈六年補山東道御史出尋鹽河東還臺内陞仍在臺久之補兵部督捕理事官旋請告遂不出公在臺最號敢言順治末兩年中疏凢九上自康熈六年至十二年共五十疏而于治河事宜尤詳論治河疏先後凡十一上先帝時請不時召見大小臣聽令反覆指陳以備採擇且曰臣願皇上留徙死之刑以待巨奸大佞其攖逆鱗者當稍示以優容寛好名之禁以厲中才下士其冒天功者則國有常典一時傳誦以為名言康熈七年駕將幸口外極陳地震之異乞勿輕動以順天意詔是之越四日又降㫖褒因徧諭羣臣自後事有闕失宜如前直言無隱不憚改更河南撫臣請急賑汝南諸郡部議以未報灾不允公疏不早報灾罪在有司百姓何辜而聽其茹糠咽皮生填溝壑乎奉㫖責其不報者而令趣發賑如御史言諸論川湖採取楠木累民論奸商大猾宜寘重法論經筵不宜久撤論官差不宜多員論屯墾之兵宜早安輯論五城棲流所宜修緝皆得俞㫖復因亢旱祁禱請寛逃人株連之罪則和氣自應事雖不行時論韙之先是州縣兩歲開徵本以四月九月有請如舊制者部以國用未足為言至是公言聞各省預撥餉銀除足備一年外存留尚多此而不足直待何時始足乎請如舊便十年㑹睢陽水灾上遣大臣行視公請于各州縣多分設米厰使貧民免失候之苦擁擠之患然後日日給一升每三日一放米以百日為率則一石之米可活一人百石之米即可活百人雖多至十萬人亦止費官庾十萬石耳使者與有司宜遍歴躬視勿急限還期勿預定米數疏入上大喜本不下閣即命賑濟侍郎田逢吉酌行而并九年八月緩徵一疏特召面陳反覆數四天顔愈和公應對詳敏在廷無不瞻聳者既内加四品俸益自感奮十二年糾定南王女孔四貞其夫孫延齡與撫臣互訐方在對簿不宜許其入廟上曰此女太皇太㕆所愛對曰即公主干憲臣亦須糾上動容可其奏家居十二年唯屏跡讀書人稀得見面沒以二十六年十一月某日也年六十有八配李氏贈淑人繼任氏子覺候選知縣女三人皆適士族孫四人曾孫一人以某月日卜葬于某原公居臺首尾七十餘疏而家本淮上目擊淮黄衝突居民昏墊漕道通塞之故其言尤多時有用不用然識者莫不謂然而以其不盡用為可惜銘曰黄入運河水緩沙滯天妃一閘以時啓閉公上書言宜如舊制加之挑濬漕行其事公又上言分黄導淮黄流漲遏閘不受淮則衝齧髙堰而髙寶其灾開支河地於黄家嘴弱黄分導淮不為暴公始上疏㫖未及降桃源湮墊决三百丈河臣呌呼公悉其故自三年前河水北衝南岸歲修五丈險工幸不相偪而噤不請塞淸河洲長裴口倒射今者之决理所必極河北數州積尸浮漂民之孑遺顛于為巢府帖旁午𣲖夫採柳採柳一束糜三百錢𣲖夫鵠面動集數千財殫民盡國何有言官為採募於事實便次及歸仁隄宜修復滚水之壩季馴倡築具載成書臣所諳熟石鐵灰樁於官取足明年七月三疏同日一請修髙堰髙堰之修係生靈百萬髙堰一决河口必閼河口之閼海口必塞上潰下塞是謂無䇿内遷留臺復陳河患夾沙黄流積淤成坂河身岸齊民其阽危孰為議者請開遥堤遥堤之設曠土則宜城郭接壤安用此為而况民舍墳墓俱隳為今之計莫若汰挑澗注芒稲畚鍤之勞勿惜勿遲黄淮滔滔上支勿治孰濬其尻臣昧死言以備芻蕘自公之去執言盈廷天子曰吁疇即余工公今既死詎復聞此吾書以告百爾君子銘户部右侍郎前福建布政司使櫟園周公墓誌銘公諱亮工字元亮别號櫟園開封人先世有諱匡者仕宋叅江西撫州軍事因家焉其後三徙定居櫟下至公祖鴻臚寺序班庭槐遊大梁而樂之復占籍開封鴻臚生子文煒即公父國子監生任諸暨簿公中明崇禎十三年進士授濰令是時濰被敵圍久公以一書生乘障親集鏃其身城以不䧟事聞行取授浙江道監察御史未幾京師破順治二年詔起公以御史招撫兩淮尋改兩淮鹽法道陞海防兵備道遷福建按察使踰年陞布政司右布政尋轉左首尾在閩八年其以按察駐節邵武也邵武在萬山中嘯聚彌山谷城外烽火燭天公權宜治軍事募敢死士日開門轉戰谿谷間多所擒獲夜則獨坐譙樓上仰天長嘯賦詩髙詠衛士擊刁斗聲中夜與相聞事少間建詩話樓祀宋嚴滄浪其上召邑諸生能詩者日與倡和境内益安為右藩時屢奉檄歴署建南汀南漳泉諸道皆數反側地人所顧却不敢就獨單車往來鋒鏑中百方經略所至輙見紀故自内台出境及被劾還質質竟轉逮復入都百姓皆扶老携幼頂香迎道左爭奉酒食勸盡觴號哭聲竟數百里閩詩人髙兆作四泣詩紀其事初公以左副都御史徵上章言閩事報可又宻有所建白頗摘抉用事者驟擢户部右侍郎而聞者咋舌曰禍始此矣未幾督臣果飛章劾奏詔赴閩勘比到前督已罷去按察使與五司理㑹鞠得其寃狀列狀上中丞時久旱牘具雨大㴻民為作歌曰束巻雨云復逮下刑部訊秋朝審可疑故事獄上可疑者報聞即釋而是時適傳恩赦凡已論囚概減等公反以赦例當隨輩徙塞外待春發遣縁世祖遺詔免尋以僉事出靑州海防道公生平喜為詩凡按部所過山川風俗及臨陣對敵呼吸生死居閒召客讌飲詼調吹彈六博揄袂獻笑無不以詩為遊戲心營口授史不給書而訟繫前後數年所得詩尤多方坐獄堂下健卒狰獰立銀鐺纍纍呼謈聲如沸手拲㨿地顧伍伯乞紙筆作送客遊大梁詩二十絶句投筆起對簿詩語皆驚人素與黄山呉生善呉從公獄中久其為北雪詩序略曰記初冬余與生夜坐為詩漏下數十刻嗚嗚吟不止或至心傷則相對泣嘗對卧薄板上忽聨句或兩人擁敗絮從口吻中濕不律露臂爭書薄板躍起短燭撲滅一笑而止其髙致如此按𤯝逾年遷叅議江南督糧道復遭劾觧職聽勘事觧尋卒公才器揮霍善經濟喜議論疾握齱拘文吏當大疑難剸斷生殺神氣安閒無不迎刃觧者自筮仕即在兵間尋擢臺職益欲以意氣自奮不幸遭亂歸才為時需十年之間晉歴卿貳然時時與世牴牾庚戍再被論忽夜起徬徨取火盡燒其生平所著述百餘巻曰使吾終身顛踣而不偶者此物也辛亥冬某遇公西陵佛寺留飲拊几太息謂余曰吾與子相見今無幾今我年六十子歸為我作恕老堂酌酒歌而已恕老堂者公所居著書處也余渡江詩不果作然竊歎公之才其轗坷歴落而老且衰於此視其中黙黙如不自聊將遂已也循公之迹考公之志則古之大人君子其身尊名立人望之者不可及而當其壯年逾邁俛仰身世出處盛衰之故其皆不自得者乎則夫世之辭富貴而就貧賤寧獨善其身以置生民之休戚理亂於不顧至于老死而不悔者彼亦誠有所激也嗚呼可以知公矣公好奬與後進嘗寘一簿坐上與客言海内人才某某輒疏記之諸所嘗經過雖深山穴處中物色無不到見少年能文士觭辭隻韻立為延譽或數屏車騎過之出其名字老生貧交相依如兄弟其為文及詩機杼必自已出語矜剏獲不蹈襲前人一字劌鉥湔濯而歸之大雅尤嗜繪事及古篆籕法每天明盥潄出外舍從容談説古今圖史書畫方名彛器皆條分節觧盡其指趣客退則手一巻燈熒熒然至夜分歸寢以為常元配馮淑人生子五在浚國學生孫男女四人卒年六十有一將以某月日葬于某原銘曰謂莫知耶為大司農謂逢其時胡蹶而終詭轡偭規滑稽乃容余不忍為奚辭固窮烏石巍巍㴞㴞大江文蒸武施唯公予功公之德威汔于數邦肆我文辭砭鍼瞽聾萬𣲖千支于海朝宗如賁待提如懸待撞晩歴􅋂﨑益放而洪誰其司之命彼祝融悠悠我思蒼蒼彼穹北山之崖嗟櫟園公山隂仲淵何公合葬墓誌銘甲寅歲余與山隂何嘉延同客揚州郡署毎言其先府君御史公事輙鳴咽涕洟不止而是時去府君之死已二十餘年矣今年復㑹于金陵得見故人魏冰叔所為公傳略而嘉延亦自以所譔行狀遺余求為之銘當丙戌五月江上師潰公棄官至剡之白峰自恨不及從亡則作詩投崖而絶久之復甦為土人守之不得死隨逃入萬山中披薙從方外遊晝夜作苦猶自謂去人境不遠復瓢笠往來縉雲義烏諸山與樵翁衲子侶行歌獨哭顦顇枯槁終至于一死而後已推公之心蓋無一日不以生之可悲而得其死之足樂也然公初嘗有意於用世矣其釋褐始令建平也邑故無城郭前令興築之未就公曰是東南門户也不可以無完功城之浹月而工罷民不知役歲久旱大江以南飛蝗食禾殆盡獨無入建平界者未幾以憂去蝗遽入北鄉於是民益以為神補任髙要端溪受黔桂諸流夏潦屢為灾即躬廵堤圩增卑培薄而蓄洩以時遠近反受其灌溉清𣙜關之假手吏胥得上下其手者掣視有定期商無滯賄官有裕課蓋公之所欲見於政事者方鋭未已此特其一二不幸又丁父艱歸隨遭亂未得盡試浙東事起強以御史召不得已就職建白數萬言或行或不行而事勢已不支矣墮白峰不死後入陶介山事山主雲藏襌師餔糒不繼隨衆樵汲同事者皆為公難之公曰吾視出没風濤間瞬息生死者何如而敢自言勞苦哉自此遊益遠入山益深﨑嶇崖塹鹽醯并絶所過皆留詩紀歲月遇髙僧郭蓮峯徴君李秘霞喜之結塵外之交舘留崇聖寺棃床風雨三人者相對黙語終日人不測其所以居數月而病作先是已丑四月公謂李徴君曰居此久幸少安顧此中常有戚戚者行别子飛錫白雲之鄉耳今留一緘與家人俟其來則示之至是病困令出所緘書讀之曰吾茹荼磨勵齎志至此沗厥所生毁傷莫贖於君為不忠於親為不孝死後切勿棺殮我當暴野三日以彰我不忠之罪三日後火化入塔不得袝葬先隴以彰我不孝之罪讀竟而絶然其家仍以殯歸葬於㑹稽上竈之玉几山者以公本非出世者從公之初志也公娶商氏大理卿為正子中書維源次女有婦德所刻苦佐公吏以成其亷隱以就其節者夫人之力居多後公十三年卒公諱宏仁字仲淵初中萬厯乙卯科副榜天啓改元覃恩以貢士試吏部得州守不就中庚午北京鄉試丁丑成進士六世祖詔南京工部尚書髙祖鎬曾祖㫤皆贈長蘆運使祖繼髙江西叅政父光道贈御史而母贈孺人陶氏禮部侍郎文簡公望齡之姊也公性至孝未遇時事親能先意承志所求無不獲人不知其貧然知其能貴而盡節於所事也少不為俗學所師友皆賢者既習聞外家教後劉公宗周講學里中復執經其門癸未進士余公增遠者字若水志節士亂後躬耕山中自匿迹不與人接公之歸葬玉几山也公子拜求其題主余公即許諾至期以舟迎之來不赴頃之自掉一小艇徑詣墓側取舊衣冠拜墓上事訖下山賓主不交一辭主人使客追之固留之飲食則舟中一庋粥一盂羮菜一豆取啜畢急挐舟延縁去㑹葬者百餘人皆目送嘆息謂非公之賢余公且不易得致也子三人嘉廸嘉建嘉延俱守先志不求仕今存者嘉延最賢有文行與余善女三人長陳次駱次魯其適也孫五人思永愈永悳永嘉廸出恕永出繼嘉建亦嘉廸出懋永嘉延出曾孫三人經鈺經鉎經鏐銘曰墮以崖不死歸以息如此嘿嘿乎誰與為徒生棄厥家披緇而髠奚别矣終返其室有鑱於縣孰鬱不宜孰謁不䖍御史之阡明經李君墓誌銘泗之盱眙有兩賢士曰李生嶟瑞嶫瑞同舉新令選㧞貢生來京師詣余於邸舍先之以詩各一巻詩皆有家法余覽而亟嘉之問其所從學曰噫先君之教也他日又來狀其父世系行事稽顙而請曰先君即世四年矣而墓尚未銘蓋愼之也今遇夫子而不得銘吾無以慰先人於地下余辭不得按狀君之孝也為母疾千里致醫得藥必親嘗終喪不室處其仁也環里門親黨之貧無絶炊者其重朋友也海内名士道經淮泗者視其家恒若歸其泛愛也雖書畫星厯醫相之士博徒劍客之至者無不館而食之其少時常負經世意髙視濶歩氣凌其儕輩已而志不就潦倒諸生間中遭放廢者數載雖人事錯迕亦若有天厄之者然久之始援恩詔貢入太學而君已病矣君廣渉書傳伸紙為文立就然性尤嗜詩而特工既得病坐卧一小園對花竹玩魚鳥欣然移日好友過從必強起延坐留飲食飲必賦詩晝以繼夜酒䦨燭㧞童僕僵睡或至日髙舂尚倚床苦索句不休自卧病二十年之中坐無一日無客客至無一日不吟風雨寒暑以為常竟君之卒歲君諱某字某别號西園卒以康熈二十八年丙寅之八月某日得年五十五元配王氏孺人繼王氏子二人即嶟瑞嶫瑞女一人適宋子僑其先世茶陵人始祖文遷巢明興以軍功授衛百户鄱陽戰没子寧襲職調衛泗州遂家盱眙焉祖某處士父某太學生其從祖官行人紹賢當武宗時直諫廷杖死追贈忠端者也公既好為詩嶟瑞兄弟跪勸止之曰爾毋然我吟得佳句體為之輕詩不啻藥石我矣以故君詩多幾至萬首今存者僅十之一藏於家銘曰詩道性情發神智兮滯滛結轖和扁與試兮沈思綿綿和湯液兮劃然理觧針石熨兮以詩為醫形往神留兮靈氣恍惝往來此邱兮如聞吟諷聲宛轉兮與俗刮除腸胃浣兮鳴呼君不尚有後其傳克遠兮桂林知府翁君合葬墓誌銘戊午歲在京師聞翁君武原名籍甚時君已為選人得黄州丞將出都與相見極歡其家故與余先兩世同年友余為文贈其行叙所以幸見君者而及兩家世契之厚既君佐治有成上計再至都余與同飯於汪祭酒宅遂别又一年君遷守桂林未幾罷去任旋聞其死也而悲之蓋乙丑年十一月二十六日也元配張宜人先卒於署至是十年未即葬孤震來京誦余向所為文謂習於君者而謁之銘將歸謀合窆焉翁氏先籍海鹽明正統間始祖茂徙居錢唐之鐵冶嶺二百年以文學世其家髙祖諱立德福建建寧府教授曾祖諱常益歲貢士祖諱聲業前庚午舉人入本朝官福建邵武府推官父諱世庸順治戊戌科進士歴官雲南廣南府知府父子所至皆有政績可紀君諱介眉字孟伯武原其别號自年向學時廣南公課以古學意遂篤好磨礲日新入成均毎試藝出必驚其同輩前後司成交重之然兩試於鄉闈輙不利而適當朝廷以新例招徠天下之仕者皆奮然曰吾與其以舉子而聽進退於有司也豈若應天子之命貲而官猶得行吾志其以黄州同知分治岐亭也岐亭去黄遠丞得代守親民事君乃洗手奉職釐剔弊藪勸農講學一切與民更始於是上官始嘖嘖歎君才時猶用兵湖南被檄解戰馬長沙又檄調巴東料理軍事不行委督造船湖南轉餉於辰靖二郡兩攝孝感蘄州篆蒞岐四載用賢勞奔馳坐席不及暖其攝孝感也岐亭人爭訴盗發近山非使君不戢欲奪之還而孝感民復爭之然卒還君於岐盗應時而散黄闔郡饑君親行郊野勸賑出榖百石為富民倡以故民聞巴東之遣而遮道號泣留不得行上官聞之遂追還前檄黄俗健訟君一治以清淨豪家多蓄奴僕失勢輙叛去有反刼制其主者君則威之以法其風始息癸亥陞桂林府知府省廣南公於潼關時廣南公亦被命新擢父子同時二千石皆翕然有仁亷聲先後抵漢上聚家人宴飲久之分道去聞者以為榮至桂林省㑹積案繁夥君隨機剖决庭無留牘居一年以斷僧元正不宜倚勢侵故相墓地葬其師迕撫軍意被劾明年制府白其寃事得觧然君竟以是去位而廣南公亦丁内艱將歸君欲往迎之知已發滇不果去逰粤東遇疾至英德卒於僧舍年僅四十一君生而王母父母俱存兄弟四人君為之長曲盡孝友道家無間言居官有暇即觀書常為本朝詩選士大夫多稱之張宜人奉姑童宜人於署能識君意盡力供甘㫖以時起居得其歡心與君同年生前一歲死故童宜人與廣南公之哀如後哭君云先是君隨廣南公隴州王輔臣叛略地至隴城無兵守被䧟廣南公走間道出迎王師謹侍左右不暫離家人皆避難山中震年九歲忽散為一卒挈至清水縣將西去有野老同驛卒二人知兒府中出從卒叩求得之投公父子驛中既歸治而家亦無恙君止一子震也今長大入太學能讀書紹其家從余求文以圖君之不朽於後君雖不幸蚤死厥施不大䆒積善之報其在此也夫震有一女弟許嫁知縣王永謀葬以某月日卜吉於某原銘曰君嘗自悲績學不第用貲起家遇違其志不知科名以人重輕仕非一途賢者餘榮彼之攘攘而綬若若以君視之鷄羣一鶴齊安之績匪曰予德惟良牧伯好是正直蹶於始安亦非已愆守道不容自古所歎黨邪醜正吾為彼衰方剛而殞復誰尤哉有德貽後有子肯構有述於文孰云匪壽明經呉君約菴合葬墓誌銘君呉姓諱鉅字任斯江南淸河縣人祖黄明萬厯年鄉貢士涇縣訓導以經義造就生徒多所成就學者稱為心融先生卒年九十有五少承先訓學務有本言動必以禮毘陵孫文介公愼行深所器重延致家與之講論易理成心易觧一編父諱某早殁訓導公在堂侍養備至間從容請質經義得其歡心竭力為兩幼叔營婚置産及其自奉泊如妻子至衣食不周不問也然呉氏世績學未有以科第顯者自訓導暨君祖孫間雖日以讀書明道為已任顧謂朝廷設科舉本以待文學行誼之士吾業變書為博士弟子而學力淺薄不足以稱明詔豈必有司不公明之過故毎至大比必持牒入省門囊巻槖筆與儕輩露宿堦下低頭就席舍年已向暮髪蒼然矣然毎試必興興輙報罷而君與訓導公俱先後需次為歲貢生薦於廷君遇康熈乙卯冊立覃恩例授州同知非其志也亟請於部改教職歸盡焚其所為舉子文字而以其所學教其四子皆成立元配髙氏孺人有賢行佐君督課諸子尤嚴常躬織袵至丙夜諸子請休不肯曰吾但聽爾曹讀書聲便可忘寢君初被貢後猶擕長子湛鄉試孺人典叙裝行無倦色曰吾於爾父子放榜時心胆俱碎矣嗚呼國家制科三年即放進士至三四百人少亦不下百五十人而天下省試所録士亦無論以千計其間賢不肖雜揉冠未上頭一經未上口猥立賢書冠進賢以文序於縉紳者何限而宿學碩儒砥行立名踸踔而不進終于襕衫席㡌齎恨入官如呉氏一門祖孫父子夫婦之間至于涕洟相慰勉貧老至死而不悔彼為之有司者果公與明非邪詎獨無人心耶夫自有道者視之窮通得喪彼在外者亦何與已事奈何當事者之曾不加意致使士没齒有不平之嘆也君享年七十三卒以康熈某年某月孺人後君幾年卒年八十子四湛恩貢生候選訓導沉邑增生先殁泓瀚俱歲貢生合葬君於某原以丁丑年某月日銘曰人言科舉有礙於學政有益于科舉兩者得失孰為細巨孰營營乎斯而能以兼取愚公之山三世以之子子孫孫山畏而移湛沆泓瀚角立嶷嶷有美封壤草茂泉滋魄歸其遲必大其筮誥封韓母何夫人袝葬墓誌銘古者夫婦無合葬之禮周公葢袝而孔子亦合葬於防其禮起自中古然禮婦死夫為之主宜非子得銘母死袝於父矣而復得請銘於賢士大夫者唐宋以來嘗有之葢縁孝子之心痛所生之日遠徒以致其不得已之情於其母耳故君子不以為過若今誥封一品韓夫人之葬非獨其情之不得已也其德更有足紀者此余於其嗣子銓兄弟之固請尤不忍其無聞也夫人姓何氏父諱某年十四歸於故兵部尚書兼都御史韓公諱某為元配尚書公父諱承宣謚忠烈明末為歴城令狥難家破公以弱孤童從王師数年又從世祖章皇帝入關定鼎擢吏部郎遷宗人府啟心郎公時悲念忠烈公不置夫人為言聞有姑尚在蒲盍訪而迎之以歸奉養是君終天之恨得釋而忠烈公為不忘也是時公居官貧甚乃鬻奩餘為公裝行迎王太夫人諸弟入都内竭孝敬之誠外盡中饋之道故王太夫人安之喜有賢婦而公諸弟俱得藉以成名暨公出撫江南再督師偏沅滇黔蕩平移節西川夫人皆隨行而其任偏沅與賊相持于七里山也夫人括家貲給飽騰鼓敢死之氣往往有烈丈夫概逮事稍間見居民室廬殘燬捐金造屋數百間以業民之露處者後子銓出守衡州有老父數十人拜馬前願一見太夫人為幸其遺愛感人心如是即所以佐公者可知矣夫人待庶子鏐有均平之德接猶子及族人恩意必周然性嚴諸子不正衣冠不敢見自尚書公捐舘數年家難作夫人備經憂患賴天子寛厚傾巢復完臨殁呼諸子榻前屬之曰我家非聖德保全㷀㷀一老嫗欲再見汝兄弟得乎吾今以天年終復何恨願若等世世勿忘上報君恩四字十弟令陵川歸亦以此語之遂取命服加身而卒康熈丁丑十月十三丑時也得年六十四歲子銓安陸府知府鏐髙州府化州石城縣知縣卒于任鈗應州知州鈞漳州陵川縣知縣錦候選知縣五子自鏐外皆夫人出女六所適詳尚書公表狀中銓兄弟既卒哭以今年四月吉袝葬夫人於涑水縣之新阡銘曰大人嶽嶽孕靈鍾秀亦資幽賛内德之懋猗尚書公四牧巖封既文以武著勲鼎鐘厥有賢配配惟以德順于姑嫜子承家克爰相夫子蔚為國楨佐籌行間才亦足稱没而遺誡小大莫忘耿耿君恩指此幽壙文學邵君墓誌銘君諱儒榮字仲木别號懼叟無錫人君殁後予嘗讀君之遺文而嘆後之學者自科舉制興而古文之道衰其患莫甚於今之所謂八股者驅天下之聰明才智以從事於無用之章句終身濡没而不得出故其間能以文章自見者必少年早逹之士而老生宿儒或不暇以為即為而不能工與不及俟其成因以湮没無聞於後世如君比者何限也予來無錫從君仲子紹棠讀君文財三十餘篇觀其所為顧太學子方傳與陳太守墓碑私謂漢太史公之法不傳於今久矣顧獨於今得之惜當時有司無知君才者而君儕輩亦未有商𣙜古今以斯文相砥礪者故君亦不能以功名自見即所得文旋亦散矣不自愛惜以是益落魄放棄其文亦不甚名於時以終邵氏宋康節先生後元末有科貢士諱偉者來居無錫是為十世祖明太祖定江南户籍無錫獨虞郡二氏得占儒籍故其家世業儒八傳為諸生諱某生贈叅議諱士宏士宏生壬戌進士山東右布政使司諱名世即君父也君少為貴公子文采弸襮所交盡一時名士以其間選伎徴歌而觥籌交錯投壺蹴鞠之戱以為常既屢及省門不第視天下雲擾乃日與其徒勤習騎射為鄉里守禦計自是無意於科舉之業矣連歲﨑嶇兵燹家益落亦不復能為向時豪舉日閉門誦經史子集每至終巻其部帙行次前後皆可舉覆故其為文悉有根底自君死後人稍知學為古人文字乃鮮留意於經術而規模近似轉相標榜其風漸繁漸熾浸以成俗君信能文章矣然生平不自炫鬻及没而猶無所稱於世而獨予竊歎賞之以為遠過於今之作者予之言果足重乎其或者不足以取信則君之厄於前而伸於後者亦未可必也君才略倜儻天性至孝初亂起獨走數千里抵山東從羣盜中扶掖方伯公歸其家已邑中諸少年乘亂欲刼掠富人家為變君密數其豪數人給之粟而以好言餌之謀益觧邑以無事丁酉友人以有事逮獄者君間至京邸經營之事得末減歸而鬚鬂為之盡白諸相往來遇緩急傾身濟之終以此竭其貲而不悔亦不以矜於人晩棲心襌寂常布衣蔬食日坐卧一榻雖文字之縁亦不復作然君年未老其氣力猶未憊宜可久視徜徉於世一旦患左掖微痛針熨不得施五月而卒豈其所見者達而其中猶有未盡平者哉君卒於康熈乙巳某月得年五十有二元配唐孺人與君同庚先十七年卒子五人曰紹聞紹棠紹祖二殤女五人皆嫁士族紹聞等以今年卜葬合葬君於小嶺灣之新阡君之屬纊也家人泣問以後事曰吾不孝不能為八十老父計何暇計汝等哉終無所言後三年而方伯公卒方伯公為吏亷殁時幾無以為殮其父子之間有足悲者銘曰其才以窮其命之逢嗚呼命兮誰司之雖不吾以昌厥辭我銘其幽君當知掌京畿道事監察御史任公墓誌銘今年夏四月二十有六日御史任公病卒於官嗣子筠偕其弟塤坪將以某月日歸葬於某鄉之某原以狀來請銘按狀公諱玥字少玉希庵其别號中順治十五年㑹試十八年成進士康熈八年選知山西石樓縣事考選授浙江道監察御史巡視長蘆鹽政囘院晋掌京畿道事卒年五十六歲任氏世大梁人始祖仕宋為髙宻尹家焉名其所居里曰梁尹社曾祖鎧太原府通判祖澄父復皆邑文學復贈如公官母鹿氏贈安人初公兄弟四人伯瑛早卒仲琪季珂相肩隨受經外傅公姿性開敏所讀書過目即能了其大義弱冠操筆為文已與兄琪齊名矣乙未琪第進士積官至禮部員外郎後三年公遂聨舉南宫㑹聞贈公疾不待廷試立馳歸時禮部亦觧登州學職歸養公與其兄弟三人侍疾視藥劑温凉燥濕問起居食飲宜適與否必謹沒則盡哀歛送以禮由是鄉里稱之其為石樓也邑故磽瘠民間不知紡織公令家置紡具教之法月責布一端賞罰其勤窳者於是民始興於婦工縣去河東觧池幾千里而食平陽鹽轉運萬山中勞費以數倍民苦淡食公議食汾鹽固請於上官乃得民至今䝉利御史巡城時以軍興攤門税移屬於正額外無敢私分毫入視鹺政疏劾巨蠧為商民患者釐剔夙弊盡根株乃止還臺封章十餘上中如免粤西帯徵錢糧及軍政宜與大計同行請為宣聖廟立碑疏俱得㫖施行然公意猶未巳也每朝囘簾閣㨿几伸紙䑛筆摹晋魏人書數十行濃淡疎密皆有意謂子弟曰吾作書萬慮俱遣亦收放心一事然知公者以公雅不好閒窺其微意如有不自聊賴者無已而託之於書又卒晦其説如此雖子弟不欲令其盡知可悲也公素友愛自前年冬禮部去世明年弟明經繼之日益傷悼不自勝遂至不起初公以御史需次於家邑大歉與禮部捐粟三千石食餒者所全活數萬人故死也人莫不哀之遺書有敬事初編二巻元配閻氏累贈安人繼丁氏封安人筠閻出貢生塤坪丁出塤邑文學坪舉人女三長適諸城候補行人司司正李濰潤次適邑文學王自惇次適登州文學沙汝肥孫三士錡士銘士鉽銘曰為吏也良躋於廟堂嘉言用彰不容容而居不逐逐而趨命止於斯而志則有餘落落寞寞其中有託豈其於世有不如意不歌而喟世眞可棄澤未究施算不厄而身亨而道年五十九不為夭羣挽推我無動一人同之可謂衆生不虛斃以正弗之有悔視治命葬三年如有待為我助者其東海文學馮君墓誌元恭以庚午年十二月某日卒去年余南歸其孤用潛稽顙而謁於余曰吾父之卒前數日自整比其詩文數十卷已命某從牀側盡讀所為詩某篇宜存集中某篇宜去或口易數字而後存者讀既命復之某曰夫子之病亟矣願少息則遣誡喪事宜一遵家禮歛以深衣巾履不得隨俗作佛事凡故人所親厚者各口占書與之訣又曰下窆宜有銘以請於執友姜君吾平生其所知也初余與君交時纔弱冠居相鄰也始用詩詞相倡酬已應諸生舉去為時文俱不意得則學為古文毎晨坐談論至忘寢食巷中兒爭笑以為癡及余中歲負笈遊四方為衣食計又數從鄉舉未能卒業斯事而君獨家居能日致甘毳侍養太夫人以其暇温習經史汎濫百家屢從方外人遊究其宗㫖性又通悟洞觧樂律旁曉青鳥遁甲家言時時為人稱説城北郊故有宋楊文元公慈湖書院於是又與里中耆宿朔望詣為講學之㑹雖應舉業亦不數作故三四十年間元恭之文日與道偕進而余為文至老不能自名其家至於性命之學槩乎未有聞焉凡此者余之所以有愧於元恭顧元恭有勝余無不及也猶憶往時里人有暴死者余曰是不知怖死亦省諸苦元恭曰不然夫臨時須了了彼神識昏憒如何離得生死及觀君彌留之際若眞能談笑於去來間者然後知向者慈湖之㑹君蓋實有得力至此而始騐也君嘗獨處一室垂簾靜坐其中晩益不喜以學道為門户雖講學之㑹亦不復舉務在躬行而已而近來標榜為名髙者競牽挽之使入竟掉頭不一顧君豈固以求異為哉夫亦誠有所見於中不可奪也自君沒而余之道益孤講求亦日廢其將終其身以訖於無所成也故於志君之事有餘痛焉君諱宗儀姓馮氏元恭其字别號魯菴曾祖光禄寺丞諱某祖贈刑部員外郎諱某父諱文偉明崇禎丁丑科進士歴官揚州知府以文章為名太守母楊氏封恭人娶通山令周某女生二子長用潛邑諸生文與行足世其家聲者次用凖次用潤女二適太學生王某諸生周某皆前卒所著有春秋三傳謹案三禮謹案律吕謹案文集詩集各如干巻君以癸卯年逰京師舘於大司冦徐公邸踰年病脾歸後再往病復作歸僅兩月而没其歸也徐公資之行至腆其没也許文表其墓而助之葬云太學生謝君墓誌銘君謝氏諱諤昌字殿侯以康熈壬子歲十二月初二日殁於京師而葬以今年壬申之三月壬子者方殁時以孤幼有待也君將葬之前月仲子緒欽持伯父大周所述行狀謁余舍請銘殿侯從余逰久其行事余所稔知固不待狀而信而大周之述其弟無諛辭余故按其狀以余所見聞誌之墓君為人沉靜不佻肫篤於孝友無他聲色嗜好雖羣從相聚圍棋賭飲君黙然無所與吟誦之暇正襟寂坐而已既補邑博士弟子員丙申丁酉間從余為制義時余尚年少見君兩房兄弟十數人登梓山㑹課競出意見恥蹈襲為文多倜儻雄邁之氣而余亦攘臂其間以為文家務出竒無窮當如是獨君持論根柢先正操筆不苟下凝思良久必㑹文切理合於法度然後止及成出示同學者余與諸君未嘗不稱善而其尊甫給諫公尤時時賞愛之以為不後於諸兄君狀貌白晳豐下大耳凖相法當得壽以貴以故給諫公屬望之頗切無何公捐館封太孺人老病在堂君兄弟皆尚不得第君奉太夫人盡誠敬道常侍飲食次陳説古今史傳所記載事蹟嘈雜兒女啼笑並作冀以此博老人歡退而竊歎碌碌懼終不足以當大人意遂鋭意入京逰太學經年忽患痰氣逆上自漏初刻至夜分死時從兄御史瞻在及兄子明經敬躋在邸中與訣口不能言引敬躋手以指畫大人兩字於掌上遂瞑其死不忘親如此可銘也已謝先世宋平江人建炎進士諱宇為定海令遂家焉曾祖大綸以仲子渭仕明萬厯間四川布政使司左叅政贈如其官父諱泰宗進士令番禺陞工部主事改兵科給事中元配葉氏封孺人生四子最後得君生甲戌年七月二十一日卒年三十九娶董氏子男二人緒禎緒欽俱邑庠生女三太學生任琯玉邑庠生王之純及丁慶潢其壻也緒禎兄弟卜吉葬君於雁蕩鄉之新阡銘曰韓退之之哀歐陽詹也曰詹在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以志養者與嗚呼君於遇可謂不幸君之志視詹可以無媿方君之生也才而父知之其死也母哭之哀比其葬也下從其兩親以遨以嬉而又奚以悲贈工部營膳司主事張公墓誌銘余至都之二年歲癸亥秋今工部主事撫寧張君有園在阜城門外東北陬修登髙故事置酒召客南北知名士㑹飲者三十餘人於時主客衣冠濟楚揖讓登進禮容之盛尊壘几席圖史之設上下池舘流眄花竹客無不灑然意得者酒酣以往分曹限韻各賦詩一章以退蓋是時都下文㑹寂寥久矣明日相傳以為盛事余亦因是始識工部君先是君尊甫贈光禄公已棄世二十餘年太夫人在堂君自是以終養告反津門矣數年太夫人即世工部君既扶柩數百里合葬於撫寧某原之舊阡而以隧道之辭屬余者以光禄公早没渴葬銘詞未備且以余之獲交於君習聞其家世故也公諱某字某世永平府撫寧縣人少孤貧嘗躬耕塞下獨用恩意徧結其裨帥使約束所部無擾我閭里賴之耕作以安於是豪長者羣推服以為能久之不樂葬其父母服闋隻身走京師隱君某公者一見竒之妻以女遂家焉即封夫人某氏者也公渉獵書傳其依傳經義欵曲為人言仁義忠信之道若老經生家聞人善稱之不容口即見有過揜覆之如不及於前代史傳興衰是非得失之故娓娓談説洞中肯綮如身與其事者時為人謀議事後不失銖毫以是縉紳先生咸樂從之遊所居纔陋巷席門車騎過從不絶也後徙家天津稍事居積家益大饒然常所餽遺賑恤費累千金松江守張君未第時落魄無貲賴公經紀其家用及為吏貧不能之官纎悉皆取辦公無倦容公没而張為制服以報其感人如此年五十七卒卒之時工部君始七歲夫人則舉契券簿籍悉付之公仲弟長齋誦經絶口不言外事而家政益修勅張氏戚黨歲時來者虛往實歸為工部君延明師廣市書籍以資其學業工部君以藐然孤童得遂成立夫人之力也曾祖某祖某父某公卒于康熈癸卯年某月日三世皆以工部君贈如其官惟古之制曰夫尊於朝妻貴於室爵不上逮也自南北朝始有封贈其祖父而自父以上官以差殺未如近制之隆厚漢置武功爵官首補吏與今例畧相似然爵僅得至第八級樂卿止耳獨工部君績學登朝聲華蔚起贈及四世階崇一品遡厥發祥所自既受得祉僉曰宜哉雖朝廷一時權宜之制所以彰善勸後者至矣工部君名孫五人銘曰始嗇終豐以道不窮既豐而死惟有其子非惟有子内教克理紫誥煌煌命服有章或被於身或賁有藏襟海帯關我藏孔安是為善人光禄之阡周節婦墓誌銘陳子大成以其祖母周孺人之銘來請曰願有述予曰孺人守節之始末可得詳乎大成曰吾祖母年未三十而寡八十八而壽終既寡之十餘年某父母又不幸俱没撫某不肖孤零丁孤苦猶幸上無奪志之親外無侵凌之暴故得以安守其志節而不至有毁面裂身之慘可以驚世而駭俗者雖其更歴五十八年而名不出于閭門然至今居吾里者見吾祖母之終始不渝其志莫不交歎以為難能見其雖老而強飯享逾中壽又莫不以為所宜得見吾兩世之無所成立而不得以養又莫不以為天道之無知而為善者之爽其報吾祖母之賢其在人耳目者如是而已唯是大成孤賤不能上於朝而褒旌之如禮非子憐其志而述之則後世何傳予謂婦人之道無非無儀故列女之所録者蓋少其可傳者以其處變而能者為竒節以列於後世耳至于履變故而不失其正區區榰拄如孺人者卒立門户此中庸之行君子之所樂道也孺人夫某子某孫大成某月日大成以其柩合葬於某原銘曰婦一終士固窮孰渝之視此封湛園集巻五
