body:
  text: 湛園集卷三翰林院編修姜宸英撰記重修嘉善縣署記古之為政者非獨以簿書聽斷為急也澤有津川有梁賔有候館野有亭障凡所以用其心者無不至若此者非以勞民也蓋教濡而德孚則民不期競趨而集其事及乎政成既去而歌思之雖所嘗憩之樹木猶相戒不忍剪伐其枝葉况於朝夕居處以出號布令而身經營之者宜其所繫於民心者益深不僅如津梁候館亭障之為設而已而歌思以樂傳之者又不待其既去而後然也嘉善故嘉興縣地前朝宣德間始分設縣治而署之建而圮圮而復新者數矣某覽其邑乘考其當時主者之爵里姓氏多不可得豈以事微故略而不著歟或者其所用心不能盡如古人故至今亦無得而稱之歟邑故劇地自豫師莫公之筮仕於此人皆為公難公洗手奉職拔去故常嚴霜加於豪猾和風棲於窮閻登進秀良討論文義民俗蒸然丕變矣先是官署器用常取給羡餘一有期㑹團里次甲供其芻食公一切除去家世陽羡薪米酒醴泛舟之役不三舍而至一勺之外弗以纍民夏秋兩稅用符下諸里符到以次輪輸閭閈絶追呼聲伍伯㦸手倚墻終日無一人後通者故報課常為諸邑先視事未期大小事悉就理乃仰瞻其堂則頽焉剝焉漸欹以壓公曰吾為天子牧養民是之不葺非所以係觀瞻始謀於其屬諏日鳩工民承命荷畚偫挶任輦恐後未閲月而堂之缺者完蠧者堅黝者堊墝者甓凡幕宇帑藏廊廡之屬以次整齊是役也撙節取具材不費城守用不煩官府公每旦夕視牘堂上吏民序立庭下益􅋏以嚴耄倪歡悅頑冥滌慮某日受公異知千里來謁門下始至則問父老言生身六七十嵗未嘗遇侯若此咸謂是堂之新不可以無述公亦以其用心之所在懼其久而易沒也命某紀其事公廉明聞於牧伯纍被褒旌近所條兑運六條頒下諸郡縣為式其見寵優如此今朝廷方行外吏卓異之典待以顯秩當事旦暮以公名上則嘉善之民且不得久私公何有於是堂耶然自縣分治以來為吏兹土者非一人矣而民之戴公也特異於前豈非仁愛之結於人心不可强哉使後之至者忘畫一之守專務更張則小民何望不然而潔已奉職以世世繼公之德於不替將我民終有賴焉而斯堂之建而圮圮而復新固可以一俯仰而得所取法也已某辱公門墻之末敢不敬志惠山秦園記天地之大昔人等之蘧廬至於宫室之麗亭臺之勝直以為寓目而已視其轉易成毁興廢之不常特瞬息間耳而傳之一姓以至數百年之久此自古未有也余少時讀吾鄉屠儀部惠山園記謂其中之上干層霄下蔭數畝者幾數百十章有泉從惠山寺而左淙淙㶁㶁注為清渠日夜流不涸中疊石條為細澗分流並涓潔可愛園固秦有也然自端敏公迄中丞公之改葺時計將百年屠公已歎為難得今去其為記者度又可八九十年而古木清泉蒼翠無改向時結構雖不必盡存要之有撤而更新無蕪而不治也豫時與客遊其上或指示豫山寺故為宋湛長史宅其南麓唐李丞相紳讀書樓旁去數武為宋尤文簡公遂初堂故址不獨其室宇無存而其子孫亦零落盡矣若愚公谷者一時勝絶吳中今亦將漸廢而為荒墟夫物之有成有毁此消息之常何足深論惟搢紳有道之士能持身正直創業以世其家而子孫之賢者能修德以光大前烈此百世不忘者也今以一園之有無為秦氏重輕者故不足以知此而因此知秦之世有令德將裴徊瞻眺之餘必有感慕而興起者莊子曰舊國舊都望之暢然不然彼獨不能以忘情乎哉園今為太史對巖公有太史日侍養園中讀書承歡饔飱必潔其父子兄弟常熙熙終日也以此思秦之世德所從來矣五園圗記奕美何子家山陰之峽山去蘭亭舊址五里許嘗欲傍山依流結園雜植花果叢竹菜茹靈藥竒草於其中而未就於其遊也命友人鍾陵樊㑹公按其山川營構而為之圗又屬豫記之庶時觀覽以自慰焉今夫士之窮居蓬蓽揣摩干進者其晝而思夜而夢所為取富貴立功名以及於宫室田園妻妾之奉子孫之計無所不至及其思䦨而夢醒回視所居依然四壁也此真可謂之妄耳若夫所求者僅在一邱一壑魚樵麋鹿之所羣居而獨遊此復與造物何與乃亦若有靳焉而不即豫求焉而不易得者而徒托之無聊之思則士之窮至此誠有無可如何者矣此五園圗之所以作也雖然以圗為妄耶則非獨功名富貴之不可恃即一邱一壑之孰為吾有而執之以為得喪邪以此圗為非妄邪則古固有戴冕垂紳鳴鐘鼎食享天下之奉而若固有之者蓋君子無入而不自得何子雖倦遊吾知其於蘭亭之所謂崇山峻嶺茂林修竹之趣無日不在胸臆間而特以其興之所托無所往而不遇也則於是圗蓋亦有足喜者焉持敬堂記三代之制營立宫室有廟有寢寢廟之中皆有堂而古者家有孰凡里之子弟之俊秀則畢集於孰而教之爾雅謂孰者門側之堂所謂夾門堂是也以此知堂者亦古人所以為教之地也古一命以上皆别立宗廟以祭而今自公卿世胄以及士庶人無不祭於其家者故以為迎神獻尸祼鬯登餕徹爼以著為趨蹌駿奔之儀賔客宴衎入席敷坐饋食進餉以立為旋辟登降跪立拜起之節冠有三加昏有六禮無不恪恭齊潔而於堂乎觀禮者故君子入其門登其堂則無敢弗敬焉先是河南二程子以持敬之學教學者其㫖以嚴恭儼恪為要其功始於動容貌正顔色出辭氣之間而推之至於盡性達天知命蓋作聖之基學者無時而可離者也南宋時有吳柔者獨傳得持敬之學於朱子歸而教授鄉里以學世其家今長洲吳氏其後也夫敬者非獨以整齊其身而巳凡父兄之教其子弟與其師長無以異也然自道之不明學之不講則人不知所以齊其家而教亦愈失何也彼齊家固莫先於子弟也今之為父兄者固日夜以望其子弟而利祿之事射覆揣摩之術有一之弗工則戚然為愧以忿彼之為師者亦以其父兄之所望而勉且力焉利欲薰其中得失紛其外譬之於馬羈絡而馳驟之非不善矣然而舍其五父之衢而試之江河則陷溺隨之矣今之不為陷溺其教者誰也余於吳氏之堂有感焉至其堂聞弦誦鼓歌之聲則辴然喜入觀其圗史陳設師友賔主所議論弟子磬折趨走階序雍雍乎秩秩乎其習乎禮也蓋吳君既以其先之所嘗聞於師者銘於其堂而又延良師傅帥子弟教習之以聖賢之道以合於古人家孰之義則可謂能不陷溺其心而庶幾乎嚴恭儼恪以期於盡性達天知命者也今世士大夫家輪奐相望落成而名之備極五福之辭若類於世之巫祝者非所稱貽謀之善也吳子獨能不以世俗之所棄者為迂闊務勉其子於聖賢豈不卓然有志之士哉使吳氏之有成俗其庶有變乎雖然不可以不誡也吾願君子孫居是堂者無以險詖驁慢之心入無以驕僻放侈之行入無跛倚怠倦以為堂之享祀無俾晝作夜以為堂之晏飲無淫朋狎遊六博抵戲浮談不根以為堂之周旋晋接左氏曰有敬無灾衛武公以敬威儀慎出話為子孫萬民繩承之兆保世滋大莫過於是夫聖學之不明於時久矣吾於吳氏有厚望焉狄梁公廟記甚矣賢者之流澤逺也八月豫道東鄉歸避雨古廟廡下仰見題額塵埃中曰唐丞相狄梁公祠按唐書梁公嘗以冬官侍郎持節江南巡撫使而唐貞觀制分天下為十道明州屬江南道為公使事之所及其私被德而尸祝之於其鄉里或然也豫既揖而降謂其里人曰若知兹祠所由建乎神何為者曰不知也相傳其為宰相時挈女后之天下而致之唐豈古之忠臣耶豫曰然然則其廟食於兹也其亦有靈否乎曰是惡得無靈往年有不敬於其父者見有神若殛之不旋踵已有不義而謀人之資及其身者神殛之亦不旋踵其為善者則否吾春秋享薦無後時者是惡得無靈豫聞之憮然按公生平一為寧州郡人立碑以頌德活死罪二千人相牽率哭碑下三日乃去再為奸臣誣貶彭澤令邑人復置生祠奉之遷魏州魏人亦德之為立祠其所至得民如此當其使江南時毁淫廟以千數僅存者四詎意其身更一千餘年後瀕海遐僻之鄉村落之聚復有所謂狄公者而爼豆之如數邦且為之賞善懲惡降威福於其地哉亦可異矣里人曰是祠幾毁行謀葺之子盍為之記豫乃指謂其人曰夫公太原人也其服官足跡疑未必親至於此然汝祖父以來皆祀之無異辭者何哉以其忠於君而澤於民也夫忠於君而澤於民雖非其地之生與未嘗親至其處而民爭廟祀之不衰其為臣則反復不忠其為民上則貪且暴則雖其生長之地與其親歷之處民愈加疾怨詈之唾棄之焉是不可為人臣者之明鑒乎非獨此也汝鄉有善人焉即徙而之他所鄉之人必曰某固某生也其他所人亦必曰某地某之所經歷與其葬處也夫孰不愛而欲引之近乎即其違道悖德為不善於鄉以沒者不獨其鄉之人疾之雖其子孫亦以為恥問其姓氏則諱若不聞指其室廬墳墓則變色疾趨而過也夫孰不惡而欲推之逺乎彼與公為難者來俊臣霍獻可之徒今皆安在居其土者奚待其善惡之著禍福之及是尚不可入廟而知警也哉里人曰善遂記其辭於石小有堂記有林蔚然從數百武外望之隱出於連甍比宇之間是為葉君九來半繭之園先是君曽大父孝廉公經始於邑東南陬父工部公稍葺而大之則園之修廣幾六十畝工部晚年析園以為三以與君之兄弟而君得其東偏之半於是小有之堂橫踞兩山間反處園之中焉自君之處此益務修治凡一椽一石皆身自經理位置莫不有意嘉卉林立清泉繞除客之來是邑者君未嘗不設主人既與之遊而飲酒賦詩則未嘗不維縶信宿而後去蓋園之至君四世矣其同時之廢為榛莽或易名他氏者多矣而是園者至今無壞益新則以君之能無忘先人之業以然也或謂君以彼其才宜早自表暴取世光寵顧退而自安於邱壑誠非所宜余謂今之汲汲自勵為當世資者非必其天性皆汨沒於富貴利欲者也蓋亦有求為買山而隱而不得者而隱忍以就之蘇秦曰使吾有田二頃安得佩六國相印乎由今觀之六國相印之與二頃田所得孰多况又有求而未必得者耶葉君之賢其知之審矣且古之君子雖其功成名立巍然係天下之望猶常以區區者與夫山人逸士爭其所嗜好於一泉石之間此其寄託者甚深未可以常情測也劉孝子尋親記初順治乙酉五月王師破建昌城明益王遁去長史劉君某挈家亡匿山中卒其伯子某即孝子也為諸生先赴試歸吳未得父耗憂泣成疾戊子嵗始決䇿至旴江時亂後藩府毁廢舊人無在者邑有張令公祠宿禱焉夢恍惚如聞神語云寄居石漈者醒求其地不得傍偟道左遇一尼謂曰石漈在閩廣交今方阻兵道塞有徑潛行七日可達也遂如其言取道往所過藤峽通仙一線天皆山谷窮絶處蒲伏晝夜行數百里不見人烟最後至白石嶺嶺陡插霄漢阪道狹者才六七寸俯臨不測之溪捫壁絶險既上復下履巉巖衝虎豺攢棘被膚血流殷足每仰天一號則陰風颯然山木悲嘯瀕於阽危者數矣嶺盡得村尋得父所依姚氏居母管孺人在焉既入門母子相持而泣已問知父喪行一年所則號絶仆地久之始蘇居數月間關輿櫬復踰嶺侍母而歸歸十年母卒當母寢疾孝子侍湯藥不解衣帶者四閲月也初長史避難數遷獨攜先世世系圗册一篋自隨至嵗戊子母時聞有聲窸窣出篋中啓鐍無有閉則復然一日母見緋衣人數輩冉冉從篋中出益大驚逾宿而孝子至其所居村見娘堡舊傳宋王龍山者於此見母得名異矣哉鬼神幽明之故君子之所慎言也而父子骨肉之間顛沛流離之際徴應巧合又往往若有陰相之者非茍然而已也其子某因婦翁金進士穀似屬余傳之余嘗慨自明季中原兵起延蔓四五十年其間父子分散各所夫婦生死異路抱忠孝節烈名填溝壑者何限其幸不相隨以沒而間著於逋臣逸士之手者又多避忌諱不出或文辭蕪漫不足以傳今表孝子之墓有韓閣學之辭特工又綴以余文則所以不泯君於後世庶在乎此也孝子字蓼蕭蘇之長洲人蘭溪縣重建尊經閣記蘭溪縣學之有尊經閣建於明嘉靖間舊矣後圮不治經籍散失士子無所於考則古學愈以荒廢嘉善陳君霆萬教諭於邑之二年始請於前御史張侯相度舊址謀重建之經始於康熙二十六年之五月比七閲月而竣事户牖疏朗丹堊煥如儲經之數十有三旁列子史百家規制整密視昔改觀落成之日搢紳先生邑弟子員瞻望咨嗟皆以為文教之復興於是乎兆今年戊辰春陳君就試北上謂是役也宜有記以告羣學者而固請於余余雖不文不可無辭以塞我友之意也昔者夫子雅言詩書執禮而曰吾志在春秋學易可以無大過當是時未有以經名也至六經十二經之說見於莊子而漢儒記禮始著經解之篇班氏傳儒林亦有所謂經學者聖人之教人在於躬行曰習而已其終身為學之序則曰十有三年學樂誦詩成童舞象二十而冠始學禮三十博學無方遜友視志四十始仕方物出謀發慮其分年而授之學則自一年離經辨志以後有三年五年七年之視由小成以至九年知類通達强立而不反而謂之大成其分時而教於樂正則春秋以禮樂冬夏以詩書蓋詩書禮樂之教相須而為用也如陰陽之迭運於四時而無一之可間如律吕之分播為八音而無一之可缺也其內外交養本末兼事為之有次第得力有先後不可誣也及其教之成則身心意知得其理而可以為天下國家之用其施之天下則人才陶淑而化民成俗矣此六經相為終始之效也或曰如此則大樂正之教何以不及易春秋乎曰春秋未經孔子筆削而易理精微非可言說也故韓宣子至魯始得觀易象春秋明非他國所得有矣然而春秋記事書之例也學至於知類通達比方窮理而及於大成則易之精微將不言而自喻矣是詩書禮樂其術雖四而猶之六也䆒之六經止一心也古人治經以養心故缺其一經則其本末內外之不備養之為無其具而才憂其不成後世以經視經則雖專通一經而已足名其家上應功令之求而有餘矣而其實不免於俗學之淺陋此金溪陸子所以有六經注腳之言而朱子亦曰經之於理猶傳之於經傳所以解經也經明則可無傳經所以明理也理明則可無經其說皆病夫俗學之淺陋欲學者反求之心而不徒溺於口耳記誦而已也然而陸子之說卒不能以無疵者其為之無次第得力無先後故也蓋但知窮經而不知內反之於心以求其實得於已者謂之俗學知反之於心矣其非有讀書窮理之功以驗夫此心之邪正而自陷於茫昧不可知之地者謂之異學陸子之學非以求異也而其流弊足以至此既及於此則何以矯正於俗學之淺陋哉若知夫二者之弊而其於尊經也思過半矣蘭溪自仁山倡教守朱子之學於一冉傳之後其士子皆朴茂而好修而又得賢師儒以為之帥而導之嚮方吾滋幸經尊而道明而人才之易成風俗之易變以復於古不難也閣在敬一亭後三面皆臨山朝嵐暮烟浮列几案而西瞰城市鱗次萬家皆可以供學者息游之助襄其事者為訓導曹君洪然董役者諸生某某陳君字紫馭方以文行有聲於時其成此宜不茍云白鹿洞講堂圗記白鹿洞本以唐李渤讀書處得名其為受經之地始自顔翊南唐就洞中建學宋南渡後朱子來知軍事拓地為書院四方從學者日衆於是時天下四大書院白鹿洞為尤盛元之山長多以處士博聞有道義者充之明三百年山長之設無聞書院時廢時復卒不領於天子之經制以至於今士大夫官於其地而知以講學為事者寥寥也翰林院侍講髙公先秉憲督學江右甫下車進士子諭以朝廷崇儒重道所以興起文事至意以其校藝之暇帥士子至鹿洞釋奠先師退就講堂陳經敷席鐘鼓笙磬叶奏堂下音吐朗徹揖讓有儀瞻歎者以為目所未經見於是命善手圗其事用垂久逺昔魯頌美僖公新泮宫其前三章皆曰思樂泮水水三面縈繞學宫如璧判然紀其勝也繼之以采芹采藻采茆水之所産也又述其出郊儀衛之盛旗斾飛揚車馬壯飭而鸞聲在道亦噦噦然和而有節無小無大從公于邁願學者衆也載色載笑匪怒伊教則講學行禮之事也古之重學也如是余未獲從公遊今披圗而觀之則潯陽之江九𣲖出其前風帆往來禽魚翔泳而並效於欄檻之下泮水之象與樹木蔭翳莎緑苔碧可以遊息而盤桓者有采芹采藻采茆之思焉織文鳥章掩映山麓畫􅎻停轍於林樾羣駟散齕於豐草伍伯圉𨽻雜坐卧其傍皆有喜色旗筏筏鸞噦噦馬蹻蹻可知也司鐸之官傴僂前引青青子襟老而擁書足趨階者少弱擠不前者立偶語者肩摩視者倚石傾耳如領悟者不可數計無小大從公者也公坐堂上對諸生若有所指揮溫溫然有樂易之容匪怒伊教此之謂也昔者魯道之盛泮宫修而頌聲作由斯以觀書院其復興如朱子時乎公以余為可與道古也者故屬記之如此拙閒堂藏硯記海昌陳公岱青司李髙凉有仁廉聲嘗自言吾視身外皆長物獨性嗜硯至癖每恨不能自克耳時卿士大夫為公德者競以好硯遺之公精於鑒别雖宦粵者數輩傾裝不能及也余從其季君子文叩所藏出之有曰卞璧者色正青紫長五寸餘圍八寸厚如其長數而不及者半其右却剡而窪中徑容三指許此石子文尤所寶愛陸君冰修為之記與兔弦白郡丞宣德舊坑三枚皆下巖石也又有曰龜巢端瓊爽鳩桃核鍾研之屬者合十有二枚而汰其次者弗著録子文藏以方底襲以綈錦每示客則拭几鄭重正衣冠而出之曰吾無以此為寶也先君數十年之精力聚於此矣孝子之於親也思其所嗜與其所好是鏗然而石者庸不得為吾之兑之戈和之弓乎願吾子之有以記之也傳曰父沒而不能讀父之書手澤存焉耳母沒而不能執母之杯棬口澤存焉耳夫不能讀者非却父書而不親也特其思慕之至執卷傍偟亦有若回翔蹢躅而不可已者斯其所以為不能也不能之心惟讀而後知之矣今子之於是研也將終襲而藏之乎抑有所用之乎子瞻曰真研不損真手不壞夫真研不損矣能保其久而無散乎故聚必有散此物之常理也以子之真手用彼之真研則研將得子之手以發其精華美粹之氣充滿宇宙焜耀竹帛斯經千百餘年無損矣况直人世俯仰旦暮之間哉吾視陳氏兄弟皆讀書修行紹其家學而子文之得之心而為文也其光鬱郁而肆浮其體溫栗而柔潤傍及六書變態波磔䇿勒之法無不諳善吾知子之所以守是研矣且子無僅謂是鏗然而石者是先君之遺也子文起曰善哉子之記是研也唯先君之靈吾不聞子之言研如卞璧者三一曰執法以司李公銘語故以名屬長君子厚一曰蟾蜍屬次君子啓三石皆最竒好事者不能目其髙下其端瓊者子文以貽余敦好齊記錢唐王子丹麓自署其所居曰敦好齊取陶公詩書敦宿好之義也余嘗稱陶公為學道者願因敦好之義而終言之夫自漢以來詩書之放廢久矣至魏之末季王何輩出競為清談以惑世士大夫非易老莊之書不讀易聖人所以明陰陽消息之理而與異端之㫖同述其傳流於江左糟粕六經菲薄湯武百餘年不絶而後熾為乾竺之教至於江陵失守蕭繹輟講文武之道竟與瓦礫同殉此晋名流之遺禍所以不在秦李斯下也陶公傷之其言曰洙泗輟微響漂流逮狂秦詩書復何罪一朝成灰塵區區諸老翁為事誠殷勤如何絶世下六籍無一親其悲時憤俗而自寓之意見矣南朝二百八十餘年無人能為此言者惜也遭時不幸終以酒人自晦非其志也使其得時以試行其所學佛老之害或者其猶未甚歟今王子德修學殖適於世用其視陶公之所好當不僅托諸閒居也已然而今天下風俗之患與前又異人懷狙詐貪利鮮恥名節不立忠信不植朝野相被習為固然此其較清談之害孰多吾滋懼先王仁義禮智之教不盡委諸地不止傳曰君子反經而已矣經正則庶民興夫物流極則必反由今之道反之必自經術始吾友能無意乎吾與子之稱是齊者宜在此不在彼也汪東川讀書圖記中允東川汪君一日攜此幅過余曰此禹生為余畫少陵詩讀書秋樹根圗蓋兼取負米刈葵之意余視京師士大夫無慮三四百人其間祿得侍養者不及三之一求如余之具慶者殆十無一二比䝉天恩許之歸覲家在兩湖間山水幽勝奉吾親而處焉暇則執卷咿唔其中以博老人之一笑此吾所謂至樂也願子有以記之余嘗謂人生有三不可悔少年不讀書老大不可悔有親不能事親後不可悔此身一敗行終身不可悔自循卑賤無過人之節亦不至自陷於不肖之行但於養親讀書蹉跎兩負每終夜思之戚然餘痛顧人老事去而悔無及矣君具幾先之哲常能處人所不爭之地以此免於悔吝者數矣余每從事後私為人傳說其梗概今復乞養於强仕之日讀書而養親以終老焉可不謂賢哉昔漢仲長公理欲卜居清曠兼珍奉養以樂其志晋潘安仁居騎省時思御板輿奉太夫人遊於家園而作閒居賦二人昧於榮利卒嬰世網為世所惜君獨能瀟然於出處之際如此非獨於余之所悔而不得者幾可以無憾迹其所為古人有所不及也然彼二子者遭時喪亂欲遂其志誠難搢紳先生幸遇承平之世進則回翔禁闥盡啓沃之職退則偃卧邱園有定省之樂出入顯晦無所不可上下千百年間如此遭際豈多得哉此觀是圗者不可不思其所自也勉齊記余寓天津日從愚菴張君遊其嗣君子勉子勉師宛平楊子可久吾同年友也每率兒子嗣洙過其讀書之齊飲酒論文常至夜分别余將還京師子勉請所以名其齊者余即以其字題之曰勉齊昔孔子對哀公以困知勉行為三纍之下今子勉天性敏妙為人醇懿篤實有造道之器其於學也可不勞而成余之以是名其齊也何居蓋古人為學工夫次第其勞逸雖殊等而君子之自治也恆樂處其最下者而已惟其質之駑鈍故勞苦艱難而猶懼其無所成若夫有過人之姿而自甘於庸衆人之所不屑為程之以逺大鼓之以勇猛積之以不已譬猶聚糧出門戒舟輿冒險阻以行於萬里之途雖不遽至其至也可計日待矣若夫閉門而安坐雖趫材軼足跬步不足以自達勉與不勉之故也人一已百人十已千彼豈必皆中材以下哉凡事力均而功倍則其舉之也易而成之可以久而弗壞鹵莽而為之則亦鹵莽而報之矣故董子亦曰事在勉强而已子勉尊甫望子成立延名師教之又廣市書籍經史監本及諸子名集雜家者流之書視其校讐之善而摹刻之工緻者無不充牣於齊中子試掇其精而咀其華以為養心修身理物經世之用而餘以資為文章之助上之可嫓夫古作者下之不失為聞人可以取榮名顯當世勉之時義不既大矣哉遂書以質吾友其平時所常為子勉論說者宜有取於此也停舟書屋記余於京師宣武門外從逆旅主人僦屋數椽其半撱而分為室者三略如舟然而以余之所居也因名之曰停舟書屋主人曰吾視往來之人凡有事於江湖者逺或數千里近或數舍莫不候風色伺便利計日併程窮力而求至故遇便風揚帆聨艦比艘乘濤上下舟子安坐而擁櫂行者憑艫而眺望瞬息抵岸則釃酒擊牲以為樂此亦行旅之至適也有舟於此偃桅踣檣蕩漾洲渚曠日而不得濟目送去者羣百千輩已獨惶惑不離其處此則勢之所去而行道者之所不顧也子之以是名也必更之無以子纍吾居余曰子不知天道乎夫盈乎彼必虧乎此者天之數也子桑曰父母豈欲我貧天地豈私貧我哉吾求其為此者而不得也然而至此極者命也夫今是舟之遇我於此亦命也子惡庸諱是哉雖然吾未見彼之必得而此之必失也今夫駕風而行勢若激箭不終日而舍者舟之常也一旦風水撓之及涯而阻者有矣不幸放乎中流卒然而遇不測之險顧視兩岸茫無涯涘當此之時則停舟之不如且夫豫憂其顛隮之及不當止而中止者過也舍其安居無患而歆羡於目前之快意者惑也吾知命焉而已主人莞爾笑曰子言固當然使子之有求於此則無以異事營營者也子信無所求也則何不舍子之舟以返子之家偃息乎庭闈散步乎園廬流覽乎詩書頓撼之所不及驚戚之所不加不亦善乎孰與夫栖栖以待是者哉余曰子休矣吾行謀之矣遂述其言為停舟書屋記思硯齊記僉憲許生洲先生示余以施侍講思硯齊記先是僉憲之大父中丞公為紹興守夢蘇端明手授一研翌日使𨽻種竹掘地得硯於卧龍山麓旁刻天然硯三字畫其背為東坡小象中丞寶之終身崇禎間公殁後兵亂失去子封奉直公每追念出涕因營齊而居之而思硯以為其名客有謂余曰噫嘻夫夢果可憑耶彼硯者果有所受之耶其得之也豈其適然而失之也豈偶然耶吾聞中丞公居官廉去任之日所載不過囊衣至今浙人猶能稱道之計其土苴金玉而粃糠富貴久矣方且以其神徜徉浮遊於造化之表而其視一硯之得失也詎有毫末足芥蒂其胸中者而以是名其齊無乃非先中丞之意乎余曰不然夫為人子者思其先人之所嗜好所遊處觸目而感之一切不敢以為無有者孝子之志也至於無見而懓然如有見無聞而愾然如有聞甚矣則其視一硯之得失於夢醒間也不猶之視人生之存亡得喪聚散離合俯仰變換於數十年之中而與之感而思思而有所歔欷宛轉為不可解哉夫死生亦大矣而况於父子之間哉此思研齊之所為作殆有不期哀而哀至者已僉憲之官京師也遍謁於所知求詩文以述其尊先生追慕之至而冀以少慰其思侍講謂奉直公賢能不匱其孝僉憲之能曲成其志皆可書信也僉憲公新奉命督學政關中裝行有日矣緣奉直公志將躬行表帥講學明道以興起其一方之士子意甚盛也余謂中丞公之硯不亡矣故記十二硯齊記余至京師交汪舍人蛟門聞有所謂十二硯齊者輒欲一至其處舍人曰無有也硯者吾夢也而齊者吾所假於大司馬梁公之館以挈吾妻子奴婢所朝夕與處者也自吾之來京師攜一硯粗理而不受墨其旁緣缺然吾挾資以僦人之居則朝至而夕徙然而硯者吾之所癖好也嘗夢得之其數十二故以名吾齊聊以寄吾生平之趣而已余曰善哉子之所託也今夫藝藝而生者其所需於物寧有涯耶膏澤取於天貨財取於地日用玩好耳目之養取於山川雲物鳥獸蟲魚草木之繁夥若是者何一非假之於物者哉及其事去時移則向之所需泯然無一存焉已夫且與物而俱化而愚者妄信之以為實然且執之以為已有庸詎非大惑歟夫日中而行說夢於途之人指逆旅而號之曰吾廬也則人必溺然疑之而不知吾生之孰非夢吾所居之孰非逆旅也不亦悲夫若知凡物之本非吾有吾皆得資之以為吾用此其為樂豈不大哉其處也仰而採於山俯而汲於泉烟雲足以資吾之懷抱琴書足以供吾之笑傲其達也宫室帷帳以為安黼黻旗斿以為飾鐘鼓絃管八音之備以為樂肥甘以為吾之飲食而輿臺以為吾之使彼其初皆非有與於我也而吾皆得而有之其得之以為固然取之不知其為誰余終身享之而不可以厭是尚不知吾身之為吾有也而况凡物之自外至者乎故曰身者天地之委形也知身為吾之所本無與物之原未嘗為吾有以無有遇無有則汜然而若辭充然而不居若是者以語於道則幾矣然則舍人疇昔之夜殆非夢也子之硯固在而子之齊固不待假而有也余以舍人為知道雲起樓記樓居惠山禪寺之左二百步其下為惠泉舊有築於泉之上者曰極目亭後改為三賢祠皆背山而俯瞰泉以為遊觀者之所登眺而休息然其規制庳隘浸圯以隳伯成公之蒞兹土也拊摩嫗煦民以大愈謳誦接乎閭閻祥風被乎山川乃以其休暇與客登山飲泉久之仰視山半邱壤穢茀草木叢蔽以為無以蕩滌神明助耳目之觀也爰謀於邑之士大夫披石剪萊相其舊址而廣之創髙樓其上懸若天半圍以雕欄曲楯夾以栝柏松杉砌以文石周以清泉然後躡梯而升倚樓而望則澄江逺帶衆山如拱射貴之湖淡灔潝潗澄碧萬頃皆若攬挹於杖履之下往來得所憑依登覽者以為快焉是山自惠山而北矗起九峰岡壠合沓狀若九龍之相連綴故名為龍山或傳嘗有龍鬬於其上故亦名鬬龍也而以雲起名其樓者則自公今日始山取其騰踔如龍樓取其蒸變如雲公所以願望乎邑之人士也彼邦之人沐浴滲漉慶公之有作反以祝乎公龍之蚴蟉兹山之下雲往而合崇朝其雨龍之蜿蜒兹山之巔雲之油油布護自天公所居地潁川南陽實龍之藏誰靳公以澤而以潤於一方皇皇寵命有降自昔公不可遺民以袵席余以公與民之交相得也異日政成而去民將視其所憩而樂依焉則是樓之建其可輕乎遂因搢紳先生之有請紀石以告來者貞靖祠雙松記故兵部主事三原房公以明崇禎十三年省墓歸里值賊李自成盜據關中脅降諸搢紳强之官公不屈走深山匿跡至絶粒死里人哀其節私諡貞靖先生立祠祀之其嗣君今慎菴京兆得白松二株於涇陽韓氏歸植之祠廡外時松以拱把又種異或滋疑其難植閲今二十年豐幹攢起相對峙如人拱揖狀摽枝外蔭髙出牆垣數尋恍如百餘年物人皆以是松之堅貞皓潔為與公類意者其神靈所憑過其下者莫不咨嗟生敬京兆君繫官京師十年每瞻慕桑梓遇客自里中來輒問祠修飭與否兩松度今長大何若既知其然則益喜請所知為詩文辭紀其事以及余余歎公完節而京兆能封植此樹不忘孝思足世其家愚不自揆為侑神之曲一章使歌而薦之曰有祠肅穆兮嵯峨之下嗟我公兮神所舍驂虬駟兮霓旌撫八極兮逰太清忽下顧兮中庭素鬛兮緑髮枝連蜷兮長歎曽陰屯兮天寒乞孤凰兮啼鵑指翠柏兮摧為薪感冬青兮颯已殘靈之來兮遲遲心悱惻兮有所思蕙肴陳兮桂醑紛交柯兮承宇既碩且蕃兮永福女萼圃記定海為甬江入海地余所見十五六年間艅艎之驚數至居人負盾荷擔而立猶日惴惴然邑著姓謝氏第閥相望余從游其羣從間顧視其居亦多就毁撤臧獲廬舍與兵馬雜居逮余再來而居民稍復其故處謝子在武治園於其室之西偏名曰萼圃日與諸伯仲遊翔其間以講德而問藝焉一日君觴余園中問余浪遊幾年意中得失幾何事追念前十年間烽火震驚婦子之不保今得息焉逰焉於此者豈非邀天之幸而然耶余倚酒微酣為謝君詠杜少陵詩安得廣厦千萬間大庇天下寒士皆歡顔輒奮袖慷慨起君兄弟亦不以余為狂也嗚呼此屋雖修廣不數畝無竒花怪石以供耳目之玩而得此於亂離之後可以見戎馬之漸息太平之將兆其在君兄弟朝夕聚處又可以見其能無事而儐籩豆飲酒以相樂有事而敦在原急難之意以相恤更世多故如此等皆不數見也然以君之才度非久淹滯於此者今吾鄉雖幸少安頃所經過自吳㑹之屬之淮南北被災處懷襄千里一望村墟無不蕩為魚鱉之居而魭鰍之宫生靈數百萬安所托命又不獨天下寒士可念也君異時富貴其無忘吾賦詩慷慨時乎京口義渡贍産碑記自岷山導江而下出峽汗漫數千里至金焦一束外旋行逆折然後朝宗於海此曹子桓所為臨江賦詩徘徊而不敢進者也然余考之史記秦始皇登㑹稽還從江乘渡注其地在句容縣北六十里不知何時復徙瓜步梁庾信集有奉命使北始渡瓜步江詩至唐開元二十二年刺史齊浣以舟行繞瓜步回逺六十里始從京口埭下直趨渡江路徑而免漂溺之患故自唐至今瓜步渡者皆徙而之京口然往時京口與揚子橋對岸瓜洲特江中一洲耳後瓜洲以北淤漲與揚子橋連南直對潤州江身益狹則水流益汛急舟緣金山之麓而行春秋之間上流泛漲山水相摶觸漩而為渦激而成湍雖恬風霽景猶懼變生不測少遇風波失利一匏千金故京口之渡為天下最險余六月渡江登金山見山足艤舟五六舟人操楫而坐若有待者寺僧深爽進曰此為濟渡之舟自巡檢某公設此後凡有事於兹土者及往來行旅各捐俸及資益造舟買田置市租以贍水手之稍食及其賞格之費焉然久滋易弛也某懼斯人之弗脫於險而大隳前功願得一言以示來者余惟易既濟稱君子思患而預防其說在六四爻曰繻有衣袽終日戒夫涉川者不能戒之於未濟之前特恃其一舟之無隙以與彼狂颷駭浪爭命於呼吸之頃固且不可况於待其既濡然後操舟而拯之此與夫救火者之焦頭爛額何以異然而聖人之慮患也偏視夫事之可需者則需之有需之不能不得已而濟者則終日戒之至不得已而濟而終日之戒之猶不足以勝夫所濟者之險既已瀕於死亡矣乃忽然而得生彼仁人者之於此視夫人之脫之死而易之生其心樂不樂也自數舟之設常嵗活人以四五十計不十年而得活者四五百人矣由十年以前觀之彼四五百人者皆江上之遊魂水府之鬼籙也然則使自今十年之後之人有一不得濟以淪胥以亡者於吾心不且有戚戚乎哉若夫推前人之心以濟於無窮此則思患預防之道宜如是也深爽學佛者也為佛之學者使人求福於𡨕𡨕其說多幻妄不可信深爽獨能推廣有司德意使人之得免於險且曰我佛之道固然其為世利益多矣余樂其有是請也而書重建陜西驛傳道衙門記本朝驛傳之制昉自前代順治間部議裁闕陜西則并其事於糧儲道康熙三十一年總制題復之移某於黔中來領其事時舊署既毁余至乃請於督撫治舊按院衙門顧按院署亦廢久唯荒址僅存或議請官給其費或議宜責成有司量𣲖里甲余唯關中向罹兵燹繼當災祲流亡之後䝉皇上恩德多方賑濟還定安集之民始克胥匡以生驛傳之復所以佐行省旬宣之不逮余首膺此任其可重繁費以厪聖天子西顧憂乃勉自經營召吏興工庀材飭事自門廡㕔事以至內廨射堂賓館公私之舍官吏之棲以間計者幾千楹棟梁櫨欂椽桷巨細之木以數計者幾千株至於磚甓瓦石蜃蛤之灰丹黝之漆綵繪之色之以物計者夫役工匠執事之屬之廪而以人計者莫不先為程度量力而授之事經始於某年某月日訖事於某年某月日用工之多至若千總費鐵五千萬有竒而官與民不知焉蓋余之為此也綦勞矣昔周禮地官遺人之制掌郊里之委積以待賔客野鄙之委積以待羇旅凡軍旅㑹同師役掌其委積之事則今驛傳所職掌近是其制曰國野之道十里有廬廬有飲食其屬則地官所謂廬氏若有賔客則令守凃路之人聚􅝵之是也三十里有宿宿有路室路室有委其屬則地官所謂委人掌以稍聚待賔客以甸聚待羇旅而軍旅共其委積芻薪者是也五十里有市市有候館候館有積其屬即秋官所謂司市凡㑹同師旅司市帥賈師而從治其政令者是也周建都豐鎬畿內千里為今布政司所轄之地當時車書萬國玉帛奔輳而十里三十里五十里之委積儲之也素而供之也時故遺人之職可以不勞而集今夷為列省地當西北徼道大帥設閫開府者數十處又內接晋豫楚蜀西抵蕃界北連沙漠冠蓋之銜命而出者與夫兵馬之往來驛騷日百十輩而十里三十里五十里之委積儲之不必其素而供之不必其時董其事者不亦難乎夫人必安其身而後可以盡其思於職業且長安省治諸屬國朝貢所出之孔道也使野處而草茇焉天子命使之謂何而何以繫觀瞻余自下車以來釐革冗弊凡芻料之減尅夫役之疲困勢利之豪脅有司之徇情莫不上遵國憲下順人情而曲為之制洗手奉職與民無擾冀以少報天子特簡之恩與督撫虛公委任之意然後經理是役迄於有成既落成而記之以志吾之不敢苟於其職已耳非敢以為後來之法然後之登斯堂者或亦慨然興感思有以補吾之不及此余之所以深望也已記周孝廉兩世改葬事孝廉以父墓非吉數謀改卜而兄弟難之未果臨沒以誡其三子既沒猶視母夫人從城中來撫之乃暝卒後三年子廷韓兄弟遂遵先命請於伯叔父自鄧尉遷葬軍障山啓封之日孝廉殯猶在堂家人歸竟夜聞若有聲哭嗚嗚不止聽者皆為感慟至棺出於土則蟻蝕木幾盡然後其兄弟咸服其先見而悔其遷之不蚤也孝廉初祔葬山左後廷韓卒廷范與其季揚議以軍障兆域隘復卜地泉瀆河陽泉瀆者地本周氏業佃者竊鬻諸富室嵗輸之租而糧存舊户孝廉知之不問也後富室訟糧於官佃者窘以情告孝亷笑曰是無患吾并糧豫之則汝訟解矣佃感激去范兄弟至是乃厚值贖歸其地遷孝亷與其元配倪孺人柩合葬焉孝亷之不校廷范兄弟之能曲成先志而妥其神靈於地下也詩曰教誨爾子式穀似之周氏有焉孝亷諱炳文文季其字無錫人余在京師廷范持總憲徐公墓表來日造余邸復謀所以久逺其親者言及必涕交橫下其請至經年益勤余以是愈知孝亷之賢而樂其有後若孝亷名行總憲公援明季朱德升先生贈諡故事以為惟孝亷足嫓美其鄉先輩而自愧不能為表章德升之姚文毅其說既以備矣余故不敢復贅與萬充宗書承教儀禮商已命童子録竟披玩反覆意義周到無罅可尋其尤辨者在寢廟之論謂大夫無私朝此皆先儒所未及愚更有臆說可與兄論相發明者附質於右周制三朝一在庫門之內大門之外曰外朝一在路門之外曰治朝亦謂之內朝亦謂之外朝一在路寢庭曰內朝亦曰燕朝自愚考之則周二朝也曲禮天子當寧而立諸公東面諸侯西面曰朝周官太僕掌燕朝之位文王世子公族朝於內朝臣有貴者以齒此燕朝在路寢庭不過為公族相朝燕飲之地臣以齒為上下非有朝儀位署之法也故玉藻日視朝於內朝退適路寢聽政路寢之制特用以聽政耳故不曰朝其大朝會則在路門之外其時則司士掌朝儀天子當寧而立於門諸公諸侯以次東西面立始謂之朝耳其禮儀儼肅非路寢庭比由此知路寢庭無朝名當時因天子取其近便居以聽政猶唐人喚仗入閣之制而其後遂相㳂以為朝耳不然路寢庭外既有朝矣而復置內朝於庭之內不既贅乎哉由此觀之則知天子之寢庭亦無私朝不獨大夫為然也大夫路寢庭無私朝可曰私朝天子路寢庭無內朝亦可曰內朝考內朝之名始見於文王世子文王為世子時王季諸侯也不得有庫門外外朝之制故以治朝為外朝以燕朝對外朝則謂之內朝耳周既有天下兩從其稱然謂治朝之為內朝者正也玉藻之文也周既有天下之制也謂為外朝者非正也文王世子之文也周未有天下之制也又諸侯庫門外朝經亦無明文鄭氏特據周禮及戴禮玉藻意推之知中門之內大門之外别是有朝既有內外兩朝則燕寢之不得復為朝審矣故曰緣文王世子之文也偶見及此兄意或未為然必以示我上張閣學書昨客都門倉皇返棹未獲時親教益至今惘惘也先生抱匡時之略應泰交之㑹外長官寮入參機禁異數重叠出自宸衷旦夕用其道以𢎞太平之化草野伏聽可勝欣慰史局得先生與南陽公為領神發凡起例勒成一代之書自當與日月並懸豈直嫓美三史而已承部下徴先曾祖太常公志銘前已繕送今别緘一冊奉覽明神廟時國本一案實發於先太常公此後盈庭水火為東林者莫不指公為之嚆矢而立儲自有長幼之㫖則已早定於萬厯十四年之一疏矣後伏闕再疏幾萬言語尤激切至以晉獻驪姬為比值當時厭言之際幸得留中然卒忤權相候補五年不得而去晚節被召至京才一月又為黨人擠退此公立朝行已之始末也愚歷考前史他不具述即前漢時如賈山路溫舒諸葛豐劉輔之輩皆僅以一疏慷慨史為立傳垂光竹帛况先太常奮不顧危浴日虞淵身受萬里之竄而之死靡悔至其謫尉之後拊循餘蹟光明俊偉比之前人懸絶萬萬此於例皆宜得書先生平生正直是與尤樂成人之美不肯苟沒人一節之善先太常之行事卓卓如此似無待於某之辭說者然而樂成人善者必其疾惡如凂者也不沒人一節之善者必其不妄徇人者也先太常直聲雖著於一時而其終始守道不渝之節概三十年沈淪州里採聽罕及先生或有所未悉而其中或不能以無疑疑而姑徇焉君子為之乎此某之所以不忍終於無言而有待於左右之一察之也且以先太常之潛德積久而未耀以先生之文章道德可傳信於後世而躬任筆削之事如此某因得冒昧攀援進求一字之褒以垂之無窮或者天憐孤忠不忍聽其終於泯泯而適值乎此時其亦有待而然耶未可知也伏望與同館諸賢商略定例特立一傳則不肖幸甚又先叔祖御史公諱思睿崇禎號能言事一參烏程再劾宜興諸所建白多關切治亂前䝉同徴及家傳故并以閒或得附書太常傳末尤所感戢徂暑惟為時保攝不宣上葉學士書都門拜别倐而載周涉兹炎夏伏惟尊候萬福逺承榮問晉陟崇階行且作時霖雨以慰顒顒者之望辱在知愛其為欣抃益何如也史局想已有成緒班馬著作成于一人之手今衆巧在門統歸繩削去取之際較前更難朝廷以兹事甚巨正非先生莫與任耳某草土餘生奄奄神氣文字之緣不復置想徒負知已二十年期許盛心良可浩嘆前䝉史館徴及先曾祖太常公志銘今奉到一卷先太常明神宗朝首爭冊封鄭貴妃觸上怒幾殆隨奉立儲自有長幼之㫖後國本得以無動者賴此一言為之地也身雖竄逐而功存宗社謫尉之後移令餘干服闋至京一扼於權相晚年內召再困於閹兒從此齎志牖下雖通籍四十餘年計散館後立朝僅百二十餘日沉淪外吏作尉者四年為令者三年耳易簀之日猶敕令置朝衣冠棺中我將上見二祖言天下事其忠君愛國之念無頃刻忘聞者無不哀其死而惜其生之不竟其用也今使悠悠之名復埋於身後則不孝為人子孫之罪何以自逭先祖户部公命某為家傳曰吾為曾祖伏闕請恤典守之七年竟得之恨未見國史耳汝後必成吾志某坐困一經潦倒白首不足以表章先人之遺緒則先祖之望或幾乎息矣而適與先生有平生之雅於此先生矯矯風節儀表當世獨立而不懼衆非而不顧推其志以達之於其所事誠有不可與流俗人言者噫亦難矣然先生不以其道之孤也所見匹夫匹婦纎介之善猶將進而誘之廣其聲譽以為好善者之勸况乎其言足以尊主安民其道足以濯世厲俗其遇之艱一躓而不振以至於窮老而不悔而其人已死徒幸其名在焉不幸其名之未立又以其子孫之無狀不足以表章先烈而使其名又將至于無所藉以傳則於大君子與人為善之心或者其猶有所未盡也且先太常之可傳不獨在國本一事其尉廣昌也境內有白狼為害則檄於邑城隍之神不數日而禽戮之如捕雛鼠焚妖廟之歲殺人為祭者三而民不驚宋丞相趙忠定公墓在餘干為守冢方氏所侵公正其侵地為文以祭之雷擊其人于墓道不旋踵此其政績之尤奇者其他所為民興革不可勝數比古循吏尤為卓犖列之諌臣類傳中宜無不可者某非敢以私干先生也朝廷委詞臣以筆削之任正以其是非明而好惡當耳是非之明好惡之當不在於地在於不沒其實而已先太常之名實暴著于天下已久使其不沒於萬世則先生之職也某何與焉然以某之無狀而使先世之流風餘跡得賴其人以傳以幸寬於不孝之罪戾則是先生由善善惡惡之公而波及於某一家之私某又何心可不知所以感也敬俟杪秋北上泥首以謝併所緝家傳及先侍御公傳尋送閣學公向承其顧遇因附候一通見希道愚悃臨書惓切寄鄧參政書某不肖不能自雕琢為文脂韋滑稽以投時好顧獨喜為古文辭間取古人希夷淡漠之㫖泊然而無味者閉户絃歌之以自排比成文章用自娛樂業與營營者背馳兼禀性迂拙不善隨時俗俯仰又絶不喜陰賊讒佞之習見人若此即拂衣起去不問貴賤而今世正多此輩觸手罣足動成觗忤自計此生當屏之深山長與木石為侣猶復不自禁時時出遊南北間以不合時宜之人挾其泊然無味之文輿服不足以動人丰采不足以敬衆積毁竦誚日引月長是以踵接貴人之門望閽趦趄無由自進宜其遊而困困而無所告欣以至於斯也而適遇執事於吳門吳之友曰宋子既庭曰繆子歌起者縷述執事之為人謂能貴而下士士無賢不肖皆得其歡心而其餘賢者禮遇之尤若不及焉卓然不以流俗之見動其中者也且又善子之文曰是百年中所無者子盍往見之夫先生古人也子以古人之道求之庶其有合也已已而相見果然復聞於繆子謂將謀之館人退自忖度以某之才非有所分毫得當於左右者襲碔砆於懷投卞和之門其庸濟乎既而念古之人有杜牧之者當奇章相之節鎮淮南牧之客焉日縱飲從狹斜間遊奇章不問也且日令壯士左右之牧既去始問知其故感泣終其身又有滕元發者館於范文正公家亦豪放不羇文正嘗思規之一日伺其出遊明燭坐室中少頃元發歸長揖問文正讀何書曰漢書又問曰漢髙祖何如人范逡巡不對而入此二公者雖不同然即其才能豈有所不如於輕雋之二年少哉然而前輩愛惜人才之至意固有出於尋常萬萬者初非有所責其勞而後待之厚望其報而後禮之殷也且牧之元發倜儻奇偉之士也非二公者容之則孰容之哉今某辱執事之知不後於古人不敢自外竊在下風聞之道路曰屬有小人之言間于左右不敢以辨夫合則留不合則去者某之道固然也豈以疑似之際與瑣瑣者多其辭說哉然而懷不能自已者以執事之知我今而有疑隱忍而就固不可默然而去尤未是也揆之或者之情當無他說直以某為狂不可近爾若以為狂則某固當學聖人之道而習其說矣其狂尚不如前二生云云之甚也就使某真狂如前二生者執事將不能容之乎是執事之卓然不惑其賢尚不如竒章文正也於某何有焉或者道路傳之非其真與而執事固未嘗有所過聽與則非愚之所敢知也某今歸矣家貧幸有先世遺書數千卷足自發憤薄田不多妻子尚不知凍餒某何求于人哉特以素䝉執事國士之知卒然辭去萬一世復有好士如竒章文正者起而誤收之儔人之中以不得出于門下為恨者恐亦執事之所恥也故敢以書謝且以為别臨書惶恐復張鳯陽書某再拜昨承手翰屬為先太君傳為僕之文為足以發幽而闡微則非愚力所敢任以僕列官史館有表揚幽貞之責若徒工祝辭而譽墓則何文之足傳某捧讀惶悚敢不勉焉竭其駑憊以副知已之望以慰孝子順孫顯揚無已之盛心然伏自思維唐李習之與皇甫持正書謂前漢事跡灼然在人口者以遷固叙述之工於學者恱而習焉其讀之詳也故溫習者事跡彰罕讀者事跡晦讀之踈數在辭之髙下而自誇其叙髙愍女楊烈婦謂不出班孟堅蔡伯喈下後唐書所記亦悉仍其舊文則其詞之工可知今太夫人節概固不讓此兩婦女者僕才非李翺而門下猥望之以遷固之事以期所以不朽于先人僕竊以為過也緣此逡巡閣筆者數日既感門下見知之甚誼不可以淺陋自外輒按狀撰次録呈惟左右讀而擇焉抑僕又聞之曾子固求歐陽公為其大父志銘先自為先大夫集叙一書致謝歐公今所傳者歐之文固精矣而曾公兩文激昻頓挫具有史公家法微歐陽其大父事亦多傳若門下所為家狀及枉書一通文詞茂美叙致悽惋不啻頡頑子固顧僕無歐陽之筆則太夫人之節烈後之秉史筆者舍門下所自為又奚取也僕拜命之辱因書其所愧并所嚮往於左右者用以為答復洪虞鄰書某自少讀先生行卷便心知嚮往藏此三十餘年矣長公來承先生不鄙而先惠之書兼賜大集讀之感荷不勝顧其辭㫖深博後進淺學茫然如望洋于大河之濱不能涯涘其涯涘也承諭比來有兩淅古文十名家之選所以嘉惠承學意良厚顧竊有疑者不敢不白於左右吾浙固稱文獻之邦自明洪永以來能以古文辭名世至今烜赫人口耳者幾人哉計三百年中無過三四公止耳王子充宋景濂方希哲王陽明是也他如謝方石茅鹿門徐文長諸公猶具體而未醇不足以齊肩於數公之列自浙而推之他省亦猶是也蓋人才之難得也何數百年英靈之聚靳于昔而獨盛于今時又皆出于浙東西一水之間而其數又不啻十人之多至此耶此某所以始承來教竊不能無疑也及展讀終幅云欲徴某文就選以充其所謂十人之數者於是不覺汗流顔頳舍其所以疑者復而為愧焉某固常有志於古之文矣若姿性駑鈍開卷過目輒眊亡向所習書隔數月視之如未經見以此自詭常得新書讀耳雖於作者之㫖稍窺見本原執筆為文時復相近然少年時科舉輟其半中年以後奔走疾患復輟其半所涉獵經傳竊取之以緣飾為文者特其稠雜中工夫什百之一二耳而貧賤也俗下應酬之文字又不能以無所為則其一二存者果可以盡信乎此視古人之并力一嚮以專攻斯事至于久而後名其家者大不侔也先生誤采其浮名而不知其實之無有使以某文字入選豈不足為門下知言之纍哉不但是也且使逺近有識之士讀某之文而妄揣量彼九人者之于文亦如是而已矣其為九人者之于纍先生者益不淺也某之所以終疑而且愧者以此然荷先生沖懷下問誼不可令長公虛往因裒次所著數卷附呈可一看置之若不䝉垂諒必欲以煩剞劂則某有瘞筆焚硯而逃耳臨復狂率唯鍳其誠欵勿罪某惶恐再拜與友人書昨承注示近著雜文十篇屬加㸃定僕于文無所諳識兼屢為時義所窘不得一意向古人書偶一開卷意緒茫然如日遊鄉閭小兒間而忽接於長者有道之側神氣塞然不能自勝豈復足以論不朽之業耶辱教惓惓不敢固辭於從者輒竭其愚陋於意有未安亦妄改易數處或疑其太狂率重開罪左右然以僕之憒憒為不辨文之佳惡則可使必欲掩飾聾聵隨儕拊抃竊知音之名投時俗之好于義不可且非所以待足下也方今古學陵遲足下憤然興起以作者自期此古人所難前年在金閶與計子甫草往還甫草日為文成必命僕檢定信使反覆再四不倦僕感激其誠亦時有異同不復更存形迹嘗作友說贈之述所以欲相扶而同進于古人之意今甫草稿中多載僕評論足下與同在京師久豈未之見耶既以此待甫草於足下懷有未盡亦誼所不敢出若其無見而好為妄言此在足下諒之耳僕從去夏别後亦時得文十餘篇俟暇時録呈足下論文精當非如僕之妄言者以僕操斧于大匠之門而劾其區區之誠亦冀足下之轉相報也不備某頓首投所知詩啓伏承閣下以某詩為可採特令送上者今抄就彚為一卷如左偕閽人以進或謂某詩多失志悲愁之作方今明良在上五辰時叙百工協和不宜以此瀆當路之聽且重見尤矣某應之曰君以哀怨之詩謂必出于衰亂之際而盛世無聞耶昔之聖人雖道溥澤隆而不能必民之皆德已博施濟衆堯舜以為難能班固食貨志載冬時民入居室男女有不得其所者乃相與詠歌自言其傷言三代聖王使民夜作燎火相共男女皆得以其間申其鬱積而比興之事起焉今所傳變風變雅者恐不盡周衰以後詩也韓愈謂物不得其平則鳴又曰臯陶鳴虞伊尹鳴商周公鳴周或疑此數人者處盛朝事聖君何不平之有而不愈而怨失事實矣不知伊尹當悔過之前周公居流言之後何得無怨耶特其怨之事有大小其用心公私不同耳今謂盛世之必無怨者是失人生憂樂之正者也然或以某之詩為自傷卑賤而有所憤許不平是又未是也愚自分道之興廢有命故嘗息意無營于世其觸物感發不能自禁而時激為酸楚悲凉之調以寫其不得已之衷此亦詩人之常事而其志或更有存者昔者伯夷傷黃農虞夏之不作悲道衰將餓死采薇自食作為詩義不忍與盜跖同富貴其志正矣然非孔子孰知其非怨耶又孰知其非如匹夫匹婦之自言其傷而有憂天下之志也故有憂天下之志而不與匹夫匹婦同其失所之歎者此伊尹周公伯夷之所同也太史公曰伯夷顔子雖賢得孔子而名益彰然則士非有知已則雖有伊尹周公伯夷憂天下之志其不同于匹夫匹婦之怨者幾希矣伏惟閣下其必有以鑒之其惶恐再拜湛園集卷三
